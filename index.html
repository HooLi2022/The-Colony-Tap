            background: #1a1a2e;
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }
        .container {
            max-width: 950px;
            margin: 0 auto;
            background: #1e1e32;
            border-radius: 20px;

        .header {

            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255, 165, 0, 0.3);
        }
        .logo {
            font-size: 36px;
            font-weight: 900;
            color: #ff9800;
            letter-spacing: 3px;
        }
        .logo span {
            color: #fff;
            font-weight: 300;
        }
        .subtitle {
            font-size: 14px;
            color: #aaa;
            letter-spacing: 2px;
            margin-top: 5px;
        }

            align-items: center;
            gap: 14px;
            box-shadow: 0 0 20px rgba(255, 152, 0, 0.2);
        }
        .selected-car-display .car-icon-big {
            font-size: 42px;
        }
        .selected-car-display .car-info-block h3 {
            font-size: 18px;
            color: #fff;
            font-weight: 700;
        }
        .selected-car-display .car-info-block p {
            font-size: 13px;
            color: #ccc;
            margin-top: 2px;
        }
        .selected-car-display .car-badge-big {
            display: inline-block;
            background: #ff9800;
            color: #000;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
            margin-top: 4px;
        }

        .search-box {
            margin-bottom: 15px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 12px 45px 12px 18px;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .search-box input:focus {
            border-color: #ff9800;
        }
        .search-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
        }

            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 20px;
            justify-content: center;
        }

            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #ccc;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
        }
        .filter-btn:hover {
            background: rgba(255, 152, 0, 0.2);
            border-color: #ff9800;
            color: #fff;
        }
        .filter-btn.active {
            background: #ff9800;
            color: #000;
            border-color: #ff9800;
            font-weight: 700;
        }
        .total-panel {
            background: #ff9800;
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 8px;
            position: sticky;
            top: 10px;
            z-index: 10;
        }
        .total-label {
            font-size: 12px;
            font-weight: 600;
            color: #000;
            text-transform: uppercase;
        }
        .total-price {
            font-size: 28px;
            font-weight: 900;
            color: #000;
        }
        .clear-btn {

            border-radius: 30px;
            border: 2px solid #000;
            background: transparent;
            color: #000;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
        }
        .clear-btn:hover {

            color: #ff9800;

            font-weight: 700;
            color: #ff9800;

            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

            margin-top: 0;
            padding-top: 0;
        }
        .service-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 4px;
            border: 1px solid transparent;
            gap: 10px;
        }
        .service-row:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 152, 0, 0.3);
        }
        .service-row.selected {
            background: rgba(255, 152, 0, 0.2);
            border-color: #ff9800;
        }
        .service-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            cursor: pointer;
            min-width: 150px;
        }
        .check-box {
            width: 24px;
            height: 24px;
            border-radius: 5px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: #000;

            background: #ff9800;
            border-color: #ff9800;
        }
        .service-name {
            font-size: 13px;
            color: #ddd;
        }

            color: #fff;
            font-weight: 600;
        }
        .service-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .service-price {
            font-size: 15px;
            font-weight: 700;
            color: #ff9800;
            white-space: nowrap;
        }
        .service-row.selected .service-price {
            color: #fff;
        }
        .detail-btn {
            padding: 7px 14px;
            border-radius: 20px;
            border: 2px solid #ff9800;
            background: rgba(255, 152, 0, 0.1);
            color: #ff9800;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.5px;

            background: #ff9800;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 152, 0, 0.5);
            transform: scale(1.05);
        }
        .hidden {
            display: none !important;

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal {
            background: #1e1e32;
            border-radius: 16px;
            width: 90%;
            max-width: 750px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            border: 2px solid #ff9800;
        }

            width: 5px;
        }
        .modal::-webkit-scrollbar-thumb {
            background: rgba(255, 152, 0, 0.4);
            border-radius: 10px;
        }
        .modal-header {
            background: #ff9800;
            padding: 16px 20px;
            border-radius: 14px 14px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 5;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 800;
            color: #000;
        }
        .modal-close {

            height: 34px;
            border-radius: 50%;
            border: 2px solid #000;
            background: transparent;
            color: #000;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover {
            background: #000;
            color: #ff9800;

            color: #ff9800;
            margin: 16px 0 8px 0;
            text-transform: uppercase;

            color: #ccc;

        .modal-body ol,

            padding-left: 20px;
        }
        .modal-body li {
            margin-bottom: 6px;
        }
        .modal-tools {
            display: flex;
            flex-wrap: wrap;

            border-radius: 15px;
            font-size: 11px;
            color: #ddd;

            padding: 12px 14px;
            border-radius: 0 8px 8px 0;
            margin: 10px 0;
            font-size: 13px;
            color: #ffa726;
        }

            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            margin: 10px 0;
            background: #000;
        }
        .modal-video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }
        .footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            color: #666;
            font-size: 11px;
        }

            .container {
                padding: 10px;
            }
            .selected-car-display {
                flex-direction: column;
                text-align: center;
            }
            .service-row {
                flex-wrap: wrap;
                padding: 10px;
            }
            .service-right {
                width: 100%;
                justify-content: space-between;
            }
            .detail-btn {
                padding: 6px 12px;
                font-size: 10px;
            }
            .modal {
                width: 95%;
                max-height: 80vh;
            }
        }
    </style>
</head>

                    'Открутите болты корзины сцепления.',
                    'Снимите корзину и ведомый диск.',
                    'Центратором установите новый диск.',
                    'Установите новую корзину, затяните болты крест-накрест.',
                    'Установите КПП на место.',
                    'Подсоедините кардан, стартер, тросик.',
                    'Отрегулируйте свободный ход педали.',
                ],
                warning: 'Тяжёлая работа! Коробка весит около 30 кг. Рекомендуется работать с помощником.',
                video: 'https://www.youtube.com/embed/dQw4w9WgXcQ',
                videoTitle: 'Видео: Замена сцепления ВАЗ 2107',
            },
            20: {
                title: 'Замена передних тормозных колодок на ВАЗ 2107',
                tools: ['Домкрат', 'Баллонный ключ', 'Ключ на 14', 'Отвёртка', 'Струбцина'],
                steps: [
                    'Ослабьте болты колеса, поднимите авто, снимите колесо.',

                    'Снимите суппорт и подвесьте на проволоке.',

                    'Очистите посадочные места щёткой.',

                    'Установите колесо.',
                    'Прокачайте педаль тормоза перед поездкой!',
                ],
                warning: 'Обязательно прокачайте педаль тормоса несколько раз перед началом движения!',
                video: 'https://www.youtube.com/embed/dQw4w9WgXcQ',
                videoTitle: 'Видео: Замена передних колодок ВАЗ 2107',
            },
            21: {
                title: 'Замена задних тормозных колодок на ВАЗ 2107',
                tools: ['Домкрат', 'Баллонный ключ', 'Ключ на 12', 'Отвёртка', 'Пассатижи'],
                steps: [
                    'Ослабьте болты, поднимите авто, снимите колесо.',
                    'Открутите направляющие штифты барабана (ключ на 12).',
                    'Снимите тормозной барабан (может потребоваться постучать).',
                    'Сфотографируйте расположение пружин и колодок.',
                    'Пассатижами снимите стяжные пружины.',

                    'Установите новые колодки, зацепите пружины.',

                    'Отрегулируйте зазор через смотровое окно.',
                    'Установите колесо, прокачайте педаль.',
                ],
                warning: 'Сфотографируйте механизм до разбора! Пружины легко перепутать.',
                video: 'https://www.youtube.com/embed/dQw4w9WgXcQ',
                videoTitle: 'Видео: Замена задних колодок ВАЗ 2107',
            },
            29: {
                title: 'Регулировка развал-схождения',
                tools: ['Стенд развал-схождения', 'Ключи'],
                steps: [
                    'Установите автомобиль на стенд.',
                    'Закрепите датчики на колёсах.',
                    'Проверьте углы установки колёс.',
                    'При необходимости отрегулируйте схождение рулевыми наконечниками.',
                    'При необходимости отрегулируйте развал (эксцентриковыми болтами).',
                    'Проверьте кастер (продольный наклон).',
                    'После регулировки проведите контрольный заезд.',
                ],
                warning: 'На ВАЗ 2107 регулируется только схождение. Развал и кастер без доработок не регулируются!',
                video: 'https://www.youtube.com/embed/dQw4w9WgXcQ',
                videoTitle: 'Видео: Развал-схождение',
            },
        };

        // Заглушка
        services.forEach(s => {
            if (!instructions[s.id]) {
                instructions[s.id] = {
                    title: s.name + ' (ВАЗ 2107)',
                    tools: ['Стандартный набор ключей', 'Отвёртки', 'Ветошь'],
                    steps: [
                        'Подготовьте автомобиль и инструменты.',
                        'Выполните демонтаж необходимых узлов.',
                        'Проведите требуемые работы.',
                        'Соберите всё в обратной последовательности.',
                        'Проверьте работоспособность.',
                    ],
                    warning: 'При отсутствии опыта обратитесь в автосервис.',
                    video: 'https://www.youtube.com/embed/dQw4w9WgXcQ',
                    videoTitle: 'Видео по ремонту ВАЗ 2107',
                };
            }
        });

        let selectedIds = new Set();
        let currentFilter = 'all';
        let searchQuery = '';

        function getPrice(s) {
            return Math.round(s.price * carMultiplier);
        }

        function formatPrice(p) { return p.toLocaleString('ru-RU') + ' ₽'; }

        function renderServices() {
            const container = document.getElementById('servicesList');
            container.innerHTML = '';
            let list = services;
            if (currentFilter !== 'all') list = list.filter(s => s.cat === currentFilter);
            if (searchQuery.trim()) {
                const q = searchQuery.toLowerCase().trim();
                list = list.filter(s => s.name.toLowerCase().includes(q));
            }
            const grouped = {};
            list.forEach(s => {
                if (!grouped[s.cat]) grouped[s.cat] = { catName: s.catName, items: [] };
                grouped[s.cat].items.push(s);
            });
            Object.keys(grouped).forEach(key => {
                const g = grouped[key];
                const title = document.createElement('div');
                title.className = 'category-title';
                title.textContent = g.catName;
                container.appendChild(title);
                g.items.forEach(s => {
                    const price = getPrice(s);
                    const row = document.createElement('div');
                    row.className = 'service-row';
                    if (selectedIds.has(s.id)) row.classList.add('selected');
                    let note = '';
                    if (price !== s.price) note =
                        `<span class="price-note" style="font-size:10px;color:#888;">(${price > s.price ? '+' : ''}${price - s.price} ₽)</span>`;
                    row.innerHTML = `
                    <div class="service-left">
                        <div class="check-box">${selectedIds.has(s.id) ? '✓' : ''}</div>
                        <span class="service-name">${s.name}</span>
                    </div>
                    <div class="service-right">
                        <span class="service-price">${formatPrice(price)} ${note}</span>
                        <button class="detail-btn">📋 Подробнее</button>
                    </div>`;
                    row.querySelector('.service-left').addEventListener('click', () => {
                        if (selectedIds.has(s.id)) selectedIds.delete(s.id);
                        else selectedIds.add(s.id);
                        renderServices();
                    });
                    row.querySelector('.detail-btn').addEventListener('click', (e) => {
                        e.stopPropagation();
                        openModal(s.id);
                    });
                    container.appendChild(row);
                });
            });
            if (!list.length) container.innerHTML =
                '<div style="text-align:center;padding:30px;color:#777;">Ничего не найдено</div>';
            updateTotal();
        }

        function updateTotal() {
            let total = 0;
            selectedIds.forEach(id => {
                const s = services.find(x => x.id === id);
                if (s) total += getPrice(s);
            });
            document.getElementById('totalPrice').textContent = formatPrice(total);
            document.getElementById('totalCount').textContent = selectedIds.size + ' шт.';
        }

        // МОДАЛЬНОЕ ОКНО
        function openModal(serviceId) {
            const instr = instructions[serviceId];
            document.getElementById('modalTitle').textContent = '📋 ' + instr.title;
            let html = '<h3>🔧 Инструменты</h3><div class="modal-tools">';
            instr.tools.forEach(t => html += `<span class="tool-tag">${t}</span>`);
            html += '</div><h3>📝 Пошаговая инструкция</h3><ol>';
            instr.steps.forEach(s => html += `<li>${s}</li>`);
            html += '</ol>';
            if (instr.warning) html +=
                '<h3>⚠️ Предупреждение</h3><div class="modal-warning">' + instr.warning + '</div>';
            if (instr.video) {
                html += '<h3>🎬 Видео</h3><p style="color:#ccc;font-size:13px;">' + instr.videoTitle + '</p>';
                html += '<div class="modal-video-wrapper"><iframe src="' + instr.video +
                    '" frameborder="0" allowfullscreen></iframe></div>';
            }
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('modalOverlay').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.add('hidden');
            document.body.style.overflow = '';
        }

        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

        document.getElementById('clearBtn').addEventListener('click', () => { selectedIds.clear();
            renderServices(); });
        document.getElementById('searchInput').addEventListener('input', e => { searchQuery = e.target.value;
            renderServices(); });
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentFilter = btn.dataset.filter;
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderServices();
            });
        });

        renderServices();
        console.log('✅ Готово! ВАЗ 2107 загружен. Кнопка "Подробнее" работает.');
    </script>
</body>
