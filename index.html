<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автосервис - Прайс-лист</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #1e1e32;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        /* Шапка */
        .header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255, 165, 0, 0.3);
        }

        .logo {
            font-size: 36px;
            font-weight: 900;
            color: #ff9800;
            letter-spacing: 3px;
        }

        .logo span {
            color: #fff;
            font-weight: 300;
        }

        .subtitle {
            font-size: 14px;
            color: #aaa;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* Заголовок блока */
        .section-title {
            font-size: 15px;
            font-weight: 700;
            color: #ff9800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            text-align: center;
        }

        /* Сетка автомобилей */
        .cars-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .car-card {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 12px 8px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
        }

        .car-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 152, 0, 0.5);
        }

        .car-card.active {
            background: rgba(255, 152, 0, 0.2);
            border-color: #ff9800;
            box-shadow: 0 0 15px rgba(255, 152, 0, 0.3);
        }

        .car-card-icon {
            font-size: 28px;
            display: block;
            margin-bottom: 4px;
        }

        .car-card-name {
            font-weight: 700;
            font-size: 12px;
            color: #fff;
            line-height: 1.2;
        }

        .car-card-detail {
            font-size: 10px;
            color: #999;
            margin-top: 2px;
        }

        .car-card-badge {
            display: inline-block;
            background: #ff9800;
            color: #000;
            font-size: 9px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 4px;
        }

        .car-card.active .car-card-badge {
            background: #fff;
            color: #000;
        }

        /* Поиск */
        .search-box {
            margin-bottom: 15px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 45px 12px 18px;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .search-box input:focus {
            border-color: #ff9800;
        }

        .search-box input::placeholder {
            color: #777;
        }

        .search-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
        }

        /* Фильтр-кнопки */
        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .filter-btn {
            padding: 8px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #ccc;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .filter-btn:hover {
            background: rgba(255, 152, 0, 0.2);
            border-color: #ff9800;
            color: #fff;
        }

        .filter-btn.active {
            background: #ff9800;
            color: #000;
            border-color: #ff9800;
            font-weight: 700;
        }

        /* Итог */
        .total-panel {
            background: #ff9800;
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 8px;
            position: sticky;
            top: 10px;
            z-index: 10;
        }

        .total-label {
            font-size: 12px;
            font-weight: 600;
            color: #000;
            text-transform: uppercase;
        }

        .total-price {
            font-size: 28px;
            font-weight: 900;
            color: #000;
        }

        .total-count {
            font-size: 12px;
            color: rgba(0, 0, 0, 0.7);
            font-weight: 500;
        }

        .clear-btn {
            padding: 8px 16px;
            border-radius: 30px;
            border: 2px solid #000;
            background: transparent;
            color: #000;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
        }

        .clear-btn:hover {
            background: #000;
            color: #ff9800;
        }

        /* Список услуг */
        .category-title {
            font-size: 12px;
            font-weight: 700;
            color: #ff9800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 12px 0 6px 5px;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .category-title:first-child {
            border-top: none;
            margin-top: 0;
            padding-top: 0;
        }

        .service-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.02);
            cursor: pointer;
            margin-bottom: 4px;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .service-row:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 152, 0, 0.3);
        }

        .service-row.selected {
            background: rgba(255, 152, 0, 0.2);
            border-color: #ff9800;
        }

        .service-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .check-box {
            width: 22px;
            height: 22px;
            border-radius: 5px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            color: #000;
        }

        .service-row.selected .check-box {
            background: #ff9800;
            border-color: #ff9800;
        }

        .service-name {
            font-size: 13px;
            color: #ddd;
        }

        .service-row.selected .service-name {
            color: #fff;
            font-weight: 600;
        }

        .service-price {
            font-size: 16px;
            font-weight: 700;
            color: #ff9800;
            white-space: nowrap;
            margin-left: 10px;
        }

        .service-row.selected .service-price {
            color: #fff;
        }

        .price-note {
            font-size: 10px;
            color: #888;
            font-weight: 400;
            margin-left: 4px;
        }

        .hidden {
            display: none !important;
        }

        /* Футер */
        .footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            color: #666;
            font-size: 11px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 12px;
                border-radius: 12px;
            }
            .logo {
                font-size: 24px;
            }
            .cars-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 6px;
            }
            .car-card {
                padding: 10px 6px;
            }
            .car-card-name {
                font-size: 10px;
            }
            .car-card-icon {
                font-size: 22px;
            }
            .service-row {
                padding: 10px 10px;
            }
            .service-name {
                font-size: 12px;
            }
            .service-price {
                font-size: 14px;
            }
            .total-price {
                font-size: 22px;
            }
            .filter-btn {
                padding: 6px 10px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- Шапка -->
        <div class="header">
            <div class="logo">AUTO<span>SERVICE</span></div>
            <div class="subtitle">Прайс-лист на слесарные работы</div>
        </div>

        <!-- Выбор автомобиля -->
        <div class="section-title">🚗 Выберите автомобиль</div>
        <div class="cars-grid" id="carsGrid"></div>

        <!-- Поиск -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Поиск услуги...">
            <span class="search-icon">🔍</span>
        </div>

        <!-- Фильтры -->
        <div class="filter-buttons" id="filterButtons">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="diagnostics">Диагностика</button>
            <button class="filter-btn" data-filter="maintenance">ТО</button>
            <button class="filter-btn" data-filter="exhaust">Выхлоп</button>
            <button class="filter-btn" data-filter="threads">Резьба</button>
            <button class="filter-btn" data-filter="transmission">Трансмиссия</button>
            <button class="filter-btn" data-filter="brakes">Тормоза</button>
            <button class="filter-btn" data-filter="welding">Сварка</button>
        </div>

        <!-- Итог -->
        <div class="total-panel" id="totalPanel">
            <div>
                <div class="total-label">Выбрано: <span id="totalCount">0</span></div>
                <div class="total-label" id="totalCarLabel"></div>
            </div>
            <div style="text-align:right;">
                <div class="total-price" id="totalPrice">0 ₽</div>
            </div>
            <button class="clear-btn" id="clearBtn">Сбросить</button>
        </div>

        <!-- Список услуг -->
        <div id="servicesList"></div>

        <!-- Футер -->
        <div class="footer">
            © 2026 AutoService. Цены без учёта запчастей и материалов.
        </div>
    </div>

    <script>
        // АВТОМОБИЛИ
        const cars = [
            { id: 'passat_b6', name: 'VW Passat B6', detail: '1.6 BSE', icon: '🚙', badge: 'Средне',
                multiplier: 1.0, custom: {} },
            { id: 'skoda_octavia', name: 'Skoda Octavia', detail: '1.6 Tour', icon: '🚗', badge: 'Легко',
                multiplier: 0.85, custom: {} },
            { id: 'audi_a4', name: 'Audi A4 B7', detail: '1.8/2.0 TFSI', icon: '🏎️', badge: 'Сложно', multiplier: 1.4,
                custom: { 7: 2800, 8: 5500, 14: 3000 } },
            { id: 'bmw_e90', name: 'BMW E90', detail: '318i/320i', icon: '🚘', badge: 'Сложно', multiplier: 1.5,
                custom: { 7: 3200, 8: 6000, 14: 3500 } },
            { id: 'ford_focus', name: 'Ford Focus 2', detail: '1.6 Duratec', icon: '🚓', badge: 'Средне',
                multiplier: 0.9, custom: {} },
            { id: 'reno_logan', name: 'Renault Logan', detail: '1.6 K7M', icon: '🚕', badge: 'Легко', multiplier: 0.75,
                custom: {} },
        ];

        // УСЛУГИ
        const services = [
            { id: 1, name: 'Компьютерная диагностика', price: 800, cat: 'diagnostics',
                catName: '🔍 ДИАГНОСТИКА' },
            { id: 2, name: 'Замена масла и фильтра', price: 800, cat: 'maintenance', catName: '🛠️ ТО' },
            { id: 3, name: 'Снятие/установка крышки двигателя', price: 200, cat: 'maintenance', catName: '🛠️ ТО' },
            { id: 4, name: 'Снятие/установка катушек (4 шт)', price: 500, cat: 'maintenance', catName: '🛠️ ТО' },
            { id: 5, name: 'Замена свечей зажигания (4 шт)', price: 600, cat: 'maintenance', catName: '🛠️ ТО' },
            { id: 6, name: 'Снятие/установка защиты двигателя', price: 500, cat: 'maintenance', catName: '🛠️ ТО' },
            { id: 7, name: 'Снятие/установка впускного коллектора', price: 2000, cat: 'exhaust',
            catName: '💨 ВЫПУСК' },
            { id: 8, name: 'Снятие/установка выпускного коллектора', price: 4000, cat: 'exhaust', catName: '💨 ВЫПУСК' },
            { id: 9, name: 'Резка приёмной трубы болгаркой', price: 500, cat: 'exhaust', catName: '💨 ВЫПУСК' },
            { id: 10, name: 'Резка старых гофр (2 шт)', price: 400, cat: 'exhaust', catName: '💨 ВЫПУСК' },
            { id: 11, name: 'Приварка новых гофр (2 шт)', price: 3500, cat: 'exhaust', catName: '💨 ВЫПУСК' },
            { id: 12, name: 'Высверливание сломанной шпильки (1 шт)', price: 1000, cat: 'threads',
            catName: '🔩 РЕЗЬБА' },
            { id: 13, name: 'Приварка гайки для выкручивания (1 шт)', price: 800, cat: 'threads',
            catName: '🔩 РЕЗЬБА' },
            { id: 14, name: 'Снятие/установка внутр. ШРУСа', price: 2000, cat: 'transmission',
            catName: '⚙️ ТРАНСМИССИЯ' },
            { id: 15, name: 'Устранение скрипа ручки КПП', price: 500, cat: 'transmission',
            catName: '⚙️ ТРАНСМИССИЯ' },
            { id: 16, name: 'Снятие/установка задних барабанов (2 шт)', price: 800, cat: 'brakes',
            catName: '🛑 ТОРМОЗА' },
            { id: 17, name: 'Покраска задних барабанов (2 шт)', price: 1200, cat: 'brakes', catName: '🛑 ТОРМОЗА' },
            { id: 18, name: 'Сварочные работы (от)', price: 500, cat: 'welding', catName: '🔥 СВАРКА' },
        ];

        let selectedCar = cars[0];
        let selectedIds = new Set();
        let currentFilter = 'all';
        let searchQuery = '';

        function getPrice(service) {
            if (selectedCar.custom[service.id] !== undefined) {
                return selectedCar.custom[service.id];
            }
            return Math.round(service.price * selectedCar.multiplier);
        }

        function formatPrice(p) {
            return p.toLocaleString('ru-RU') + ' ₽';
        }

        function renderCars() {
            const grid = document.getElementById('carsGrid');
            grid.innerHTML = '';
            cars.forEach(car => {
                const div = document.createElement('div');
                div.className = 'car-card';
                if (car.id === selectedCar.id) div.classList.add('active');
                div.innerHTML = `
                    <span class="car-card-icon">${car.icon}</span>
                    <div class="car-card-name">${car.name}</div>
                    <div class="car-card-detail">${car.detail}</div>
                    <span class="car-card-badge">${car.badge}</span>
                `;
                div.addEventListener('click', () => {
                    selectedCar = car;
                    selectedIds.clear();
                    renderCars();
                    renderServices();
                });
                grid.appendChild(div);
            });
        }

        function renderServices() {
            const container = document.getElementById('servicesList');
            container.innerHTML = '';

            let list = services;

            if (currentFilter !== 'all') {
                list = list.filter(s => s.cat === currentFilter);
            }

            if (searchQuery.trim() !== '') {
                const q = searchQuery.toLowerCase().trim();
                list = list.filter(s => s.name.toLowerCase().includes(q));
            }

            const grouped = {};
            list.forEach(s => {
                if (!grouped[s.cat]) grouped[s.cat] = { catName: s.catName, items: [] };
                grouped[s.cat].items.push(s);
            });

            Object.keys(grouped).forEach(key => {
                const g = grouped[key];
                const title = document.createElement('div');
                title.className = 'category-title';
                title.textContent = g.catName;
                container.appendChild(title);

                g.items.forEach(s => {
                    const price = getPrice(s);
                    const row = document.createElement('div');
                    row.className = 'service-row';
                    if (selectedIds.has(s.id)) row.classList.add('selected');

                    let note = '';
                    if (price !== s.price) {
                        const diff = price - s.price;
                        const sign = diff > 0 ? '+' : '';
                        note = `<span class="price-note">(${sign}${diff} ₽)</span>`;
                    }

                    row.innerHTML = `
                        <div class="service-left">
                            <div class="check-box">${selectedIds.has(s.id) ? '✓' : ''}</div>
                            <span class="service-name">${s.name}</span>
                        </div>
                        <span class="service-price">${formatPrice(price)} ${note}</span>
                    `;

                    row.addEventListener('click', () => {
                        if (selectedIds.has(s.id)) {
                            selectedIds.delete(s.id);
                        } else {
                            selectedIds.add(s.id);
                        }
                        renderServices();
                    });

                    container.appendChild(row);
                });
            });

            if (list.length === 0) {
                container.innerHTML =
                    '<div style="text-align:center;padding:30px;color:#777;">Ничего не найдено</div>';
            }

            updateTotal();
        }

        function updateTotal() {
            let total = 0;
            selectedIds.forEach(id => {
                const s = services.find(x => x.id === id);
                if (s) total += getPrice(s);
            });
            document.getElementById('totalPrice').textContent = formatPrice(total);
            document.getElementById('totalCount').textContent = selectedIds.size + ' шт.';
            document.getElementById('totalCarLabel').textContent = selectedCar.name;
        }

        document.getElementById('clearBtn').addEventListener('click', () => {
            selectedIds.clear();
            renderServices();
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderServices();
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentFilter = btn.getAttribute('data-filter');
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove(
                    'active'));
                btn.classList.add('active');
                renderServices();
            });
        });

        // Старт
        renderCars();
        renderServices();
    </script>
</body>
</html>
