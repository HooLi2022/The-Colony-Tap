<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Городская Игра</title>
    <style>
        /* Сброс стилей */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tahoma', sans-serif; }
        
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Главный контейнер - мобильный экран */
        .game-container {
            width: 100%;
            max-width: 420px;
            height: 750px;
            background-color: #322b36;
            background-image: url('https://www.transparenttextures.com/patterns/black-scales.png'); /* Имитация текстуры */
            position: relative;
            overflow: hidden;
            border: 2px solid #4a3e4e;
            box-shadow: 0 0 20px black;
        }

        /* --- Верхняя панель ресурсов --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            background: #2e2a2c;
            padding: 5px 10px;
            border-bottom: 2px solid #6b1818;
            color: #fff;
            font-size: 12px;
            height: 40px;
            align-items: center;
        }
        
        .resource-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .icon {
            width: 20px;
            height: 20px;
            background-color: #444;
            border-radius: 50%;
            display: inline-block;
        }
        .icon.gold { background: gold; }
        .icon.score { background: red; }
        .icon.coin { background: silver; }

        /* --- Фон с толпой (имитация) --- */
        .game-scene {
            height: 480px;
            background: #1a1215;
            position: relative;
            background-image: radial-gradient(circle, #2e1e2f 0%, #1a1015 100%);
        }

        /* --- Персонаж --- */
        .character {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: 320px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Маска (сделана через CSS) */
        .face-mask {
            width: 70px;
            height: 70px;
            background: #ccc;
            border-radius: 50%;
            border: 2px solid #333;
            position: absolute;
            top: 10px;
            background-image: radial-gradient(circle at 30% 30%, #fff, #aaa);
        }
        .face-mask::after {
            content: ":)";
            color: #300;
            font-size: 30px;
            font-weight: bold;
            position: absolute;
            top: 30%;
            left: 20%;
        }

        /* Тело - футболка */
        .character-body {
            width: 120px;
            height: 150px;
            background: #fff;
            position: absolute;
            top: 60px;
            border-radius: 10px 10px 0 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
            color: #000;
        }
        .shirt-text {
            background-color: #ffa500;
            padding: 2px 5px;
        }

        /* Ноги */
        .character-legs {
            position: absolute;
            top: 200px;
            display: flex;
            gap: 10px;
        }
        .leg {
            width: 40px;
            height: 90px;
            background: #333;
        }
        .leg.left { transform: rotate(5deg); }
        .leg.right { transform: rotate(-5deg); }

        /* Кроссовки */
        .shoe {
            width: 50px;
            height: 20px;
            background: #000;
            border-radius: 5px 5px 0 0;
            margin-top: 75px;
            position: absolute;
        }
        .shoe.l { left: 10px; }
        .shoe.r { right: 10px; }

        /* Диалоговое окно */
        .bubble {
            position: absolute;
            top: -60px;
            left: -80px;
            background: #fff;
            padding: 10px;
            border-radius: 8px;
            width: 200px;
            font-size: 11px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            text-align: center;
        }
        .bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: #fff transparent transparent transparent;
        }

        /* --- Левое меню --- */
        .menu-left {
            position: absolute;
            left: 10px;
            top: 80px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .menu-btn {
            width: 50px;
            height: 50px;
            background: #2b2b2b;
            border: 2px solid #8e2811;
            border-radius: 50%;
            color: #fff;
            font-size: 9px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            box-shadow: 0 0 5px #000;
        }

        /* --- Правое меню (действия) --- */
        .menu-right {
            position: absolute;
            right: 10px;
            top: 100px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .action-icon {
            width: 40px;
            height: 40px;
            background: #3a2e2e;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 20px;
            border: 1px solid #666;
        }

        /* --- Событие (акция) --- */
        .event-block {
            position: absolute;
            bottom: 50px;
            left: 10px;
            background: #222;
            border: 2px solid #555;
            padding: 5px;
            color: #ddd;
            font-size: 10px;
            width: 100px;
            text-align: center;
        }
        .event-timer {
            color: #fbff00;
            margin-top: 2px;
        }

        /* --- Нижняя панель (здания) --- */
        .bottom-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(to top, #8e7a63, #5a4942);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 3px solid #333;
            overflow-x: auto;
            padding: 0 5px;
        }
        .building {
            width: 50px;
            height: 60px;
            background: #4b3b33;
            border: 1px solid #222;
            position: relative;
            flex-shrink: 0;
        }
        .building img { width: 100%; height: 100%; object-fit: cover; }
        .shield-icon {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 20px;
            height: 20px;
            background: #666;
            border-radius: 50%;
        }

        .invite-btn {
            width: 60px;
            height: 80px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white"><path d="M5 20h14v-2H5v2zM19 4h-4V2h-2v2H9V2H7v2H5v14h14V4z"/></svg>');
            background-color: #b37d5a;
            background-repeat: no-repeat;
            background-position: center;
            border: 2px solid #8b4513;
            border-radius: 5px 0 0 5px;
        }

        /* --- Интерактив (JS обновляет это) --- */
        .clickable {
            cursor: pointer;
            transition: 0.2s;
        }
        .clickable:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>

<div class="game-container">
    
    <!-- Верхняя панель -->
    <div class="top-bar">
        <div class="resource-item">
            <span>⚡</span> <span id="energy">6.7k</span>
        </div>
        <div class="resource-item clickable" onclick="addMoney()">
            <span class="icon gold"></span> <span id="cash">11.5k</span>
        </div>
        <div class="resource-item" onclick="addScore()">
            <span class="icon score"></span> <span id="score">222.6B</span>
        </div>
        <div class="resource-item">
            <span class="icon coin"></span> <span id="coins">1.4Q</span>
        </div>
    </div>

    <!-- Сцена -->
    <div class="game-scene">
        
        <!-- Персонаж -->
        <div class="character">
            <div class="bubble">Мужик не тот, кто яйца брил, а тот кто в армии служил</div>
            
            <div class="face-mask"></div>
            <div class="character-body">
                <span class="shirt-text">Хулиган</span>
            </div>
            <div class="character-legs">
                <div class="leg left"></div>
                <div class="leg right"></div>
            </div>
            <div class="shoe l"></div>
            <div class="shoe r"></div>
        </div>

        <!-- Левая панель -->
        <div class="menu-left">
            <div class="menu-btn">Шнырь</div>
            <div class="menu-btn" style="background:#5a1e1e">Положение</div>
            <div class="menu-btn">Акция<br><span style="color:yellow; font-size:8px;">0д 2ч</span></div>
        </div>

        <!-- Правая панель -->
        <div class="menu-right">
            <div class="action-icon">🏆</div>
            <div class="action-icon">🚬</div>
            <div class="action-icon">🚗</div>
            <div class="action-icon">📦</div>
        </div>
        
        <!-- Информация справа снизу -->
        <div style="position: absolute; bottom: 150px; right: 10px; color: #fff; font-size: 10px; text-align: center; background: rgba(0,0,0,0.5); padding: 2px;">
            <div>Истекает через:</div>
            <div style="color: red;">14:03:18</div>
        </div>
    </div>

    <!-- Нижняя панель -->
    <div class="bottom-bar">
        <!-- Имитация строений -->
        <div class="building" style="background: url('https://via.placeholder.com/50x60/333/fff?text=🏢')"></div>
        <div class="building" style="background: url('https://via.placeholder.com/50x60/533/fff?text=🏠')"></div>
        <div class="building" style="background: url('https://via.placeholder.com/50x60/353/fff?text=⛪')"></div>
        <div class="building" style="background: url('https://via.placeholder.com/50x60/335/fff?text=🏬')"></div>
        <div class="building" style="background: url('https://via.placeholder.com/50x60/555/fff?text=⚔️')"></div>
        <div class="building" style="background: url('https://via.placeholder.com/50x60/222/fff?text=🛡️')"></div>
        <div class="invite-btn" onclick="alert('Пригласи друзей!')"></div>
    </div>

</div>

<script>
    // Простая логика для демонстрации работы кода
    let cash = 11500;
    let score = 222.6;
    let coins = 1.4;

    function addMoney() {
        cash += Math.floor(Math.random() * 100);
        document.getElementById('cash').innerText = formatNumber(cash);
    }

    function addScore() {
        score += 0.5;
        document.getElementById('score').innerText = formatNumber(score) + "B";
    }

    function formatNumber(num) {
        if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
        return num.toFixed(0);
    }

    // Автоматическое обновление энергии для реализма
    let energy = 6.7;
    setInterval(() => {
        energy += 0.01;
        document.getElementById('energy').innerText = energy.toFixed(1) + 'k';
    }, 5000);
</script>

</body>
</html>
