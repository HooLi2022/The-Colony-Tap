<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автосервис - Прайс-лист</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #1e1e32;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255, 165, 0, 0.3);
        }
        .logo { font-size: 36px; font-weight: 900; color: #ff9800; letter-spacing: 3px; }
        .logo span { color: #fff; font-weight: 300; }
        .subtitle { font-size: 14px; color: #aaa; letter-spacing: 2px; margin-top: 5px; }

        /* Умный поиск */
        .smart-search {
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .smart-search input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 30px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }
        .smart-search input:focus {
            border-color: #ff9800;
            box-shadow: 0 0 20px rgba(255,152,0,0.3);
        }
        .search-results {
            display: none;
            margin-top: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .search-results.active { display: block; }
        .search-result-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        .search-result-item:hover {
            background: rgba(255,152,0,0.15);
        }
        .search-result-item:last-child { border-bottom: none; }
        .search-result-name { font-size: 13px; color: #fff; }
        .search-result-cat { font-size: 10px; color: #ff9800; text-transform: uppercase; }
        .search-result-price { font-size: 14px; color: #ff9800; font-weight: 700; }

        /* Селекторы */
        .selector-section {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .selector-title {
            font-size: 13px;
            font-weight: 700;
            color: #ff9800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 14px;
            text-align: center;
        }
        .selector-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
        .selector-row:last-child { margin-bottom: 0; }
        .selector-group { flex: 1; min-width: 200px; }
        .selector-label {
            font-size: 10px;
            font-weight: 700;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .selector-buttons { display: flex; flex-wrap: wrap; gap: 5px; }
        .sel-btn {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.04);
            color: #ccc;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
            text-align: left;
        }
        .sel-btn:hover { background: rgba(255,152,0,0.15); border-color: rgba(255,152,0,0.5); color: #fff; }
        .sel-btn.active { background: #ff9800; color: #000; border-color: #ff9800; font-weight: 700; }
        .sel-btn .btn-code { font-size: 9px; color: #999; display: block; }
        .sel-btn.active .btn-code { color: rgba(0,0,0,0.7); }
        .selected-config {
            background: rgba(255,152,0,0.12);
            border: 1px solid #ff9800;
            border-radius: 10px;
            padding: 12px 16px;
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .selected-config-icon { font-size: 32px; }
        .selected-config-info { flex: 1; }
        .selected-config-name { font-size: 15px; font-weight: 700; color: #fff; }
        .selected-config-detail { font-size: 11px; color: #ccc; }
        .selected-config-code { font-size: 10px; color: #ff9800; margin-top: 2px; }
        .selected-config-badge {
            background: #ff9800;
            color: #000;
            font-size: 10px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 12px;
        }

        /* Фильтры */
        .filter-buttons { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; justify-content: center; }
        .filter-btn {
            padding: 8px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #ccc;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
        }
        .filter-btn:hover { background: rgba(255,152,0,0.2); border-color: #ff9800; color: #fff; }
        .filter-btn.active { background: #ff9800; color: #000; border-color: #ff9800; font-weight: 700; }

        /* Итого */
        .total-panel {
            background: #ff9800;
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 8px;
            position: sticky;
            top: 10px;
            z-index: 10;
        }
        .total-label { font-size: 12px; font-weight: 600; color: #000; text-transform: uppercase; }
        .total-price { font-size: 28px; font-weight: 900; color: #000; }
        .clear-btn {
            padding: 8px 16px;
            border-radius: 30px;
            border: 2px solid #000;
            background: transparent;
            color: #000;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
        }
        .clear-btn:hover { background: #000; color: #ff9800; }

        /* Список услуг */
        .category-title {
            font-size: 13px;
            font-weight: 700;
            color: #ff9800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 15px 0 8px 5px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .category-title:first-child { border-top: none; margin-top: 0; padding-top: 0; }
        .service-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            border-radius: 10px;
            background: rgba(255,255,255,0.02);
            margin-bottom: 4px;
            border: 1px solid transparent;
            gap: 10px;
        }
        .service-row:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,152,0,0.3); }
        .service-row.selected { background: rgba(255,152,0,0.2); border-color: #ff9800; }
        .service-left { display: flex; align-items: center; gap: 10px; flex: 1; cursor: pointer; min-width: 150px; }
        .check-box {
            width: 24px;
            height: 24px;
            border-radius: 5px;
            border: 2px solid rgba(255,255,255,0.3);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: #000;
        }
        .service-row.selected .check-box { background: #ff9800; border-color: #ff9800; }
        .service-name { font-size: 13px; color: #ddd; }
        .service-row.selected .service-name { color: #fff; font-weight: 600; }
        .service-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .service-price { font-size: 15px; font-weight: 700; color: #ff9800; white-space: nowrap; }
        .service-row.selected .service-price { color: #fff; }
        .price-note { font-size: 10px; color: #888; margin-left: 3px; }
        .detail-btn {
            padding: 7px 14px;
            border-radius: 20px;
            border: 2px solid #ff9800;
            background: rgba(255,152,0,0.1);
            color: #ff9800;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }
        .detail-btn:hover { background: #ff9800; color: #000; box-shadow: 0 0 15px rgba(255,152,0,0.5); }

        /* Модалка */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.hidden { display: none; }
        .modal {
            background: #1e1e32;
            border-radius: 16px;
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 2px solid #ff9800;
        }
        .modal-header {
            background: #ff9800;
            padding: 16px 20px;
            border-radius: 14px 14px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 5;
        }
        .modal-title { font-size: 18px; font-weight: 800; color: #000; }
        .modal-close {
            width: 34px; height: 34px;
            border-radius: 50%;
            border: 2px solid #000;
            background: transparent;
            color: #000;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover { background: #000; color: #ff9800; }
        .modal-body { padding: 20px; }
        .modal-body h3 { font-size: 15px; color: #ff9800; margin: 20px 0 10px 0; text-transform: uppercase; }
        .modal-body h3:first-child { margin-top: 0; }
        .modal-tools { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
        .tool-tag {
            background: rgba(255,255,255,0.08);
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 11px;
            color: #ddd;
        }
        .modal-warning {
            background: rgba(255,152,0,0.12);
            border-left: 4px solid #ff9800;
            padding: 12px 14px;
            border-radius: 0 8px 8px 0;
            margin: 10px 0;
            font-size: 13px;
            color: #ffa726;
        }
        .modal-info-table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 12px; }
        .modal-info-table td { padding: 6px 10px; border-bottom: 1px solid rgba(255,255,255,0.08); color: #ccc; }
        .modal-info-table td:first-child { font-weight: 600; color: #ff9800; white-space: nowrap; width: 40%; }
        .step-block {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .step-header {
            font-weight: 700;
            color: #ff9800;
            font-size: 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .step-number {
            background: #ff9800;
            color: #000;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 13px;
        }
        .step-text { font-size: 13px; color: #ccc; line-height: 1.6; }
        .step-image {
            width: 100%;
            max-width: 400px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-top: 8px;
            cursor: pointer;
        }
        .footer { text-align: center; margin-top: 25px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.08); color: #666; font-size: 11px; }

        /* Кнопка админа */
        .admin-link {
            text-align: right;
            margin-bottom: 10px;
        }
        .admin-link a {
            color: #666;
            font-size: 11px;
            text-decoration: none;
            transition: color 0.2s;
        }
        .admin-link a:hover { color: #ff9800; }

        /* Стили для админ-панели */
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
        }
        .login-box input {
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 15px;
            outline: none;
            margin-bottom: 10px;
            text-align: center;
        }
        .login-box input:focus { border-color: #ff9800; }
        .btn {
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.2s;
        }
        .btn-primary { background: #ff9800; color: #000; }
        .btn-primary:hover { background: #ffb74d; }
        .btn-danger { background: #e53935; color: #fff; }
        .btn-danger:hover { background: #ef5350; }
        .btn-outline { background: transparent; border: 2px solid #ff9800; color: #ff9800; }
        .btn-outline:hover { background: #ff9800; color: #000; }
        .btn-success { background: #43a047; color: #fff; }
        .btn-success:hover { background: #66bb6a; }
        .btn-sm { padding: 6px 12px; font-size: 10px; border-radius: 20px; }

        .admin-section {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .admin-section h3 {
            font-size: 16px;
            color: #ff9800;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 12px;
        }
        .admin-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 14px;
        }
        .admin-card h4 { font-size: 13px; color: #fff; margin-bottom: 6px; }
        .admin-card p { font-size: 10px; color: #999; margin-bottom: 3px; }
        .admin-card .card-actions { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }

        .form-group { margin-bottom: 12px; }
        .form-group label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 13px;
            outline: none;
            font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: #ff9800; }
        .form-group textarea { min-height: 70px; resize: vertical; }
        .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .form-row .form-group { flex: 1; min-width: 180px; }
        .badge {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 10px;
            font-size: 9px;
            font-weight: 700;
            margin-left: 4px;
        }
        .badge-engine { background: rgba(66,165,245,0.2); color: #42a5f5; }
        .badge-gearbox { background: rgba(171,71,188,0.2); color: #ab47bc; }
        .empty-state { text-align: center; padding: 30px; color: #666; }
        .tabs-admin { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-admin {
            padding: 10px 18px;
            border-radius: 25px;
            border: 2px solid rgba(255,255,255,0.2);
            background: transparent;
            color: #ccc;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }
        .tab-admin:hover { border-color: #ff9800; color: #fff; }
        .tab-admin.active { background: #ff9800; color: #000; border-color: #ff9800; }
        .tab-content-admin { display: none; }
        .tab-content-admin.active { display: block; }

        @media (max-width: 768px) {
            .container { padding: 12px; }
            .admin-grid { grid-template-columns: 1fr; }
            .form-row { flex-direction: column; }
            .service-row { flex-wrap: wrap; padding: 10px; }
            .service-right { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body>
    <div class="container" id="appContainer">
        <!-- Контент загружается динамически -->
    </div>

            <div class="modal-header">

                <button class="modal-close" id="modalClose">✕</button>

            <div class="modal-body" id="modalBody"></div>

                { id: 1, name: 'Замена масла и масляного фильтра', price: 800, cat: 'maintenance', tools: 'Ключ для пробки, Съёмник фильтра, Ёмкость 5л', specs: 'Интервал|Каждые 15 000 км\nОбъём|4.0 л', steps: 'Прогрейте двигатель.\nСлейте масло.\nЗамените фильтр.\nЗалейте новое масло.', warning: 'Не перетягивайте фильтр!', image: '' },

                { id: 4, name: 'Замена передних колодок', price: 1200, cat: 'brakes', tools: 'Домкрат, Ключ 13-15, Струбцина', specs: 'Проверка|Каждые 15 000 км', steps: 'Снимите колесо.\nСнимите суппорт.\nЗамените колодки.', warning: 'Прокачайте педаль!', image: '' },
                { id: 5, name: 'Замена масла в АКПП', price: 2500, cat: 'transmission', tools: 'Шестигранник, Шприц, Фильтр', specs: 'Масло|ATF ESSO 71141\nОбъём|3.5 л', steps: 'Снимите поддон.\nЗамените фильтр.\nЗалейте масло.', warning: 'Только оригинальное масло!', image: '' },
                { id: 6, name: 'Замена салонного фильтра', price: 400, cat: 'maintenance', tools: 'Отвёртка Torx T20', specs: 'Интервал|30 000 км', steps: 'Снимите облицовку.\nЗамените фильтр.', warning: '', image: '' },
                { id: 7, name: 'Замена амортизаторов перед', price: 3000, cat: 'suspension', tools: 'Домкрат, Ключи, Съёмник пружин', specs: 'Проверка|Каждые 30 000 км', steps: 'Снимите колесо.\nОткрутите амортизатор.\nУстановите новый.', warning: 'Меняйте парой!', image: '' },
                { id: 8, name: 'Компьютерная диагностика', price: 1000, cat: 'diagnostics', tools: 'Сканер OBD2, Ноутбук', specs: 'Периодичность|При необходимости', steps: 'Подключите сканер.\nСчитайте ошибки.\nСбросьте ошибки.', warning: '', image: '' },
            ];
        }

        // ==================== СОСТОЯНИЕ ====================
        let isAdmin = localStorage.getItem(STORAGE_AUTH) === 'true';
        let cars = loadCars();
        let services = loadServices();
        let selCar = cars[0]?.id || null;
        let selEngine = cars[0]?.engines[0]?.id || null;
        let selGearbox = cars[0]?.engines[0]?.gearboxes[0]?.id || null;
        let selectedIds = new Set();
        let currentFilter = 'all';
        let adminTab = 'cars';
        let adminSelCar = null;
        let adminSelEngine = null;

        function getSel() {
            const c = cars.find(x => x.id === selCar);
            if (!c) return null;
            const e = c.engines.find(x => x.id === selEngine);
            if (!e) return null;
            const g = e.gearboxes.find(x => x.id === selGearbox);
            return g ? { car: c, engine: e, gearbox: g } : null;
        }

        function mult() { const d = getSel(); return d ? d.gearbox.multiplier : 1; }
        function price(s) { return Math.round(s.price * mult()); }
        function fmt(p) { return p.toLocaleString('ru-RU') + ' ₽'; }

        // ==================== РЕНДЕР ====================
        function renderApp() {
            const el = document.getElementById('appContainer');
            if (isAdmin) {
                el.innerHTML = renderAdminPanel();
                bindAdminEvents();
            } else {
                el.innerHTML = renderPriceList();
                bindPriceEvents();
            }
        }

        function renderPriceList() {
            const catNames = { maintenance:'🛠️ ТО', engine:'⚡ Двигатель', exhaust:'💨 Выхлоп', transmission:'⚙️ Трансмиссия', brakes:'🛑 Тормоза', suspension:'🔧 Подвеска', welding:'🔥 Сварка', diagnostics:'🔍 Диагностика' };
            let h = '';
            // Хедер
            h += '<div class="header"><div class="logo">AUTO<span>SERVICE</span></div><div class="subtitle">Прайс-лист на слесарные работы</div></div>';
            h += '<div class="admin-link"><a href="#" onclick="loginAsAdmin()">🔐 Вход для администратора</a></div>';

            // Умный поиск
            h += '<div class="smart-search"><input type="text" id="smartSearch" placeholder="🔍 Умный поиск: введите название услуги, инструмент или категорию..." autocomplete="off"><div class="search-results" id="searchResults"></div></div>';

            // Селектор авто
            h += '<div class="selector-section"><div class="selector-title">🚗 Выберите автомобиль</div>';
            h += '<div class="selector-row"><div class="selector-group"><div class="selector-label">Марка / Модель</div><div class="selector-buttons" id="carBtns">';
            cars.forEach(c => h += '<button class="sel-btn' + (c.id === selCar ? ' active' : '') + '" data-car="' + c.id + '">' + c.icon + ' ' + c.name + '<span class="btn-code">' + c.category + '</span></button>');
            h += '</div></div></div>';
            h += '<div class="selector-row"><div class="selector-group"><div class="selector-label">Двигатель</div><div class="selector-buttons" id="engineBtns">';
            const car = cars.find(c => c.id === selCar);
            if (car) car.engines.forEach(e => h += '<button class="sel-btn' + (e.id === selEngine ? ' active' : '') + '" data-engine="' + e.id + '">' + e.name + ' (' + e.power + ')<span class="btn-code">' + e.code + '</span></button>');
            h += '</div></div></div>';
            h += '<div class="selector-row"><div class="selector-group"><div class="selector-label">Коробка передач</div><div class="selector-buttons" id="gearboxBtns">';
            if (car) { const eng = car.engines.find(e => e.id === selEngine); if (eng) eng.gearboxes.forEach(g => h += '<button class="sel-btn' + (g.id === selGearbox ? ' active' : '') + '" data-gearbox="' + g.id + '">' + g.name + '<span class="btn-code">' + g.drive + ' • ' + g.code + '</span></button>')); }
            h += '</div></div></div>';

            const d = getSel();
            if (d) {
                h += '<div class="selected-config"><span class="selected-config-icon">' + d.car.icon + '</span><div class="selected-config-info"><div class="selected-config-name">' + d.car.name + '</div><div class="selected-config-detail">' + d.engine.name + ' • ' + d.gearbox.name + '</div><div class="selected-config-code">Двиг: ' + d.engine.code + ' | КПП: ' + d.gearbox.code + ' | ×' + d.gearbox.multiplier.toFixed(2) + '</div></div><span class="selected-config-badge">' + d.gearbox.badge + '</span></div>';
            }
            h += '</div>';

            // Фильтры
            h += '<div class="filter-buttons" id="filterBtns"><button class="filter-btn' + (currentFilter === 'all' ? ' active' : '') + '" data-filter="all">Все</button>';
            [...new Set(services.map(s => s.cat))].forEach(cat => h += '<button class="filter-btn' + (currentFilter === cat ? ' active' : '') + '" data-filter="' + cat + '">' + (catNames[cat] || cat) + '</button>');
            h += '</div>';

            // Итого
            let total = 0;
            selectedIds.forEach(id => { const s = services.find(x => x.id === id); if (s) total += price(s); });
            h += '<div class="total-panel"><div><div class="total-label">Выбрано: ' + selectedIds.size + ' шт.</div><div class="total-label">' + (d ? d.car.name + ' ' + d.engine.name : '') + '</div></div><div class="total-price">' + fmt(total) + '</div><button class="clear-btn" id="clearBtn">Сбросить</button></div>';

            // Список услуг
            h += '<div id="svcList">';
            let list = services.filter(s => currentFilter === 'all' || s.cat === currentFilter);
            const grp = {};
            list.forEach(s => { if (!grp[s.cat]) grp[s.cat] = []; grp[s.cat].push(s); });
            Object.keys(grp).forEach(k => {
                h += '<div class="category-title">' + (catNames[k] || k) + '</div>';
                grp[k].forEach(s => {
                    const p = price(s);
                    const diff = p - s.price;
                    const note = diff !== 0 ? '<span class="price-note">(' + (diff > 0 ? '+' : '') + diff + ' ₽)</span>' : '';
                    h += '<div class="service-row' + (selectedIds.has(s.id) ? ' selected' : '') + '" data-sid="' + s.id + '"><div class="service-left"><div class="check-box">' + (selectedIds.has(s.id) ? '✓' : '') + '</div><span class="service-name">' + s.name + '</span></div><div class="service-right"><span class="service-price">' + fmt(p) + ' ' + note + '</span><button class="detail-btn" data-detail="' + s.id + '">📋 Подробнее</button></div></div>';
                });
            });
            if (!list.length) h += '<div class="empty-state">😕 Услуги не найдены</div>';
            h += '</div>';
            h += '<div class="footer">© 2026 AutoService. Цены без учёта запчастей.</div>';
            return h;
        }

            let h = '';
            h += '<div class="header"><div class="logo">AUTO<span>SERVICE</span></div><div class="subtitle">⚙️ Админ-панель</div></div>';

                if (ac) {
                    h += '<div class="admin-section" id="enginePanel"><h3>⚙️ Двигатели для: ' + ac.icon + ' ' + ac.name + '</h3><div class="form-row"><div class="form-group"><label>Название</label><input type="text" id="aeName" placeholder="1.8T 20V Turbo"></div><div class="form-group"><label>Код</label><input type="text" id="aeCode" placeholder="AEB"></div><div class="form-group"><label>Мощность</label><input type="text" id="aePower" placeholder="150 л.с."></div><div class="form-group"><label>Топливо</label><select id="aeFuel"><option>Бензин</option><option>Дизель</option></select></div></div><button class="btn btn-primary" id="btnAddEngine">➕ Добавить двигатель</button><div style="margin-top:12px;" id="adminEnginesList">';
                    ac.engines.forEach(e => {
                        h += '<div style="background:rgba(255,255,255,0.03);padding:10px;border-radius:8px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;"><span><strong>' + e.name + '</strong> <span class="badge badge-engine">' + e.code + '</span> ' + e.power + ' ' + e.fuel + ' | КПП: ' + e.gearboxes.length + '</span><div><button class="btn btn-sm btn-outline" data-ac-gearbox="' + e.id + '">⚙️ КПП</button><button class="btn btn-sm btn-danger" data-ac-deleng="' + e.id + '">🗑️</button></div></div>';
                    });
                    if (!ac.engines.length) h += '<div class="empty-state">Нет двигателей</div>';
                    h += '</div></div>';
                }
            }

            // Панель КПП
            if (adminSelCar && adminSelEngine) {
                const ac = cars.find(c => c.id === adminSelCar);
                if (ac) {
                    const eng = ac.engines.find(e => e.id === adminSelEngine);
                    if (eng) {
                        h += '<div class="admin-section" id="gearboxPanel"><h3>⚙️ КПП для: ' + eng.name + ' (' + eng.code + ')</h3><div class="form-row"><div class="form-group"><label>Название</label><input type="text" id="agName" placeholder="МКПП-5 (012)"></div><div class="form-group"><label>Код</label><input type="text" id="agCode" placeholder="012"></div><div class="form-group"><label>Привод</label><select id="agDrive"><option>Передний</option><option>Задний</option><option>Полный</option></select></div><div class="form-group"><label>Коэфф.</label><input type="number" id="agMult" value="1.0" step="0.05"></div><div class="form-group"><label>Сложность</label><input type="text" id="agBadge" placeholder="Средне"></div></div><button class="btn btn-primary" id="btnAddGearbox">➕ Добавить КПП</button><div style="margin-top:12px;" id="adminGearboxesList">';
                        eng.gearboxes.forEach(g => {
                            h += '<div style="background:rgba(255,255,255,0.03);padding:10px;border-radius:8px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;"><span><strong>' + g.name + '</strong> <span class="badge badge-gearbox">' + g.code + '</span> ' + g.drive + ' ×' + g.multiplier.toFixed(2) + ' <em>' + g.badge + '</em></span><button class="btn btn-sm btn-danger" data-ac-delgb="' + g.id + '">🗑️</button></div>';
                        });
                        if (!eng.gearboxes.length) h += '<div class="empty-state">Нет КПП</div>';
                        h += '</div></div>';
                    }
                }
            }
            h += '</div>';

            // Вкладка Услуги
            h += '<div class="tab-content-admin' + (adminTab === 'services' ? ' active' : '') + '" id="atab-services">';
            h += '<div class="admin-section"><h3>➕ Добавить / Редактировать</h3><input type="hidden" id="svcEditId"><div class="form-row"><div class="form-group"><label>Название</label><input type="text" id="svcName" placeholder="Замена масла"></div><div class="form-group"><label>Цена (₽)</label><input type="number" id="svcPrice" value="1000"></div><div class="form-group"><label>Категория</label><select id="svcCat"><option value="maintenance">🛠️ ТО</option><option value="engine">⚡ Двигатель</option><option value="exhaust">💨 Выхлоп</option><option value="transmission">⚙️ Трансмиссия</option><option value="brakes">🛑 Тормоза</option><option value="suspension">🔧 Подвеска</option><option value="welding">🔥 Сварка</option><option value="diagnostics">🔍 Диагностика</option></select></div></div><div class="form-group"><label>Инструменты (через запятую)</label><input type="text" id="svcTools"></div><div class="form-group"><label>Регламент (строка: метка|значение)</label><textarea id="svcSpecs" placeholder="Интервал|15 000 км"></textarea></div><div class="form-group"><label>Пошаговая инструкция (каждая строка — шаг)</label><textarea id="svcSteps" placeholder="Прогрейте двигатель."></textarea></div><div class="form-group"><label>Предупреждение</label><input type="text" id="svcWarning"></div><div class="form-group"><label>Ссылка на изображение</label><input type="text" id="svcImage"></div><button class="btn btn-primary" id="btnSaveSvc">💾 Сохранить</button><button class="btn btn-outline" id="btnClearSvc">✕ Очистить</button></div>';
            h += '<div class="admin-section"><h3>📋 Услуги</h3><div class="admin-grid" id="adminServicesList">';
            services.forEach(s => {
                h += '<div class="admin-card"><h4>' + s.name + '</h4><p>' + fmt(s.price) + ' | Категория: ' + s.cat + '</p><p>Инструменты: ' + (s.tools || '—') + '</p><div class="card-actions"><button class="btn btn-sm btn-outline" data-as-edit="' + s.id + '">✏️ Ред.</button><button class="btn btn-sm btn-danger" data-as-del="' + s.id + '">🗑️</button></div></div>';
            });
            if (!services.length) h += '<div class="empty-state">Нет услуг</div>';
            h += '</div></div></div>';

            h += '<div class="footer">Админ-панель автосервиса</div>';
            return h;
        }

        // ==================== БИНДИНГИ ====================
        function bindPriceEvents() {
            document.querySelectorAll('#carBtns .sel-btn').forEach(b => b.onclick = () => { selCar = b.dataset.car; const c = cars.find(x => x.id === selCar); selEngine = c?.engines[0]?.id || null;
                selGearbox = c?.engines[0]?.gearboxes[0]?.id || null;
                selectedIds.clear();
                renderApp(); });
            document.querySelectorAll('#engineBtns .sel-btn').forEach(b => b.onclick = () => { selEngine = b.dataset.engine; const c = cars.find(x => x.id === selCar); const e = c?.engines.find(x => x.id === selEngine);
                selGearbox = e?.gearboxes[0]?.id || null;
                selectedIds.clear();
                renderApp(); });
            document.querySelectorAll('#gearboxBtns .sel-btn').forEach(b => b.onclick = () => { selGearbox = b.dataset.gearbox;
                selectedIds.clear();
                renderApp(); });
            document.querySelectorAll('#filterBtns .filter-btn').forEach(b => b.onclick = () => { currentFilter = b.dataset.filter;
                renderApp(); });
            document.getElementById('clearBtn').onclick = () => { selectedIds.clear();
                renderApp(); };
            document.querySelectorAll('.service-row').forEach(r => {
                r.querySelector('.service-left').onclick = () => { const sid = parseInt(r.dataset.sid);
                    selectedIds.has(sid) ? selectedIds.delete(sid) : selectedIds.add(sid);
                    renderApp(); };
                r.querySelector('.detail-btn').onclick = (e) => { e.stopPropagation();
                    openModal(parseInt(r.querySelector('.detail-btn').dataset.detail)); };
            });
            // Умный поиск
            const ss = document.getElementById('smartSearch');
            const sr = document.getElementById('searchResults');
            ss.oninput = () => {
                const q = ss.value.toLowerCase().trim();
                if (!q) { sr.classList.remove('active');
                    sr.innerHTML = ''; return; }
                let results = services.filter(s => {
                    return s.name.toLowerCase().includes(q) || (s.tools && s.tools.toLowerCase().includes(
                        q)) || s.cat.toLowerCase().includes(q);
                });
                if (results.length) {
                    sr.classList.add('active');
                    sr.innerHTML = results.map(s => '<div class="search-result-item" data-ssid="' + s.id +
                        '"><div><div class="search-result-name">' + s.name +
                        '</div><div class="search-result-cat">' + s.cat +
                        '</div></div><div class="search-result-price">' + fmt(price(s)) +
                        '</div></div>').join('');
                    sr.querySelectorAll('.search-result-item').forEach(item => item.onclick = () => {
                        const sid = parseInt(item.dataset.ssid);
                        selectedIds.has(sid) ? selectedIds.delete(sid) : selectedIds.add(sid);
                        ss.value = '';
                        sr.classList.remove('active');
                        renderApp();
                    });
                } else { sr.classList.add('active');
                    sr.innerHTML = '<div class="empty-state" style="padding:15px;">Ничего не найдено</div>'; }
            };
        }

        function bindAdminEvents() {
            // Табы
            document.querySelectorAll('.tab-admin').forEach(b => b.onclick = () => { adminTab = b.dataset.atab;
                adminSelCar = null;
                adminSelEngine = null;
                renderApp(); });
            // Добавить авто
            document.getElementById('btnAddCar').onclick = () => {
                const n = document.getElementById('acName').value.trim();
                const i = document.getElementById('acIcon').value.trim() || '🚗';
                const c = document.getElementById('acCat').value.trim() || 'Стандарт';
                if (!n) return alert('Введите название!');
                cars.push({ id: 'c' + Date.now(), name: n, icon: i, category: c, engines: [] });
                saveCars(cars);
                renderApp();
            };
            // Удалить авто
            document.querySelectorAll('[data-ac-delcar]').forEach(b => b.onclick = () => {
                if (!confirm('Удалить авто и модификации?')) return;
                cars = cars.filter(c => c.id !== b.dataset.acDelcar);
                if (selCar === b.dataset.acDelcar) { selCar = cars[0]?.id || null;
                    selEngine = cars[0]?.engines[0]?.id || null;
                    selGearbox = cars[0]?.engines[0]?.gearboxes[0]?.id || null; }
                saveCars(cars);
                adminSelCar = null;
                adminSelEngine = null;
                renderApp();
            });
            // Выбрать авто для двигателей
            document.querySelectorAll('[data-ac-engine]').forEach(b => b.onclick = () => { adminSelCar = b.dataset.acEngine;
                adminSelEngine = null;
                renderApp(); });
            // Добавить двигатель
            const btnAE = document.getElementById('btnAddEngine');
            if (btnAE) btnAE.onclick = () => {
                const ac = cars.find(c => c.id === adminSelCar);
                if (!ac) return;
                const n = document.getElementById('aeName').value.trim();
                const cd = document.getElementById('aeCode').value.trim();
                const p = document.getElementById('aePower').value.trim();
                const f = document.getElementById('aeFuel').value;
                if (!n || !cd) return alert('Заполните!');
                ac.engines.push({ id: 'e' + Date.now(), name: n, code: cd, power: p, fuel: f, gearboxes: [] });
                saveCars(cars);
                renderApp();
            };
            // Удалить двигатель
            document.querySelectorAll('[data-ac-deleng]').forEach(b => b.onclick = () => {
                if (!confirm('Удалить?')) return;
                const ac = cars.find(c => c.id === adminSelCar);
                if (ac) ac.engines = ac.engines.filter(e => e.id !== b.dataset.acDeleng);
                saveCars(cars);
                renderApp();
            });
            // Выбрать двигатель для КПП
            document.querySelectorAll('[data-ac-gearbox]').forEach(b => b.onclick = () => { adminSelEngine = b.dataset.acGearbox;
                renderApp(); });
            // Добавить КПП
            const btnAG = document.getElementById('btnAddGearbox');
            if (btnAG) btnAG.onclick = () => {
                const ac = cars.find(c => c.id === adminSelCar);
                if (!ac) return;
                const eng = ac.engines.find(e => e.id === adminSelEngine);
                if (!eng) return;
                const n = document.getElementById('agName').value.trim();
                const cd = document.getElementById('agCode').value.trim();
                const d = document.getElementById('agDrive').value;
                const m = parseFloat(document.getElementById('agMult').value) || 1;
                const bd = document.getElementById('agBadge').value.trim() || 'Средне';
                if (!n || !cd) return alert('Заполните!');
                eng.gearboxes.push({ id: 'g' + Date.now(), name: n, code: cd, drive: d, multiplier: m, badge: bd });
                saveCars(cars);
                renderApp();
            };
            // Удалить КПП
            document.querySelectorAll('[data-ac-delgb]').forEach(b => b.onclick = () => {
                if (!confirm('Удалить?')) return;
                const ac = cars.find(c => c.id === adminSelCar);
                if (!ac) return;
                const eng = ac.engines.find(e => e.id === adminSelEngine);
                if (eng) eng.gearboxes = eng.gearboxes.filter(g => g.id !== b.dataset.acDelgb);
                saveCars(cars);
                renderApp();
            });

            // Сохранить услугу
            document.getElementById('btnSaveSvc').onclick = () => {
                const editId = document.getElementById('svcEditId').value;
                const name = document.getElementById('svcName').value.trim();
                const pr = parseInt(document.getElementById('svcPrice').value) || 0;
                const cat = document.getElementById('svcCat').value;
                const tools = document.getElementById('svcTools').value.trim();
                const specs = document.getElementById('svcSpecs').value.trim();
                const steps = document.getElementById('svcSteps').value.trim();
                const warning = document.getElementById('svcWarning').value.trim();
                const image = document.getElementById('svcImage').value.trim();
                if (!name || !pr) return alert('Заполните название и цену!');
                if (editId) {
                    const idx = services.findIndex(s => s.id == editId);
                    if (idx >= 0) services[idx] = { ...services[idx], name, price: pr, cat, tools, specs, steps,
                        warning, image };
                } else {
                    services.push({ id: Date.now(), name, price: pr, cat, tools, specs, steps, warning, image });
                }
                saveServices(services);
                clearSvcForm();
                renderApp();
            };
            document.getElementById('btnClearSvc').onclick = clearSvcForm;
            // Редактировать услугу
            document.querySelectorAll('[data-as-edit]').forEach(b => b.onclick = () => {
                const s = services.find(x => x.id == b.dataset.asEdit);
                if (!s) return;
                document.getElementById('svcEditId').value = s.id;
                document.getElementById('svcName').value = s.name;
                document.getElementById('svcPrice').value = s.price;
                document.getElementById('svcCat').value = s.cat;
                document.getElementById('svcTools').value = s.tools || '';
                document.getElementById('svcSpecs').value = s.specs || '';
                document.getElementById('svcSteps').value = s.steps || '';
                document.getElementById('svcWarning').value = s.warning || '';
                document.getElementById('svcImage').value = s.image || '';
                adminTab = 'services';
                renderApp();
            });
            // Удалить услугу
            document.querySelectorAll('[data-as-del]').forEach(b => b.onclick = () => {
                if (!confirm('Удалить?')) return;
                services = services.filter(s => s.id != b.dataset.asDel);
                saveServices(services);
                renderApp();
            });
        }

        function clearSvcForm() {
            document.getElementById('svcEditId').value = '';
            document.getElementById('svcName').value = '';
            document.getElementById('svcPrice').value = '1000';
            document.getElementById('svcCat').value = 'maintenance';
            document.getElementById('svcTools').value = '';
            document.getElementById('svcSpecs').value = '';
            document.getElementById('svcSteps').value = '';
            document.getElementById('svcWarning').value = '';
            document.getElementById('svcImage').value = '';
        }

        // Модальное окно
        function openModal(sid) {
            const s = services.find(x => x.id === sid);
            if (!s) return;
            document.getElementById('modalTitle').textContent = '📋 ' + s.name;
            let h = '';
            if (s.specs?.trim()) {
                h += '<h3>📅 Регламент и спецификации</h3><table class="modal-info-table">';
                s.specs.split('\n').forEach(line => { const p = line.split('|'); if (p.length >= 2) h +=
                        '<tr><td>' + p[0].trim() + '</td><td>' + p[1].trim() + '</td></tr>'; });
                h += '</table>';
            }
            if (s.tools?.trim()) { h += '<h3>🔧 Инструменты</h3><div class="modal-tools">';
                s.tools.split(',').forEach(t => h += '<span class="tool-tag">' + t.trim() + '</span>');
                h += '</div>'; }
            if (s.steps?.trim()) { h += '<h3>📝 Пошаговая инструкция</h3>';
                s.steps.split('\n').forEach((st, i) => h += '<div class="step-block"><div class="step-header"><span class="step-number">' + (
                    i + 1) + '</span> Шаг ' + (i + 1) + '</div><div class="step-text">' + st +
                    '</div></div>'); }
            if (s.image?.trim()) h += '<h3>🖼️ Изображение</h3><img src="' + s.image +
                '" class="step-image" onerror="this.style.display=\'none\'">';
            if (s.warning?.trim()) h += '<h3>⚠️ Предупреждение</h3><div class="modal-warning">' + s.warning +
                '</div>';
            document.getElementById('modalBody').innerHTML = h;
            document.getElementById('modalOverlay').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() { document.getElementById('modalOverlay').classList.add('hidden');
            document.body.style.overflow = ''; }
        document.getElementById('modalClose').onclick = closeModal;
        document.getElementById('modalOverlay').onclick = function(e) { if (e.target === this) closeModal(); };
        document.onkeydown = function(e) { if (e.key === 'Escape') closeModal(); };

        // Вход / выход админа
        window.loginAsAdmin = function() {
            const p = prompt('Введите пароль администратора:');
            if (p === ADMIN_PASSWORD) {
                localStorage.setItem(STORAGE_AUTH, 'true');
                isAdmin = true;
                renderApp();
            } else if (p !== null) {
                alert('Неверный пароль!');
            }
        };
        window.logoutAdmin = function() {
            localStorage.removeItem(STORAGE_AUTH);
            isAdmin = false;
            renderApp();
        };

        // Инициализация
        if (!cars.length) { cars = getDefaultCars();
            saveCars(cars); }
        if (!services.length) { services = getDefaultServices();
            saveServices(services); }
        renderApp();
    </script>
</body>
</html>
