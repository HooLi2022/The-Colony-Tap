        // Заглушка для услуг без подробной инструкции
        services.forEach(s => {
            if (!instructions[s.id]) {
                instructions[s.id] = {
                    title: s.name + ' (ВАЗ 2107)',
                    tools: ['Стандартный набор ключей', 'Отвёртки', 'Ветошь'],
                    stepsWithImages: [
                        { step: 1, title: 'Подготовка',
                            text: 'Подготовьте автомобиль и необходимые инструменты.', image: null,
                            caption: '' },
                        { step: 2, title: 'Демонтаж',
                            text: 'Выполните демонтаж необходимых узлов для доступа.', image: null,
                            caption: '' },
                        { step: 3, title: 'Ремонт', text: 'Проведите требуемые работы согласно регламенту.',
                            image: null, caption: '' },
                        { step: 4, title: 'Сборка',
                            text: 'Соберите всё в обратной последовательности.', image: null, caption: '' },
                        { step: 5, title: 'Проверка',
                            text: 'Проверьте работоспособность узла после ремонта.', image: null, caption: '' },
                    ],
                    warning: 'При отсутствии опыта обратитесь в автосервис.',
                    video: 'https://www.youtube.com/embed/dQw4w9WgXcQ',
                    videoTitle: 'Видео по ремонту ВАЗ 2107',
                };
            }
        });

        let selectedIds = new Set();
        let currentFilter = 'all';
        let searchQuery = '';

        function getPrice(s) {
            return Math.round(s.price * carMultiplier);
        }

        function formatPrice(p) { return p.toLocaleString('ru-RU') + ' ₽'; }

        function renderServices() {
            const container = document.getElementById('servicesList');
            container.innerHTML = '';
            let list = services;
            if (currentFilter !== 'all') list = list.filter(s => s.cat === currentFilter);
            if (searchQuery.trim()) {
                const q = searchQuery.toLowerCase().trim();
                list = list.filter(s => s.name.toLowerCase().includes(q));
            }
            const grouped = {};
            list.forEach(s => {
                if (!grouped[s.cat]) grouped[s.cat] = { catName: s.catName, items: [] };
                grouped[s.cat].items.push(s);
            });
            Object.keys(grouped).forEach(key => {
                const g = grouped[key];
                const title = document.createElement('div');
                title.className = 'category-title';
                title.textContent = g.catName;
                container.appendChild(title);
                g.items.forEach(s => {
                    const price = getPrice(s);
                    const row = document.createElement('div');
                    row.className = 'service-row';
                    if (selectedIds.has(s.id)) row.classList.add('selected');
                    let note = '';
                    if (price !== s.price) note =
                        `<span class="price-note" style="font-size:10px;color:#888;">(${price > s.price ? '+' : ''}${price - s.price} ₽)</span>`;
                    row.innerHTML = `
                    <div class="service-left">
                        <div class="check-box">${selectedIds.has(s.id) ? '✓' : ''}</div>
                        <span class="service-name">${s.name}</span>
                    </div>
                    <div class="service-right">
                        <span class="service-price">${formatPrice(price)} ${note}</span>
                        <button class="detail-btn">📋 Подробнее</button>
                    </div>`;
                    row.querySelector('.service-left').addEventListener('click', () => {
                        if (selectedIds.has(s.id)) selectedIds.delete(s.id);
                        else selectedIds.add(s.id);
                        renderServices();
                    });
                    row.querySelector('.detail-btn').addEventListener('click', (e) => {
                        e.stopPropagation();
                        openModal(s.id);
                    });
                    container.appendChild(row);
                });
            });
            if (!list.length) container.innerHTML =
                '<div style="text-align:center;padding:30px;color:#777;">Ничего не найдено</div>';
            updateTotal();
        }

        function updateTotal() {
            let total = 0;
            selectedIds.forEach(id => {
                const s = services.find(x => x.id === id);
                if (s) total += getPrice(s);
            });
            document.getElementById('totalPrice').textContent = formatPrice(total);
            document.getElementById('totalCount').textContent = selectedIds.size + ' шт.';
        }

        function openModal(serviceId) {
            const instr = instructions[serviceId];
            document.getElementById('modalTitle').textContent = '📋 ' + instr.title;
            let html = '';

            // Инструменты
            html += '<h3>🔧 Инструменты</h3><div class="modal-tools">';
            instr.tools.forEach(t => html += `<span class="tool-tag">${t}</span>`);
            html += '</div>';

            // Пошаговая инструкция с картинками
            html += '<h3>📝 Пошаговая инструкция</h3>';

            if (instr.stepsWithImages && instr.stepsWithImages.length > 0) {
                instr.stepsWithImages.forEach(stepData => {
                    html += '<div class="step-block">';
                    html +=
                        `<div class="step-header"><span class="step-number">${stepData.step}</span> ${stepData.title}</div>`;
                    html += `<div class="step-text">${stepData.text}</div>`;
                    if (stepData.image) {
                        html +=
                            `<img src="${stepData.image}" alt="${stepData.caption}" class="step-image" loading="lazy">`;
                        if (stepData.caption) {
                            html += `<div class="image-caption">${stepData.caption}</div>`;
                        }
                    }
                    html += '</div>';
                });
            }

            // Предупреждение
            if (instr.warning) {
                html += '<h3>⚠️ Предупреждение</h3>';
                html += '<div class="modal-warning">' + instr.warning + '</div>';
            }

            // Видео
            if (instr.video) {
                html += '<h3>🎬 Видеоинструкция</h3>';
                html += '<p style="color:#ccc;font-size:13px;margin-bottom:8px;">' + instr.videoTitle + '</p>';
                html += '<div class="modal-video-wrapper"><iframe src="' + instr.video +
                    '" frameborder="0" allowfullscreen></iframe></div>';
            }

            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('modalOverlay').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.add('hidden');
            document.body.style.overflow = '';
        }
        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });
        document.getElementById('clearBtn').addEventListener('click', () => { selectedIds.clear();
            renderServices(); });
        document.getElementById('searchInput').addEventListener('input', e => { searchQuery = e.target.value;
            renderServices(); });
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentFilter = btn.dataset.filter;
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderServices();
            });
        });
        renderServices();
        console.log('✅ Готово! Картинки расставлены по порядку от начала до конца.');
    </script>
