<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Trade Tracker - The Colony</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 12px;
            color: #eee;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Шапка - компактная на мобилках */
        .header {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 12px 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .user-badge {
            background: #0f3460;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
        }
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            font-size: 14px;
            touch-action: manipulation;
        }
        button:active { transform: scale(0.96); }
        button.danger { background: #dc3545; }
        button.secondary { background: #533483; }
        button.success { background: #28a745; }
        
        /* Карточки */
        .card {
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: flex-end;
        }
        .form-group { flex: 1; min-width: 80px; }
        .form-group label { font-size: 11px; color: #aaa; display: block; margin-bottom: 4px; }
        input, select {
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: #1a1a2e;
            color: white;
            width: 100%;
            font-size: 14px;
        }
        
        /* Статистика - 3 блока в ряд на мобилке */
        .stats-grid {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .stat-card {
            background: #0f3460;
            padding: 12px 10px;
            border-radius: 12px;
            text-align: center;
            flex: 1;
            min-width: 90px;
        }
        .stat-value { font-size: 22px; font-weight: bold; color: #e94560; }
        .stat-label { font-size: 10px; color: #aaa; margin-top: 5px; }
        .profit { color: #4caf50; }
        .loss { color: #f44336; }
        
        /* Таблица - с горизонтальной прокруткой */
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 0 -5px;
            padding: 0 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 550px;
        }
        th, td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 13px;
        }
        th { background: #0f3460; color: #e94560; font-weight: bold; }
        tr:hover { background: rgba(255,255,255,0.05); }
        
        /* Кнопки действий в таблице */
        .action-buttons {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        .action-btn {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            border: none;
            cursor: pointer;
        }
        .edit-btn { background: #ffc107; color: #000; }
        .delete-btn { background: #dc3545; color: white; }
        
        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1a1a2e;
            padding: 20px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            max-height: 80%;
            overflow: auto;
        }
        
        /* Список пользователей */
        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            margin: 8px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            gap: 10px;
            flex-wrap: wrap;
        }
        .user-info { flex: 1; }
        .user-name { font-weight: bold; font-size: 16px; }
        
        /* Окно профиля */
        .profile-window {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95%;
            max-width: 500px;
            max-height: 85vh;
            background: #1a1a2e;
            border-radius: 20px;
            z-index: 2000;
            flex-direction: column;
            border: 2px solid #e94560;
            display: none;
        }
        .profile-window.show { display: flex; }
        .profile-header {
            padding: 15px;
            background: #0f3460;
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .profile-header h3 { font-size: 16px; margin: 0; }
        .profile-body {
            padding: 15px;
            overflow-y: auto;
            flex: 1;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1999;
            display: none;
        }
        .overlay.show { display: block; }
        
        /* Быстрые суммы (подсказки) */
        .quick-sums {
            display: flex;
            gap: 8px;
            margin: 10px 0 5px;
            flex-wrap: wrap;
        }
        .quick-btn {
            background: #0f3460;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }
        .quick-btn:active { background: #e94560; }
        
        /* Уведомления */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 3000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }
        
        /* Иконки и компактность */
        .quantity-badge {
            background: #e94560;
            padding: 2px 6px;
            border-radius: 20px;
            font-size: 10px;
            margin-left: 5px;
        }
        .small-text { font-size: 11px; color: #aaa; }
        
        @media (max-width: 480px) {
            body { padding: 8px; }
            .stat-value { font-size: 18px; }
            .stat-card { padding: 8px; }
            .form-group { min-width: 70px; }
            button { padding: 8px 12px; font-size: 12px; }
            th, td { font-size: 11px; padding: 6px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <span style="color:#aaa; font-size:12px;">👤</span>
            <span class="user-badge" id="currentUserName">Не авторизован</span>
        </div>
        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
            <select id="currencySelect" onchange="changeCurrency()" style="width: auto; padding: 6px 10px;">
                <option value="RUB">₽</option>
                <option value="USD">$</option>
                <option value="EUR">€</option>
            </select>
            <button onclick="showAllUsers()" class="secondary" style="padding: 6px 12px;">👥</button>
            <button onclick="openAdminPanel()" class="danger" style="padding: 6px 12px;">🔧</button>
        </div>
    </div>
    <div id="mainContent"><div class="loading">⏳ Загрузка...</div></div>
</div>

<div id="profileOverlay" class="overlay" onclick="closeProfileWindow()"></div>
<div id="profileWindow" class="profile-window">
    <div class="profile-header">
        <h3 id="profileTitle">👤 Профиль</h3>
        <button onclick="closeProfileWindow()" style="background:#dc3545; padding: 5px 12px;">✖</button>
    </div>
    <div class="profile-body" id="profileBody">Загрузка...</div>
</div>

<div id="usersModal" class="modal">
    <div class="modal-content">
        <h3>👥 Все игроки</h3>
        <div id="usersList"></div>
        <button onclick="closeModal('usersModal')" style="margin-top: 15px; width:100%">Закрыть</button>
    </div>
</div>

<div id="adminModal" class="modal">
    <div class="modal-content">
        <h3>🔧 Админ-панель</h3>
        <div id="adminPanelContent"></div>
        <button onclick="closeModal('adminModal')" style="margin-top: 15px; width:100%">Закрыть</button>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>✏️ Редактировать</h3>
        <div class="form-group"><label>Предмет</label><input type="text" id="editName"></div>
        <div class="form-group"><label>Кол-во</label><input type="number" id="editQuantity" step="1"></div>
        <div class="form-group"><label>Покупка</label><input type="number" id="editBuy" step="0.01"></div>
        <div class="form-group"><label>Продажа</label><input type="number" id="editSell" step="0.01"></div>
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button onclick="saveEdit()" class="success" style="flex:1">Сохранить</button>
            <button onclick="closeModal('editModal')" style="flex:1">Отмена</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA_gNkLMsTxneTwyg5bDxKBN9osRIUrPaE",
        authDomain: "the-colony-tap.firebaseapp.com",
        databaseURL: "https://the-colony-tap-default-rtdb.firebaseio.com",
        projectId: "the-colony-tap",
        storageBucket: "the-colony-tap.firebasestorage.app",
        messagingSenderId: "433438733616",
        appId: "1:433438733616:web:76095a36161b32590d44f5"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let currentUser = null;
    let editTradeId = null;
    let currentCurrency = 'RUB';
    const symbols = { RUB: '₽', USD: '$', EUR: '€' };
    let myTradesListener = null;
    let currentProfileListenerRef = null;
    
    function showToast(text, isError = false) {
        const toast = document.getElementById("toast");
        toast.textContent = text;
        toast.style.background = isError ? '#dc3545' : '#28a745';
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
    }
    
    function login() {
        let name = prompt("Введите ваш ник:", "Player" + Math.floor(Math.random()*1000));
        if (!name) return;
        name = name.replace(/[^a-zA-Z0-9_]/g, '_');
        if (name.length < 2) name = "User_" + Date.now();
        currentUser = name;
        localStorage.setItem("tradeTrackerUser", currentUser);
        setupRealtimeListener();
        renderMain();
        showToast(`Добро пожаловать, ${currentUser}!`);
    }
    
    function logout() {
        if (myTradesListener) myTradesListener.off();
        currentUser = null;
        localStorage.removeItem("tradeTrackerUser");
        renderLoginScreen();
    }
    
    function changeCurrency() {
        currentCurrency = document.getElementById("currencySelect").value;
        renderMain();
    }
    
    function closeProfileWindow() {
        if (currentProfileListenerRef) {
            currentProfileListenerRef.off();
            currentProfileListenerRef = null;
        }
        document.getElementById("profileOverlay").classList.remove("show");
        document.getElementById("profileWindow").classList.remove("show");
    }
    
    async function openProfileWindow(username) {
        closeProfileWindow();
        
        const overlay = document.getElementById("profileOverlay");
        const window = document.getElementById("profileWindow");
        const profileTitle = document.getElementById("profileTitle");
        const profileBody = document.getElementById("profileBody");
        
        profileTitle.innerHTML = `👤 ${username}`;
        profileBody.innerHTML = '<div class="loading">⏳ Загрузка...</div>';
        
        overlay.classList.add("show");
        window.classList.add("show");
        
        const snapshot = await db.ref(`users/${username}/trades`).once("value");
        renderProfileContent(snapshot.val() || []);
        
        const tradesRef = db.ref(`users/${username}/trades`);
        tradesRef.on('value', (snapshot) => {
            if (document.getElementById("profileWindow").classList.contains("show")) {
                renderProfileContent(snapshot.val() || []);
            }
        });
        currentProfileListenerRef = tradesRef;
    }
    
    function renderProfileContent(trades) {
        const profileBody = document.getElementById("profileBody");
        if (!profileBody) return;
        
        let totalBuySum = 0, totalSellSum = 0, totalProfit = 0;
        trades.forEach(t => {
            totalBuySum += t.buyPrice || 0;
            totalSellSum += t.sellPrice || 0;
            totalProfit += t.profit || 0;
        });
        
        profileBody.innerHTML = `
            <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px">
                <div class="stat-card"><div class="stat-value">${totalBuySum.toFixed(2)} ${symbols[currentCurrency]}</div><div class="stat-label">💰 Потрачено</div></div>
                <div class="stat-card"><div class="stat-value">${totalSellSum.toFixed(2)} ${symbols[currentCurrency]}</div><div class="stat-label">💵 Получено</div></div>
                <div class="stat-card"><div class="stat-value ${totalProfit>=0?'profit':'loss'}">${totalProfit>=0?'+':''}${totalProfit.toFixed(2)} ${symbols[currentCurrency]}</div><div class="stat-label">📈 Прибыль</div></div>
            </div>
            <div class="table-wrapper">
            <table>
                <thead><tr><th>Дата</th><th>Предмет</th><th>Кол-во</th><th>Покупка</th><th>Продажа</th><th>Прибыль</th></tr></thead>
                <tbody>${trades.slice().reverse().map(t => `
                    <tr>
                        <td>${t.date?.split(',')[0] || '-'}</td>
                        <td>${t.itemName}${t.quantity>1?`<span class="quantity-badge">x${t.quantity}</span>`:''}</td>
                        <td>${t.quantity||1}</td>
                        <td>${t.buyPrice>0?t.buyPrice.toFixed(2)+' '+symbols[currentCurrency]:'-'}</td>
                        <td>${t.sellPrice>0?t.sellPrice.toFixed(2)+' '+symbols[currentCurrency]:'-'}</td>
                        <td class="${t.profit>=0?'profit':'loss'}">${t.profit>=0?'+':''}${t.profit.toFixed(2)} ${symbols[currentCurrency]}</td>
                    </tr>
                `).join('')}</tbody>
            </table>
            </div>
        `;
    }
    
    async function renderMain() {
        if (!currentUser) { renderLoginScreen(); return; }
        
        const snapshot = await db.ref(`users/${currentUser}/trades`).once("value");
        let trades = snapshot.val() || [];
        
        let totalBuySum = 0, totalSellSum = 0, totalProfit = 0;
        trades.forEach(t => {
            totalBuySum += t.buyPrice || 0;
            totalSellSum += t.sellPrice || 0;
            totalProfit += t.profit || 0;
        });
        
        const html = `
            <div class="card">
                <h3 style="margin-bottom:12px; font-size:18px;">➕ Новая сделка</h3>
                <div class="form-row">
                    <div class="form-group"><label>Предмет</label><input type="text" id="itemName" placeholder="Название"></div>
                    <div class="form-group"><label>Кол-во</label><input type="number" id="itemQuantity" value="1" step="1" min="1"></div>
                    <div class="form-group"><label>💰 Покупка</label><input type="number" id="buyPrice" step="0.01" placeholder="0"></div>
                    <div class="form-group"><label>💵 Продажа</label><input type="number" id="sellPrice" step="0.01" placeholder="0"></div>
                    <div class="form-group"><button onclick="addTrade()" style="width:100%">➕ Добавить</button></div>
                </div>
                <div class="quick-sums">
                    <span class="quick-btn" onclick="setQuickSum('buy', 100)">+100₽</span>
                    <span class="quick-btn" onclick="setQuickSum('buy', 500)">+500₽</span>
                    <span class="quick-btn" onclick="setQuickSum('sell', 100)">+100₽</span>
                    <span class="quick-btn" onclick="setQuickSum('sell', 500)">+500₽</span>
                    <span class="quick-btn" onclick="clearForm()">🗑️ Очистить</span>
                </div>
                <div class="small-text" style="margin-top:8px">💡 Комиссия Steam 13% при продаже</div>
            </div>
            
            <div class="card">
                <h3 style="margin-bottom:12px; font-size:16px;">📊 Моя статистика</h3>
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value">${totalBuySum.toFixed(2)} ${symbols[currentCurrency]}</div><div class="stat-label">💰 Куплено</div></div>
                    <div class="stat-card"><div class="stat-value">${totalSellSum.toFixed(2)} ${symbols[currentCurrency]}</div><div class="stat-label">💵 Продано</div></div>
                    <div class="stat-card"><div class="stat-value ${totalProfit>=0?'profit':'loss'}">${totalProfit>=0?'+':''}${totalProfit.toFixed(2)} ${symbols[currentCurrency]}</div><div class="stat-label">📈 Прибыль</div></div>
                </div>
            </div>
            
            <div class="card">
                <h3 style="margin-bottom:12px; font-size:16px;">📋 История сделок</h3>
                ${trades.length === 0 ? '<div style="text-align:center;padding:30px">Нет сделок</div>' : `
                <div class="table-wrapper">
                <table>
                    <thead><tr><th>Дата</th><th>Предмет</th><th>Кол-во</th><th>Покупка</th><th>Продажа</th><th>Прибыль</th><th></th></tr></thead>
                    <tbody>${trades.slice().reverse().map(t => `
                        <tr>
                            <td>${t.date?.split(',')[0] || '-'}</td>
                            <td>${t.itemName}${t.quantity>1?`<span class="quantity-badge">x${t.quantity}</span>`:''}</td>
                            <td>${t.quantity||1}</td>
                            <td>${t.buyPrice>0?t.buyPrice.toFixed(2)+' '+symbols[currentCurrency]:'-'}</td>
                            <td>${t.sellPrice>0?t.sellPrice.toFixed(2)+' '+symbols[currentCurrency]:'-'}</td>
                            <td class="${t.profit>=0?'profit':'loss'}">${t.profit>=0?'+':''}${t.profit.toFixed(2)} ${symbols[currentCurrency]}</td>
                            <td><div class="action-buttons"><button class="action-btn edit-btn" onclick='openEdit(${t.id})'>✏️</button><button class="action-btn delete-btn" onclick='deleteTradeConfirm(${t.id})'>🗑️</button></div></td>
                        </tr>
                    `).join('')}</tbody>
                </table>
                </div>`}
            </div>
        `;
        
        document.getElementById("mainContent").innerHTML = html;
        document.getElementById("currentUserName").innerHTML = currentUser;
    }
    
    function setQuickSum(type, amount) {
        const field = type === 'buy' ? 'buyPrice' : 'sellPrice';
        const current = parseFloat(document.getElementById(field)?.value) || 0;
        document.getElementById(field).value = current + amount;
    }
    
    function clearForm() {
        document.getElementById("itemName").value = "";
        document.getElementById("itemQuantity").value = "1";
        document.getElementById("buyPrice").value = "";
        document.getElementById("sellPrice").value = "";
    }
    
    function renderLoginScreen() {
        document.getElementById("mainContent").innerHTML = `
            <div class="card" style="text-align:center">
                <h2>🎮 Trade Tracker</h2>
                <p style="margin:15px 0">Учёт сделок с комиссией Steam 13%</p>
                <p style="margin:5px 0; color:#e94560; font-size:12px;">🔧 Админ: admin123</p>
                <button onclick="login()" style="font-size:16px; padding:12px 25px; margin-top:10px;">🚀 Войти</button>
            </div>
        `;
        document.getElementById("currentUserName").innerHTML = "Не авторизован";
    }
    
    function setupRealtimeListener() {
        if (myTradesListener) myTradesListener.off();
        if (currentUser) {
            myTradesListener = db.ref(`users/${currentUser}/trades`).on('value', () => {
                renderMain();
            });
        }
    }
    
    async function addTrade() {
        const name = document.getElementById("itemName")?.value;
        const quantity = parseInt(document.getElementById("itemQuantity")?.value) || 1;
        const buyTotal = parseFloat(document.getElementById("buyPrice")?.value) || 0;
        const sellTotal = parseFloat(document.getElementById("sellPrice")?.value) || 0;
        
        if (!name) { showToast("Введите название предмета", true); return; }
        if (quantity < 1) { showToast("Количество должно быть ≥1", true); return; }
        
        const commission = sellTotal * 0.13;
        const netSell = sellTotal - commission;
        const profit = netSell - buyTotal;
        
        const trade = {
            id: Date.now(),
            itemName: name,
            quantity: quantity,
            buyPrice: buyTotal,
            sellPrice: sellTotal,
            commission: commission,
            netSell: netSell,
            profit: profit,
            date: new Date().toLocaleString(),
            timestamp: Date.now()
        };
        
        const ref = db.ref(`users/${currentUser}/trades`);
        const snap = await ref.once("value");
        let trades = snap.val() || [];
        trades.push(trade);
        await ref.set(trades);
        
        clearForm();
        showToast(`✅ Добавлено: ${name}`);
    }
    
    async function deleteTradeConfirm(id) {
        if (!confirm("Удалить сделку?")) return;
        const ref = db.ref(`users/${currentUser}/trades`);
        const snap = await ref.once("value");
        let trades = snap.val() || [];
        trades = trades.filter(t => t.id !== id);
        await ref.set(trades);
        showToast("🗑️ Сделка удалена");
    }
    
    async function openEdit(id) {
        const ref = db.ref(`users/${currentUser}/trades`);
        const snap = await ref.once("value");
        const trades = snap.val() || [];
        const trade = trades.find(t => t.id === id);
        if (trade) {
            editTradeId = id;
            document.getElementById("editName").value = trade.itemName;
            document.getElementById("editQuantity").value = trade.quantity || 1;
            document.getElementById("editBuy").value = trade.buyPrice;
            document.getElementById("editSell").value = trade.sellPrice;
            document.getElementById("editModal").style.display = "flex";
        }
    }
    
    async function saveEdit() {
        const newName = document.getElementById("editName").value;
        const newQuantity = parseInt(document.getElementById("editQuantity").value) || 1;
        const newBuy = parseFloat(document.getElementById("editBuy").value) || 0;
        const newSell = parseFloat(document.getElementById("editSell").value) || 0;
        
        const commission = newSell * 0.13;
        const netSell = newSell - commission;
        const profit = netSell - newBuy;
        
        const ref = db.ref(`users/${currentUser}/trades`);
        const snap = await ref.once("value");
        let trades = snap.val() || [];
        const index = trades.findIndex(t => t.id === editTradeId);
        if (index !== -1) {
            trades[index] = { ...trades[index], 
                itemName: newName, 
                quantity: newQuantity,
                buyPrice: newBuy, 
                sellPrice: newSell, 
                commission, 
                netSell, 
                profit 
            };
            await ref.set(trades);
        }
        closeModal("editModal");
        showToast("✏️ Сделка обновлена");
    }
    
    async function showAllUsers() {
        const snapshot = await db.ref("users").once("value");
        const users = snapshot.val() || {};
        const userList = Object.keys(users);
        const container = document.getElementById("usersList");
        
        if (userList.length === 0) {
            container.innerHTML = "<div>Нет пользователей</div>";
        } else {
            let html = "";
            for (const user of userList) {
                const tradesSnap = await db.ref(`users/${user}/trades`).once("value");
                const trades = tradesSnap.val() || [];
                let profit = 0;
                trades.forEach(t => profit += t.profit || 0);
                html += `<div class="user-item">
                    <div class="user-info"><div class="user-name">👤 ${user}</div><div class="small-text">Сделок: ${trades.length} | Прибыль: ${profit.toFixed(2)} ₽</div></div>
                    <button onclick="openProfileWindow('${user}')" style="background:#533483; padding:6px 12px;">📊</button>
                </div>`;
            }
            container.innerHTML = html;
        }
        document.getElementById("usersModal").style.display = "flex";
    }
    
    async function openAdminPanel() {
        const pwd = prompt("Пароль администратора:");
        if (pwd !== "admin123") { if (pwd !== null) showToast("Неверный пароль!", true); return; }
        
        const snapshot = await db.ref("users").once("value");
        const users = snapshot.val() || {};
        const userList = Object.keys(users);
        
        let usersHtml = "";
        for (const user of userList) {
            const tradesSnap = await db.ref(`users/${user}/trades`).once("value");
            const trades = tradesSnap.val() || [];
            let totalProfit = 0, totalSpent = 0;
            trades.forEach(t => { totalProfit += t.profit || 0; totalSpent += t.buyPrice || 0; });
            usersHtml += `<div class="user-item"><div><strong>${user}</strong><div class="small-text">Потрачено: ${totalSpent.toFixed(2)}₽ | Прибыль: ${totalProfit.toFixed(2)}₽</div></div><button onclick="adminDeleteUser('${user}')" class="danger" style="padding:5px 12px;">❌</button></div>`;
        }
        
        const adminHtml = `
            <div style="margin-bottom:15px">
                <button onclick="adminResetAll()" class="danger" style="width:100%;margin-bottom:8px">💣 СБРОСИТЬ ВСЕ</button>
                <button onclick="adminResetMe()" style="width:100%;background:#ffc107;color:#000">🗑️ Сбросить мои данные</button>
            </div>
            <h4>👥 Игроки (${userList.length})</h4>
            ${usersHtml || "<div>Нет пользователей</div>"}`;
        
        document.getElementById("adminPanelContent").innerHTML = adminHtml;
        document.getElementById("adminModal").style.display = "flex";
    }
    
    async function adminResetAll() {
        if (!confirm("Удалить ВСЕ данные?")) return;
        if (prompt("Введите 'УДАЛИТЬ ВСЁ'") !== "УДАЛИТЬ ВСЁ") { showToast("Отменено", true); return; }
        await db.ref("users").set({});
        showToast("✅ Все данные удалены");
        closeModal("adminModal");
        renderMain();
    }
    
    async function adminResetMe() {
        if (!currentUser) return;
        if (!confirm(`Удалить ваши данные (${currentUser})?`)) return;
        await db.ref(`users/${currentUser}`).set({});
        showToast("✅ Ваши данные удалены");
        closeModal("adminModal");
        logout();
    }
    
    async function adminDeleteUser(username) {
        if (!confirm(`Удалить пользователя "${username}"?`)) return;
        await db.ref(`users/${username}`).set({});
        showToast(`✅ ${username} удалён`);
        if (currentUser === username) logout();
        else { closeModal("adminModal"); openAdminPanel(); }
    }
    
    function closeModal(id) { document.getElementById(id).style.display = "none"; }
    
    window.login = login;
    window.changeCurrency = changeCurrency;
    window.showAllUsers = showAllUsers;
    window.openAdminPanel = openAdminPanel;
    window.addTrade = addTrade;
    window.deleteTradeConfirm = deleteTradeConfirm;
    window.openEdit = openEdit;
    window.saveEdit = saveEdit;
    window.openProfileWindow = openProfileWindow;
    window.closeProfileWindow = closeProfileWindow;
    window.adminResetAll = adminResetAll;
    window.adminResetMe = adminResetMe;
    window.adminDeleteUser = adminDeleteUser;
    window.closeModal = closeModal;
    window.setQuickSum = setQuickSum;
    window.clearForm = clearForm;
    
    (function() {
        const saved = localStorage.getItem("tradeTrackerUser");
        if (saved) { currentUser = saved; setupRealtimeListener(); renderMain(); }
        else renderLoginScreen();
    })();
</script>
</body>
</html>
