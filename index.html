            padding: 0;
            box-sizing: border-box;

            background: #1a1a2e;
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #1e1e32;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255, 165, 0, 0.3);
        }
        .logo {
            font-size: 36px;
            font-weight: 900;
            color: #ff9800;
            letter-spacing: 3px;
        }
        .logo span {
            color: #fff;
            font-weight: 300;
        }
        .subtitle {
            font-size: 14px;
            color: #aaa;
            letter-spacing: 2px;
            margin-top: 5px;
        }
        .selector-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);

        .selector-title {
            font-size: 13px;
            font-weight: 700;
            color: #ff9800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 14px;
            text-align: center;
        }
        .selector-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
        }
        .selector-row:last-child {
            margin-bottom: 0;
        }
        .selector-group {
            flex: 1;
            min-width: 200px;
        }
        .selector-label {
            font-size: 10px;
            font-weight: 700;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .selector-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .sel-btn {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.04);
            color: #ccc;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            transition: all 0.2s ease;
            white-space: nowrap;
            text-align: left;
        }
        .sel-btn:hover {
            background: rgba(255, 152, 0, 0.15);
            border-color: rgba(255, 152, 0, 0.5);
            color: #fff;
        }
        .sel-btn.active {

            color: #000;
            border-color: #ff9800;
            font-weight: 700;
            box-shadow: 0 0 12px rgba(255, 152, 0, 0.4);
        }
        .sel-btn .btn-code {
            font-size: 9px;
            color: #999;
            display: block;
        }
        .sel-btn.active .btn-code {
            color: rgba(0, 0, 0, 0.7);
        }
        .selected-config {
            background: rgba(255, 152, 0, 0.12);
            border: 1px solid #ff9800;
            border-radius: 10px;
            padding: 12px 16px;
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .selected-config-icon {
            font-size: 32px;
        }
        .selected-config-info {
            flex: 1;
        }
        .selected-config-name {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
        }
        .selected-config-detail {
            font-size: 11px;
            color: #ccc;
        }
        .selected-config-code {
            font-size: 10px;
            color: #ff9800;
            margin-top: 2px;
        }

            color: #000;
            font-size: 10px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 12px;
            white-space: nowrap;

            margin-bottom: 15px;
            position: relative;
        }
        .search-box input {

            padding: 12px 45px 12px 18px;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        }
        .search-icon {

            color: #ff9800;

            color: #ccc;

            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            color: #666;
            font-size: 11px;
        }

</head>

            { id: 22, name: 'Замена амортизаторов зад (2 шт)', basePrice: 2500, cat: 'suspension',
                catName: '🔧 ПОДВЕСКА' },
            { id: 23, name: 'Регулировка развал-схождения', basePrice: 2000, cat: 'suspension',
                catName: '🔧 ПОДВЕСКА' },
            { id: 24, name: 'Сварочные работы (кузов, час)', basePrice: 3000, cat: 'welding', catName: '🔥 СВАРКА' },
        ];

        const instructions = {
            1: {
                title: 'Замена масла и масляного фильтра',
                tools: ['Ключ для пробки', 'Съёмник фильтра', 'Ёмкость 5 л', 'Воронка'],
                specs: [
                    { label: 'Интервал замены', value: 'Каждые 15 000 км' },
                    { label: 'Объём (1.8T)', value: '4.0 л' },
                    { label: 'Объём (2.8 VR6)', value: '5.5 л' },
                    { label: 'Объём (1.9 TDI)', value: '4.5 л' },
                    { label: 'Спецификация', value: 'VW 502.00 / 505.00' },
                ],
                warning: 'На 1.8T сократите интервал до 10 000 км при активной езде.',
                steps: ['Прогрейте двигатель.', 'Слейте масло.', 'Замените фильтр.', 'Залейте новое масло.']
            },
            4: {
                title: 'Замена салонного фильтра',
                tools: ['Отвёртка Torx T20'],
                specs: [{ label: 'Интервал', value: 'Каждые 30 000 км' }, { label: 'Расположение',
                    value: 'Под панелью пассажира' }],
                warning: 'В пыльной местности — каждые 15 000 км.',
                steps: ['Снимите облицовку.', 'Извлеките старый фильтр.', 'Установите новый.']
            },
            5: {
                title: 'Замена свечей зажигания',
                tools: ['Свечной ключ 16 мм', 'Динамометрический ключ'],
                specs: [{ label: 'Интервал', value: 'Каждые 60 000 км' }, { label: 'Тип (1.8T)',
                    value: 'Bosch F7LTCR / NGK BKUR6ET' }, { label: 'Момент', value: '30 Нм' }],
                warning: 'Аккуратно с катушками на 1.8T!',
                steps: ['Дайте двигателю остыть.', 'Снимите катушки.', 'Замените свечи (30 Нм).']
            },
            6: {
                title: 'Замена ремня ГРМ + ролик',
                tools: ['Набор ключей', 'Фиксаторы', 'Динамометрический ключ'],
                specs: [{ label: 'Интервал', value: 'Каждые 90 000 км' }, { label: 'Критичность',
                    value: 'ОЧЕНЬ ВАЖНО для 1.8T!' }],
                warning: 'Обрыв ремня = загиб клапанов! Меняйте помпу одновременно.',
                steps: ['Выставьте метки.', 'Снимите ремень.', 'Установите новый с роликом.', 'Проверните 2 оборота.']
            },
            14: {
                title: 'Замена масла в МКПП',
                tools: ['Шестигранник 17 мм', 'Шприц'],
                specs: [{ label: 'Тип масла', value: 'G052 SAE 75W90' }, { label: 'Объём (FWD)',
                    value: '2.25 л' }, { label: 'Объём (4Motion)', value: '2.75 л' }],
                warning: 'Только масло G052!',
                steps: ['Слейте масло.', 'Залейте новое шприцем до уровня.']
            },
            15: {
                title: 'Замена масла в АКПП (01V)',
                tools: ['Шестигранник', 'Шприц', 'Фильтр АКПП', 'Прокладка'],
                specs: [{ label: 'Тип масла', value: 'ATF ESSO 71141 / G052 162' }, { label: 'Объём',
                    value: '3.5 л' }],
                warning: 'Только оригинальное масло VW!',
                steps: ['Снимите поддон.', 'Замените фильтр.', 'Залейте масло.', 'Проверьте уровень при t°.']
            },
            20: {
                title: 'Замена тормозной жидкости',
                tools: ['Ключ для штуцеров', 'Шланг', 'DOT-4'],
                specs: [{ label: 'Тип', value: 'DOT-4' }, { label: 'Порядок',
                    value: 'ПЗ → ЛЗ → ПП → ЛП' }],
                warning: 'Не допускайте осушения бачка.',
                steps: ['Откачайте старую жидкость.', 'Прокачайте каждое колесо.']
            }
        };

        // Заглушка
        services.forEach(s => {
            if (!instructions[s.id]) instructions[s.id] = {
                title: s.name,
                tools: ['Набор инструментов'],
                specs: [{ label: 'Интервал', value: 'По регламенту' }],
                steps: ['Выполните работу согласно регламенту.'],
                warning: 'При отсутствии опыта обратитесь в автосервис.'
            };
        });

        let selectedCarId = 'vaz2107',
            selectedEngineId = 'vaz16carb',
            selectedGearboxId = 'vaz_m5';
        let selectedIds = new Set(),
            currentFilter = 'all',
            searchQuery = '';

        function getData() {
            const c = carDatabase.find(x => x.carId === selectedCarId);
            if (!c) return null;
            const e = c.engines.find(x => x.engineId === selectedEngineId);
            if (!e) return null;
            const g = e.gearboxes.find(x => x.gearboxId === selectedGearboxId);
            return g ? { car: c, engine: e, gearbox: g } : null;
        }

        function mult() { const d = getData(); return d ? d.gearbox.multiplier : 1; }

        function price(s) { return Math.round(s.basePrice * mult()); }

        function fmt(p) { return p.toLocaleString('ru-RU') + ' ₽'; }

        function renderCars() {
            const el = document.getElementById('carButtons');
            el.innerHTML = '';
            carDatabase.forEach(c => {
                const b = document.createElement('button');
                b.className = 'sel-btn' + (c.carId === selectedCarId ? ' active' : '');
                b.innerHTML = c.carIcon + ' ' + c.carName + '<span class="btn-code">' + c.category +
                    '</span>';
                b.onclick = () => {
                    selectedCarId = c.carId;
                    selectedEngineId = c.engines[0].engineId;
                    selectedGearboxId = c.engines[0].gearboxes[0].gearboxId;
                    selectedIds.clear();
                    renderAll();
                };
                el.appendChild(b);
            });
        }

        function renderEngines() {
            const el = document.getElementById('engineButtons');
            el.innerHTML = '';
            const c = carDatabase.find(x => x.carId === selectedCarId);
            if (!c) return;
            c.engines.forEach(e => {
                const b = document.createElement('button');
                b.className = 'sel-btn' + (e.engineId === selectedEngineId ? ' active' : '');
                b.innerHTML = e.engineName + ' (' + e.power + ')<span class="btn-code">Код: ' + e
                    .engineCode + '</span>';
                b.onclick = () => {
                    selectedEngineId = e.engineId;
                    selectedGearboxId = e.gearboxes[0].gearboxId;
                    selectedIds.clear();
                    renderAll();
                };
                el.appendChild(b);
            });
        }

        function renderGearboxes() {
            const el = document.getElementById('gearboxButtons');
            el.innerHTML = '';
            const d = getData();
            if (!d) return;
            d.engine.gearboxes.forEach(g => {
                const b = document.createElement('button');
                b.className = 'sel-btn' + (g.gearboxId === selectedGearboxId ? ' active' : '');
                b.innerHTML = g.gearboxName + '<span class="btn-code">' + g.drive + ' • ' + g.gearboxCode +
                    '</span>';
                b.onclick = () => { selectedGearboxId = g.gearboxId;
                    selectedIds.clear();
                    renderAll(); };
                el.appendChild(b);
            });
        }

        function updateConfig() {
            const d = getData();
            if (!d) return;
            document.getElementById('configName').textContent = d.car.carIcon + ' ' + d.car.carName;
            document.getElementById('configDetail').textContent = d.engine.engineName + ' • ' + d.gearbox
            .gearboxName;
            document.getElementById('configCode').textContent = 'Двиг: ' + d.engine.engineCode + ' | КПП: ' + d
                .gearbox.gearboxCode + ' | ×' + d.gearbox.multiplier.toFixed(2);
            document.getElementById('configBadge').textContent = d.gearbox.badge;
            document.getElementById('totalCarLabel').textContent = d.car.carName + ' ' + d.engine.engineName;
        }

        function renderServices() {
            const el = document.getElementById('servicesList');
            el.innerHTML = '';
            const m = mult();
            let list = services.filter(s => currentFilter === 'all' || s.cat === currentFilter);
            if (searchQuery.trim()) {
                const q = searchQuery.toLowerCase();
                list = list.filter(s => s.name.toLowerCase().includes(q));
            }
            const grp = {};
            list.forEach(s => { if (!grp[s.cat]) grp[s.cat] = { n: s.catName, items: [] };
                grp[s.cat].items.push(s); });
            Object.keys(grp).forEach(k => {
                const g = grp[k];
                const t = document.createElement('div');
                t.className = 'category-title';
                t.textContent = g.n;
                el.appendChild(t);
                g.items.forEach(s => {
                    const p = price(s);
                    const r = document.createElement('div');
                    r.className = 'service-row' + (selectedIds.has(s.id) ? ' selected' : '');
                    const diff = p - s.basePrice;
                    const note = diff !== 0 ? '<span class="price-note">(' + (diff > 0 ? '+' :
                        '') + diff + ' ₽)</span>' : '';
                    r.innerHTML = '<div class="service-left"><div class="check-box">' + (
                        selectedIds.has(s.id) ? '✓' : '') + '</div><span class="service-name">' + s
                        .name + '</span></div><div class="service-right"><span class="service-price">' +
                        fmt(p) + ' ' + note +
                        '</span><button class="detail-btn">📋 Подробнее</button></div>';
                    r.querySelector('.service-left').onclick = () => { selectedIds.has(s.id) ?
                        selectedIds.delete(s.id) : selectedIds.add(s.id);
                        renderServices(); };
                    r.querySelector('.detail-btn').onclick = (e) => { e.stopPropagation();
                        openModal(s.id); };
                    el.appendChild(r);
                });
            });
            if (!list.length) el.innerHTML =
                '<div style="text-align:center;padding:30px;color:#777;">Ничего не найдено</div>';
            updateTotal();
        }

        function updateTotal() {
            let t = 0;
            selectedIds.forEach(id => { const s = services.find(x => x.id === id); if (s) t += price(s); });
            document.getElementById('totalPrice').textContent = fmt(t);
            document.getElementById('totalCount').textContent = selectedIds.size + ' шт.';
        }

        function renderAll() { renderCars();
            renderEngines();
            renderGearboxes();
            updateConfig();
            renderServices(); }

        function openModal(id) {
            const i = instructions[id];
            document.getElementById('modalTitle').textContent = '📋 ' + i.title;
            let h = '';
            if (i.specs) {
                h += '<h3>📅 Регламент и спецификации</h3><table class="modal-info-table">';
                i.specs.forEach(s => h += '<tr><td>' + s.label + '</td><td>' + s.value + '</td></tr>');
                h += '</table>';
            }
            h += '<h3>🔧 Инструменты</h3><div class="modal-tools">';
            i.tools.forEach(t => h += '<span class="tool-tag">' + t + '</span>');
            h += '</div><h3>📝 Пошаговая инструкция</h3>';
            i.steps.forEach((s, n) => h += '<div class="step-block"><div class="step-header"><span class="step-number">' +
                (n + 1) + '</span> Шаг ' + (n + 1) + '</div><div class="step-text">' + s + '</div></div>');
            if (i.warning) h += '<h3>⚠️ Предупреждение</h3><div class="modal-warning">' + i.warning + '</div>';
            document.getElementById('modalBody').innerHTML = h;
            document.getElementById('modalOverlay').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() { document.getElementById('modalOverlay').classList.add('hidden');
            document.body.style.overflow = ''; }
        document.getElementById('modalClose').onclick = closeModal;
        document.getElementById('modalOverlay').onclick = function(e) { if (e.target === this) closeModal(); };
        document.onkeydown = function(e) { if (e.key === 'Escape') closeModal(); };
        document.getElementById('clearBtn').onclick = () => { selectedIds.clear();
            renderServices(); };
        document.getElementById('searchInput').oninput = e => { searchQuery = e.target.value;
            renderServices(); };
        document.querySelectorAll('.filter-btn').forEach(b => b.onclick = () => {
            currentFilter = b.dataset.filter;
            document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            renderServices();
        });

        renderAll();
    </script>
</body>
</html>
