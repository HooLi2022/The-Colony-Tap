<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автосервис - Прайс-лист с выбором автомобиля</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            background: rgba(30, 30, 50, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Шапка */
        .header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255, 165, 0, 0.3);
        }

        .logo {
            font-size: 36px;
            font-weight: 900;
            color: #ff9800;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 152, 0, 0.5);
            margin-bottom: 5px;
        }

        .logo span {
            color: #fff;
            font-weight: 300;
        }

        .subtitle {
            font-size: 14px;
            color: #aaa;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Выбор автомобиля — выпадающий список */
        .car-selector-wrapper {
            margin-bottom: 25px;
        }

        .car-selector-header {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 16px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
            user-select: none;
        }

        .car-selector-header:hover {
            border-color: rgba(255, 152, 0, 0.5);
            background: rgba(0, 0, 0, 0.5);
        }

        .car-selector-header.open {
            border-color: #ff9800;
            border-radius: 16px 16px 0 0;
            box-shadow: 0 0 20px rgba(255, 152, 0, 0.3);
            background: rgba(255, 152, 0, 0.08);
        }

        .selected-car-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .selected-car-icon {
            font-size: 36px;
            transition: transform 0.3s ease;
        }

        .car-selector-header.open .selected-car-icon {
            transform: scale(1.1);
        }

        .selected-car-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .selected-car-name {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .selected-car-model {
            font-size: 13px;
            color: #aaa;
        }

        .selected-car-badge {
            display: inline-block;
            background: #ff9800;
            color: #000;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            letter-spacing: 0.5px;
            width: fit-content;
            margin-top: 3px;
        }

        .arrow-icon {
            font-size: 20px;
            color: #ff9800;
            transition: transform 0.3s ease;
            font-weight: bold;
        }

        .car-selector-header.open .arrow-icon {
            transform: rotate(180deg);
        }

        /* Выпадающая панель со списком авто */
        .car-dropdown {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #ff9800;
            border-top: none;
            border-radius: 0 0 16px 16px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            opacity: 0;
        }

        .car-dropdown.open {
            max-height: 600px;
            opacity: 1;
        }

        .car-dropdown-inner {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .car-option {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
        }

        .car-option:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 152, 0, 0.3);
            transform: translateX(4px);
        }

        .car-option.active {
            background: rgba(255, 152, 0, 0.15);
            border-color: #ff9800;
            box-shadow: 0 0 15px rgba(255, 152, 0, 0.2);
        }

        .car-option-icon {
            font-size: 28px;
            flex-shrink: 0;
            width: 40px;
            text-align: center;
        }

        .car-option-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .car-option-name {
            font-weight: 700;
            font-size: 15px;
            color: #fff;
        }

        .car-option-detail {
            font-size: 12px;
            color: #999;
        }

        .car-option-badge {
            display: inline-block;
            background: rgba(255, 152, 0, 0.2);
            color: #ff9800;
            font-size: 10px;
            font-weight: 600;
            padding: 3px 9px;
            border-radius: 20px;
            letter-spacing: 0.5px;
            width: fit-content;
            margin-top: 2px;
        }

        .car-option.active .car-option-badge {
            background: #ff9800;
            color: #000;
        }

        .car-option-check {
            font-size: 20px;
            color: #ff9800;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease;
            flex-shrink: 0;
        }

        .car-option.active .car-option-check {
            opacity: 1;
        }

        /* Поиск */
        .search-box {
            margin-bottom: 20px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 14px 50px 14px 20px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: #ff9800;
            box-shadow: 0 0 15px rgba(255, 152, 0, 0.3);
            background: rgba(0, 0, 0, 0.5);
        }

        .search-box input::placeholder {
            color: #777;
        }

        .search-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 22px;
            color: #ff9800;
            pointer-events: none;
        }

        /* Фильтр-кнопки */
        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .filter-btn {
            padding: 9px 16px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #ccc;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
            white-space: nowrap;
            font-weight: 500;
        }

        .filter-btn:hover {
            background: rgba(255, 152, 0, 0.2);
            border-color: #ff9800;
            color: #fff;
        }

        .filter-btn.active {
            background: #ff9800;
            color: #000;
            border-color: #ff9800;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4);
        }

        /* Итоговая панель */
        .total-panel {
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            border-radius: 15px;
            padding: 18px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: 0 8px 25px rgba(255, 152, 0, 0.3);
            position: sticky;
            top: 10px;
            z-index: 10;
        }

        .total-label {
            font-size: 14px;
            font-weight: 600;
            color: #000;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .total-price {
            font-size: 30px;
            font-weight: 900;
            color: #000;
            letter-spacing: 1px;
        }

        .total-count {
            font-size: 13px;
            color: rgba(0, 0, 0, 0.7);
            font-weight: 500;
        }

        .clear-btn {
            padding: 10px 20px;
            border-radius: 50px;
            border: 2px solid #000;
            background: transparent;
            color: #000;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .clear-btn:hover {
            background: #000;
            color: #ff9800;
        }

        /* Список услуг */
        .services-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .category-title {
            font-size: 13px;
            font-weight: 700;
            color: #ff9800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 15px 0 8px 5px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .category-title:first-child {
            border-top: none;
            margin-top: 0;
            padding-top: 0;
        }

        .service-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 13px 18px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            user-select: none;
        }

        .service-item:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 152, 0, 0.3);
        }

        .service-item.selected {
            background: rgba(255, 152, 0, 0.15);
            border-color: #ff9800;
            box-shadow: 0 0 15px rgba(255, 152, 0, 0.2);
        }

        .service-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .checkbox-custom {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .service-item.selected .checkbox-custom {
            background: #ff9800;
            border-color: #ff9800;
        }

        .check-mark {
            color: #000;
            font-size: 14px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .service-item.selected .check-mark {
            opacity: 1;
        }

        .service-name {
            font-size: 14px;
            font-weight: 500;
            color: #ddd;
        }

        .service-item.selected .service-name {
            color: #fff;
            font-weight: 600;
        }

        .service-price {
            font-size: 17px;
            font-weight: 700;
            color: #ff9800;
            white-space: nowrap;
            margin-left: 15px;
            min-width: 90px;
            text-align: right;
        }

        .service-item.selected .service-price {
            color: #fff;
        }

        .price-diff {
            font-size: 11px;
            color: #999;
            font-weight: 400;
        }

        .hidden {
            display: none !important;
        }

        /* Футер */
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            color: #666;
            font-size: 12px;
            letter-spacing: 1px;
        }

        /* Анимация */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .service-item {
            animation: fadeInUp 0.4s ease forwards;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
                border-radius: 12px;
            }
            .logo {
                font-size: 24px;
            }
            .selected-car-name {
                font-size: 15px;
            }
            .selected-car-icon {
                font-size: 28px;
            }
            .service-item {
                padding: 10px 12px;
            }
            .service-name {
                font-size: 13px;
            }
            .service-price {
                font-size: 14px;
                min-width: 70px;
            }
            .total-price {
                font-size: 24px;
            }
            .filter-btn {
                padding: 7px 11px;
                font-size: 11px;
            }
            .total-panel {
                padding: 14px 16px;
            }
            .car-option {
                padding: 12px 10px;
            }
            .car-option-name {
                font-size: 13px;
            }
        }

        @media (max-width: 400px) {
            .selected-car-name {
                font-size: 13px;
            }
            .selected-car-icon {
                font-size: 24px;
            }
            .car-option-icon {
                font-size: 22px;
                width: 30px;
            }
        }

        /* Скроллбар */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 152, 0, 0.3);
            border-radius: 10px;
        }
    </style>
</head>

            <div class="car-dropdown" id="carDropdown">

            </div>
            <div style="text-align:right;">

                <div class="total-price" id="totalPrice">0 ₽</div>

            <button class="clear-btn" id="clearBtn">✕ Сбросить</button>

            { id: 17, name: 'Зачистка и покраска задних тормозных барабанов (2 шт)', basePrice: 1200, category: 'brakes',
                categoryName: '🛑 ТОРМОЗНАЯ СИСТЕМА' },
            { id: 18, name: 'Сварочные работы (приварка гаек, прутков, гофр) — от', basePrice: 500, category: 'welding',
                categoryName: '🔥 СВАРОЧНЫЕ РАБОТЫ' },
        ];

        // ==================== СОСТОЯНИЕ ====================
        let selectedCarId = 'passat_b6';
        let selectedServices = new Set();
        let currentFilter = 'all';
        let currentSearch = '';
        let isDropdownOpen = false;

        // DOM-элементы
        const carSelectorHeader = document.getElementById('carSelectorHeader');
        const carDropdown = document.getElementById('carDropdown');
        const carDropdownInner = document.getElementById('carDropdownInner');
        const arrowIcon = document.getElementById('arrowIcon');
        const selectedCarIcon = document.getElementById('selectedCarIcon');
        const selectedCarName = document.getElementById('selectedCarName');
        const selectedCarModel = document.getElementById('selectedCarModel');
        const selectedCarBadge = document.getElementById('selectedCarBadge');
        const servicesList = document.getElementById('servicesList');
        const totalPriceEl = document.getElementById('totalPrice');
        const totalCountEl = document.getElementById('totalCount');
        const totalCarLabel = document.getElementById('totalCarLabel');
        const clearBtn = document.getElementById('clearBtn');
        const searchInput = document.getElementById('searchInput');
        const filterButtons = document.querySelectorAll('.filter-btn');

        // ==================== ФУНКЦИИ ====================

        function getSelectedCar() {
            return cars.find(c => c.id === selectedCarId) || cars[0];
        }

        function getServicePrice(service) {
            const car = getSelectedCar();
            if (car.customPrices && car.customPrices[service.id] !== undefined) {
                return car.customPrices[service.id];
            }
            return Math.round(service.basePrice * car.multiplier);
        }

        function formatPrice(price) {
            return price.toLocaleString('ru-RU') + ' ₽';
        }

        // Обновление шапки выбранного авто
        function updateSelectedCarHeader() {
            const car = getSelectedCar();
            selectedCarIcon.textContent = car.icon;
            selectedCarName.textContent = car.name;
            selectedCarModel.textContent = car.detail;
            selectedCarBadge.textContent = car.badge;
        }

        // Отрисовка выпадающего списка авто
        function renderCarDropdown() {
            carDropdownInner.innerHTML = '';
            cars.forEach(car => {
                const option = document.createElement('div');
                option.className = 'car-option';
                if (car.id === selectedCarId) {
                    option.classList.add('active');
                }
                option.setAttribute('data-car-id', car.id);
                option.innerHTML = `
                    <span class="car-option-icon">${car.icon}</span>
                    <div class="car-option-info">
                        <span class="car-option-name">${car.name}</span>
                        <span class="car-option-detail">${car.detail}</span>
                        <span class="car-option-badge">${car.badge}</span>
                    </div>
                    <span class="car-option-check">✓</span>
                `;
                option.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectCar(car.id);
                    closeDropdown();
                });
                carDropdownInner.appendChild(option);
            });
        }

        // Открыть/закрыть выпадающий список
        function toggleDropdown() {
            if (isDropdownOpen) {
                closeDropdown();
            } else {
                openDropdown();
            }
        }

        function openDropdown() {
            isDropdownOpen = true;
            carSelectorHeader.classList.add('open');
            carDropdown.classList.add('open');
            arrowIcon.textContent = '▲';
            renderCarDropdown();
        }

        function closeDropdown() {
            isDropdownOpen = false;
            carSelectorHeader.classList.remove('open');
            carDropdown.classList.remove('open');
            arrowIcon.textContent = '▼';
        }

        // Выбор автомобиля
        function selectCar(carId) {
            if (selectedCarId === carId) return;
            selectedCarId = carId;
            selectedServices.clear();
            updateSelectedCarHeader();
            renderCarDropdown();
            renderServices();
        }

        // Закрытие при клике вне списка
        document.addEventListener('click', (e) => {
            const wrapper = document.getElementById('carSelectorWrapper');
            if (isDropdownOpen && !wrapper.contains(e.target)) {
                closeDropdown();
            }
        });

        // Отрисовка списка услуг
        function renderServices() {
            servicesList.innerHTML = '';
            const car = getSelectedCar();

            let filteredServices = services;

            if (currentFilter !== 'all') {
                filteredServices = filteredServices.filter(s => s.category === currentFilter);
            }

            if (currentSearch.trim() !== '') {
                const searchLower = currentSearch.toLowerCase().trim();
                filteredServices = filteredServices.filter(s =>
                    s.name.toLowerCase().includes(searchLower)
                );
            }

            const grouped = {};
            filteredServices.forEach(s => {
                if (!grouped[s.category]) {
                    grouped[s.category] = {
                        categoryName: s.categoryName,
                        items: []
                    };
                }
                grouped[s.category].items.push(s);
            });

            Object.keys(grouped).forEach(catKey => {
                const group = grouped[catKey];

                const titleDiv = document.createElement('div');
                titleDiv.className = 'category-title';
                titleDiv.textContent = group.categoryName;
                servicesList.appendChild(titleDiv);

                group.items.forEach(service => {
                    const price = getServicePrice(service);
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'service-item';
                    if (selectedServices.has(service.id)) {
                        itemDiv.classList.add('selected');
                    }
                    itemDiv.setAttribute('data-id', service.id);

                    let priceDiffHtml = '';
                    if (price !== service.basePrice) {
                        const diff = price - service.basePrice;
                        const sign = diff > 0 ? '+' : '';
                        priceDiffHtml = `<span class="price-diff">(${sign}${diff} ₽)</span>`;
                    }

                    itemDiv.innerHTML = `
                        <div class="service-info">
                            <div class="checkbox-custom">
                                <span class="check-mark">✓</span>
                            </div>
                            <span class="service-name">${service.name}</span>
                        </div>
                        <span class="service-price">${formatPrice(price)} ${priceDiffHtml}</span>
                    `;

                    itemDiv.addEventListener('click', () => toggleService(service.id));
                    servicesList.appendChild(itemDiv);
                });
            });

            if (filteredServices.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.style.cssText =
                    'text-align:center; padding:40px; color:#777; font-size:16px;';
                emptyDiv.textContent = '😕 Ничего не найдено. Попробуйте изменить запрос или фильтр.';
                servicesList.appendChild(emptyDiv);
            }

            updateTotal();
        }

        function toggleService(id) {
            if (selectedServices.has(id)) {
                selectedServices.delete(id);
            } else {
                selectedServices.add(id);
            }
            renderServices();
        }

        function updateTotal() {
            let total = 0;
            selectedServices.forEach(id => {
                const service = services.find(s => s.id === id);
                if (service) {
                    total += getServicePrice(service);
                }
            });

            const car = getSelectedCar();
            totalPriceEl.textContent = formatPrice(total);
            totalCountEl.textContent = selectedServices.size + ' шт.';
            totalCarLabel.textContent = car.name + ' — Сумма:';
        }

        function clearAll() {
            selectedServices.clear();
            renderServices();
        }

        function setFilter(filter) {
            currentFilter = filter;
            filterButtons.forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-filter') === filter) {
                    btn.classList.add('active');
                }
            });
            renderServices();
        }

        // ==================== ОБРАБОТЧИКИ ====================
        carSelectorHeader.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleDropdown();
        });

        clearBtn.addEventListener('click', clearAll);

        searchInput.addEventListener('input', (e) => {
            currentSearch = e.target.value;
            renderServices();
        });

        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const filter = btn.getAttribute('data-filter');
                setFilter(filter);
            });
        });

        // Закрытие выпадающего списка по клавише Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && isDropdownOpen) {
                closeDropdown();
            }
        });

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        function init() {
            updateSelectedCarHeader();
            renderCarDropdown();
            renderServices();
            console.log('🚗 Прайс-лист загружен!');
            console.log('📋 Автомобилей: ' + cars.length);
            console.log('🔧 Услуг: ' + services.length);
            console.log('💡 Нажмите на панель автомобиля, чтобы открыть список.');
            console.log('💡 Кликните вне списка или нажмите Escape, чтобы закрыть.');
        }

        init();
    </script>
</body>
</html>
