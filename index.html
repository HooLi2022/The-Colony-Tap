<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <title>Автосервис - Прайс-лист</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; min-height: 100vh; padding: 20px; color: #e0e0e0; }
        .container { max-width: 1100px; margin: 0 auto; background: #1e1e32; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .header { text-align: center; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 2px solid rgba(255,165,0,0.3); }
        .logo { font-size: 36px; font-weight: 900; color: #ff9800; letter-spacing: 3px; }
        .logo span { color: #fff; font-weight: 300; }
        .subtitle { font-size: 14px; color: #aaa; letter-spacing: 2px; margin-top: 5px; }
        .status-bar { text-align: center; padding: 8px; margin-bottom: 15px; border-radius: 8px; font-size: 11px; font-weight: 600; }
        .status-bar.online { background: rgba(76,175,80,0.2); color: #4caf50; }
        .status-bar.offline { background: rgba(244,67,54,0.2); color: #f44336; }
        .smart-search { background: rgba(0,0,0,0.4); border-radius: 16px; padding: 20px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .smart-search input { width: 100%; padding: 14px 20px; border-radius: 30px; border: 2px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: #fff; font-size: 15px; outline: none; }
        .smart-search input:focus { border-color: #ff9800; }
        .search-results { display: none; margin-top: 10px; background: rgba(0,0,0,0.5); border-radius: 12px; max-height: 300px; overflow-y: auto; }
        .search-results.active { display: block; }
        .search-result-item { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; }
        .search-result-item:hover { background: rgba(255,152,0,0.15); }
        .search-result-name { font-size: 13px; color: #fff; }
        .search-result-price { font-size: 14px; color: #ff9800; font-weight: 700; }
        .selector-section { background: rgba(0,0,0,0.3); border-radius: 16px; padding: 20px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .selector-title { font-size: 13px; font-weight: 700; color: #ff9800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 14px; text-align: center; }
        .selector-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
        .selector-group { flex: 1; min-width: 200px; }
        .selector-label { font-size: 10px; font-weight: 700; color: #999; text-transform: uppercase; margin-bottom: 6px; }
        .selector-buttons { display: flex; flex-wrap: wrap; gap: 5px; }
        .sel-btn { padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.04); color: #ccc; cursor: pointer; font-size: 11px; font-weight: 500; transition: all 0.2s; white-space: nowrap; }
        .sel-btn:hover { background: rgba(255,152,0,0.15); border-color: rgba(255,152,0,0.5); color: #fff; }
        .sel-btn.active { background: #ff9800; color: #000; border-color: #ff9800; font-weight: 700; }
        .sel-btn .btn-code { font-size: 9px; color: #999; display: block; }
        .sel-btn.active .btn-code { color: rgba(0,0,0,0.7); }
        .selected-config { background: rgba(255,152,0,0.12); border: 1px solid #ff9800; border-radius: 10px; padding: 12px 16px; margin-top: 12px; display: flex; align-items: center; gap: 10px; }
        .selected-config-icon { font-size: 32px; }
        .selected-config-info { flex: 1; }
        .selected-config-name { font-size: 15px; font-weight: 700; color: #fff; }
        .selected-config-detail { font-size: 11px; color: #ccc; }
        .selected-config-badge { background: #ff9800; color: #000; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 12px; }
        .filter-buttons { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; justify-content: center; }
        .filter-btn { padding: 8px 14px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: #ccc; cursor: pointer; font-size: 11px; }
        .filter-btn:hover { background: rgba(255,152,0,0.2); border-color: #ff9800; color: #fff; }
        .filter-btn.active { background: #ff9800; color: #000; border-color: #ff9800; font-weight: 700; }
        .total-panel { background: #ff9800; border-radius: 12px; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 8px; position: sticky; top: 10px; z-index: 10; }
        .total-label { font-size: 12px; font-weight: 600; color: #000; text-transform: uppercase; }
        .total-price { font-size: 28px; font-weight: 900; color: #000; }
        .clear-btn { padding: 8px 16px; border-radius: 30px; border: 2px solid #000; background: transparent; color: #000; cursor: pointer; font-weight: 700; font-size: 12px; text-transform: uppercase; }
        .clear-btn:hover { background: #000; color: #ff9800; }
        .category-title { font-size: 13px; font-weight: 700; color: #ff9800; text-transform: uppercase; letter-spacing: 1px; margin: 15px 0 8px 5px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.08); }
        .category-title:first-child { border-top: none; margin-top: 0; padding-top: 0; }
        .service-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; border-radius: 10px; background: rgba(255,255,255,0.02); margin-bottom: 4px; border: 1px solid transparent; gap: 10px; }
        .service-row:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,152,0,0.3); }
        .service-row.selected { background: rgba(255,152,0,0.2); border-color: #ff9800; }
        .service-left { display: flex; align-items: center; gap: 10px; flex: 1; cursor: pointer; }
        .check-box { width: 24px; height: 24px; border-radius: 5px; border: 2px solid rgba(255,255,255,0.3); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; color: #000; }
        .service-row.selected .check-box { background: #ff9800; border-color: #ff9800; }
        .service-name { font-size: 13px; color: #ddd; }
        .service-right { display: flex; align-items: center; gap: 8px; }
        .service-price { font-size: 15px; font-weight: 700; color: #ff9800; white-space: nowrap; }
        .price-note { font-size: 10px; color: #888; margin-left: 3px; }
        .detail-btn { padding: 7px 14px; border-radius: 20px; border: 2px solid #ff9800; background: rgba(255,152,0,0.1); color: #ff9800; cursor: pointer; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .detail-btn:hover { background: #ff9800; color: #000; }
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; display:flex; align-items:center; justify-content:center; }
        .modal-overlay.hidden { display:none; }
        .modal { background:#1e1e32; border-radius:16px; width:90%; max-width:800px; max-height:85vh; overflow-y:auto; border:2px solid #ff9800; }
        .modal-header { background:#ff9800; padding:16px 20px; border-radius:14px 14px 0 0; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; }
        .modal-title { font-size:18px; font-weight:800; color:#000; }
        .modal-close { width:34px; height:34px; border-radius:50%; border:2px solid #000; background:transparent; color:#000; cursor:pointer; font-size:18px; font-weight:bold; display:flex; align-items:center; justify-content:center; }
        .modal-close:hover { background:#000; color:#ff9800; }
        .modal-body { padding:20px; }
        .modal-body h3 { font-size:15px; color:#ff9800; margin:20px 0 10px 0; text-transform:uppercase; }
        .modal-tools { display:flex; flex-wrap:wrap; gap:6px; margin:8px 0; }
        .tool-tag { background:rgba(255,255,255,0.08); padding:5px 10px; border-radius:15px; font-size:11px; color:#ddd; }
        .modal-warning { background:rgba(255,152,0,0.12); border-left:4px solid #ff9800; padding:12px 14px; border-radius:0 8px 8px 0; margin:10px 0; font-size:13px; color:#ffa726; }
        .modal-info-table { width:100%; border-collapse:collapse; margin:10px 0; font-size:12px; }
        .modal-info-table td { padding:6px 10px; border-bottom:1px solid rgba(255,255,255,0.08); color:#ccc; }
        .modal-info-table td:first-child { font-weight:600; color:#ff9800; width:40%; }
        .step-block { background:rgba(255,255,255,0.03); border-radius:12px; padding:16px; margin-bottom:12px; }
        .step-header { font-weight:700; color:#ff9800; font-size:14px; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
        .step-number { background:#ff9800; color:#000; width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:13px; }
        .step-text { font-size:13px; color:#ccc; line-height:1.6; }
        .step-image { width:100%; max-width:400px; border-radius:8px; margin-top:8px; }
        .footer { text-align:center; margin-top:25px; padding-top:15px; border-top:1px solid rgba(255,255,255,0.08); color:#666; font-size:11px; }
        .admin-link { text-align:right; margin-bottom:10px; }
        .admin-link a { color:#666; font-size:11px; text-decoration:none; }
        .admin-link a:hover { color:#ff9800; }
        .btn { padding:10px 18px; border-radius:25px; border:none; cursor:pointer; font-size:12px; font-weight:700; }
        .btn-primary { background:#ff9800; color:#000; }
        .btn-danger { background:#e53935; color:#fff; }
        .btn-outline { background:transparent; border:2px solid #ff9800; color:#ff9800; }
        .btn-outline:hover { background:#ff9800; color:#000; }
        .btn-sm { padding:5px 10px; font-size:10px; border-radius:15px; }
        .admin-section { background:rgba(0,0,0,0.3); border-radius:16px; padding:20px; margin-bottom:20px; border:1px solid rgba(255,255,255,0.1); }
        .admin-section h3 { font-size:16px; color:#ff9800; margin-bottom:15px; text-transform:uppercase; }
        .admin-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px; }
        .admin-card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:14px; }
        .admin-card h4 { font-size:13px; color:#fff; margin-bottom:6px; }
        .admin-card p { font-size:10px; color:#999; }
        .admin-card .card-actions { display:flex; gap:5px; margin-top:8px; flex-wrap:wrap; }
        .form-group { margin-bottom:10px; }
        .form-group label { display:block; font-size:10px; font-weight:700; color:#999; text-transform:uppercase; margin-bottom:4px; }
        .form-group input,.form-group textarea,.form-group select { width:100%; padding:8px 12px; border-radius:8px; border:1px solid rgba(255,255,255,0.2); background:rgba(0,0,0,0.3); color:#fff; font-size:12px; outline:none; font-family:inherit; }
        .form-group textarea { min-height:60px; resize:vertical; }
        .form-row { display:flex; gap:10px; flex-wrap:wrap; }
        .form-row .form-group { flex:1; min-width:160px; }
        .badge { display:inline-block; padding:2px 7px; border-radius:10px; font-size:9px; font-weight:700; margin-left:4px; }
        .badge-engine { background:rgba(66,165,245,0.2); color:#42a5f5; }
        .badge-gearbox { background:rgba(171,71,188,0.2); color:#ab47bc; }
        .empty-state { text-align:center; padding:30px; color:#666; }
        .tabs-admin { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
        .tab-admin { padding:10px 18px; border-radius:25px; border:2px solid rgba(255,255,255,0.2); background:transparent; color:#ccc; cursor:pointer; font-size:12px; font-weight:600; }
        .tab-admin.active { background:#ff9800; color:#000; border-color:#ff9800; }
        .tab-content-admin { display:none; }
        .tab-content-admin.active { display:block; }
        @media(max-width:768px) { .container{padding:12px} .admin-grid{grid-template-columns:1fr} .form-row{flex-direction:column} .service-row{flex-wrap:wrap} .service-right{width:100%;justify-content:space-between} }
    </style>
</head>
<body>
    <div class="container" id="appContainer">
        <div class="header"><div class="logo">AUTO<span>SERVICE</span></div><div class="subtitle">Загрузка...</div></div>

    </div>

    <div class="modal-overlay hidden" id="modalOverlay">
        <div class="modal"><div class="modal-header"><span class="modal-title" id="modalTitle"></span><button class="modal-close" id="modalClose">✕</button></div><div class="modal-body" id="modalBody"></div></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        firebase.initializeApp({ databaseURL: 'https://the-colony-tap-default-rtdb.firebaseio.com/' });
        const db = firebase.database();
        const ADMIN_PASS = 'admin123';
        const KEY_AUTH = 'as_auth_v4';

        let isAdmin = localStorage.getItem(KEY_AUTH) === '1';
        let cars = [];
        let services = [];
        let selCar = null;
        let selEng = null;
        let selGb = null;
        let picks = new Set();
        let filt = 'all';
        let admTab = 'cars';
        let admCar = null;
        let admEng = null;
        let dbOnline = false;

        function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        function fmt(p) { return p.toLocaleString('ru-RU') + ' ₽'; }
        function getSel() { var c = cars.find(function(x) { return x.id === selCar; }); if (!c) return null; var e = c.engines.find(function(x) { return x.id === selEng; }); if (!e) return null; var g = e.gearboxes.find(function(x) { return x.id === selGb; }); return g ? { car: c, engine: e, gearbox: g } : null; }
        function mult() { var d = getSel(); return d ? d.gearbox.mult : 1; }
        function prc(s) { return Math.round(s.price * mult()); }

        function getDefaultCars() { return [{ id: 'vaz2107', name: 'ВАЗ 2107', icon: '🚗', cat: 'Эконом', engines: [{ id: 'vaz16carb', name: '1.6 карбюратор', code: '2106', power: '74 л.с.', fuel: 'Бензин', gearboxes: [{ id: 'vaz_m5', name: 'МКПП-5', code: '2107', drive: 'Задний', mult: 0.7, badge: 'Эконом' }] }, { id: 'vaz16inj', name: '1.6 инжектор', code: '21067', power: '74 л.с.', fuel: 'Бензин', gearboxes: [{ id: 'vaz_m5', name: 'МКПП-5', code: '2107', drive: 'Задний', mult: 0.75, badge: 'Эконом' }] }] }, { id: 'passatb5', name: 'VW Passat B5', icon: '🚙', cat: 'Бизнес', engines: [{ id: '18t_aeb', name: '1.8T Turbo', code: 'AEB', power: '150 л.с.', fuel: 'Бензин', gearboxes: [{ id: '012', name: 'МКПП-5 (012)', code: '012', drive: 'Передний', mult: 1.2, badge: 'Средне' }, { id: '01v', name: 'АКПП-5 (01V)', code: '01V', drive: 'Передний', mult: 1.4, badge: 'Сложно' }] }, { id: '19tdi', name: '1.9 TDI', code: 'AFN', power: '110 л.с.', fuel: 'Дизель', gearboxes: [{ id: '012', name: 'МКПП-5 (012)', code: '012', drive: 'Передний', mult: 1.15, badge: 'Средне' }, { id: '01v', name: 'АКПП-5 (01V)', code: '01V', drive: 'Передний', mult: 1.35, badge: 'Сложно' }] }] }]; }

        function getDefaultServices() {
            return [
                { id:1, name:'Диагностика двигателя (компьютерная)', price:1500, cat:'diagnostics', tools:'Сканер OBD2, Ноутбук', specs:'Время|30-60 мин\nРекомендация|При горящем Check Engine', steps:'Подключите сканер к разъёму OBD2.\nСчитайте коды ошибок.\nПроверьте параметры в реальном времени.\nСбросьте ошибки после устранения.', warning:'Не стирайте ошибки до выяснения причины!', image:'' },
                { id:2, name:'Диагностика ходовой части', price:800, cat:'diagnostics', tools:'Подъёмник, Люфтомер', specs:'Время|20-30 мин', steps:'Поднимите авто на подъёмнике.\nПроверьте люфты в шаровых опорах.\nПроверьте рулевые наконечники.\nОсмотрите сайлентблоки.', warning:'', image:'' },
                { id:3, name:'Диагностика тормозной системы', price:600, cat:'diagnostics', tools:'Тестер тормозной жидкости, Штангенциркуль', specs:'Время|15-20 мин', steps:'Проверьте толщину колодок.\nИзмерьте биение дисков.\nПроверьте уровень жидкости.\nПроверьте герметичность.', warning:'', image:'' },
                { id:10, name:'Замена масла и масляного фильтра', price:1000, cat:'maintenance', tools:'Ключ для пробки, Съёмник фильтра, Ёмкость 5л', specs:'Интервал|Каждые 10 000 км\nОбъём (легковые)|3.5-5.0 л\nОбъём (внедорожники)|5.0-8.0 л', steps:'Прогрейте двигатель 5-7 минут.\nОткрутите сливную пробку.\nСлейте масло (10-15 мин).\nЗамените масляный фильтр.\nЗалейте новое масло.\nПроверьте уровень щупом.', warning:'Не перетягивайте фильтр! Используйте масло рекомендованной вязкости.', image:'' },
                { id:11, name:'Замена воздушного фильтра', price:400, cat:'maintenance', tools:'Отвёртка', specs:'Интервал|Каждые 15 000 км', steps:'Откройте корпус воздушного фильтра.\nИзвлеките старый фильтр.\nУстановите новый.\nЗакройте корпус.', warning:'', image:'' },
                { id:12, name:'Замена салонного фильтра', price:500, cat:'maintenance', tools:'Отвёртка Torx', specs:'Интервал|Каждые 15 000 км', steps:'Найдите отсек фильтра (под бардачком).\nСнимите крышку.\nИзвлеките старый фильтр.\nУстановите новый (стрелка по потоку).', warning:'В пыльных условиях меняйте чаще.', image:'' },
                { id:13, name:'Замена топливного фильтра', price:600, cat:'maintenance', tools:'Ключи, Ёмкость', specs:'Интервал|Каждые 30 000 км\nДизель|Каждые 15 000 км', steps:'Сбросьте давление в топливной системе.\nОтсоедините шланги.\nСнимите старый фильтр.\nУстановите новый (стрелка по потоку).\nЗапустите двигатель, проверьте герметичность.', warning:'Осторожно — топливо под давлением!', image:'' },
                { id:14, name:'Замена свечей зажигания (4 шт)', price:800, cat:'maintenance', tools:'Свечной ключ, Динамометрический ключ', specs:'Интервал|Каждые 30 000 км\nИридиевые|Каждые 60 000 км\nМомент затяжки|25-30 Нм', steps:'Дайте двигателю остыть.\nСнимите катушки зажигания.\nВыкрутите старые свечи.\nПроверьте зазор новых свечей.\nВкрутите новые свечи.\nЗатяните динамометрическим ключом.', warning:'Не перетяните — можно повредить резьбу в ГБЦ!', image:'' },
                { id:15, name:'Замена охлаждающей жидкости', price:1200, cat:'maintenance', tools:'Ёмкость, Воронка', specs:'Интервал|Каждые 2 года', steps:'Дайте двигателю остыть.\nОткройте крышку расширительного бачка.\nСлейте старую жидкость.\nПромойте систему.\nЗалейте новую жидкость.\nУдалите воздушные пробки.', warning:'Не открывайте крышку на горячем двигателе!', image:'' },
                { id:16, name:'Замена тормозной жидкости', price:1000, cat:'maintenance', tools:'Ключ для штуцеров, Шланг, DOT-4', specs:'Интервал|Каждые 2 года\nТип|DOT-4\nПорядок прокачки|ПЗ→ЛЗ→ПП→ЛП', steps:'Откачайте старую жидкость из бачка.\nЗалейте свежую.\nПрокачайте каждое колесо.\nСледите за уровнем в бачке.', warning:'Не допускайте осушения бачка — попадёт воздух!', image:'' },

        function loadData() {
            db.ref('cars').once('value').then(function(snap) { if (snap.exists()) { cars = snap.val(); } else { cars = getDefaultCars();
                    db.ref('cars').set(cars); } if (!selCar && cars.length > 0) { selCar = cars[0].id;
                    selEng = cars[0].engines?.[0]?.id || null;
                    selGb = cars[0].engines?.[0]?.gearboxes?.[0]?.id || null; }
                dbOnline = true;
                render(); }).catch(function() { cars = getDefaultCars();
                dbOnline = false;
                render(); });
            db.ref('services').once('value').then(function(snap) { if (snap.exists()) { services = snap.val(); } else { services = getDefaultServices();
                    db.ref('services').set(services); }
                dbOnline = true;
                render(); }).catch(function() { services = getDefaultServices();
                dbOnline = false;
                render(); });
            db.ref('cars').on('value', function(snap) { if (snap.exists()) { cars = snap.val();
                    dbOnline = true;
                    render(); } });
            db.ref('services').on('value', function(snap) { if (snap.exists()) { services = snap.val();
                    dbOnline = true;
                    render(); } });
            db.ref('.info/connected').on('value', function(snap) { dbOnline = snap.val() === true; });
        }

        function saveData() { if (dbOnline) { db.ref('cars').set(cars);
                db.ref('services').set(services); } }

        function render() { document.getElementById('appContainer').innerHTML = isAdmin ? renderAdmin() : renderClient(); if (isAdmin) bindAdmin(); else bindClient(); }

        function renderClient() {
            var h = '';
            h += '<div class="header"><div class="logo">AUTO<span>SERVICE</span></div><div class="subtitle">Полный каталог услуг • ' + services.length + ' позиций</div></div>';
            h += '<div class="status-bar ' + (dbOnline ? 'online' : 'offline') + '" id="statusBar">' + (dbOnline ? '🟢 Онлайн' : '🔴 Офлайн') + '</div>';
            h += '<div class="admin-link"><a href="#" id="loginLink">🔐 Админ</a></div>';
            h += '<div class="smart-search"><input type="text" id="smartSearch" placeholder="🔍 Поиск услуги..." autocomplete="off"><div class="search-results" id="searchResults"></div></div>';
            h += '<div class="selector-section"><div class="selector-title">🚗 Выберите авто</div>';
            h += '<div class="selector-row"><div class="selector-group"><div class="selector-label">Модель</div><div class="selector-buttons" id="carBtns">';
            cars.forEach(function(c) { h += '<button class="sel-btn' + (c.id === selCar ? ' active' : '') + '" data-car="' + c.id + '">' + c.icon + ' ' + esc(c.name) + '<span class="btn-code">' + esc(c.cat) + '</span></button>'; });
            h += '</div></div></div>';
            var car = cars.find(function(c) { return c.id === selCar; });
            h += '<div class="selector-row"><div class="selector-group"><div class="selector-label">Двигатель</div><div class="selector-buttons" id="engBtns">';
            if (car) car.engines.forEach(function(e) { h += '<button class="sel-btn' + (e.id === selEng ? ' active' : '') + '" data-eng="' + e.id + '">' + esc(e.name) + ' (' + esc(e.power) + ')<span class="btn-code">' + esc(e.code) + '</span></button>'; });
            h += '</div></div></div>';
            h += '<div class="selector-row"><div class="selector-group"><div class="selector-label">КПП</div><div class="selector-buttons" id="gbBtns">';
            if (car) { var eng = car.engines.find(function(e) { return e.id === selEng; }); if (eng) eng.gearboxes.forEach(function(g) { h += '<button class="sel-btn' + (g.id === selGb ? ' active' : '') + '" data-gb="' + g.id + '">' + esc(g.name) + '<span class="btn-code">' + esc(g.drive) + ' • ' + esc(g.code) + '</span></button>'; }); }
            h += '</div></div></div>';
            var d = getSel();
            if (d) h += '<div class="selected-config"><span class="selected-config-icon">' + d.car.icon + '</span><div class="selected-config-info"><div class="selected-config-name">' + esc(d.car.name) + '</div><div class="selected-config-detail">' + esc(d.engine.name) + ' • ' + esc(d.gearbox.name) + '</div></div><span class="selected-config-badge">×' + d.gearbox.mult.toFixed(2) + ' • ' + esc(d.gearbox.badge) + '</span></div>';
            h += '</div>';
            var catNames = { diagnostics:'🔍 Диагностика', maintenance:'🛠️ ТО', engine:'⚡ Двигатель', exhaust:'💨 Выхлоп', transmission:'⚙️ Трансмиссия', brakes:'🛑 Тормоза', suspension:'🔧 Подвеска', ac:'❄️ Кондиционер', electrical:'🔌 Электрика', body:'🎨 Кузов', tires:'🛞 Шины' };
            h += '<div class="filter-buttons" id="filtBtns"><button class="filter-btn' + (filt === 'all' ? ' active' : '') + '" data-filt="all">Все</button>';
            Object.keys(catNames).forEach(function(c) { h += '<button class="filter-btn' + (filt === c ? ' active' : '') + '" data-filt="' + c + '">' + catNames[c] + '</button>'; });
            h += '</div>';
            var total = 0;
            picks.forEach(function(id) { var s = services.find(function(x) { return x.id === id; }); if (s) total += prc(s); });
            h += '<div class="total-panel"><div><div class="total-label">Выбрано: ' + picks.size + ' услуг</div></div><div class="total-price">' + fmt(total) + '</div><button class="clear-btn" id="clearBtn">Сбросить</button></div>';
            var list = services.filter(function(s) { return filt === 'all' || s.cat === filt; });
            var grp = {};
            list.forEach(function(s) { if (!grp[s.cat]) grp[s.cat] = [];
                grp[s.cat].push(s); });
            h += '<div id="svcList">';
            Object.keys(grp).forEach(function(k) { h += '<div class="category-title">' + (catNames[k] || k) + ' (' + grp[k].length + ')</div>';
                grp[k].forEach(function(s) { var p = prc(s); var diff = p - s.price; var note = diff !== 0 ? '<span class="price-note">(' + (diff > 0 ? '+' : '') + diff + ' ₽)</span>' : '';
                    h += '<div class="service-row' + (picks.has(s.id) ? ' selected' : '') + '" data-sid="' + s.id + '"><div class="service-left"><div class="check-box">' + (picks.has(s.id) ? '✓' : '') + '</div><span class="service-name">' + esc(s.name) + '</span></div><div class="service-right"><span class="service-price">' + fmt(p) + ' ' + note + '</span><button class="detail-btn" data-det="' + s.id + '">📋 Подробнее</button></div></div>'; }); });
            if (!list.length) h += '<div class="empty-state">Ничего не найдено</div>';
            h += '</div><div class="footer">© 2026 AutoService • ' + services.length + ' услуг в каталоге</div>';
            return h;
        }

        function bindClient() {
            document.getElementById('loginLink').onclick = function(e) { e.preventDefault(); var p = prompt('Пароль:'); if (p === ADMIN_PASS) { localStorage.setItem(KEY_AUTH, '1');
                    isAdmin = true;
                    render(); } else if (p !== null) alert('Неверно!'); };
            document.querySelectorAll('#carBtns .sel-btn').forEach(function(b) { b.onclick = function() { selCar = b.dataset.car; var c = cars.find(function(x) { return x.id === selCar; });
                    selEng = c?.engines?.[0]?.id || null;
                    selGb = c?.engines?.[0]?.gearboxes?.[0]?.id || null;
                    picks.clear();
                    render(); }; });
            document.querySelectorAll('#engBtns .sel-btn').forEach(function(b) { b.onclick = function() { selEng = b.dataset.eng; var c = cars.find(function(x) { return x.id === selCar; }); if (c) { var e = c.engines.find(function(x) { return x.id === selEng; });
                    selGb = e?.gearboxes?.[0]?.id || null; }
                picks.clear();
                render(); }; });
            document.querySelectorAll('#gbBtns .sel-btn').forEach(function(b) { b.onclick = function() { selGb = b.dataset.gb;
                picks.clear();
                render(); }; });
            document.querySelectorAll('#filtBtns .filter-btn').forEach(function(b) { b.onclick = function() { filt = b.dataset.filt;
                render(); }; });
            document.getElementById('clearBtn').onclick = function() { picks.clear();
                render(); };
            document.querySelectorAll('.service-row').forEach(function(r) { r.querySelector('.service-left').onclick = function() { var sid = parseInt(r.dataset.sid);
                    picks.has(sid) ? picks.delete(sid) : picks.add(sid);
                    render(); };
                r.querySelector('.detail-btn').onclick = function(e) { e.stopPropagation();
                    openModal(parseInt(r.querySelector('.detail-btn').dataset.det)); }; });
            var ss = document.getElementById('smartSearch');
            var sr = document.getElementById('searchResults');
            ss.oninput = function() { var q = ss.value.toLowerCase().trim(); if (!q) { sr.classList.remove('active');
                    sr.innerHTML = ''; return; } var results = services.filter(function(s) { return s.name.toLowerCase().indexOf(q) >= 0 || (s.tools && s.tools.toLowerCase().indexOf(q) >= 0) || s.cat.toLowerCase().indexOf(q) >= 0; }); if (results.length) { sr.classList.add('active');
                    sr.innerHTML = results.map(function(s) { return '<div class="search-result-item" data-ssid="' + s.id + '"><div class="search-result-name">' + esc(s.name) + '</div><div class="search-result-price">' + fmt(prc(s)) + '</div></div>'; }).join('');
                    sr.querySelectorAll('.search-result-item').forEach(function(item) { item.onclick = function() { var sid = parseInt(item.dataset.ssid);
                            picks.has(sid) ? picks.delete(sid) : picks.add(sid);
                            ss.value = '';
                            sr.classList.remove('active');
                            render(); }; }); } else { sr.classList.add('active');
                    sr.innerHTML = '<div class="empty-state" style="padding:15px;">Ничего не найдено</div>'; } };
        }

        function renderAdmin() {
            var h = '';
            h += '<div class="header"><div class="logo">AUTO<span>SERVICE</span></div><div class="subtitle">⚙️ Админ-панель • ' + services.length + ' услуг</div></div>';
            h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;"><div class="tabs-admin"><button class="tab-admin' + (admTab === 'cars' ? ' active' : '') + '" data-atab="cars">🚗 Авто</button><button class="tab-admin' + (admTab === 'svc' ? ' active' : '') + '" data-atab="svc">🔧 Услуги</button></div><button class="btn btn-outline btn-sm" id="logoutBtn">🚪 Выйти</button></div>';
            h += '<div class="tab-content-admin' + (admTab === 'cars' ? ' active' : '') + '">';
            h += '<div class="admin-section"><h3>➕ Добавить авто</h3><div class="form-row"><div class="form-group"><label>Модель</label><input type="text" id="acName" placeholder="VW Passat B5"></div><div class="form-group"><label>Иконка</label><input type="text" id="acIcon" placeholder="🚙"></div><div class="form-group"><label>Категория</label><input type="text" id="acCat" placeholder="Бизнес"></div></div><button class="btn btn-primary" id="btnAddCar">➕ Добавить</button></div>';
            h += '<div class="admin-section"><h3>📋 Авто (' + cars.length + ')</h3><div class="admin-grid">';
            cars.forEach(function(c) { h += '<div class="admin-card"><h4>' + c.icon + ' ' + esc(c.name) + '</h4><p>' + esc(c.cat) + ' | Двигателей: ' + c.engines.length + '</p><div class="card-actions"><button class="btn btn-sm btn-outline" data-engs="' + c.id + '">⚙️ Двигатели</button><button class="btn btn-sm btn-danger" data-delcar="' + c.id + '">🗑️</button></div></div>'; });
            h += '</div></div>';
            h += '</div>';
            h += '<div class="tab-content-admin' + (admTab === 'svc' ? ' active' : '') + '">';
            h += '<div class="admin-section"><h3>➕ Услуга</h3><input type="hidden" id="svcEditId"><div class="form-row"><div class="form-group"><label>Название</label><input type="text" id="svcName"></div><div class="form-group"><label>Цена (₽)</label><input type="number" id="svcPrice" value="1000"></div><div class="form-group"><label>Категория</label><select id="svcCat"><option value="diagnostics">🔍 Диагностика</option><option value="maintenance">🛠️ ТО</option><option value="engine">⚡ Двигатель</option><option value="exhaust">💨 Выхлоп</option><option value="transmission">⚙️ Трансмиссия</option><option value="brakes">🛑 Тормоза</option><option value="suspension">🔧 Подвеска</option><option value="ac">❄️ Кондиционер</option><option value="electrical">🔌 Электрика</option><option value="body">🎨 Кузов</option><option value="tires">🛞 Шины</option></select></div></div><div class="form-group"><label>Инструменты</label><input type="text" id="svcTools"></div><div class="form-group"><label>Регламент</label><textarea id="svcSpecs"></textarea></div><div class="form-group"><label>Инструкция</label><textarea id="svcSteps"></textarea></div><div class="form-group"><label>Предупреждение</label><input type="text" id="svcWarning"></div><div class="form-group"><label>URL картинки</label><input type="text" id="svcImage"></div><button class="btn btn-primary" id="btnSaveSvc">💾 Сохранить</button><button class="btn btn-outline btn-sm" id="btnClearSvc">✕ Очистить</button></div>';
            h += '<div class="admin-section"><h3>📋 Услуги (' + services.length + ')</h3><div class="admin-grid">';
            services.forEach(function(s) { h += '<div class="admin-card"><h4>' + esc(s.name) + '</h4><p>' + fmt(s.price) + ' | ' + s.cat + '</p><div class="card-actions"><button class="btn btn-sm btn-outline" data-editsvc="' + s.id + '">✏️</button><button class="btn btn-sm btn-danger" data-delsvc="' + s.id + '">🗑️</button></div></div>'; });
            h += '</div></div></div>';
            return h;
        }

        function bindAdmin() {
            document.getElementById('logoutBtn').onclick = function() { localStorage.removeItem(KEY_AUTH);
                isAdmin = false;
                render(); };
            document.querySelectorAll('.tab-admin').forEach(function(b) { b.onclick = function() { admTab = b.dataset.atab;
                render(); }; });
            document.getElementById('btnAddCar').onclick = function() { var n = document.getElementById('acName').value.trim(); var i = document.getElementById('acIcon').value.trim() || '🚗'; var c = document.getElementById('acCat').value.trim() || 'Стандарт'; if (!n) return alert('Название!');
                cars.push({ id: 'c' + Date.now(), name: n, icon: i, cat: c, engines: [] });
                saveData();
                render(); };
            document.querySelectorAll('[data-delcar]').forEach(function(b) { b.onclick = function() { if (!confirm('Удалить?')) return;
                    cars = cars.filter(function(c) { return c.id !== b.dataset.delcar; });
                    saveData();
                    render(); }; });
            document.querySelectorAll('[data-engs]').forEach(function(b) { b.onclick = function() { admCar = b.dataset.engs;
                admEng = null;
                render(); }; });
            document.getElementById('btnSaveSvc').onclick = function() { var eid = document.getElementById('svcEditId').value; var n = document.getElementById('svcName').value.trim(); var p = parseInt(document.getElementById('svcPrice').value) || 0; var c = document.getElementById('svcCat').value; var t = document.getElementById('svcTools').value.trim(); var sp = document.getElementById('svcSpecs').value.trim(); var st = document.getElementById('svcSteps').value.trim(); var w = document.getElementById('svcWarning').value.trim(); var im = document.getElementById('svcImage').value.trim(); if (!n || !p) return alert('Название и цена!'); if (eid) { var idx = services.findIndex(function(s) { return s.id == eid; }); if (idx >= 0) services[idx] = { id: services[idx].id, name: n, price: p, cat: c, tools: t, specs: sp, steps: st, warning: w, image: im }; } else { services.push({ id: Date.now(), name: n, price: p, cat: c, tools: t, specs: sp, steps: st, warning: w, image: im }); }
                saveData();
                document.getElementById('svcEditId').value = '';
                document.getElementById('svcName').value = '';
                document.getElementById('svcPrice').value = '1000';
                render(); };
            document.getElementById('btnClearSvc').onclick = function() { document.getElementById('svcEditId').value = '';
                document.getElementById('svcName').value = '';
                document.getElementById('svcPrice').value = '1000'; };
            document.querySelectorAll('[data-editsvc]').forEach(function(b) { b.onclick = function() { var s = services.find(function(x) { return x.id == b.dataset.editsvc; }); if (!s) return;
                    document.getElementById('svcEditId').value = s.id;
                    document.getElementById('svcName').value = s.name;
                    document.getElementById('svcPrice').value = s.price;
                    document.getElementById('svcCat').value = s.cat;
                    document.getElementById('svcTools').value = s.tools || '';
                    document.getElementById('svcSpecs').value = s.specs || '';
                    document.getElementById('svcSteps').value = s.steps || '';
                    document.getElementById('svcWarning').value = s.warning || '';
                    document.getElementById('svcImage').value = s.image || '';
                    admTab = 'svc';
                    render(); }; });
            document.querySelectorAll('[data-delsvc]').forEach(function(b) { b.onclick = function() { if (!confirm('Удалить?')) return;
                    services = services.filter(function(s) { return s.id != b.dataset.delsvc; });
                    saveData();
                    render(); }; });
        }

        function openModal(sid) { var s = services.find(function(x) { return x.id === sid; }); if (!s) return;
            document.getElementById('modalTitle').textContent = s.name; var h = ''; if (s.specs?.trim()) { h += '<h3>📅 Регламент</h3><table class="modal-info-table">';
                s.specs.split('\n').forEach(function(l) { var p = l.split('|'); if (p.length >= 2) h += '<tr><td>' + esc(p[0].trim()) + '</td><td>' + esc(p[1].trim()) + '</td></tr>'; });
                h += '</table>'; } if (s.tools?.trim()) { h += '<h3>🔧 Инструменты</h3><div class="modal-tools">';
                s.tools.split(',').forEach(function(t) { h += '<span class="tool-tag">' + esc(t.trim()) + '</span>'; });
                h += '</div>'; } if (s.steps?.trim()) { h += '<h3>📝 Инструкция</h3>';
                s.steps.split('\n').forEach(function(st, i) { h += '<div class="step-block"><div class="step-header"><span class="step-number">' + (i + 1) + '</span> Шаг ' + (i + 1) + '</div><div class="step-text">' + esc(st) + '</div></div>'; }); } if (s.image?.trim()) h += '<h3>🖼️ Фото</h3><img src="' + esc(s.image) + '" class="step-image" onerror="this.style.display=\'none\'">'; if (s.warning?.trim()) h += '<h3>⚠️ Предупреждение</h3><div class="modal-warning">' + esc(s.warning) + '</div>';
            document.getElementById('modalBody').innerHTML = h;
            document.getElementById('modalOverlay').classList.remove('hidden');
            document.body.style.overflow = 'hidden'; }

        function closeModal() { document.getElementById('modalOverlay').classList.add('hidden');
            document.body.style.overflow = ''; }
        document.getElementById('modalClose').onclick = closeModal;
        document.getElementById('modalOverlay').onclick = function(e) { if (e.target === this) closeModal(); };
        document.onkeydown = function(e) { if (e.key === 'Escape') closeModal(); };

        loadData();
    </script>
