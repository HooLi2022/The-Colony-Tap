<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎮 GameStore | Магазин цифровых игр</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c1f 0%, #1a142f 100%);
            color: #fff;
            min-height: 100vh;
        }

        /* Кастомный скроллбар */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #ff6b4a, #ff8a5c);
            border-radius: 10px;
        }

        /* Контейнер */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Шапка */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 2rem;
            background: linear-gradient(135deg, #ff6b4a, #ff8a5c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #ff8a5c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Карточка баланса */
        .wallet-card {
            background: linear-gradient(135deg, rgba(255,107,74,0.15), rgba(255,138,92,0.05));
            border-radius: 20px;
            padding: 12px 24px;
            border: 1px solid rgba(255,107,74,0.3);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .wallet-icon {
            font-size: 1.8rem;
            color: #ff8a5c;
        }

        .wallet-info h3 {
            font-size: 0.8rem;
            font-weight: 500;
            color: #aaa;
        }

        .wallet-info .balance {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ff8a5c;
        }

        /* Поиск и фильтры */
        .search-section {
            margin-bottom: 30px;
        }

        .search-bar {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .search-input-wrapper {
            flex: 1;
            position: relative;
        }

        .search-input-wrapper i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px 14px 48px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #ff8a5c;
            background: rgba(255,255,255,0.08);
        }

        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            color: #aaa;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #ff6b4a, #ff8a5c);
            color: white;
            border-color: transparent;
        }

        .filter-btn:hover:not(.active) {
            background: rgba(255,107,74,0.2);
            color: #ff8a5c;
        }

        /* Сетка игр */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        /* Карточка игры */
        .game-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            position: relative;
        }

        .game-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255,107,74,0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .game-image {
            position: relative;
            height: 180px;
            overflow: hidden;
        }

        .game-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .game-card:hover .game-image img {
            transform: scale(1.05);
        }

        .game-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .game-badge.popular {
            background: linear-gradient(135deg, #ff6b4a, #ff8a5c);
        }

        .game-badge.new {
            background: linear-gradient(135deg, #4caf50, #45a049);
        }

        .game-badge.sale {
            background: linear-gradient(135deg, #ff4444, #ff8c00);
        }

        .game-info {
            padding: 20px;
        }

        .game-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .game-category {
            font-size: 0.75rem;
            color: #ff8a5c;
            margin-bottom: 12px;
            display: inline-block;
            background: rgba(255,107,74,0.15);
            padding: 3px 10px;
            border-radius: 20px;
        }

        .game-description {
            font-size: 0.85rem;
            color: #aaa;
            line-height: 1.5;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .game-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        .game-price {
            font-size: 1.4rem;
            font-weight: 800;
            color: #ff8a5c;
        }

        .game-price.old-price {
            font-size: 0.9rem;
            color: #666;
            text-decoration: line-through;
            margin-right: 8px;
        }

        .buy-btn {
            background: linear-gradient(135deg, #ff6b4a, #ff8a5c);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .buy-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255,107,74,0.4);
        }

        .buy-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #444;
        }

        /* Корзина */
        .cart-sidebar {
            position: fixed;
            right: -400px;
            top: 0;
            width: 380px;
            height: 100vh;
            background: linear-gradient(135deg, #0f0c1f, #1a142f);
            border-left: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            box-shadow: -5px 0 30px rgba(0,0,0,0.5);
        }

        .cart-sidebar.open {
            right: 0;
        }

        .cart-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h2 {
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .close-cart {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .cart-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            margin-bottom: 12px;
        }

        .cart-item-img {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            object-fit: cover;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-title {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .cart-item-price {
            color: #ff8a5c;
            font-size: 0.85rem;
        }

        .remove-item {
            background: none;
            border: none;
            color: #ff4444;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .cart-footer {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .checkout-btn {
            width: 100%;
            background: linear-gradient(135deg, #4caf50, #45a049);
            border: none;
            padding: 14px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .checkout-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(76,175,80,0.4);
        }

        /* Кнопка корзины */
        .cart-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #ff6b4a, #ff8a5c);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 99;
            box-shadow: 0 5px 20px rgba(255,107,74,0.4);
            transition: all 0.3s;
        }

        .cart-btn:hover {
            transform: scale(1.1);
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4444;
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Уведомления */
        .toast {
            position: fixed;
            bottom: 100px;
            right: 30px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 50px;
            border-left: 4px solid #4caf50;
            z-index: 1001;
            animation: slideInRight 0.3s ease;
            font-size: 0.9rem;
        }

        .toast.error {
            border-left-color: #ff4444;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Адаптив */
        @media (max-width: 768px) {
            .cart-sidebar {
                width: 100%;
                right: -100%;
            }
            .games-grid {
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 15px;
            }
            .header {
                flex-direction: column;
                text-align: center;
            }
            .search-bar {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Шапка -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-gamepad"></i></div>
                <h1>GameStore</h1>
            </div>
            <div class="wallet-card">
                <div class="wallet-icon"><i class="fas fa-coins"></i></div>
                <div class="wallet-info">
                    <h3>Ваш баланс</h3>
                    <div class="balance" id="balance">5000 ₽</div>
                </div>
                <button class="filter-btn" onclick="addFunds()" style="background: rgba(255,107,74,0.2);"><i class="fas fa-plus"></i> +</button>
            </div>
        </div>

        <!-- Поиск и фильтры -->
        <div class="search-section">
            <div class="search-bar">
                <div class="search-input-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" class="search-input" id="searchInput" placeholder="Поиск игр...">
                </div>
                <div class="filter-group" id="filterGroup">
                    <button class="filter-btn active" data-category="all">Все</button>
                    <button class="filter-btn" data-category="Экшен">Экшен</button>
                    <button class="filter-btn" data-category="RPG">RPG</button>
                    <button class="filter-btn" data-category="Шутер">Шутер</button>
                    <button class="filter-btn" data-category="Приключения">Приключения</button>
                    <button class="filter-btn" data-category="Инди">Инди</button>
                </div>
            </div>
        </div>

        <!-- Сетка игр -->
        <div class="games-grid" id="gamesGrid"></div>
    </div>

    <!-- Корзина -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2><i class="fas fa-shopping-cart"></i> Корзина</h2>
            <button class="close-cart" onclick="toggleCart()"><i class="fas fa-times"></i></button>
        </div>
        <div class="cart-items" id="cartItems">
            <div style="text-align: center; color: #666; padding: 40px;">Корзина пуста</div>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Итого:</span>
                <span id="cartTotal">0 ₽</span>
            </div>
            <button class="checkout-btn" onclick="checkout()">Оформить заказ</button>
        </div>
    </div>

    <!-- Кнопка корзины -->
    <div class="cart-btn" onclick="toggleCart()">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-count" id="cartCount">0</span>
    </div>

    <script>
        // ==================== ДАННЫЕ ИГР ====================
        const games = [
            { id: 1, name: "Cyberpunk 2077", category: "RPG", price: 2999, oldPrice: 4999, image: "https://placehold.co/400x200/1a1f2a/ff8a5c?text=Cyberpunk", description: "Откройте для себя историю Ви — наёмницы, охотящейся за уникальным имплантом.", badge: "popular" },
            { id: 2, name: "Elden Ring", category: "RPG", price: 3499, oldPrice: 4999, image: "https://placehold.co/400x200/1a1f2a/ff8a5c?text=Elden+Ring", description: "Новая фэнтезийная RPG от создателей Dark Souls.", badge: "new" },
            { id: 3, name: "Call of Duty: MW3", category: "Шутер", price: 3999, oldPrice: 5999, image: "https://placehold.co/400x200/1a1f2a/ff8a5c?text=COD+MW3", description: "Культовая серия шутеров возвращается.", badge: "popular" },
            { id: 4, name: "Baldur's Gate 3", category: "RPG", price: 2999, oldPrice: null, image: "https://placehold.co/400x200/1a1f2a/ff8a5c?text=Baldur's+Gate", description: "Эпическая RPG, основанная на правилах Dungeons & Dragons.", badge: "new" },
            { id: 5, name: "Hollow Knight", category: "Инди", price: 499, oldPrice: 799, image: "https://placehold.co/400x200/1a1f2a/ff8a5c?text=Hollow+Knight", description: "Увлекательный платформер в мрачном мире.", badge: null },
            { id: 6, name: "Red Dead Redemption 2", category: "Приключения", price: 2499, oldPrice: 3999, image: "https://placehold.co/400x200/1a1f2a/ff8a5c?text=RDR2", description: "Эпическая история о жизни Дикого Запада.", badge: "sale" },
            { id: 7, name: "Counter-Strike 2", category: "Шутер", price: 0, oldPrice: null, image: "https://placehold.co/400x200/1a1f2a/ff8a5c?text=CS2", description: "Легендарный шутер абсолютно бесплатно!", badge: null },
            { id: 8, name: "The Witcher 3", category: "RPG", price: 1299, oldPrice: 2999, image: "https://placehold.co/400x200/1a1f2a/ff8a5c?text=Witcher+3", description: "Станьте Геральтом из Ривии в эпическом приключении.", badge: "sale" },
            { id: 9, name: "Stray", category: "Приключения", price: 899, oldPrice: 1499, image: "https://placehold.co/400x200/1a1f2a/ff8a5c?text=Stray", description: "Приключения бездомного кота в кибергороде.", badge: null },
            { id: 10, name: "Dota 2", category: "Экшен", price: 0, oldPrice: null, image: "https://placehold.co/400x200/1a1f2a/ff8a5c?text=Dota+2", description: "Лучшая MOBA в мире. Играйте бесплатно!", badge: null },
            { id: 11, name: "Resident Evil 4", category: "Экшен", price: 1999, oldPrice: 3499, image: "https://placehold.co/400x200/1a1f2a/ff8a5c?text=RE4", description: "Классический хоррор в новом исполнении.", badge: "new" },
            { id: 12, name: "Stardew Valley", category: "Инди", price: 399, oldPrice: 699, image: "https://placehold.co/400x200/1a1f2a/ff8a5c?text=Stardew", description: "Расслабляющий симулятор фермы.", badge: null }
        ];

        // Состояние
        let userBalance = 5000;
        let cart = [];
        let currentFilter = "all";
        let searchQuery = "";

        // DOM элементы
        const gamesGrid = document.getElementById('gamesGrid');
        const balanceEl = document.getElementById('balance');
        const cartCountEl = document.getElementById('cartCount');
        const cartTotalEl = document.getElementById('cartTotal');
        const cartItemsEl = document.getElementById('cartItems');
        const searchInput = document.getElementById('searchInput');

        // ==================== ФУНКЦИИ ====================
        function updateBalance() {
            balanceEl.textContent = userBalance.toLocaleString() + ' ₽';
            saveData();
        }

        function saveData() {
            localStorage.setItem('gameStore_balance', userBalance);
            localStorage.setItem('gameStore_cart', JSON.stringify(cart));
        }

        function loadData() {
            const savedBalance = localStorage.getItem('gameStore_balance');
            if (savedBalance) userBalance = parseInt(savedBalance);
            
            const savedCart = localStorage.getItem('gameStore_cart');
            if (savedCart) cart = JSON.parse(savedCart);
            
            updateBalance();
            updateCartUI();
            renderGames();
        }

        function addFunds() {
            let amount = prompt('Введите сумму пополнения (₽):', '1000');
            if (amount && !isNaN(amount) && parseInt(amount) > 0) {
                userBalance += parseInt(amount);
                updateBalance();
                showToast(`💰 Баланс пополнен на ${parseInt(amount)} ₽`, 'success');
                renderGames();
            }
        }

        function addToCart(game) {
            if (cart.find(item => item.id === game.id)) {
                showToast('❌ Эта игра уже в корзине', 'error');
                return;
            }
            cart.push(game);
            updateCartUI();
            showToast(`✅ ${game.name} добавлена в корзину`, 'success');
            saveData();
        }

        function removeFromCart(gameId) {
            cart = cart.filter(item => item.id !== gameId);
            updateCartUI();
            showToast('🗑 Товар удалён из корзины', 'success');
            saveData();
        }

        function updateCartUI() {
            const cartCount = cart.reduce((sum, item) => sum + 1, 0);
            const cartTotal = cart.reduce((sum, item) => sum + item.price, 0);
            
            cartCountEl.textContent = cartCount;
            cartTotalEl.textContent = cartTotal.toLocaleString() + ' ₽';
            
            if (cart.length === 0) {
                cartItemsEl.innerHTML = '<div style="text-align: center; color: #666; padding: 40px;">🛒 Корзина пуста</div>';
                return;
            }
            
            cartItemsEl.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <img class="cart-item-img" src="${item.image}" alt="${item.name}">
                    <div class="cart-item-info">
                        <div class="cart-item-title">${item.name}</div>
                        <div class="cart-item-price">${item.price.toLocaleString()} ₽</div>
                    </div>
                    <button class="remove-item" onclick="removeFromCart(${item.id})">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            `).join('');
        }

        function checkout() {
            if (cart.length === 0) {
                showToast('🛒 Корзина пуста!', 'error');
                return;
            }
            
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            
            if (userBalance >= total) {
                userBalance -= total;
                updateBalance();
                
                // Покупка совершена
                showToast(`🎉 Поздравляем! Вы приобрели ${cart.length} игр на ${total} ₽`, 'success');
                
                // Здесь можно добавить логику для "библиотеки" игр
                console.log('Купленные игры:', cart);
                
                cart = [];
                updateCartUI();
                renderGames();
                saveData();
                
                // Закрываем корзину
                toggleCart();
            } else {
                showToast(`❌ Недостаточно средств! Нужно еще ${(total - userBalance).toLocaleString()} ₽`, 'error');
            }
        }

        function renderGames() {
            let filtered = games.filter(game => {
                const matchesFilter = currentFilter === "all" || game.category === currentFilter;
                const matchesSearch = game.name.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesFilter && matchesSearch;
            });
            
            gamesGrid.innerHTML = filtered.map(game => {
                const inCart = cart.some(item => item.id === game.id);
                const isFree = game.price === 0;
                
                return `
                    <div class="game-card">
                        <div class="game-image">
                            <img src="${game.image}" alt="${game.name}">
                            ${game.badge ? `<span class="game-badge ${game.badge}">${game.badge === 'popular' ? '🔥 Популярное' : game.badge === 'new' ? '🆕 Новинка' : '🔥 Скидка'}</span>` : ''}
                        </div>
                        <div class="game-info">
                            <div class="game-title">${game.name}</div>
                            <span class="game-category">${game.category}</span>
                            <div class="game-description">${game.description}</div>
                            <div class="game-footer">
                                <div>
                                    ${game.oldPrice ? `<span class="old-price">${game.oldPrice.toLocaleString()} ₽</span>` : ''}
                                    <span class="game-price">${isFree ? 'Бесплатно' : game.price.toLocaleString() + ' ₽'}</span>
                                </div>
                                ${!inCart ? 
                                    `<button class="buy-btn" onclick="addToCart(${JSON.stringify(game).replace(/"/g, '&quot;')})">
                                        <i class="fas fa-shopping-cart"></i> В корзину
                                    </button>` :
                                    `<button class="buy-btn" style="background:#444;" disabled>
                                        <i class="fas fa-check"></i> В корзине
                                    </button>`
                                }
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            if (filtered.length === 0) {
                gamesGrid.innerHTML = '<div style="text-align:center; padding:60px; color:#666;">🔍 Ничего не найдено</div>';
            }
        }

        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('open');
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // ==================== СОБЫТИЯ ====================
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderGames();
        });
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.category;
                renderGames();
            });
        });
        
        // Закрытие корзины по клику вне
        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('cartSidebar');
            const cartBtn = document.querySelector('.cart-btn');
            if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && !cartBtn.contains(e.target)) {
                sidebar.classList.remove('open');
            }
        });
        
        // ==================== ЗАПУСК ====================
        loadData();
    </script>
</body>
</html>
