<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎁 CS2 CASE OPENER | Открытие кейсов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0e1a, #0f1219);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ШАПКА */
        .header {
            background: linear-gradient(135deg, #1a1f2a, #0f1219);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border-bottom: 3px solid #ffd700;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .balance-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .balance-card {
            background: linear-gradient(135deg, #2a2f3a, #1a1f2a);
            padding: 20px 35px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #ffd700;
        }

        .balance-amount {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffd700;
        }

        .balance-label {
            font-size: 0.9rem;
            color: #aaa;
        }

        .stats {
            display: flex;
            gap: 20px;
        }

        .stat {
            background: rgba(255,255,255,0.05);
            padding: 15px 25px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #aaa;
        }

        /* КЕЙСЫ */
        .cases-section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 1.8rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: "🎁";
            font-size: 2rem;
        }

        .cases-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .case-card {
            background: linear-gradient(135deg, #1f242f, #151a24);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255,215,0,0.2);
            position: relative;
            overflow: hidden;
        }

        .case-card:hover {
            transform: translateY(-5px);
            border-color: #ffd700;
            box-shadow: 0 10px 30px rgba(255,215,0,0.2);
        }

        .case-image {
            font-size: 5rem;
            margin-bottom: 15px;
        }

        .case-name {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .case-price {
            font-size: 1.3rem;
            color: #ffd700;
            margin: 15px 0;
        }

        .case-price span {
            font-size: 0.9rem;
            color: #aaa;
        }

        .case-items {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 15px;
        }

        .open-btn {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #1a1f2a;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }

        .open-btn:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        .open-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* АНИМАЦИЯ ОТКРЫТИЯ */
        .opening-animation {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.3s;
        }

        .opening-animation.hidden {
            display: none;
        }

        .roulette {
            width: 80%;
            max-width: 800px;
            background: linear-gradient(135deg, #1a1f2a, #0f1219);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            border: 3px solid #ffd700;
        }

        .roulette-items {
            display: flex;
            overflow: hidden;
            margin: 30px 0;
            position: relative;
            height: 200px;
            border-radius: 20px;
            background: #0a0e1a;
        }

        .roulette-track {
            display: flex;
            animation: spin 2s ease-out forwards;
        }

        .roulette-item {
            min-width: 150px;
            padding: 20px;
            text-align: center;
            background: #1f242f;
            margin: 0 5px;
            border-radius: 15px;
        }

        .roulette-item-icon {
            font-size: 3rem;
        }

        .roulette-item-name {
            font-size: 1rem;
            margin-top: 10px;
        }

        .roulette-item-price {
            font-size: 0.9rem;
            color: #ffd700;
            margin-top: 5px;
        }

        @keyframes spin {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .result-popup {
            margin-top: 20px;
            padding: 20px;
            background: rgba(76,175,80,0.2);
            border-radius: 15px;
            border: 1px solid #4caf50;
            animation: bounce 0.5s;
        }

        @keyframes bounce {
            0% { transform: scale(0.8); opacity: 0; }
            80% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ИНВЕНТАРЬ */
        .inventory-section {
            background: linear-gradient(135deg, #1a1f2a, #0f1219);
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            border-top: 3px solid #ffd700;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }

        .inventory-item {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid rgba(255,215,0,0.2);
            position: relative;
        }

        .inventory-item:hover {
            transform: translateY(-3px);
            border-color: #ffd700;
        }

        .inventory-item-icon {
            font-size: 2.5rem;
        }

        .inventory-item-name {
            font-size: 0.8rem;
            margin-top: 8px;
        }

        .inventory-item-price {
            font-size: 0.7rem;
            color: #ffd700;
            margin-top: 5px;
        }

        .sell-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 0.7rem;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
        }

        .sell-btn:hover {
            background: #45a049;
        }

        /* КНОПКА СБРОСА */
        .reset-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #ff4444;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            z-index: 100;
            transition: all 0.3s;
        }

        .reset-btn:hover {
            background: #ff6666;
            transform: scale(1.05);
        }

        /* УВЕДОМЛЕНИЯ */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 2000;
            animation: slideIn 0.3s;
            display: none;
        }

        .notification.show {
            display: block;
        }

        .notification.error {
            background: #ff4444;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ШАПКА -->
        <div class="header">
            <div class="balance-info">
                <div class="balance-card">
                    <div class="balance-amount" id="balance">0</div>
                    <div class="balance-label">💰 Монеты</div>
                </div>
                <div class="stats">
                    <div class="stat">
                        <div class="stat-value" id="casesOpened">0</div>
                        <div class="stat-label">Открыто кейсов</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="itemsValue">0</div>
                        <div class="stat-label">💰 Стоимость инвентаря</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- КЕЙСЫ -->
        <div class="cases-section">
            <h2 class="section-title">Доступные кейсы</h2>
            <div class="cases-grid" id="casesList"></div>
        </div>

        <!-- ИНВЕНТАРЬ -->
        <div class="inventory-section">
            <h2 class="section-title" style="--content: '📦';">Мой инвентарь</h2>
            <div class="inventory-grid" id="inventoryList"></div>
        </div>
    </div>

    <!-- Кнопка сброса -->
    <button class="reset-btn" onclick="resetGame()">🔄 СБРОС ИГРЫ</button>

    <!-- Уведомления -->
    <div class="notification" id="notification"></div>

    <script>
        // ===== ДАННЫЕ КЕЙСОВ И ПРЕДМЕТОВ =====
        const cases = [
            {
                id: 'case_1',
                name: '⚡ ОБЫЧНЫЙ КЕЙС',
                icon: '📦',
                price: 100,
                items: [
                    { name: 'P250 | Sand Dune', icon: '🔫', price: 5, rarity: 'common' },
                    { name: 'MAC-10 | Palm', icon: '🔫', price: 8, rarity: 'common' },
                    { name: 'Five-SeveN | Forest', icon: '🔫', price: 12, rarity: 'common' },
                    { name: 'M4A4 | Urban DDPAT', icon: '🔫', price: 25, rarity: 'rare' },
                    { name: 'AK-47 | Blue Laminate', icon: '🔫', price: 40, rarity: 'rare' },
                    { name: 'AWP | Worm God', icon: '🔫', price: 60, rarity: 'epic' },
                    { name: '★ Knife | Forest', icon: '🔪', price: 500, rarity: 'legendary' }
                ]
            },
            {
                id: 'case_2',
                name: '💎 ПРЕМИУМ КЕЙС',
                icon: '💎',
                price: 500,
                items: [
                    { name: 'USP-S | Guardian', icon: '🔫', price: 30, rarity: 'rare' },
                    { name: 'Desert Eagle | Crimson Web', icon: '🔫', price: 50, rarity: 'rare' },
                    { name: 'M4A1-S | Cyrex', icon: '🔫', price: 80, rarity: 'epic' },
                    { name: 'AK-47 | Redline', icon: '🔫', price: 120, rarity: 'epic' },
                    { name: 'AWP | Asiimov', icon: '🔫', price: 250, rarity: 'legendary' },
                    { name: '★ Knife | Crimson Web', icon: '🔪', price: 1500, rarity: 'mythical' },
                    { name: '★ Butterfly Knife | Fade', icon: '🦋', price: 5000, rarity: 'divine' }
                ]
            },
            {
                id: 'case_3',
                name: '👑 ЛЕГЕНДАРНЫЙ КЕЙС',
                icon: '👑',
                price: 2500,
                items: [
                    { name: 'AWP | Dragon Lore', icon: '🐉', price: 5000, rarity: 'legendary' },
                    { name: 'AK-47 | Fire Serpent', icon: '🔥', price: 3000, rarity: 'legendary' },
                    { name: 'M4A4 | Howl', icon: '🐺', price: 4000, rarity: 'legendary' },
                    { name: '★ Karambit | Fade', icon: '🔪', price: 15000, rarity: 'mythical' },
                    { name: '★ M9 Bayonet | Marble Fade', icon: '🔪', price: 20000, rarity: 'mythical' },
                    { name: '★ Butterfly Knife | Doppler', icon: '🦋', price: 35000, rarity: 'divine' },
                    { name: '★ Karambit | Ruby', icon: '💎', price: 100000, rarity: 'divine' }
                ]
            }
        ];

        // ===== СОСТОЯНИЕ ИГРОКА =====
        let player = {
            balance: 1000,
            casesOpened: 0,
            inventory: []
        };

        // ===== DOM ЭЛЕМЕНТЫ =====
        const balanceEl = document.getElementById('balance');
        const casesOpenedEl = document.getElementById('casesOpened');
        const itemsValueEl = document.getElementById('itemsValue');
        const casesList = document.getElementById('casesList');
        const inventoryList = document.getElementById('inventoryList');

        // ===== ЗАГРУЗКА ДАННЫХ =====
        function loadGame() {
            const saved = localStorage.getItem('cs2_opener');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    player = { ...player, ...data };
                } catch(e) {}
            }
            updateUI();
            renderCases();
            renderInventory();
        }

        function saveGame() {
            localStorage.setItem('cs2_opener', JSON.stringify({
                balance: player.balance,
                casesOpened: player.casesOpened,
                inventory: player.inventory
            }));
        }

        // ===== ОБНОВЛЕНИЕ UI =====
        function updateUI() {
            balanceEl.textContent = player.balance.toLocaleString();
            casesOpenedEl.textContent = player.casesOpened;
            
            // Подсчёт общей стоимости инвентаря
            const totalValue = player.inventory.reduce((sum, item) => sum + item.price, 0);
            itemsValueEl.textContent = totalValue.toLocaleString();
        }

        // ===== РЕНДЕР КЕЙСОВ =====
        function renderCases() {
            casesList.innerHTML = cases.map(caseItem => `
                <div class="case-card">
                    <div class="case-image">${caseItem.icon}</div>
                    <div class="case-name">${caseItem.name}</div>
                    <div class="case-price">${caseItem.price} <span>монет</span></div>
                    <div class="case-items">${caseItem.items.length} предметов</div>
                    <button class="open-btn" onclick="openCase('${caseItem.id}')" 
                        ${player.balance < caseItem.price ? 'disabled' : ''}>
                        🎁 ОТКРЫТЬ
                    </button>
                </div>
            `).join('');
        }

        // ===== РЕНДЕР ИНВЕНТАРЯ =====
        function renderInventory() {
            if (player.inventory.length === 0) {
                inventoryList.innerHTML = '<div style="text-align:center; color:#aaa; grid-column:1/-1;">Инвентарь пуст. Откройте кейс!</div>';
                return;
            }
            
            // Группировка предметов
            const grouped = {};
            player.inventory.forEach(item => {
                const key = `${item.name}|${item.icon}`;
                if (!grouped[key]) {
                    grouped[key] = { ...item, count: 0 };
                }
                grouped[key].count++;
            });
            
            inventoryList.innerHTML = Object.values(grouped).map(item => `
                <div class="inventory-item">
                    <div class="inventory-item-icon">${item.icon}</div>
                    <div class="inventory-item-name">${item.name}</div>
                    <div class="inventory-item-price">${item.price}💰</div>
                    <div class="inventory-item-price">x${item.count}</div>
                    <button class="sell-btn" onclick="sellItem('${item.name}', '${item.icon}')">💸 ПРОДАТЬ ВСЕ</button>
                </div>
            `).join('');
        }

        // ===== ОТКРЫТИЕ КЕЙСА =====
        function openCase(caseId) {
            const caseItem = cases.find(c => c.id === caseId);
            if (!caseItem) return;
            
            if (player.balance < caseItem.price) {
                showNotification('❌ Недостаточно монет!', 'error');
                return;
            }
            
            // Списываем монеты
            player.balance -= caseItem.price;
            player.casesOpened++;
            
            // Выбираем случайный предмет
            const randomIndex = Math.floor(Math.random() * caseItem.items.length);
            const wonItem = { ...caseItem.items[randomIndex], wonAt: Date.now() };
            
            // Добавляем в инвентарь
            player.inventory.push(wonItem);
            
            saveGame();
            updateUI();
            renderInventory();
            
            // Показываем анимацию
            showOpeningAnimation(wonItem, caseItem);
        }

        // ===== АНИМАЦИЯ ОТКРЫТИЯ =====
        function showOpeningAnimation(wonItem, caseItem) {
            // Создаём модальное окно с анимацией
            const modal = document.createElement('div');
            modal.className = 'opening-animation';
            modal.innerHTML = `
                <div class="roulette">
                    <h2 style="color:#ffd700;">🎲 ОТКРЫТИЕ КЕЙСА</h2>
                    <div class="roulette-items" id="rouletteItems">
                        <div class="roulette-track" id="rouletteTrack">
                            ${caseItem.items.map(item => `
                                <div class="roulette-item">
                                    <div class="roulette-item-icon">${item.icon}</div>
                                    <div class="roulette-item-name">${item.name}</div>
                                    <div class="roulette-item-price">${item.price}💰</div>
                                </div>
                            `).join('')}
                            ${caseItem.items.map(item => `
                                <div class="roulette-item">
                                    <div class="roulette-item-icon">${item.icon}</div>
                                    <div class="roulette-item-name">${item.name}</div>
                                    <div class="roulette-item-price">${item.price}💰</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="result-popup" id="resultPopup" style="display: none;">
                        <div style="font-size: 3rem;">${wonItem.icon}</div>
                        <div style="font-size: 1.5rem; margin: 10px 0;">🎉 ВЫ ВЫИГРАЛИ!</div>
                        <div style="font-size: 1.2rem; font-weight: bold;">${wonItem.name}</div>
                        <div style="color: #ffd700; margin-top: 5px;">Стоимость: ${wonItem.price}💰</div>
                        <button class="open-btn" onclick="this.closest('.opening-animation').remove()" style="margin-top: 20px;">ЗАБРАТЬ</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // Анимация прокрутки
            const track = modal.querySelector('#rouletteTrack');
            const items = modal.querySelectorAll('.roulette-item');
            const targetIndex = caseItem.items.findIndex(i => i.name === wonItem.name);
            
            // Рассчитываем позицию
            const itemWidth = 160;
            const targetPosition = (targetIndex + caseItem.items.length) * itemWidth;
            
            track.style.animation = 'none';
            track.offsetHeight;
            track.style.animation = 'spin 2s ease-out forwards';
            track.style.transform = `translateX(-${targetPosition}px)`;
            
            // Показываем результат через 2 секунды
            setTimeout(() => {
                const resultPopup = modal.querySelector('#resultPopup');
                resultPopup.style.display = 'block';
                
                // Прокручиваем к результату
                resultPopup.scrollIntoView({ behavior: 'smooth' });
            }, 2000);
        }

        // ===== ПРОДАЖА ПРЕДМЕТА =====
        function sellItem(itemName, itemIcon) {
            // Находим все предметы с таким именем
            const itemsToSell = player.inventory.filter(item => item.name === itemName && item.icon === itemIcon);
            
            if (itemsToSell.length === 0) {
                showNotification('❌ Предмет не найден!', 'error');
                return;
            }
            
            const totalPrice = itemsToSell.reduce((sum, item) => sum + item.price, 0);
            
            if (confirm(`Продать ${itemsToSell.length} шт. "${itemName}" за ${totalPrice} монет?`)) {
                // Удаляем все такие предметы
                player.inventory = player.inventory.filter(item => !(item.name === itemName && item.icon === itemIcon));
                player.balance += totalPrice;
                
                saveGame();
                updateUI();
                renderInventory();
                
                showNotification(`✅ Продано! +${totalPrice} монет`);
            }
        }

        // ===== СБРОС ИГРЫ =====
        function resetGame() {
            if (confirm('⚠️ ВНИМАНИЕ! Весь прогресс будет удален. Продолжить?')) {
                player = {
                    balance: 1000,
                    casesOpened: 0,
                    inventory: []
                };
                saveGame();
                updateUI();
                renderInventory();
                renderCases();
                showNotification('🔄 Игра сброшена!');
            }
        }

        // ===== УВЕДОМЛЕНИЯ =====
        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type === 'error' ? 'error' : ''} show`;
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        loadGame();
    </script>
</body>
</html>
