<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автосервис - Прайс-лист на работы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            background: #1e1e32;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        /* Шапка */
        .header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255, 165, 0, 0.3);
        }

        .logo {
            font-size: 36px;
            font-weight: 900;
            color: #ff9800;
            letter-spacing: 3px;
        }

        .logo span {
            color: #fff;
            font-weight: 300;
        }

        .subtitle {
            font-size: 14px;
            color: #aaa;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* Заголовок блока */
        .section-title {
            font-size: 15px;
            font-weight: 700;
            color: #ff9800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            text-align: center;
        }

        /* Поиск авто */
        .car-search-box {
            margin-bottom: 12px;
            position: relative;
        }

        .car-search-box input {
            width: 100%;
            padding: 10px 40px 10px 14px;
            border-radius: 25px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 13px;
            outline: none;
        }

        .car-search-box input:focus {
            border-color: #ff9800;
        }

        .car-search-box input::placeholder {
            color: #777;
        }

        .car-search-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
        }

        /* Сетка автомобилей */
        .cars-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 25px;
            max-height: 350px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .cars-grid::-webkit-scrollbar {
            width: 5px;
        }
        .cars-grid::-webkit-scrollbar-track {
            background: transparent;
        }
        .cars-grid::-webkit-scrollbar-thumb {
            background: rgba(255, 152, 0, 0.3);
            border-radius: 10px;
        }

        .car-card {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            padding: 10px 6px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
        }

        .car-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 152, 0, 0.5);
        }

        .car-card.active {
            background: rgba(255, 152, 0, 0.2);
            border-color: #ff9800;
            box-shadow: 0 0 15px rgba(255, 152, 0, 0.3);
        }

        .car-card-icon {
            font-size: 24px;
            display: block;
            margin-bottom: 2px;
        }

        .car-card-brand {
            font-weight: 700;
            font-size: 11px;
            color: #fff;
            line-height: 1.2;
        }

        .car-card-model {
            font-size: 9px;
            color: #999;
            margin-top: 1px;
        }

        .car-card-badge {
            display: inline-block;
            background: #ff9800;
            color: #000;
            font-size: 8px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 10px;
            margin-top: 3px;
        }

        .car-card.active .car-card-badge {
            background: #fff;
            color: #000;
        }

        .car-card.hidden-by-search {
            display: none;
        }

        /* Поиск услуг */
        .search-box {
            margin-bottom: 15px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 45px 12px 18px;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .search-box input:focus {
            border-color: #ff9800;
        }

        .search-box input::placeholder {
            color: #777;
        }

        .search-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
        }

        /* Фильтр-кнопки */
        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .filter-btn {
            padding: 8px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #ccc;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .filter-btn:hover {
            background: rgba(255, 152, 0, 0.2);
            border-color: #ff9800;
            color: #fff;
        }

        .filter-btn.active {
            background: #ff9800;
            color: #000;
            border-color: #ff9800;
            font-weight: 700;
        }

        /* Итог */
        .total-panel {
            background: #ff9800;
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 8px;
            position: sticky;
            top: 10px;
            z-index: 10;
        }

        .total-label {
            font-size: 12px;
            font-weight: 600;
            color: #000;
            text-transform: uppercase;
        }

        .total-price {
            font-size: 28px;
            font-weight: 900;
            color: #000;
        }

        .total-count {
            font-size: 12px;
            color: rgba(0, 0, 0, 0.7);
            font-weight: 500;
        }

        .clear-btn {
            padding: 8px 16px;
            border-radius: 30px;
            border: 2px solid #000;
            background: transparent;
            color: #000;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
        }

        .clear-btn:hover {
            background: #000;
            color: #ff9800;
        }

        /* Список услуг */
        .category-title {
            font-size: 12px;
            font-weight: 700;
            color: #ff9800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 12px 0 6px 5px;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .category-title:first-child {
            border-top: none;
            margin-top: 0;
            padding-top: 0;
        }

        .service-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 4px;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            gap: 8px;
            flex-wrap: wrap;
        }

        .service-row:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 152, 0, 0.3);
        }

        .service-row.selected {
            background: rgba(255, 152, 0, 0.2);
            border-color: #ff9800;
        }

        .service-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 180px;
            cursor: pointer;
        }

        .check-box {
            width: 22px;
            height: 22px;
            border-radius: 5px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            color: #000;
        }

        .service-row.selected .check-box {
            background: #ff9800;
            border-color: #ff9800;
        }

        .service-name {
            font-size: 13px;
            color: #ddd;
        }

        .service-row.selected .service-name {
            color: #fff;
            font-weight: 600;
        }

        .service-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .service-price {
            font-size: 16px;
            font-weight: 700;
            color: #ff9800;
            white-space: nowrap;
        }

        .service-row.selected .service-price {
            color: #fff;
        }

        .price-note {
            font-size: 10px;
            color: #888;
            font-weight: 400;
            margin-left: 4px;
        }

        .detail-btn {
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #ff9800;
            background: transparent;
            color: #ff9800;
            cursor: pointer;
            font-size: 10px;
            font-weight: 600;
            transition: all 0.2s ease;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-btn:hover {
            background: #ff9800;
            color: #000;
            box-shadow: 0 0 12px rgba(255, 152, 0, 0.4);
        }

        .hidden {
            display: none !important;
        }

        /* Модальное окно */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal {
            background: #1e1e32;
            border-radius: 16px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 152, 0, 0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal::-webkit-scrollbar {
            width: 5px;
        }
        .modal::-webkit-scrollbar-track {
            background: transparent;
        }
        .modal::-webkit-scrollbar-thumb {
            background: rgba(255, 152, 0, 0.3);
            border-radius: 10px;
        }

        .modal-header {
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            padding: 18px 24px;
            border-radius: 16px 16px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 800;
            color: #000;
            letter-spacing: 0.5px;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #000;
            background: transparent;
            color: #000;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            line-height: 1;
        }

        .modal-close:hover {
            background: #000;
            color: #ff9800;
        }

        .modal-body {
            padding: 24px;
        }

        .modal-section {
            margin-bottom: 20px;
        }

        .modal-section h3 {
            font-size: 16px;
            font-weight: 700;
            color: #ff9800;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .modal-section p,
        .modal-section li {
            font-size: 14px;
            color: #ccc;
            line-height: 1.7;
            margin-bottom: 8px;
        }

        .modal-section ul,
        .modal-section ol {
            padding-left: 20px;
            margin-bottom: 12px;
        }

        .modal-section li {
            margin-bottom: 6px;
        }

        .modal-image {
            width: 100%;
            max-width: 100%;
            border-radius: 10px;
            margin: 12px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            margin: 12px 0;
            background: #000;
        }

        .modal-video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }

        .modal-warning {
            background: rgba(255, 152, 0, 0.1);
            border-left: 4px solid #ff9800;
            padding: 12px 16px;
            border-radius: 0 8px 8px 0;
            margin: 12px 0;
            font-size: 13px;
            color: #ff9800;
        }

        .modal-tools {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0;
        }

        .modal-tool-tag {
            background: rgba(255, 255, 255, 0.08);
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 11px;
            color: #ddd;
        }

        /* Футер */
        .footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            color: #666;
            font-size: 11px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 12px;
                border-radius: 12px;
            }
            .logo {
                font-size: 24px;
            }
            .cars-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 5px;
                max-height: 300px;
            }
            .car-card {
                padding: 8px 4px;
            }
            .car-card-brand {
                font-size: 10px;
            }
            .car-card-icon {
                font-size: 20px;
            }
            .service-row {
                padding: 10px;
                gap: 6px;
            }
            .service-name {
                font-size: 12px;
            }
            .service-price {
                font-size: 14px;
            }
            .total-price {
                font-size: 22px;
            }
            .filter-btn {
                padding: 6px 10px;
                font-size: 10px;
            }
            .detail-btn {
                padding: 5px 10px;
                font-size: 9px;
            }
            .modal {
                width: 95%;
                max-height: 85vh;
            }
            .modal-title {
                font-size: 16px;
            }
        }
    </style>
</head>

        </div>
    </div>

    <div class="modal-overlay hidden" id="modalOverlay">

        function getPrice(service) {
            if (selectedCar.custom[service.id] !== undefined) {
                return selectedCar.custom[service.id];
            }
            return Math.round(service.price * selectedCar.multiplier);
        }

        function formatPrice(p) {
            return p.toLocaleString('ru-RU') + ' ₽';
        }

        function renderCars() {
            const grid = document.getElementById('carsGrid');
            grid.innerHTML = '';
            cars.forEach(car => {
                const div = document.createElement('div');
                div.className = 'car-card';
                if (car.id === selectedCar.id) div.classList.add('active');

                if (carSearchQuery.trim() !== '') {
                    const q = carSearchQuery.toLowerCase().trim();
                    const searchStr = (car.brand + ' ' + car.model + ' ' + car.engine).toLowerCase();
                    if (!searchStr.includes(q)) {
                        div.classList.add('hidden-by-search');
                    }
                }

                div.innerHTML = `
                    <span class="car-card-icon">${car.icon}</span>
                    <div class="car-card-brand">${car.brand} ${car.model}</div>
                    <div class="car-card-model">${car.engine}</div>
                    <span class="car-card-badge">${car.badge}</span>
                `;
                div.addEventListener('click', () => {
                    selectedCar = car;
                    selectedIds.clear();
                    renderCars();
                    renderServices();
                });
                grid.appendChild(div);
            });
        }

        function renderServices() {
            const container = document.getElementById('servicesList');
            container.innerHTML = '';

            let list = services;

            if (currentFilter !== 'all') {
                list = list.filter(s => s.cat === currentFilter);
            }

            if (searchQuery.trim() !== '') {
                const q = searchQuery.toLowerCase().trim();
                list = list.filter(s => s.name.toLowerCase().includes(q));
            }

            const grouped = {};
            list.forEach(s => {
                if (!grouped[s.cat]) grouped[s.cat] = { catName: s.catName, items: [] };
                grouped[s.cat].items.push(s);
            });

            Object.keys(grouped).forEach(key => {
                const g = grouped[key];
                const title = document.createElement('div');
                title.className = 'category-title';
                title.textContent = g.catName;
                container.appendChild(title);

                g.items.forEach(s => {
                    const price = getPrice(s);
                    const row = document.createElement('div');
                    row.className = 'service-row';
                    if (selectedIds.has(s.id)) row.classList.add('selected');

                    let note = '';
                    if (price !== s.price) {
                        const diff = price - s.price;
                        const sign = diff > 0 ? '+' : '';
                        note = `<span class="price-note">(${sign}${diff} ₽)</span>`;
                    }

                    row.innerHTML = `
                        <div class="service-left">
                            <div class="check-box">${selectedIds.has(s.id) ? '✓' : ''}</div>
                            <span class="service-name">${s.name}</span>
                        </div>
                        <div class="service-right">
                            <span class="service-price">${formatPrice(price)} ${note}</span>
                            <button class="detail-btn" data-id="${s.id}">📋 Подробнее</button>
                        </div>
                    `;

                    // Клик по чекбоксу
                    row.querySelector('.service-left').addEventListener('click', () => {
                        if (selectedIds.has(s.id)) {
                            selectedIds.delete(s.id);
                        } else {
                            selectedIds.add(s.id);
                        }
                        renderServices();
                    });

                    // Клик по кнопке "Подробнее"
                    row.querySelector('.detail-btn').addEventListener('click', (e) => {
                        e.stopPropagation();
                        openModal(s.id);
                    });

                    container.appendChild(row);
                });
            });

            if (list.length === 0) {
                container.innerHTML =
                    '<div style="text-align:center;padding:30px;color:#777;">Ничего не найдено</div>';
            }

            updateTotal();
        }

        function updateTotal() {
            let total = 0;
            selectedIds.forEach(id => {
                const s = services.find(x => x.id === id);
                if (s) total += getPrice(s);
            });
            document.getElementById('totalPrice').textContent = formatPrice(total);
            document.getElementById('totalCount').textContent = selectedIds.size + ' шт.';
            document.getElementById('totalCarLabel').textContent =
                selectedCar.brand + ' ' + selectedCar.model + ' (' + selectedCar.engine + ')';
        }

        // ==================== МОДАЛЬНОЕ ОКНО ====================
        function openModal(serviceId) {
            const instr = instructions[serviceId];
            const overlay = document.getElementById('modalOverlay');
            const titleEl = document.getElementById('modalTitle');
            const bodyEl = document.getElementById('modalBody');

            titleEl.textContent = '📋 ' + instr.title;

            let html = '';

            // Инструменты
            html += '<div class="modal-section">';
            html += '<h3>🔧 Необходимые инструменты</h3>';
            html += '<div class="modal-tools">';
            instr.tools.forEach(t => {
                html += `<span class="modal-tool-tag">${t}</span>`;
            });
            html += '</div></div>';

            // Пошаговая инструкция
            html += '<div class="modal-section">';
            html += '<h3>📝 Пошаговая инструкция</h3>';
            html += '<ol>';
            instr.steps.forEach(step => {
                html += `<li>${step}</li>`;
            });
            html += '</ol></div>';

            // Предупреждение
            if (instr.warning) {
                html += '<div class="modal-section">';
                html += '<h3>⚠️ Важное предупреждение</h3>';
                html += `<div class="modal-warning">${instr.warning}</div>`;
                html += '</div>';
            }

            // Изображения (если есть)
            if (instr.images && instr.images.length > 0) {
                html += '<div class="modal-section">';
                html += '<h3>🖼️ Фотографии процесса</h3>';
                instr.images.forEach(img => {
                    html +=
                        `<img src="${img}" alt="Фото ремонта" class="modal-image" onerror="this.style.display='none'">`;
                });
                html += '</div>';
            }

            // Видео
            if (instr.video) {
                html += '<div class="modal-section">';
                html += '<h3>🎬 Видеоинструкция</h3>';
                html += `<p style="color:#ccc;font-size:13px;">${instr.videoTitle}</p>`;
                html += '<div class="modal-video-wrapper">';
                html +=
                    `<iframe src="${instr.video}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
                html += '</div></div>';
            }

            bodyEl.innerHTML = html;
            overlay.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.add('hidden');
            document.body.style.overflow = '';
        }

        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modalOverlay')) {
                closeModal();
            }
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Остальные обработчики
        document.getElementById('clearBtn').addEventListener('click', () => {
            selectedIds.clear();
            renderServices();
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderServices();
        });

        document.getElementById('carSearchInput').addEventListener('input', (e) => {
            carSearchQuery = e.target.value;
            renderCars();
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentFilter = btn.getAttribute('data-filter');
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove(
                'active'));
                btn.classList.add('active');
                renderServices();
            });
        });

        // Старт
        renderCars();
        renderServices();
        console.log('🚗 Загружено автомобилей: ' + cars.length);
        console.log('🔧 Загружено услуг: ' + services.length);
        console.log('📋 Нажмите «Подробнее» для просмотра инструкции.');
    </script>
</body>
</html>
