<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎮 GameStore | Магазин цифровых игр</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c1f 0%, #1a142f 100%);
            color: #fff;
            min-height: 100vh;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #ff6b4a, #ff8a5c); border-radius: 10px; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Шапка */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 2rem;
            background: linear-gradient(135deg, #ff6b4a, #ff8a5c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #ff8a5c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .wallet-card {
            background: linear-gradient(135deg, rgba(255,107,74,0.15), rgba(255,138,92,0.05));
            border-radius: 20px;
            padding: 12px 24px;
            border: 1px solid rgba(255,107,74,0.3);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .wallet-icon {
            font-size: 1.8rem;
            color: #ff8a5c;
        }

        .wallet-info h3 {
            font-size: 0.8rem;
            font-weight: 500;
            color: #aaa;
        }

        .wallet-info .balance {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ff8a5c;
        }

        .topup-btn {
            background: linear-gradient(135deg, #ff6b4a, #ff8a5c);
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .topup-btn:hover { transform: scale(1.05); }

        /* Поиск */
        .search-section { margin-bottom: 30px; }
        .search-bar { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; }
        .search-input-wrapper { flex: 1; position: relative; }
        .search-input-wrapper i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #888; }
        .search-input {
            width: 100%;
            padding: 14px 20px 14px 48px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .search-input:focus { outline: none; border-color: #ff8a5c; }

        .filter-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .filter-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            color: #aaa;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        .filter-btn.active {
            background: linear-gradient(135deg, #ff6b4a, #ff8a5c);
            color: white;
            border-color: transparent;
        }

        /* Сетка игр */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .game-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.4s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .game-card:hover { transform: translateY(-8px); border-color: rgba(255,107,74,0.5); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }

        .game-image { position: relative; height: 180px; overflow: hidden; }
        .game-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .game-card:hover .game-image img { transform: scale(1.05); }

        .game-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .game-badge.popular { background: linear-gradient(135deg, #ff6b4a, #ff8a5c); }
        .game-badge.new { background: linear-gradient(135deg, #4caf50, #45a049); }
        .game-badge.sale { background: linear-gradient(135deg, #ff4444, #ff8c00); }

        .game-info { padding: 20px; }
        .game-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
        .game-category {
            font-size: 0.75rem;
            color: #ff8a5c;
            margin-bottom: 12px;
            display: inline-block;
            background: rgba(255,107,74,0.15);
            padding: 3px 10px;
            border-radius: 20px;
        }
        .game-description {
            font-size: 0.85rem;
            color: #aaa;
            line-height: 1.5;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .game-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .game-price { font-size: 1.4rem; font-weight: 800; color: #ff8a5c; }
        .game-price.old-price { font-size: 0.9rem; color: #666; text-decoration: line-through; margin-right: 8px; }

        .buy-btn {
            background: linear-gradient(135deg, #ff6b4a, #ff8a5c);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .buy-btn:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 5px 20px rgba(255,107,74,0.4); }
        .buy-btn:disabled { opacity: 0.5; cursor: not-allowed; background: #444; }

        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }
        .modal.show { display: flex; }
        .modal-content {
            background: linear-gradient(135deg, #1a1f2a, #0f1219);
            border: 3px solid #ffd700;
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
        .modal-content h2 { color: #ffd700; margin-bottom: 20px; }

        .payment-options { display: grid; gap: 15px; margin: 30px 0; }
        .payment-option {
            background: rgba(255,255,255,0.05);
            border: 2px solid transparent;
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .payment-option:hover { border-color: #ffd700; background: rgba(255,215,0,0.1); transform: scale(1.02); }
        .payment-icon { font-size: 2rem; }
        .payment-info { flex: 1; text-align: left; }
        .payment-name { font-size: 1.1rem; font-weight: bold; }
        .payment-desc { font-size: 0.8rem; color: #aaa; }

        .amount-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ffd700;
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1.1rem;
            margin: 20px 0;
            text-align: center;
        }

        .modal-buttons { display: flex; gap: 15px; }
        .modal-btn {
            flex: 1;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #1a1f2a;
            border: none;
            padding: 12px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        .modal-btn.cancel { background: #444; color: white; }

        /* Корзина */
        .cart-sidebar {
            position: fixed;
            right: -400px;
            top: 0;
            width: 380px;
            height: 100vh;
            background: linear-gradient(135deg, #0f0c1f, #1a142f);
            border-left: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .cart-sidebar.open { right: 0; }
        .cart-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        .close-cart { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        .cart-items { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-item { display: flex; gap: 12px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 16px; margin-bottom: 12px; }
        .cart-item-img { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; }
        .cart-item-info { flex: 1; }
        .cart-item-title { font-weight: 600; font-size: 0.9rem; }
        .cart-item-price { color: #ff8a5c; }
        .remove-item { background: none; border: none; color: #ff4444; cursor: pointer; }
        .cart-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .cart-total { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 1.2rem; font-weight: 700; }
        .checkout-btn { width: 100%; background: linear-gradient(135deg, #4caf50, #45a049); border: none; padding: 14px; border-radius: 40px; color: white; font-weight: 700; cursor: pointer; }

        .cart-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #ff6b4a, #ff8a5c);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 99;
            box-shadow: 0 5px 20px rgba(255,107,74,0.4);
        }
        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4444;
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            right: 30px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 50px;
            border-left: 4px solid #4caf50;
            z-index: 1001;
            animation: slideInRight 0.3s ease;
        }
        .toast.error { border-left-color: #ff4444; }
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .cart-sidebar { width: 100%; right: -100%; }
            .games-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
            .header { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-gamepad"></i></div>
                <h1>GameStore</h1>
            </div>
            <div class="wallet-card">
                <div class="wallet-icon"><i class="fas fa-coins"></i></div>
                <div class="wallet-info">
                    <h3>Ваш баланс</h3>
                    <div class="balance" id="balance">0 ₽</div>
                </div>
                <button class="topup-btn" onclick="openTopupModal()"><i class="fas fa-plus"></i> Пополнить</button>
            </div>
        </div>

        <div class="search-section">
            <div class="search-bar">
                <div class="search-input-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" class="search-input" id="searchInput" placeholder="Поиск игр...">
                </div>
                <div class="filter-group" id="filterGroup">
                    <button class="filter-btn active" data-category="all">Все</button>
                    <button class="filter-btn" data-category="Экшен">Экшен</button>
                    <button class="filter-btn" data-category="RPG">RPG</button>
                    <button class="filter-btn" data-category="Шутер">Шутер</button>
                    <button class="filter-btn" data-category="Приключения">Приключения</button>
                    <button class="filter-btn" data-category="Инди">Инди</button>
                </div>
            </div>
        </div>

        <div class="games-grid" id="gamesGrid"></div>
    </div>

    <!-- Модальное окно пополнения -->
    <div class="modal" id="topupModal">
        <div class="modal-content">
            <h2><i class="fas fa-money-bill-wave"></i> Пополнение баланса</h2>
            <div class="payment-options">
                <div class="payment-option" onclick="selectPaymentMethod('bank_card')">
                    <div class="payment-icon"><i class="fas fa-credit-card"></i></div>
                    <div class="payment-info">
                        <div class="payment-name">Банковская карта</div>
                        <div class="payment-desc">Visa, Mastercard, МИР</div>
                    </div>
                </div>
                <div class="payment-option" onclick="selectPaymentMethod('sbp')">
                    <div class="payment-icon"><i class="fas fa-qrcode"></i></div>
                    <div class="payment-info">
                        <div class="payment-name">СБП (Система быстрых платежей)</div>
                        <div class="payment-desc">Оплата по QR-коду</div>
                    </div>
                </div>
                <div class="payment-option" onclick="selectPaymentMethod('yoo_money')">
                    <div class="payment-icon"><i class="fab fa-yandex"></i></div>
                    <div class="payment-info">
                        <div class="payment-name">ЮMoney</div>
                        <div class="payment-desc">С кошелька или счёта</div>
                    </div>
                </div>
            </div>
            <input type="number" class="amount-input" id="topupAmount" placeholder="Сумма пополнения (₽)" min="50" value="500">
            <div class="modal-buttons">
                <button class="modal-btn" onclick="processPayment()">Оплатить</button>
                <button class="modal-btn cancel" onclick="closeTopupModal()">Отмена</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно оплаты (QR код) -->
    <div class="modal" id="paymentModal">
        <div class="modal-content">
            <h2><i class="fas fa-qrcode"></i> Оплата через ЮKassa</h2>
            <div id="qrContainer" style="margin: 20px 0;"></div>
            <div id="paymentStatus" style="margin: 15px 0; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 15px;">
                <p id="paymentInfo" style="color: #aaa;">Создание платежа...</p>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closePaymentModal()">Закрыть</button>
            </div>
        </div>
    </div>

    <!-- Корзина -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2><i class="fas fa-shopping-cart"></i> Корзина</h2>
            <button class="close-cart" onclick="toggleCart()"><i class="fas fa-times"></i></button>
        </div>
        <div class="cart-items" id="cartItems">
            <div style="text-align: center; color: #666; padding: 40px;">Корзина пуста</div>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Итого:</span>
                <span id="cartTotal">0 ₽</span>
            </div>
            <button class="checkout-btn" onclick="checkout()">Оформить заказ</button>
        </div>
    </div>

    <div class="cart-btn" onclick="toggleCart()">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-count" id="cartCount">0</span>
    </div>

    <script>
        // ==================== КОНФИГУРАЦИЯ ЮKASSA ====================
        const YOOKASSA_CONFIG = {
            shopId: '1282823',
            secretKey: 'live__sfe-PdMEhGW5xdo17Vti-gdLb3RSC8VmSsyp4uEcvE',
            apiUrl: 'https://api.yookassa.ru/v3/payments'
        };

        // ==================== ДАННЫЕ ИГР ====================
        const games = [
            { id: 1, name: "Cyberpunk 2077", category: "RPG", price: 2999, oldPrice: 4999, image: "https://placehold.co/400x200/1a1f2a/ff8a5c?text=Cyberpunk", description: "Откройте для себя историю Ви — наёмницы, охотящейся за уникальным имплантом.", badge: "popular" },
            { id: 2, name: "Elden Ring", category: "RPG", price: 3499, oldPrice: 4999, image: "https://placehold.co/400x200/1a1f2a/ff8a5c?text=Elden+Ring", description: "Новая фэнтезийная RPG от создателей Dark Souls.", badge: "new" },
            { id: 3, name: "Call of Duty: MW3", category: "Шутер", price: 3999, oldPrice: 5999, image: "https://placehold.co/400x200/1a1f2a/ff8a5c?text=COD+MW3", description: "Культовая серия шутеров возвращается.", badge: "popular" },
            { id: 4, name: "Baldur's Gate 3", category: "RPG", price: 2999, oldPrice: null, image: "https://placehold.co/400x200/1a1f2a/ff8a5c?text=Baldur's+Gate", description: "Эпическая RPG, основанная на правилах Dungeons & Dragons.", badge: "new" },
            { id: 5, name: "Hollow Knight", category: "Инди", price: 499, oldPrice: 799, image: "https://placehold.co/400x200/1a1f2a/ff8a5c?text=Hollow+Knight", description: "Увлекательный платформер в мрачном мире.", badge: null },
            { id: 6, name: "Red Dead Redemption 2", category: "Приключения", price: 2499, oldPrice: 3999, image: "https://placehold.co/400x200/1a1f2a/ff8a5c?text=RDR2", description: "Эпическая история о жизни Дикого Запада.", badge: "sale" },
            { id: 7, name: "Counter-Strike 2", category: "Шутер", price: 0, oldPrice: null, image: "https://placehold.co/400x200/1a1f2a/ff8a5c?text=CS2", description: "Легендарный шутер абсолютно бесплатно!", badge: null },
            { id: 8, name: "The Witcher 3", category: "RPG", price: 1299, oldPrice: 2999, image: "https://placehold.co/400x200/1a1f2a/ff8a5c?text=Witcher+3", description: "Станьте Геральтом из Ривии в эпическом приключении.", badge: "sale" },
            { id: 9, name: "Stray", category: "Приключения", price: 899, oldPrice: 1499, image: "https://placehold.co/400x200/1a1f2a/ff8a5c?text=Stray", description: "Приключения бездомного кота в кибергороде.", badge: null },
            { id: 10, name: "Dota 2", category: "Экшен", price: 0, oldPrice: null, image: "https://placehold.co/400x200/1a1f2a/ff8a5c?text=Dota+2", description: "Лучшая MOBA в мире. Играйте бесплатно!", badge: null }
        ];

        let userBalance = 5000;
        let cart = [];
        let currentFilter = "all";
        let searchQuery = "";
        let selectedPaymentMethod = null;
        let currentPaymentId = null;
        let paymentCheckInterval = null;

        // DOM элементы
        const gamesGrid = document.getElementById('gamesGrid');
        const balanceEl = document.getElementById('balance');
        const cartCountEl = document.getElementById('cartCount');
        const cartTotalEl = document.getElementById('cartTotal');
        const cartItemsEl = document.getElementById('cartItems');
        const searchInput = document.getElementById('searchInput');

        // ==================== БАЛАНС ====================
        function updateBalance() {
            balanceEl.textContent = userBalance.toLocaleString() + ' ₽';
            saveData();
        }

        function saveData() {
            localStorage.setItem('gameStore_balance', userBalance);
            localStorage.setItem('gameStore_cart', JSON.stringify(cart));
        }

        function loadData() {
            const savedBalance = localStorage.getItem('gameStore_balance');
            if (savedBalance) userBalance = parseInt(savedBalance);
            const savedCart = localStorage.getItem('gameStore_cart');
            if (savedCart) cart = JSON.parse(savedCart);
            updateBalance();
            updateCartUI();
            renderGames();
        }

        // ==================== ЮKASSA ПЛАТЕЖИ ====================
        function generateIdempotenceKey() {
            return Date.now() + '-' + Math.random().toString(36).substr(2, 16);
        }

        async function createYookassaPayment(amount, paymentMethod) {
            const idempotenceKey = generateIdempotenceKey();
            const paymentId = 'pay_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
            
            // Определяем тип платежа для ЮKassa
            let paymentMethodData = {};
            switch(paymentMethod) {
                case 'bank_card':
                    paymentMethodData = { type: 'bank_card' };
                    break;
                case 'sbp':
                    paymentMethodData = { type: 'sbp' };
                    break;
                case 'yoo_money':
                    paymentMethodData = { type: 'yoo_money' };
                    break;
                default:
                    paymentMethodData = { type: 'bank_card' };
            }

            const paymentData = {
                amount: {
                    value: amount.toFixed(2),
                    currency: 'RUB'
                },
                capture: true,
                confirmation: {
                    type: 'redirect',
                    return_url: window.location.href
                },
                description: `Пополнение баланса GameStore на ${amount}₽`,
                metadata: {
                    paymentId: paymentId,
                    userId: 'user_' + Date.now(),
                    amount: amount
                },
                payment_method_data: paymentMethodData
            };

            const auth = btoa(`${YOOKASSA_CONFIG.shopId}:${YOOKASSA_CONFIG.secretKey}`);
            
            try {
                const response = await fetch(YOOKASSA_CONFIG.apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Basic ${auth}`,
                        'Idempotence-Key': idempotenceKey
                    },
                    body: JSON.stringify(paymentData)
                });
                
                const result = await response.json();
                
                if (result.confirmation && result.confirmation.confirmation_url) {
                    return {
                        success: true,
                        paymentId: result.id,
                        confirmationUrl: result.confirmation.confirmation_url,
                        qrCode: result.confirmation.confirmation_url
                    };
                } else {
                    throw new Error(result.description || 'Ошибка создания платежа');
                }
            } catch (error) {
                console.error('YooKassa API error:', error);
                return {
                    success: false,
                    error: error.message
                };
            }
        }

        async function createPaymentDirect(amount, paymentMethod) {
            // Для демонстрации используем генерацию QR-кода через API сервиса
            // В реальном проекте здесь будет запрос к вашему бэкенду
            const paymentId = 'PAY_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
            
            // Формируем ссылку для оплаты через ЮKassa
            let paymentUrl = '';
            if (paymentMethod === 'sbp') {
                paymentUrl = `https://yookassa.ru/sbp?amount=${amount}&paymentId=${paymentId}&shopId=${YOOKASSA_CONFIG.shopId}`;
            } else {
                paymentUrl = `https://yookassa.ru/payment?amount=${amount}&paymentId=${paymentId}&shopId=${YOOKASSA_CONFIG.shopId}`;
            }
            
            return {
                success: true,
                paymentId: paymentId,
                confirmationUrl: paymentUrl,
                qrCode: paymentUrl
            };
        }

        async function processPaymentWithYookassa(amount, method) {
            const paymentResult = await createYookassaPayment(amount, method);
            
            if (paymentResult.success) {
                currentPaymentId = paymentResult.paymentId;
                showPaymentModal(method, paymentResult.confirmationUrl, amount);
                startPaymentCheck(paymentResult.paymentId, amount);
                return true;
            } else {
                showToast('❌ Ошибка создания платежа: ' + paymentResult.error, 'error');
                return false;
            }
        }

        function showPaymentModal(method, paymentUrl, amount) {
            const modal = document.getElementById('paymentModal');
            const qrContainer = document.getElementById('qrContainer');
            const paymentInfo = document.getElementById('paymentInfo');
            
            const methodNames = {
                'bank_card': '💳 Банковская карта',
                'sbp': '📱 СБП (Система быстрых платежей)',
                'yoo_money': '💰 ЮMoney'
            };
            
            qrContainer.innerHTML = `
                <div style="background: white; padding: 15px; border-radius: 20px; display: inline-block;">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(paymentUrl)}" style="width: 200px; height: 200px;">
                </div>
                <div style="margin-top: 15px;">
                    <p>Сумма: <strong style="color:#ffd700;">${amount} ₽</strong></p>
                    <p style="font-size: 0.8rem;">Отсканируйте QR-код камерой телефона</p>
                    <p style="font-size: 0.7rem; margin-top: 10px;">или перейдите по ссылке:</p>
                    <a href="${paymentUrl}" target="_blank" style="color: #ffd700; word-break: break-all; font-size: 0.7rem;">${paymentUrl.substring(0, 50)}...</a>
                </div>
            `;
            paymentInfo.innerHTML = `${methodNames[method] || 'Оплата'}<br><small>После оплаты баланс пополнится автоматически (до 1 минуты)</small>`;
            
            modal.classList.add('show');
        }

        function startPaymentCheck(paymentId, expectedAmount) {
            let attempts = 0;
            const maxAttempts = 60; // 60 * 2 сек = 2 минуты
            
            if (paymentCheckInterval) clearInterval(paymentCheckInterval);
            
            paymentCheckInterval = setInterval(async () => {
                attempts++;
                
                try {
                    // Проверяем статус платежа через ЮKassa API
                    const auth = btoa(`${YOOKASSA_CONFIG.shopId}:${YOOKASSA_CONFIG.secretKey}`);
                    const response = await fetch(`https://api.yookassa.ru/v3/payments/${paymentId}`, {
                        headers: {
                            'Authorization': `Basic ${auth}`
                        }
                    });
                    
                    const result = await response.json();
                    
                    if (result.status === 'succeeded') {
                        clearInterval(paymentCheckInterval);
                        paymentCheckInterval = null;
                        
                        // Зачисляем средства
                        userBalance += expectedAmount;
                        updateBalance();
                        renderGames();
                        closePaymentModal();
                        showToast(`✅ Баланс пополнен на ${expectedAmount} ₽`, 'success');
                    } else if (result.status === 'canceled') {
                        clearInterval(paymentCheckInterval);
                        paymentCheckInterval = null;
                        closePaymentModal();
                        showToast('❌ Платёж был отменён', 'error');
                    } else if (attempts >= maxAttempts) {
                        clearInterval(paymentCheckInterval);
                        paymentCheckInterval = null;
                        showToast('⏰ Время ожидания истекло. Если вы оплатили, свяжитесь с поддержкой', 'error');
                    }
                } catch (error) {
                    console.error('Check payment error:', error);
                    if (attempts >= maxAttempts) {
                        clearInterval(paymentCheckInterval);
                        paymentCheckInterval = null;
                    }
                }
            }, 2000);
        }

        function closePaymentModal() {
            document.getElementById('paymentModal').classList.remove('show');
            if (paymentCheckInterval) {
                clearInterval(paymentCheckInterval);
                paymentCheckInterval = null;
            }
        }

        // ==================== ПОПОЛНЕНИЕ ====================
        function openTopupModal() {
            document.getElementById('topupModal').classList.add('show');
        }

        function closeTopupModal() {
            document.getElementById('topupModal').classList.remove('show');
        }

        function selectPaymentMethod(method) {
            selectedPaymentMethod = method;
            const options = document.querySelectorAll('.payment-option');
            options.forEach(opt => opt.style.borderColor = 'transparent');
            event.currentTarget.style.borderColor = '#ffd700';
        }

        async function processPayment() {
            const amount = parseInt(document.getElementById('topupAmount').value);
            if (!amount || amount < 50) {
                showToast('❌ Минимальная сумма пополнения 50 ₽', 'error');
                return;
            }
            if (!selectedPaymentMethod) {
                showToast('❌ Выберите способ оплаты', 'error');
                return;
            }

            closeTopupModal();
            
            // Создаём платёж через ЮKassa
            await processPaymentWithYookassa(amount, selectedPaymentMethod);
        }

        // ==================== КОРЗИНА ====================
        function addToCart(game) {
            if (cart.find(item => item.id === game.id)) {
                showToast('❌ Эта игра уже в корзине', 'error');
                return;
            }
            cart.push(game);
            updateCartUI();
            showToast(`✅ ${game.name} добавлена в корзину`, 'success');
            saveData();
        }

        function removeFromCart(gameId) {
            cart = cart.filter(item => item.id !== gameId);
            updateCartUI();
            showToast('🗑 Товар удалён из корзины', 'success');
            saveData();
        }

        function updateCartUI() {
            const cartCount = cart.length;
            const cartTotal = cart.reduce((sum, item) => sum + item.price, 0);
            
            cartCountEl.textContent = cartCount;
            cartTotalEl.textContent = cartTotal.toLocaleString() + ' ₽';
            
            if (cart.length === 0) {
                cartItemsEl.innerHTML = '<div style="text-align: center; color: #666; padding: 40px;">🛒 Корзина пуста</div>';
                return;
            }
            
            cartItemsEl.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <img class="cart-item-img" src="${item.image}" alt="${item.name}">
                    <div class="cart-item-info">
                        <div class="cart-item-title">${item.name}</div>
                        <div class="cart-item-price">${item.price.toLocaleString()} ₽</div>
                    </div>
                    <button class="remove-item" onclick="removeFromCart(${item.id})">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            `).join('');
        }

        function checkout() {
            if (cart.length === 0) {
                showToast('🛒 Корзина пуста!', 'error');
                return;
            }
            
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            
            if (userBalance >= total) {
                userBalance -= total;
                updateBalance();
                showToast(`🎉 Поздравляем! Вы приобрели ${cart.length} игр на ${total} ₽`, 'success');
                cart = [];
                updateCartUI();
                renderGames();
                saveData();
                toggleCart();
            } else {
                const need = total - userBalance;
                showToast(`❌ Недостаточно средств! Нужно еще ${need.toLocaleString()} ₽. Пополните баланс.`, 'error');
                openTopupModal();
            }
        }

        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('open');
        }

        // ==================== ОТОБРАЖЕНИЕ ИГР ====================
        function renderGames() {
            let filtered = games.filter(game => {
                const matchesFilter = currentFilter === "all" || game.category === currentFilter;
                const matchesSearch = game.name.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesFilter && matchesSearch;
            });
            
            gamesGrid.innerHTML = filtered.map(game => {
                const inCart = cart.some(item => item.id === game.id);
                const isFree = game.price === 0;
                
                return `
                    <div class="game-card">
                        <div class="game-image">
                            <img src="${game.image}" alt="${game.name}">
                            ${game.badge ? `<span class="game-badge ${game.badge}">${game.badge === 'popular' ? '🔥 Популярное' : game.badge === 'new' ? '🆕 Новинка' : '🔥 Скидка'}</span>` : ''}
                        </div>
                        <div class="game-info">
                            <div class="game-title">${game.name}</div>
                            <span class="game-category">${game.category}</span>
                            <div class="game-description">${game.description}</div>
                            <div class="game-footer">
                                <div>
                                    ${game.oldPrice ? `<span class="old-price">${game.oldPrice.toLocaleString()} ₽</span>` : ''}
                                    <span class="game-price">${isFree ? 'Бесплатно' : game.price.toLocaleString() + ' ₽'}</span>
                                </div>
                                ${!inCart ? 
                                    `<button class="buy-btn" onclick="addToCart(${JSON.stringify(game).replace(/"/g, '&quot;')})">
                                        <i class="fas fa-shopping-cart"></i> В корзину
                                    </button>` :
                                    `<button class="buy-btn" style="background:#444;" disabled>
                                        <i class="fas fa-check"></i> В корзине
                                    </button>`
                                }
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            if (filtered.length === 0) {
                gamesGrid.innerHTML = '<div style="text-align:center; padding:60px; color:#666;">🔍 Ничего не найдено</div>';
            }
        }

        // ==================== СОБЫТИЯ ====================
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderGames();
        });
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.category;
                renderGames();
            });
        });
        
        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('cartSidebar');
            const cartBtn = document.querySelector('.cart-btn');
            if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && !cartBtn.contains(e.target)) {
                sidebar.classList.remove('open');
            }
        });

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        loadData();
    </script>
</body>
</html>
