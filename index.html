<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автосервис - Прайс-лист</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; min-height: 100vh; padding: 20px; color: #e0e0e0; }
        .container { max-width: 1100px; margin: 0 auto; background: #1e1e32; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .header { text-align: center; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 2px solid rgba(255,165,0,0.3); }
        .logo { font-size: 36px; font-weight: 900; color: #ff9800; letter-spacing: 3px; }
        .logo span { color: #fff; font-weight: 300; }
        .subtitle { font-size: 14px; color: #aaa; letter-spacing: 2px; margin-top: 5px; }
        .status-bar { text-align: center; padding: 8px; margin-bottom: 15px; border-radius: 8px; font-size: 11px; font-weight: 600; }
        .status-bar.online { background: rgba(76,175,80,0.2); color: #4caf50; }
        .status-bar.offline { background: rgba(244,67,54,0.2); color: #f44336; }
        .status-bar.connecting { background: rgba(255,152,0,0.2); color: #ff9800; }
        .smart-search { background: rgba(0,0,0,0.4); border-radius: 16px; padding: 20px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .smart-search input { width: 100%; padding: 14px 20px; border-radius: 30px; border: 2px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: #fff; font-size: 15px; outline: none; }
        .smart-search input:focus { border-color: #ff9800; }
        .search-results { display: none; margin-top: 10px; background: rgba(0,0,0,0.5); border-radius: 12px; max-height: 300px; overflow-y: auto; }
        .search-results.active { display: block; }
        .search-result-item { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; }
        .search-result-item:hover { background: rgba(255,152,0,0.15); }
        .search-result-name { font-size: 13px; color: #fff; }
        .search-result-price { font-size: 14px; color: #ff9800; font-weight: 700; }
        .selector-section { background: rgba(0,0,0,0.3); border-radius: 16px; padding: 20px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .selector-title { font-size: 13px; font-weight: 700; color: #ff9800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 14px; text-align: center; }
        .selector-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
        .selector-group { flex: 1; min-width: 200px; }
        .selector-label { font-size: 10px; font-weight: 700; color: #999; text-transform: uppercase; margin-bottom: 6px; }
        .selector-buttons { display: flex; flex-wrap: wrap; gap: 5px; }
        .sel-btn { padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.04); color: #ccc; cursor: pointer; font-size: 11px; font-weight: 500; transition: all 0.2s; white-space: nowrap; }
        .sel-btn:hover { background: rgba(255,152,0,0.15); border-color: rgba(255,152,0,0.5); color: #fff; }
        .sel-btn.active { background: #ff9800; color: #000; border-color: #ff9800; font-weight: 700; }
        .sel-btn .btn-code { font-size: 9px; color: #999; display: block; }
        .sel-btn.active .btn-code { color: rgba(0,0,0,0.7); }
        .selected-config { background: rgba(255,152,0,0.12); border: 1px solid #ff9800; border-radius: 10px; padding: 12px 16px; margin-top: 12px; display: flex; align-items: center; gap: 10px; }
        .selected-config-icon { font-size: 32px; }
        .selected-config-info { flex: 1; }
        .selected-config-name { font-size: 15px; font-weight: 700; color: #fff; }
        .selected-config-detail { font-size: 11px; color: #ccc; }
        .selected-config-badge { background: #ff9800; color: #000; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 12px; }
        .filter-buttons { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; justify-content: center; }
        .filter-btn { padding: 8px 14px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: #ccc; cursor: pointer; font-size: 11px; }
        .filter-btn:hover { background: rgba(255,152,0,0.2); border-color: #ff9800; color: #fff; }
        .filter-btn.active { background: #ff9800; color: #000; border-color: #ff9800; font-weight: 700; }
        .total-panel { background: #ff9800; border-radius: 12px; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 8px; position: sticky; top: 10px; z-index: 10; }
        .total-label { font-size: 12px; font-weight: 600; color: #000; text-transform: uppercase; }
        .total-price { font-size: 28px; font-weight: 900; color: #000; }
        .clear-btn { padding: 8px 16px; border-radius: 30px; border: 2px solid #000; background: transparent; color: #000; cursor: pointer; font-weight: 700; font-size: 12px; text-transform: uppercase; }
        .clear-btn:hover { background: #000; color: #ff9800; }
        .category-title { font-size: 13px; font-weight: 700; color: #ff9800; text-transform: uppercase; letter-spacing: 1px; margin: 15px 0 8px 5px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.08); }
        .category-title:first-child { border-top: none; margin-top: 0; padding-top: 0; }
        .service-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; border-radius: 10px; background: rgba(255,255,255,0.02); margin-bottom: 4px; border: 1px solid transparent; gap: 10px; }
        .service-row:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,152,0,0.3); }
        .service-row.selected { background: rgba(255,152,0,0.2); border-color: #ff9800; }
        .service-left { display: flex; align-items: center; gap: 10px; flex: 1; cursor: pointer; }
        .check-box { width: 24px; height: 24px; border-radius: 5px; border: 2px solid rgba(255,255,255,0.3); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; color: #000; }
        .service-row.selected .check-box { background: #ff9800; border-color: #ff9800; }
        .service-name { font-size: 13px; color: #ddd; }
        .service-right { display: flex; align-items: center; gap: 8px; }
        .service-price { font-size: 15px; font-weight: 700; color: #ff9800; white-space: nowrap; }
        .price-note { font-size: 10px; color: #888; margin-left: 3px; }
        .detail-btn { padding: 7px 14px; border-radius: 20px; border: 2px solid #ff9800; background: rgba(255,152,0,0.1); color: #ff9800; cursor: pointer; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .detail-btn:hover { background: #ff9800; color: #000; }
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; display:flex; align-items:center; justify-content:center; }
        .modal-overlay.hidden { display:none; }
        .modal { background:#1e1e32; border-radius:16px; width:90%; max-width:800px; max-height:85vh; overflow-y:auto; border:2px solid #ff9800; }
        .modal-header { background:#ff9800; padding:16px 20px; border-radius:14px 14px 0 0; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; }
        .modal-title { font-size:18px; font-weight:800; color:#000; }
        .modal-close { width:34px; height:34px; border-radius:50%; border:2px solid #000; background:transparent; color:#000; cursor:pointer; font-size:18px; font-weight:bold; display:flex; align-items:center; justify-content:center; }
        .modal-close:hover { background:#000; color:#ff9800; }
        .modal-body { padding:20px; }
        .modal-body h3 { font-size:15px; color:#ff9800; margin:20px 0 10px 0; text-transform:uppercase; }
        .modal-body h3:first-child { margin-top:0; }
        .modal-tools { display:flex; flex-wrap:wrap; gap:6px; margin:8px 0; }
        .tool-tag { background:rgba(255,255,255,0.08); padding:5px 10px; border-radius:15px; font-size:11px; color:#ddd; }
        .modal-warning { background:rgba(255,152,0,0.12); border-left:4px solid #ff9800; padding:12px 14px; border-radius:0 8px 8px 0; margin:10px 0; font-size:13px; color:#ffa726; }
        .modal-info-table { width:100%; border-collapse:collapse; margin:10px 0; font-size:12px; }
        .modal-info-table td { padding:6px 10px; border-bottom:1px solid rgba(255,255,255,0.08); color:#ccc; }
        .modal-info-table td:first-child { font-weight:600; color:#ff9800; width:40%; }
        .step-block { background:rgba(255,255,255,0.03); border-radius:12px; padding:16px; margin-bottom:12px; }
        .step-header { font-weight:700; color:#ff9800; font-size:14px; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
        .step-number { background:#ff9800; color:#000; width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:13px; }
        .step-text { font-size:13px; color:#ccc; line-height:1.6; }
        .step-image { width:100%; max-width:400px; border-radius:8px; margin-top:8px; }
        .footer { text-align:center; margin-top:25px; padding-top:15px; border-top:1px solid rgba(255,255,255,0.08); color:#666; font-size:11px; }
        .admin-link { text-align:right; margin-bottom:10px; }
        .admin-link a { color:#666; font-size:11px; text-decoration:none; }
        .admin-link a:hover { color:#ff9800; }
        .btn { padding:10px 18px; border-radius:25px; border:none; cursor:pointer; font-size:12px; font-weight:700; }
        .btn-primary { background:#ff9800; color:#000; }
        .btn-primary:hover { background:#ffb74d; }
        .btn-danger { background:#e53935; color:#fff; }
        .btn-danger:hover { background:#ef5350; }
        .btn-outline { background:transparent; border:2px solid #ff9800; color:#ff9800; }
        .btn-outline:hover { background:#ff9800; color:#000; }
        .btn-sm { padding:5px 10px; font-size:10px; border-radius:15px; }
        .admin-section { background:rgba(0,0,0,0.3); border-radius:16px; padding:20px; margin-bottom:20px; border:1px solid rgba(255,255,255,0.1); }
        .admin-section h3 { font-size:16px; color:#ff9800; margin-bottom:15px; text-transform:uppercase; }
        .admin-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px; }
        .admin-card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:14px; }
        .admin-card h4 { font-size:13px; color:#fff; margin-bottom:6px; }
        .admin-card p { font-size:10px; color:#999; }
        .admin-card .card-actions { display:flex; gap:5px; margin-top:8px; flex-wrap:wrap; }
        .form-group { margin-bottom:10px; }
        .form-group label { display:block; font-size:10px; font-weight:700; color:#999; text-transform:uppercase; margin-bottom:4px; }
        .form-group input,.form-group textarea,.form-group select { width:100%; padding:8px 12px; border-radius:8px; border:1px solid rgba(255,255,255,0.2); background:rgba(0,0,0,0.3); color:#fff; font-size:12px; outline:none; font-family:inherit; }
        .form-group input:focus,.form-group textarea:focus,.form-group select:focus { border-color:#ff9800; }
        .form-group textarea { min-height:60px; resize:vertical; }
        .form-row { display:flex; gap:10px; flex-wrap:wrap; }
        .form-row .form-group { flex:1; min-width:160px; }
        .badge { display:inline-block; padding:2px 7px; border-radius:10px; font-size:9px; font-weight:700; margin-left:4px; }
        .badge-engine { background:rgba(66,165,245,0.2); color:#42a5f5; }
        .badge-gearbox { background:rgba(171,71,188,0.2); color:#ab47bc; }
        .empty-state { text-align:center; padding:30px; color:#666; }
        .tabs-admin { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
        .tab-admin { padding:10px 18px; border-radius:25px; border:2px solid rgba(255,255,255,0.2); background:transparent; color:#ccc; cursor:pointer; font-size:12px; font-weight:600; }
        .tab-admin:hover { border-color:#ff9800; color:#fff; }
        .tab-admin.active { background:#ff9800; color:#000; border-color:#ff9800; }
        .tab-content-admin { display:none; }
        .tab-content-admin.active { display:block; }
        @media(max-width:768px) { .container{padding:12px} .admin-grid{grid-template-columns:1fr} .form-row{flex-direction:column} .service-row{flex-wrap:wrap} .service-right{width:100%;justify-content:space-between} }
    </style>
</head>
<body>
    <div class="container" id="appContainer">
        <div class="header"><div class="logo">AUTO<span>SERVICE</span></div><div class="subtitle">Загрузка...</div></div>
        <div class="status-bar connecting" id="statusBar">⏳ Подключение к Firebase...</div>
        <div class="empty-state" style="padding:60px;">🔄 Загрузка данных...</div>
    </div>

    <div class="modal-overlay hidden" id="modalOverlay">
        <div class="modal">
            <div class="modal-header"><span class="modal-title" id="modalTitle"></span><button class="modal-close" id="modalClose">✕</button></div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        firebase.initializeApp({ databaseURL: 'https://the-colony-tap-default-rtdb.firebaseio.com/' });
        const db = firebase.database();
        const ADMIN_PASS = 'admin123';
        const KEY_AUTH = 'as_auth_v3';

        let isAdmin = localStorage.getItem(KEY_AUTH) === '1';
        let cars = [];
        let services = [];
        let selCar = null;
        let selEng = null;
        let selGb = null;
        let picks = new Set();
        let filt = 'all';
        let admTab = 'cars';
        let admCar = null;
        let admEng = null;
        let dbOnline = false;

        function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        function fmt(p) { return p.toLocaleString('ru-RU') + ' ₽'; }

        function getSel() {
            var c = cars.find(function(x) { return x.id === selCar; });
            if (!c) return null;
            var e = c.engines.find(function(x) { return x.id === selEng; });
            if (!e) return null;
            var g = e.gearboxes.find(function(x) { return x.id === selGb; });
            return g ? { car: c, engine: e, gearbox: g } : null;
        }
        function mult() { var d = getSel(); return d ? d.gearbox.mult : 1; }
        function prc(s) { return Math.round(s.price * mult()); }

        function updateStatus(state) {
            var bar = document.getElementById('statusBar');
            if (!bar) return;
            bar.className = 'status-bar ' + state;
            if (state === 'online') bar.innerHTML = '🟢 Онлайн • Firebase • ' + cars.length + ' авто / ' + services.length + ' услуг';
            else if (state === 'offline') bar.innerHTML = '🔴 Офлайн • Локальные данные';
            else bar.textContent = '🟡 Подключение...';
        }

        function loadData() {
            updateStatus('connecting');
            db.ref('cars').once('value').then(function(snap) {
                if (snap.exists()) { cars = snap.val(); console.log('✅ Авто загружено:', cars.length); }
                else { cars = []; console.log('⚠️ Нет авто в БД'); }
                if (!selCar && cars.length > 0) { selCar = cars[0].id;
                    selEng = cars[0].engines?.[0]?.id || null;
                    selGb = cars[0].engines?.[0]?.gearboxes?.[0]?.id || null; }
                dbOnline = true;
                updateStatus('online');
                render();
            }).catch(function(err) {
                console.error('❌ Ошибка авто:', err);
                loadLocal();
                render();
            });
            db.ref('services').once('value').then(function(snap) {
                if (snap.exists()) { services = snap.val(); console.log('✅ Услуг загружено:', services.length); }
                else { services = []; console.log('⚠️ Нет услуг в БД'); }
                dbOnline = true;
                updateStatus('online');
                render();
            }).catch(function(err) {
                console.error('❌ Ошибка услуг:', err);
                loadLocal();
                render();
            });
            db.ref('cars').on('value', function(snap) { if (snap.exists()) { cars = snap.val();
                    dbOnline = true;
                    updateStatus('online');
                    render(); } });
            db.ref('services').on('value', function(snap) { if (snap.exists()) { services = snap.val();
                    dbOnline = true;
                    updateStatus('online');
                    render(); } });
            db.ref('.info/connected').on('value', function(snap) { dbOnline = snap.val() === true;
                updateStatus(dbOnline ? 'online' : 'offline'); });
        }

        function loadLocal() {
            var lc = localStorage.getItem('as_cars_local_v3');
            var ls = localStorage.getItem('as_svc_local_v3');
            if (lc && cars.length === 0) { cars = JSON.parse(lc); if (!selCar && cars.length > 0) { selCar = cars[0].id;
                    selEng = cars[0].engines?.[0]?.id || null;
                    selGb = cars[0].engines?.[0]?.gearboxes?.[0]?.id || null; } }
            if (ls && services.length === 0) services = JSON.parse(ls);
            updateStatus('offline');
        }

        function saveData() {
            if (dbOnline) { db.ref('cars').set(cars);
                db.ref('services').set(services); } else { localStorage.setItem('as_cars_local_v3', JSON.stringify(
                    cars));
                localStorage.setItem('as_svc_local_v3', JSON.stringify(services));
                updateStatus('offline'); }
        }

        function render() { document.getElementById('appContainer').innerHTML = isAdmin ? renderAdmin() : renderClient(); if (
                isAdmin) bindAdmin(); else bindClient();
            updateStatus(dbOnline ? 'online' : 'offline'); }

        // КЛИЕНТ
        function renderClient() {
            var h = '';
            h += '<div class="header"><div class="logo">AUTO<span>SERVICE</span></div><div class="subtitle">Прайс-лист</div></div>';
            h += '<div class="status-bar ' + (dbOnline ? 'online' : 'offline') + '" id="statusBar">' + (dbOnline ?
                '🟢 Онлайн' : '🔴 Офлайн') + '</div>';
            h += '<div class="admin-link"><a href="#" id="loginLink">🔐 Админ</a></div>';
            h +=
            '<div class="smart-search"><input type="text" id="smartSearch" placeholder="🔍 Поиск услуги..." autocomplete="off"><div class="search-results" id="searchResults"></div></div>';
            h += '<div class="selector-section"><div class="selector-title">🚗 Выберите авто</div>';
            h +=
            '<div class="selector-row"><div class="selector-group"><div class="selector-label">Модель</div><div class="selector-buttons" id="carBtns">';
            cars.forEach(function(c) { h += '<button class="sel-btn' + (c.id === selCar ? ' active' : '') +
                    '" data-car="' + c.id + '">' + c.icon + ' ' + esc(c.name) + '<span class="btn-code">' + esc(c
                        .cat) + '</span></button>'; });
            h += '</div></div></div>';
            var car = cars.find(function(c) { return c.id === selCar; });
            h +=
            '<div class="selector-row"><div class="selector-group"><div class="selector-label">Двигатель</div><div class="selector-buttons" id="engBtns">';
            if (car) car.engines.forEach(function(e) { h += '<button class="sel-btn' + (e.id === selEng ? ' active' :
                    '') + '" data-eng="' + e.id + '">' + esc(e.name) + ' (' + esc(e.power) +
                    ')<span class="btn-code">' + esc(e.code) + '</span></button>'; });
            h += '</div></div></div>';
            h +=
            '<div class="selector-row"><div class="selector-group"><div class="selector-label">КПП</div><div class="selector-buttons" id="gbBtns">';
            if (car) { var eng = car.engines.find(function(e) { return e.id === selEng; }); if (eng) eng.gearboxes
                .forEach(function(g) { h += '<button class="sel-btn' + (g.id === selGb ? ' active' : '') +
                        '" data-gb="' + g.id + '">' + esc(g.name) + '<span class="btn-code">' + esc(g.drive) +
                        ' • ' + esc(g.code) + '</span></button>'; }); }
            h += '</div></div></div>';
            var d = getSel();
            if (d) h += '<div class="selected-config"><span class="selected-config-icon">' + d.car.icon +
                '</span><div class="selected-config-info"><div class="selected-config-name">' + esc(d.car.name) +
                '</div><div class="selected-config-detail">' + esc(d.engine.name) + ' • ' + esc(d.gearbox.name) +
                '</div></div><span class="selected-config-badge">' + esc(d.gearbox.badge) + '</span></div>';
            h += '</div>';
            var cats = ['maintenance', 'engine', 'exhaust', 'transmission', 'brakes', 'suspension', 'welding',
            'diagnostics'];
            var catNames = { maintenance: '🛠️ ТО', engine: '⚡ Двигатель', exhaust: '💨 Выхлоп',
                transmission: '⚙️ Трансмиссия', brakes: '🛑 Тормоза', suspension: '🔧 Подвеска', welding: '🔥 Сварка',
                diagnostics: '🔍 Диагностика' };
            h += '<div class="filter-buttons" id="filtBtns"><button class="filter-btn' + (filt === 'all' ? ' active' :
                '') + '" data-filt="all">Все</button>';
            cats.forEach(function(c) { h += '<button class="filter-btn' + (filt === c ? ' active' : '') +
                    '" data-filt="' + c + '">' + (catNames[c] || c) + '</button>'; });
            h += '</div>';
            var total = 0;
            picks.forEach(function(id) { var s = services.find(function(x) { return x.id === id; }); if (s) total +=
                    prc(s); });
            h += '<div class="total-panel"><div><div class="total-label">Выбрано: ' + picks.size +
                ' шт.</div></div><div class="total-price">' + fmt(total) +
                '</div><button class="clear-btn" id="clearBtn">Сбросить</button></div>';
            var list = services.filter(function(s) { return filt === 'all' || s.cat === filt; });
            var grp = {};
            list.forEach(function(s) { if (!grp[s.cat]) grp[s.cat] = [];
                grp[s.cat].push(s); });
            h += '<div id="svcList">';
            Object.keys(grp).forEach(function(k) { h += '<div class="category-title">' + (catNames[k] || k) + '</div>';
                grp[k].forEach(function(s) { var p = prc(s); var diff = p - s.price; var note = diff !== 0 ?
                        '<span class="price-note">(' + (diff > 0 ? '+' : '') + diff + ' ₽)</span>' : '';
