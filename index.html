<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автосервис - Прайс-лист на работы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(30, 30, 50, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Шапка */
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255, 165, 0, 0.3);
        }

        .logo {
            font-size: 36px;
            font-weight: 900;
            color: #ff9800;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 152, 0, 0.5);
            margin-bottom: 5px;
        }

        .logo span {
            color: #fff;
            font-weight: 300;
        }

        .subtitle {
            font-size: 14px;
            color: #aaa;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Поиск */
        .search-box {
            margin-bottom: 25px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 15px 50px 15px 20px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: #ff9800;
            box-shadow: 0 0 15px rgba(255, 152, 0, 0.3);
            background: rgba(0, 0, 0, 0.5);
        }

        .search-box input::placeholder {
            color: #777;
        }

        .search-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 22px;
            color: #ff9800;
            pointer-events: none;
        }

        /* Фильтр-кнопки (категории) */
        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
            justify-content: center;
        }

        .filter-btn {
            padding: 10px 18px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #ccc;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
            white-space: nowrap;
            font-weight: 500;
        }

        .filter-btn:hover {
            background: rgba(255, 152, 0, 0.2);
            border-color: #ff9800;
            color: #fff;
        }

        .filter-btn.active {
            background: #ff9800;
            color: #000;
            border-color: #ff9800;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4);
        }

        /* Итоговая панель */
        .total-panel {
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            border-radius: 15px;
            padding: 18px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: 0 8px 25px rgba(255, 152, 0, 0.3);
        }

        .total-label {
            font-size: 15px;
            font-weight: 600;
            color: #000;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .total-price {
            font-size: 32px;
            font-weight: 900;
            color: #000;
            letter-spacing: 1px;
        }

        .total-count {
            font-size: 13px;
            color: rgba(0, 0, 0, 0.7);
            font-weight: 500;
        }

        .clear-btn {
            padding: 10px 20px;
            border-radius: 50px;
            border: 2px solid #000;
            background: transparent;
            color: #000;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .clear-btn:hover {
            background: #000;
            color: #ff9800;
        }

        /* Список услуг */
        .services-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .category-title {
            font-size: 14px;
            font-weight: 700;
            color: #ff9800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 15px 0 8px 5px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .category-title:first-child {
            border-top: none;
            margin-top: 0;
            padding-top: 0;
        }

        .service-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 13px 18px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            user-select: none;
        }

        .service-item:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 152, 0, 0.3);
        }

        .service-item.selected {
            background: rgba(255, 152, 0, 0.15);
            border-color: #ff9800;
            box-shadow: 0 0 15px rgba(255, 152, 0, 0.2);
        }

        .service-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .checkbox-custom {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .service-item.selected .checkbox-custom {
            background: #ff9800;
            border-color: #ff9800;
        }

        .check-mark {
            color: #000;
            font-size: 14px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .service-item.selected .check-mark {
            opacity: 1;
        }

        .service-name {
            font-size: 15px;
            font-weight: 500;
            color: #ddd;
        }

        .service-item.selected .service-name {
            color: #fff;
            font-weight: 600;
        }

        .service-price {
            font-size: 18px;
            font-weight: 700;
            color: #ff9800;
            white-space: nowrap;
            margin-left: 15px;
        }

        .service-item.selected .service-price {
            color: #fff;
        }

        .hidden {
            display: none !important;
        }

        /* Футер */
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            color: #666;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .footer a {
            color: #ff9800;
            text-decoration: none;
        }

        /* Анимация появления */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .service-item {
            animation: fadeInUp 0.4s ease forwards;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 15px;
                border-radius: 12px;
            }
            .logo {
                font-size: 24px;
            }
            .service-item {
                padding: 10px 12px;
            }
            .service-name {
                font-size: 13px;
            }
            .service-price {
                font-size: 15px;
            }
            .total-price {
                font-size: 24px;
            }
            .filter-btn {
                padding: 8px 12px;
                font-size: 11px;
            }
        }

        /* Стиль для прокрутки */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 152, 0, 0.3);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- Шапка -->
        <div class="header">
            <div class="logo">AUTO<span>SERVICE</span></div>
            <div class="subtitle">Прайс-лист на слесарные работы</div>
        </div>

        <!-- Поиск -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Поиск по названию услуги...">
            <span class="search-icon">🔍</span>
        </div>

        <!-- Кнопки категорий -->
        <div class="filter-buttons" id="filterButtons">
            <button class="filter-btn active" data-filter="all">Все услуги</button>
            <button class="filter-btn" data-filter="diagnostics">Диагностика</button>
            <button class="filter-btn" data-filter="maintenance">ТО</button>
            <button class="filter-btn" data-filter="exhaust">Выпускная система</button>
            <button class="filter-btn" data-filter="threads">Ремонт резьбы</button>
            <button class="filter-btn" data-filter="transmission">Трансмиссия</button>
            <button class="filter-btn" data-filter="brakes">Тормоза</button>
            <button class="filter-btn" data-filter="welding">Сварка</button>
        </div>

        <!-- Итоговая сумма -->
        <div class="total-panel" id="totalPanel">
            <div>
                <div class="total-label">Выбрано услуг:</div>
                <div class="total-count" id="totalCount">0</div>
            </div>
            <div style="text-align:right;">
                <div class="total-label">Итого:</div>
                <div class="total-price" id="totalPrice">0 ₽</div>
            </div>
            <button class="clear-btn" id="clearBtn">✕ Сбросить всё</button>
        </div>

        <!-- Список услуг -->
        <div class="services-list" id="servicesList">
            <!-- Заполняется через JavaScript -->
        </div>

        <!-- Футер -->
        <div class="footer">
            © 2026 AutoService. Цены указаны за работу без учёта стоимости запчастей и материалов.
        </div>

    </div>

    <script>
        // Массив всех услуг
        const services = [
            { id: 1, name: 'Компьютерная диагностика автомобиля', price: 800, category: 'diagnostics',
                categoryName: '🔍 ДИАГНОСТИКА' },
            { id: 2, name: 'Замена моторного масла и масляного фильтра', price: 800, category: 'maintenance',
                categoryName: '🛠️ ТЕХНИЧЕСКОЕ ОБСЛУЖИВАНИЕ' },
            { id: 3, name: 'Снятие/установка декоративной крышки двигателя', price: 200, category: 'maintenance',
                categoryName: '🛠️ ТЕХНИЧЕСКОЕ ОБСЛУЖИВАНИЕ' },
            { id: 4, name: 'Снятие/установка катушек зажигания (4 шт)', price: 500, category: 'maintenance',
                categoryName: '🛠️ ТЕХНИЧЕСКОЕ ОБСЛУЖИВАНИЕ' },
            { id: 5, name: 'Замена свечей зажигания (4 шт)', price: 600, category: 'maintenance',
                categoryName: '🛠️ ТЕХНИЧЕСКОЕ ОБСЛУЖИВАНИЕ' },
            { id: 6, name: 'Снятие/установка защиты двигателя (нижний пыльник)', price: 500, category: 'maintenance',
                categoryName: '🛠️ ТЕХНИЧЕСКОЕ ОБСЛУЖИВАНИЕ' },
            { id: 7, name: 'Снятие/установка впускного коллектора', price: 2000, category: 'exhaust',
                categoryName: '💨 СИСТЕМА ВЫПУСКА' },
            { id: 8, name: 'Снятие/установка выпускного коллектора (штаны)', price: 4000, category: 'exhaust',
                categoryName: '💨 СИСТЕМА ВЫПУСКА' },
            { id: 9, name: 'Резка приемной трубы болгаркой (для быстрого съема)', price: 500, category: 'exhaust',
                categoryName: '💨 СИСТЕМА ВЫПУСКА' },
            { id: 10, name: 'Резка старых гофр болгаркой (2 шт)', price: 400, category: 'exhaust',
                categoryName: '💨 СИСТЕМА ВЫПУСКА' },
            { id: 11, name: 'Подгонка и приварка новых гофр (2 шт)', price: 3500, category: 'exhaust',
                categoryName: '💨 СИСТЕМА ВЫПУСКА' },
            { id: 12, name: 'Высверливание/выкручивание сломанной шпильки (1 шт)', price: 1000, category: 'threads',
                categoryName: '🔩 РЕМОНТ РЕЗЬБОВЫХ СОЕДИНЕНИЙ' },
            { id: 13, name: 'Приварка гайки/прутка для выкручивания обломанной шпильки (1 шт)', price: 800,
                category: 'threads', categoryName: '🔩 РЕМОНТ РЕЗЬБОВЫХ СОЕДИНЕНИЙ' },
            { id: 14, name: 'Снятие/установка внутреннего ШРУСа (отведение от КПП для доступа)', price: 2000,
                category: 'transmission', categoryName: '⚙️ ТРАНСМИССИЯ' },
            { id: 15, name: 'Устранение скрипа ручки КПП (смазка механизма кулисы)', price: 500, category: 'transmission',
                categoryName: '⚙️ ТРАНСМИССИЯ' },
            { id: 16, name: 'Снятие/установка задних тормозных барабанов (2 шт)', price: 800, category: 'brakes',
                categoryName: '🛑 ТОРМОЗНАЯ СИСТЕМА' },
            { id: 17, name: 'Зачистка и покраска задних тормозных барабанов с баллона (2 шт)', price: 1200,
                category: 'brakes', categoryName: '🛑 ТОРМОЗНАЯ СИСТЕМА' },
            { id: 18, name: 'Сварочные работы (приварка гаек, прутков, гофр) — от', price: 500, category: 'welding',
                categoryName: '🔥 СВАРОЧНЫЕ РАБОТЫ' },
        ];

        // Состояние выбранных услуг
        let selectedServices = new Set();

        // Текущий фильтр
        let currentFilter = 'all';
        // Текущий поисковый запрос
        let currentSearch = '';

        // Получить DOM-элементы
        const servicesList = document.getElementById('servicesList');
        const totalPriceEl = document.getElementById('totalPrice');
        const totalCountEl = document.getElementById('totalCount');
        const clearBtn = document.getElementById('clearBtn');
        const searchInput = document.getElementById('searchInput');
        const filterButtons = document.querySelectorAll('.filter-btn');

        // Функция форматирования цены
        function formatPrice(price) {
            return price.toLocaleString('ru-RU') + ' ₽';
        }

        // Функция отрисовки списка услуг
        function renderServices() {
            servicesList.innerHTML = '';

            // Фильтруем услуги
            let filteredServices = services;

            // Применяем фильтр категории
            if (currentFilter !== 'all') {
                filteredServices = filteredServices.filter(s => s.category === currentFilter);
            }

            // Применяем поиск
            if (currentSearch.trim() !== '') {
                const searchLower = currentSearch.toLowerCase().trim();
                filteredServices = filteredServices.filter(s =>
                    s.name.toLowerCase().includes(searchLower)
                );
            }

            // Группируем по категориям
            const grouped = {};
            filteredServices.forEach(s => {
                if (!grouped[s.category]) {
                    grouped[s.category] = {
                        categoryName: s.categoryName,
                        items: []
                    };
                }
                grouped[s.category].items.push(s);
            });

            // Отрисовываем сгруппированный список
            Object.keys(grouped).forEach(catKey => {
                const group = grouped[catKey];

                // Заголовок категории
                const titleDiv = document.createElement('div');
                titleDiv.className = 'category-title';
                titleDiv.textContent = group.categoryName;
                servicesList.appendChild(titleDiv);

                // Услуги в категории
                group.items.forEach(service => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'service-item';
                    if (selectedServices.has(service.id)) {
                        itemDiv.classList.add('selected');
                    }
                    itemDiv.setAttribute('data-id', service.id);

                    itemDiv.innerHTML = `
                                <div class="service-info">
                                    <div class="checkbox-custom">
                                        <span class="check-mark">✓</span>
                                    </div>
                                    <span class="service-name">${service.name}</span>
                                </div>
                                <span class="service-price">${formatPrice(service.price)}</span>
                            `;

                    itemDiv.addEventListener('click', () => toggleService(service.id));
                    servicesList.appendChild(itemDiv);
                });
            });

            // Если ничего не найдено
            if (filteredServices.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.style.cssText = 'text-align:center; padding:40px; color:#777; font-size:16px;';
                emptyDiv.textContent = '😕 Ничего не найдено. Попробуйте изменить запрос.';
                servicesList.appendChild(emptyDiv);
            }

            updateTotal();
        }

        // Переключение выбора услуги
        function toggleService(id) {
            if (selectedServices.has(id)) {
                selectedServices.delete(id);
            } else {
                selectedServices.add(id);
            }
            renderServices();
        }

        // Обновление итоговой суммы
        function updateTotal() {
            let total = 0;
            selectedServices.forEach(id => {
                const service = services.find(s => s.id === id);
                if (service) {
                    total += service.price;
                }
            });

            totalPriceEl.textContent = formatPrice(total);
            totalCountEl.textContent = selectedServices.size + ' шт.';
        }

        // Сброс всего выбора
        function clearAll() {
            selectedServices.clear();
            renderServices();
        }

        // Установка фильтра
        function setFilter(filter) {
            currentFilter = filter;
            // Обновляем активную кнопку
            filterButtons.forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-filter') === filter) {
                    btn.classList.add('active');
                }
            });
            renderServices();
        }

        // Обработчики событий
        clearBtn.addEventListener('click', clearAll);

        searchInput.addEventListener('input', (e) => {
            currentSearch = e.target.value;
            renderServices();
        });

        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const filter = btn.getAttribute('data-filter');
                setFilter(filter);
            });
        });

        // Инициализация — отрисовываем список при загрузке
        renderServices();

        console.log('🚗 Прайс-лист автосервиса загружен и готов к работе!');
        console.log('📋 Всего услуг: ' + services.length);
        console.log('💰 Выбирайте услуги — сумма считается автоматически.');
    </script>
</body>
</html>
