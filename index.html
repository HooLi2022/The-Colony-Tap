<!DOCTYPE html>
<html lang="ru">

    <title>Автосервис - Прайс-лист и Запись</title>
    <style>
        :root { --bg: #1a1a2e; --surface: #1e1e32; --accent: #ff9800; --text: #e0e0e0; --muted: #999; --radius: 12px; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI', system-ui, -apple-system, sans-serif; background:var(--bg); min-height:100vh; padding:16px; color:var(--text); }
        .container { max-width:1300px; margin:0 auto; background:var(--surface); border-radius:20px; padding:24px; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
        .header { text-align:center; margin-bottom:20px; padding-bottom:16px; border-bottom:2px solid rgba(255,165,0,0.3); }
        .logo { font-size:32px; font-weight:900; color:var(--accent); letter-spacing:2px; }
        .logo span { color:#fff; font-weight:300; }
        .subtitle { font-size:13px; color:var(--muted); letter-spacing:1px; margin-top:4px; }
        .status-bar { text-align:center; padding:6px 12px; margin-bottom:14px; border-radius:20px; font-size:10px; font-weight:600; }
        .status-bar.online { background:rgba(76,175,80,0.15); color:#4caf50; }
        .main-tabs { display:flex; gap:6px; margin-bottom:20px; flex-wrap:wrap; justify-content:center; }
        .main-tab { padding:12px 22px; border-radius:24px; border:2px solid rgba(255,255,255,0.15); background:transparent; color:#ccc; cursor:pointer; font-size:13px; font-weight:700; transition:all 0.25s; white-space:nowrap; }
        .main-tab:hover { border-color:var(--accent); color:#fff; background:rgba(255,152,0,0.08); }
        .main-tab.active { background:var(--accent); color:#000; border-color:var(--accent); }
        .tab-content { display:none; animation:fadeIn 0.3s ease; }
        .tab-content.active { display:block; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
        .card { background:rgba(0,0,0,0.25); border-radius:14px; padding:18px; margin-bottom:18px; border:1px solid rgba(255,255,255,0.06); }
        .card-title { font-size:12px; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:12px; text-align:center; }
        .search-wrap { position:relative; margin-bottom:16px; }
        .search-wrap input { width:100%; padding:12px 44px 12px 16px; border-radius:24px; border:2px solid rgba(255,255,255,0.12); background:rgba(0,0,0,0.3); color:#fff; font-size:14px; outline:none; }
        .search-wrap input:focus { border-color:var(--accent); }
        .search-results { display:none; margin-top:8px; background:rgba(0,0,0,0.5); border-radius:12px; max-height:260px; overflow-y:auto; }
        .search-results.active { display:block; }
        .search-item { padding:10px 14px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,0.04); display:flex; justify-content:space-between; font-size:12px; }
        .search-item:hover { background:rgba(255,152,0,0.12); }
        .chip-row { display:flex; flex-wrap:wrap; gap:5px; max-height:180px; overflow-y:auto; }
        .chip { padding:7px 11px; border-radius:20px; border:1px solid rgba(255,255,255,0.18); background:rgba(255,255,255,0.03); color:#ccc; cursor:pointer; font-size:10px; font-weight:500; transition:all 0.2s; white-space:nowrap; }
        .chip:hover { border-color:var(--accent); color:#fff; background:rgba(255,152,0,0.08); }
        .chip.active { background:var(--accent); color:#000; border-color:var(--accent); font-weight:700; }
        .info-bar { background:rgba(255,152,0,0.1); border:1px solid var(--accent); border-radius:10px; padding:10px 14px; margin-top:10px; display:flex; align-items:center; gap:10px; font-size:13px; }
        .btn { padding:9px 18px; border-radius:22px; border:none; cursor:pointer; font-size:11px; font-weight:700; transition:all 0.2s; }
        .btn-sm { padding:5px 10px; font-size:9px; border-radius:14px; }
        .btn-accent { background:var(--accent); color:#000; }
        .btn-accent:active { transform:scale(0.97); }
        .btn-success { background:#4caf50; color:#fff; }
        .btn-danger { background:#e53935; color:#fff; }
        .btn-outline { background:transparent; border:2px solid var(--accent); color:var(--accent); }
        .sticky-bar { background:var(--accent); border-radius:12px; padding:14px 18px; display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:8px; position:sticky; top:8px; z-index:10; }
        .sticky-bar .price { font-size:26px; font-weight:900; color:#000; }
        .svc-group-title { font-size:11px; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:1px; margin:12px 0 6px 4px; padding-top:8px; border-top:1px solid rgba(255,255,255,0.06); }
        .svc-row { display:flex; justify-content:space-between; align-items:center; padding:10px 12px; border-radius:10px; background:rgba(255,255,255,0.015); margin-bottom:3px; gap:8px; font-size:12px; cursor:pointer; }
        .svc-row:active { background:rgba(255,152,0,0.2); }
        .svc-row.selected { background:rgba(255,152,0,0.15); }
        .svc-left { display:flex; align-items:center; gap:8px; flex:1; }
        .check { width:20px; height:20px; border-radius:5px; border:2px solid rgba(255,255,255,0.25); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:bold; color:#000; }
        .svc-row.selected .check { background:var(--accent); border-color:var(--accent); }
        .svc-price-text { color:var(--accent); font-weight:700; }
        .booking-total { background:var(--accent); color:#000; padding:6px 12px; border-radius:8px; font-weight:800; font-size:13px; display:inline-block; margin:8px 0; }

        .form-group textarea { min-height:70px; resize:vertical; }
        .delivery-options { display:flex; gap:6px; }

        .del-opt.active { border-color:var(--accent); background:rgba(255,152,0,0.12); }

        .calendar-popup { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:var(--surface); border:2px solid var(--accent); border-radius:12px; padding:14px; z-index:200; display:none; width:300px; max-width:95vw; box-shadow:0 20px 50px rgba(0,0,0,0.9); }

        .cal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:199; display:none; }
        .cal-overlay.show { display:block; }
        .cal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
        .cal-header button { background:transparent; border:none; color:var(--accent); cursor:pointer; font-size:18px; padding:6px 10px; }
        .cal-header span { font-weight:700; font-size:14px; color:#fff; }
        .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; text-align:center; }
        .cal-day-name { font-size:9px; color:var(--muted); padding:4px 0; }
        .cal-day { padding:8px 4px; border-radius:6px; cursor:pointer; font-size:12px; color:#ccc; }
        .cal-day:active { background:var(--accent); }
        .cal-day.active { background:var(--accent); color:#000; font-weight:700; }
        .cal-day.other { color:#444; }
        .cal-day.today { border:1px solid var(--accent); }
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:999; display:flex; align-items:center; justify-content:center; }
        .modal-overlay.hidden { display:none; }
        .modal { background:var(--surface); border-radius:16px; width:92%; max-width:720px; max-height:85vh; overflow-y:auto; border:2px solid var(--accent); }
        .modal-header { background:var(--accent); padding:14px 18px; border-radius:14px 14px 0 0; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:2; }
        .modal-close { width:30px; height:30px; border-radius:50%; border:2px solid #000; background:transparent; color:#000; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; }
        .modal-body { padding:16px; font-size:12px; }
        .step { background:rgba(255,255,255,0.02); border-radius:10px; padding:12px; margin-bottom:8px; }

        .admin-tab { padding:8px 14px; border-radius:18px; border:2px solid rgba(255,255,255,0.15); background:transparent; color:#ccc; cursor:pointer; font-size:11px; font-weight:600; }
        .admin-tab.active { background:var(--accent); color:#000; border-color:var(--accent); }
        .admin-content { display:none; }
        .admin-content.active { display:block; }
        .booking-card { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.06); border-radius:12px; padding:14px; margin-bottom:10px; }
        .booking-total-badge { background:var(--accent); color:#000; padding:6px 12px; border-radius:8px; font-weight:800; font-size:13px; display:inline-block; margin-top:6px; }
        .empty { text-align:center; padding:30px; color:#555; }
        .footer { text-align:center; margin-top:20px; padding-top:12px; border-top:1px solid rgba(255,255,255,0.05); color:#555; font-size:10px; }

            .form-grid { grid-template-columns:1fr; }
            .svc-row { padding:12px 10px; }
            .sticky-bar { padding:10px 14px; }
            .sticky-bar .price { font-size:20px; }
            .chip { padding:8px 12px; font-size:11px; }
            .btn { padding:12px 20px; font-size:13px; }
            .del-opt { padding:14px 8px; }
            .modal { width:96%; max-height:90vh; border-radius:12px; }
            .modal-header { border-radius:10px 10px 0 0; }
            .booking-card { padding:10px; }
        }
        @media (max-width:400px) {
            .chip { padding:6px 9px; font-size:9px; }

</head>

        function renderCal(popup,input){
            let months=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
            let days=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
            let today=new Date();today.setHours(0,0,0,0);
            let h=`<div class="cal-header"><button id="calPrev">◀</button><span>${months[calMonth]} ${calYear}</span><button id="calNext">▶</button></div>`;
            h+=`<div class="cal-grid">${days.map(d=>`<div class="cal-day-name">${d}</div>`).join('')}`;
            let firstDay=new Date(calYear,calMonth,1).getDay()||7;
            let lastDate=new Date(calYear,calMonth+1,0).getDate();
            let prevLast=new Date(calYear,calMonth,0).getDate();
            for(let i=1;i<firstDay;i++)h+=`<div class="cal-day other">${prevLast-firstDay+i+1}</div>`;
            for(let d=1;d<=lastDate;d++){let dt=new Date(calYear,calMonth,d);let cls='cal-day';if(dt.getTime()===calDate.getTime())cls+=' active';if(dt.getTime()===today.getTime())cls+=' today';h+=`<div class="${cls}" data-date="${dt.toISOString()}">${d}</div>`;}
            let total=firstDay+lastDate-1,remaining=Math.ceil(total/7)*7-total;
            for(let i=1;i<=remaining;i++)h+=`<div class="cal-day other">${i}</div>`;
            h+=`</div>`;popup.innerHTML=h;
            popup.querySelector('#calPrev').onclick=e=>{e.stopPropagation();calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCal(popup,input);};
            popup.querySelector('#calNext').onclick=e=>{e.stopPropagation();calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCal(popup,input);};
            popup.querySelectorAll('.cal-day:not(.other)').forEach(d=>d.onclick=e=>{e.stopPropagation();calDate=new Date(d.dataset.date);input.value=calDate.toLocaleDateString('ru-RU');closeCal();});
        }
        document.getElementById('calOverlay').onclick=closeCal;

            let h=`<div class="header"><div class="logo">AUTO<span>SERVICE</span></div><div class="subtitle">⚙️ Админ-панель • ${C.length} авто • ${S.length} услуг</div></div>`;
            h+=`<div class="status-bar ${onl?'online':''}">${onl?'🟢 Онлайн':'🔴 Офлайн'}</div>`;
            h+=`<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:16px;"><div class="admin-tabs"><button class="admin-tab${at==='bookings'?' active':''}" data-at="bookings">📅 Заявки (${B?Object.keys(B).length:0})</button><button class="admin-tab${at==='cars'?' active':''}" data-at="cars">🚗 Авто (${C.length})</button><button class="admin-tab${at==='services'?' active':''}" data-at="services">🔧 Услуги (${S.length})</button></div><button class="btn btn-outline btn-sm" id="logoutBtn">🚪 Выйти</button></div>`;
            h+=`<div class="admin-content${at==='bookings'?' active':''}">${RAB()}</div>`;
            h+=`<div class="admin-content${at==='cars'?' active':''}">${RAC()}</div>`;
            h+=`<div class="admin-content${at==='services'?' active':''}">${RAS()}</div>`;
            h+=`<div class="footer">Админ-панель</div>`;
            return h;
        }

        function RAB(){
            if(!B||!Object.keys(B).length)return '<div class="empty">Нет заявок</div>';
            let h='';
            Object.keys(B).reverse().forEach(k=>{
                let b=B[k],car=C.find(c=>c.id===b.carId)||{icon:'🚗',name:'Не указан'};
                let scs=b.status==='confirmed'?'color:#4caf50;':b.status==='done'?'color:#9e9e9e;':'color:var(--accent);';
                let st=b.status==='confirmed'?'Подтверждена':b.status==='done'?'Выполнена':'Новая';
                let bookingTotal=b.total||calcTotal(b.services||[]);
                h+=`<div class="booking-card"><div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;"><div><strong>${E(b.name)}</strong><br><span style="color:var(--accent);">📞 ${E(b.phone)}</span></div><span style="${scs}font-weight:700;font-size:10px;">${st}</span></div>`;
                h+=`<div style="margin-top:6px;font-size:12px;">🚗 ${car.icon} ${E(car.name)} | 📅 ${b.date||'—'} ${b.time||''}</div>`;
                if(b.services&&b.services.length){h+=`<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:3px;">${b.services.map(sid=>{let s=S.find(x=>x.id===sid);return s?`<span class="badge" style="background:rgba(255,152,0,0.15);color:var(--accent);">${E(s.name)}</span>`:'';}).join('')}</div>`;}
                if(b.problem)h+=`<div style="margin-top:8px;padding:8px;background:rgba(0,0,0,0.2);border-radius:6px;font-size:11px;">📝 ${E(b.problem)}</div>`;
                h+=`<div class="booking-total-badge">💰 Сумма: ${F(bookingTotal)}</div>`;
                h+=`<div style="margin-top:8px;display:flex;gap:5px;flex-wrap:wrap;">${b.status==='new'?`<button class="btn btn-success btn-sm" data-confirm="${k}">✅</button>`:''}${b.status!=='done'?`<button class="btn btn-accent btn-sm" data-done="${k}">✔️</button>`:''}<button class="btn btn-danger btn-sm" data-del="${k}">🗑️</button></div></div>`;
            });
            return h;
        }

        function RAC(){
            let h=`<div class="card"><div class="card-title">➕ Добавить авто</div><div style="display:flex;gap:8px;flex-wrap:wrap;"><div class="form-group" style="flex:1;"><label>Модель</label><input type="text" id="acName"></div><div class="form-group" style="flex:1;"><label>Иконка</label><input type="text" id="acIcon" placeholder="🚙"></div><div class="form-group" style="flex:1;"><label>Категория</label><input type="text" id="acCat"></div></div><button class="btn btn-accent" id="btnAddCar">➕ Добавить</button></div>`;
            h+=`<div class="card"><div class="card-title">📋 Автомобили (${C.length})</div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px;">${C.map(c=>`<div style="background:rgba(255,255,255,0.02);padding:10px;border-radius:8px;"><strong>${c.icon} ${E(c.name)}</strong><br><small>${E(c.cat)} • Двигателей: ${c.engines.length}</small><div style="margin-top:6px;display:flex;gap:4px;"><button class="btn btn-outline btn-sm" data-engs="${c.id}">⚙️</button><button class="btn btn-danger btn-sm" data-delcar="${c.id}">🗑️</button></div></div>`).join('')}</div></div>`;
            return h;
        }

        function RAS(){
            let h=`<div class="card"><div class="card-title">➕ Услуга</div><input type="hidden" id="svcEditId"><div style="display:flex;gap:8px;flex-wrap:wrap;"><div class="form-group" style="flex:2;"><label>Название</label><input type="text" id="svcName"></div><div class="form-group" style="flex:1;"><label>Цена</label><input type="number" id="svcPrice" value="1000"></div><div class="form-group" style="flex:1;"><label>Категория</label><select id="svcCat">${['diagnostics:🔍 Диагностика','maintenance:🛠️ ТО','engine:⚡ Двигатель','exhaust:💨 Выхлоп','transmission:⚙️ Трансмиссия','brakes:🛑 Тормоза','suspension:🔧 Подвеска','ac:❄️ Кондиционер','electrical:🔌 Электрика','body:🎨 Кузов','tires:🛞 Шины'].map(x=>`<option value="${x.split(':')[0]}">${x.split(':')[1]}</option>`).join('')}</select></div></div><div class="form-group"><label>Инструменты</label><input type="text" id="svcTools"></div><div class="form-group"><label>Регламент</label><textarea id="svcSpecs"></textarea></div><div class="form-group"><label>Инструкция</label><textarea id="svcSteps"></textarea></div><div class="form-group"><label>Предупреждение</label><input type="text" id="svcWarning"></div><button class="btn btn-accent" id="btnSaveSvc">💾 Сохранить</button><button class="btn btn-outline btn-sm" id="btnClearSvc">✕</button></div>`;
            h+=`<div class="card"><div class="card-title">📋 Услуги (${S.length})</div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px;">${S.map(s=>`<div style="background:rgba(255,255,255,0.02);padding:10px;border-radius:8px;"><strong>${E(s.name)}</strong><br><small>${F(s.price)} • ${s.cat}</small><div style="margin-top:6px;display:flex;gap:4px;"><button class="btn btn-outline btn-sm" data-editsvc="${s.id}">✏️</button><button class="btn btn-danger btn-sm" data-delsvc="${s.id}">🗑️</button></div></div>`).join('')}</div></div>`;
            return h;
        }

        function BA(){
            document.getElementById('logoutBtn').onclick=()=>{localStorage.removeItem(KA);A=!1;R();};
            document.querySelectorAll('.admin-tab').forEach(b=>b.onclick=()=>{at=b.dataset.at;R();});
            document.querySelectorAll('[data-confirm]').forEach(b=>b.onclick=()=>db.ref('bookings/'+b.dataset.confirm+'/status').set('confirmed'));
            document.querySelectorAll('[data-done]').forEach(b=>b.onclick=()=>db.ref('bookings/'+b.dataset.done+'/status').set('done'));
            document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{if(confirm('Удалить?'))db.ref('bookings/'+b.dataset.del).remove();});
            document.getElementById('btnAddCar').onclick=()=>{let n=document.getElementById('acName').value.trim();if(!n)return alert('Название!');C.push({id:'c'+Date.now(),name:n,icon:document.getElementById('acIcon').value.trim()||'🚗',cat:document.getElementById('acCat').value.trim()||'Стандарт',engines:[]});sC();R();};
            document.querySelectorAll('[data-delcar]').forEach(b=>b.onclick=()=>{if(!confirm('Удалить?'))return;C=C.filter(c=>c.id!==b.dataset.delcar);sC();R();});
            document.getElementById('btnSaveSvc').onclick=()=>{let eid=document.getElementById('svcEditId').value,n=document.getElementById('svcName').value.trim(),p=parseInt(document.getElementById('svcPrice').value)||0;if(!n||!p)return alert('Название и цена!');let o={name:n,price:p,cat:document.getElementById('svcCat').value,tools:document.getElementById('svcTools').value.trim(),specs:document.getElementById('svcSpecs').value.trim(),steps:document.getElementById('svcSteps').value.trim(),warning:document.getElementById('svcWarning').value.trim()};if(eid){let i=S.findIndex(s=>s.id==eid);if(i>=0){o.id=S[i].id;S[i]=o;}}else{o.id=Date.now();S.push(o);}sS();document.getElementById('svcEditId').value='';document.getElementById('svcName').value='';document.getElementById('svcPrice').value='1000';R();};
            document.getElementById('btnClearSvc').onclick=()=>{document.getElementById('svcEditId').value='';document.getElementById('svcName').value='';document.getElementById('svcPrice').value='1000';};
            document.querySelectorAll('[data-editsvc]').forEach(b=>b.onclick=()=>{let s=S.find(x=>x.id==b.dataset.editsvc);if(!s)return;document.getElementById('svcEditId').value=s.id;document.getElementById('svcName').value=s.name;document.getElementById('svcPrice').value=s.price;document.getElementById('svcCat').value=s.cat;document.getElementById('svcTools').value=s.tools||'';document.getElementById('svcSpecs').value=s.specs||'';document.getElementById('svcSteps').value=s.steps||'';document.getElementById('svcWarning').value=s.warning||'';at='services';R();});
            document.querySelectorAll('[data-delsvc]').forEach(b=>b.onclick=()=>{if(!confirm('Удалить?'))return;S=S.filter(s=>s.id!=b.dataset.delsvc);sS();R();});
        }

        function OM(sid){let s=S.find(x=>x.id===sid);if(!s)return;document.getElementById('modalTitle').textContent=s.name;let h='';if(s.specs?.trim()){h+='<h3>📅 Регламент</h3><table style="width:100%;border-collapse:collapse;font-size:11px;">';s.specs.split('\n').forEach(l=>{let p=l.split('|');if(p.length>=2)h+=`<tr><td style="padding:5px 8px;border-bottom:1px solid rgba(255,255,255,0.05);color:var(--accent);">${E(p[0].trim())}</td><td style="padding:5px 8px;border-bottom:1px solid rgba(255,255,255,0.05);">${E(p[1].trim())}</td></tr>`;});h+='</table>';}if(s.tools?.trim()){h+='<h3>🔧 Инструменты</h3><div style="display:flex;flex-wrap:wrap;gap:4px;">';s.tools.split(',').forEach(t=>h+=`<span class="badge" style="background:rgba(255,255,255,0.08);padding:4px 8px;">${E(t.trim())}</span>`);h+='</div>';}if(s.steps?.trim()){h+='<h3>📝 Инструкция</h3>';s.steps.split('\n').forEach((st,i)=>h+=`<div class="step"><div class="step-head">Шаг ${i+1}</div>${E(st)}</div>`);}if(s.warning?.trim())h+=`<h3>⚠️ Предупреждение</h3><div style="background:rgba(255,152,0,0.1);border-left:4px solid var(--accent);padding:10px;border-radius:0 8px 8px 0;">${E(s.warning)}</div>`;document.getElementById('modalBody').innerHTML=h;document.getElementById('modalOverlay').classList.remove('hidden');document.body.style.overflow='hidden';}
        function CM(){document.getElementById('modalOverlay').classList.add('hidden');document.body.style.overflow='';}
        document.getElementById('modalClose').onclick=CM;
        document.getElementById('modalOverlay').onclick=e=>{if(e.target===document.getElementById('modalOverlay'))CM();};
        document.onkeydown=e=>{if(e.key==='Escape')CM();};

        LD();
    </script>
</body>
</html>
