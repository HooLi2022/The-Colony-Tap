                    { url: 'https://a1.drive-data.ru/1c0a5bu-960.jpg', desc: 'Проверяем уровень масла щупом' },
                ],
                video: 'https://www.youtube.com/embed/dQw4w9WgXcQ',
                videoTitle: 'Видео: Замена масла ВАЗ 2107',
            },
            3: {
                title: 'Замена свечей зажигания на ВАЗ 2107',
                tools: ['Свечной ключ 21 мм', 'Щётка', 'Ветошь'],
                steps: [
                    'Дайте двигателю остыть.',
                    'Снимите свечные колпачки.',
                    'Продуйте свечные колодцы.',
                    'Свечным ключом выкрутите старые свечи.',
                    'Проверьте зазор новых свечей (0.7-0.8 мм).',
                    'Вкрутите новые свечи от руки до упора.',
                    'Дотяните ключом (без усилия!).',
                    'Установите свечные колпачки.',
                ],
                warning: 'Не перетяните свечи — можно повредить резьбу в ГБЦ! Рекомендуемые свечи: А17ДВРМ.',
                images: [],
                video: 'https://www.youtube.com/embed/dQw4w9WgXcQ',
                videoTitle: 'Видео: Замена свечей ВАЗ 2107',
            },
            7: {
                title: 'Регулировка клапанов ВАЗ 2107',
                tools: ['Ключ на 13', 'Щуп 0.15 мм', 'Отвёртка', 'Ключ для проворачивания коленвала'],
                steps: [
                    'Снимите клапанную крышку.',
                    'Прокрутите коленвал до ВМТ 1-го цилиндра.',
                    'Щупом 0.15 мм проверьте зазор на 1-м и 3-м клапанах (выпускные).',
                    'Проверьте зазор на 2-м и 5-м клапанах (впускные).',
                    'При необходимости ослабьте контргайку и отрегулируйте.',
                    'Проверните коленвал на 360° (ВМТ 4-го цилиндра).',
                    'Проверьте 4-й и 6-й клапаны (выпуск), 7-й и 8-й (впуск).',
                    'Отрегулируйте при необходимости.',
                    'Установите клапанную крышку с новой прокладкой.',
                ],
                warning: 'Зазор для впускных и выпускных клапанов: 0.15 мм (на холодную).',
                images: [],
                video: 'https://www.youtube.com/embed/dQw4w9WgXcQ',
                videoTitle: 'Видео: Регулировка клапанов ВАЗ 2107',
            },
        };

        services.forEach(s => {
            if (!instructions[s.id]) {
                instructions[s.id] = {
                    title: s.name + ' (ВАЗ 2107)',
                    tools: ['Стандартный набор ключей', 'Отвёртки', 'Ветошь'],
                    steps: [
                        'Подготовьте автомобиль и инструменты.',
                        'Выполните демонтаж необходимых узлов.',
                        'Проведите требуемые работы.',
                        'Соберите всё в обратной последовательности.',
                        'Проверьте работоспособность.',
                    ],
                    warning: 'При отсутствии опыта обратитесь в автосервис.',
                    images: [],
                    video: 'https://www.youtube.com/embed/dQw4w9WgXcQ',
                    videoTitle: 'Видео по ремонту ВАЗ 2107',
                };
            }
        });

        let selectedIds = new Set();
        let currentFilter = 'all';
        let searchQuery = '';

        function getPrice(s) {
            return Math.round(s.price * carMultiplier);
        }

        function formatPrice(p) { return p.toLocaleString('ru-RU') + ' ₽'; }

        function renderServices() {
            const container = document.getElementById('servicesList');
            container.innerHTML = '';
            let list = services;
            if (currentFilter !== 'all') list = list.filter(s => s.cat === currentFilter);
            if (searchQuery.trim()) {
                const q = searchQuery.toLowerCase().trim();
                list = list.filter(s => s.name.toLowerCase().includes(q));
            }
            const grouped = {};
            list.forEach(s => {
                if (!grouped[s.cat]) grouped[s.cat] = { catName: s.catName, items: [] };
                grouped[s.cat].items.push(s);
            });
            Object.keys(grouped).forEach(key => {
                const g = grouped[key];
                const title = document.createElement('div');
                title.className = 'category-title';
                title.textContent = g.catName;
                container.appendChild(title);
                g.items.forEach(s => {
                    const price = getPrice(s);
                    const row = document.createElement('div');
                    row.className = 'service-row';
                    if (selectedIds.has(s.id)) row.classList.add('selected');
                    let note = '';
                    if (price !== s.price) note =
                        `<span class="price-note" style="font-size:10px;color:#888;">(${price > s.price ? '+' : ''}${price - s.price} ₽)</span>`;
                    row.innerHTML = `
                    <div class="service-left">
                        <div class="check-box">${selectedIds.has(s.id) ? '✓' : ''}</div>
                        <span class="service-name">${s.name}</span>
                    </div>
                    <div class="service-right">
                        <span class="service-price">${formatPrice(price)} ${note}</span>
                        <button class="detail-btn">📋 Подробнее</button>
                    </div>`;
                    row.querySelector('.service-left').addEventListener('click', () => {
                        if (selectedIds.has(s.id)) selectedIds.delete(s.id);
                        else selectedIds.add(s.id);
                        renderServices();
                    });
                    row.querySelector('.detail-btn').addEventListener('click', (e) => {
                        e.stopPropagation();
                        openModal(s.id);
                    });
                    container.appendChild(row);
                });
            });
            if (!list.length) container.innerHTML =
                '<div style="text-align:center;padding:30px;color:#777;">Ничего не найдено</div>';
            updateTotal();
        }

        function updateTotal() {
            let total = 0;
            selectedIds.forEach(id => {
                const s = services.find(x => x.id === id);
                if (s) total += getPrice(s);
            });
            document.getElementById('totalPrice').textContent = formatPrice(total);
            document.getElementById('totalCount').textContent = selectedIds.size + ' шт.';
        }

        function openModal(serviceId) {
            const instr = instructions[serviceId];
            document.getElementById('modalTitle').textContent = '📋 ' + instr.title;
            let html = '<h3>🔧 Инструменты</h3><div class="modal-tools">';
            instr.tools.forEach(t => html += `<span class="tool-tag">${t}</span>`);
            html += '</div>';
            html += '<h3>📝 Пошаговая инструкция</h3><ol>';
            instr.steps.forEach(s => html += `<li>${s}</li>`);
            html += '</ol>';
            if (instr.warning) html +=
                '<h3>⚠️ Предупреждение</h3><div class="modal-warning">' + instr.warning + '</div>';
            if (instr.images && instr.images.length > 0) {
                html += '<h3>🖼️ Фотографии процесса</h3><div class="modal-images">';
                instr.images.forEach(img => {
                    html +=
                        `<div><img src="${img.url}" alt="${img.desc}" title="${img.desc}" loading="lazy"><p style="font-size:11px;color:#999;text-align:center;margin-top:4px;">${img.desc}</p></div>`;
                });
                html += '</div>';
            }
            if (instr.video) {
                html += '<h3>🎬 Видео</h3><p style="color:#ccc;font-size:13px;">' + instr.videoTitle + '</p>';
                html += '<div class="modal-video-wrapper"><iframe src="' + instr.video +
                    '" frameborder="0" allowfullscreen></iframe></div>';
            }
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('modalOverlay').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.add('hidden');
            document.body.style.overflow = '';
        }
        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });
        document.getElementById('clearBtn').addEventListener('click', () => { selectedIds.clear();
            renderServices(); });
        document.getElementById('searchInput').addEventListener('input', e => { searchQuery = e.target.value;
            renderServices(); });
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentFilter = btn.dataset.filter;
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderServices();
            });
        });
        renderServices();
        console.log('✅ Готово! Инструкция с картинками из статьи загружена.');
    </script>
</body>
</html>
