<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎁 CS2 CASE OPENER | Открытие кейсов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0e1a, #0f1219);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ШАПКА */
        .header {
            background: linear-gradient(135deg, #1a1f2a, #0f1219);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border-bottom: 3px solid #ffd700;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .balance-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .balance-card {
            background: linear-gradient(135deg, #2a2f3a, #1a1f2a);
            padding: 20px 35px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #ffd700;
        }

        .balance-amount {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffd700;
        }

        .balance-label {
            font-size: 0.9rem;
            color: #aaa;
        }

        .stats {
            display: flex;
            gap: 20px;
        }

        .stat {
            background: rgba(255,255,255,0.05);
            padding: 15px 25px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #aaa;
        }

        /* КЕЙСЫ */
        .cases-section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 1.8rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cases-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .case-card {
            background: linear-gradient(135deg, #1f242f, #151a24);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255,215,0,0.2);
            position: relative;
            overflow: hidden;
        }

        .case-card:hover {
            transform: translateY(-5px);
            border-color: #ffd700;
            box-shadow: 0 10px 30px rgba(255,215,0,0.2);
        }

        .case-image {
            font-size: 5rem;
            margin-bottom: 15px;
        }

        .case-name {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .case-price {
            font-size: 1.3rem;
            color: #ffd700;
            margin: 15px 0;
        }

        .case-price span {
            font-size: 0.9rem;
            color: #aaa;
        }

        .case-items {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 15px;
        }

        .open-btn {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #1a1f2a;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }

        .open-btn:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        .open-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* АНИМАЦИЯ ОТКРЫТИЯ С ПОЛОСКОЙ ПОСЕРЕДИНЕ */
        .opening-animation {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .opening-animation.hidden {
            display: none;
        }

        .roulette-container {
            width: 90%;
            max-width: 1000px;
            background: linear-gradient(135deg, #1a1f2a, #0f1219);
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            border: 3px solid #ffd700;
            position: relative;
        }

        .roulette-title {
            color: #ffd700;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .roulette-wrapper {
            position: relative;
            overflow: hidden;
            margin: 20px 0;
            border-radius: 20px;
            background: #0a0e1a;
            padding: 20px 0;
        }

        .roulette-track {
            display: flex;
            gap: 10px;
            will-change: transform;
        }

        .roulette-item {
            min-width: 140px;
            padding: 20px 15px;
            text-align: center;
            background: linear-gradient(135deg, #2a2f3a, #1a1f2a);
            border-radius: 15px;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .roulette-item.active {
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
            transform: scale(1.02);
        }

        .roulette-item-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .roulette-item-name {
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .roulette-item-price {
            font-size: 0.8rem;
            color: #ffd700;
        }

        /* ПОЛОСКА ПОСЕРЕДИНЕ */
        .center-indicator {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, #ffd700, #ffaa00, #ffd700);
            z-index: 10;
            box-shadow: 0 0 15px rgba(255,215,0,0.8);
            pointer-events: none;
        }

        .center-indicator::before,
        .center-indicator::after {
            content: "▼";
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 20px;
            text-shadow: 0 0 5px rgba(255,215,0,0.5);
        }

        .center-indicator::before {
            top: -20px;
        }

        .center-indicator::after {
            bottom: -20px;
            transform: translateX(-50%) rotate(180deg);
        }

        /* КНОПКИ УПРАВЛЕНИЯ */
        .roulette-controls {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .spin-btn {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #1a1f2a;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .spin-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .skip-btn {
            background: linear-gradient(135deg, #4caf50, #45a049);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .skip-btn:hover {
            transform: scale(1.05);
        }

        .result-popup {
            margin-top: 20px;
            padding: 20px;
            background: rgba(76,175,80,0.2);
            border-radius: 15px;
            border: 2px solid #4caf50;
            animation: bounce 0.5s;
        }

        @keyframes bounce {
            0% { transform: scale(0.8); opacity: 0; }
            80% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ИНВЕНТАРЬ */
        .inventory-section {
            background: linear-gradient(135deg, #1a1f2a, #0f1219);
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            border-top: 3px solid #ffd700;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }

        .inventory-item {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid rgba(255,215,0,0.2);
            position: relative;
        }

        .inventory-item:hover {
            transform: translateY(-3px);
            border-color: #ffd700;
        }

        .inventory-item-icon {
            font-size: 2.5rem;
        }

        .inventory-item-name {
            font-size: 0.8rem;
            margin-top: 8px;
        }

        .inventory-item-price {
            font-size: 0.7rem;
            color: #ffd700;
            margin-top: 5px;
        }

        .sell-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 0.7rem;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
        }

        .sell-btn:hover {
            background: #45a049;
        }

        .reset-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #ff4444;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            z-index: 100;
            transition: all 0.3s;
        }

        .reset-btn:hover {
            background: #ff6666;
            transform: scale(1.05);
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 2000;
            animation: slideIn 0.3s;
            display: none;
        }

        .notification.show {
            display: block;
        }

        .notification.error {
            background: #ff4444;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .rarity-common { color: #808080; }
        .rarity-rare { color: #4169e1; }
        .rarity-epic { color: #9400d3; }
        .rarity-legendary { color: #ff8c00; }
        .rarity-mythical { color: #ff00ff; }
        .rarity-divine { color: #00ffff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="balance-info">
                <div class="balance-card">
                    <div class="balance-amount" id="balance">0</div>
                    <div class="balance-label">💰 Монеты</div>
                </div>
                <div class="stats">
                    <div class="stat">
                        <div class="stat-value" id="casesOpened">0</div>
                        <div class="stat-label">Открыто кейсов</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="itemsValue">0</div>
                        <div class="stat-label">💰 Стоимость инвентаря</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="cases-section">
            <h2 class="section-title">Доступные кейсы</h2>
            <div class="cases-grid" id="casesList"></div>
        </div>

        <div class="inventory-section">
            <h2 class="section-title">📦 Мой инвентарь</h2>
            <div class="inventory-grid" id="inventoryList"></div>
        </div>
    </div>

    <button class="reset-btn" onclick="resetGame()">🔄 СБРОС ИГРЫ</button>
    <div class="notification" id="notification"></div>

    <script>
        // ===== ДАННЫЕ КЕЙСОВ И ПРЕДМЕТОВ =====
        const cases = [
            {
                id: 'case_1',
                name: '⚡ ОБЫЧНЫЙ КЕЙС',
                icon: '📦',
                price: 100,
                items: [
                    { name: 'P250 | Sand Dune', icon: '🔫', price: 5, rarity: 'common' },
                    { name: 'MAC-10 | Palm', icon: '🔫', price: 8, rarity: 'common' },
                    { name: 'Five-SeveN | Forest', icon: '🔫', price: 12, rarity: 'common' },
                    { name: 'M4A4 | Urban DDPAT', icon: '🔫', price: 25, rarity: 'rare' },
                    { name: 'AK-47 | Blue Laminate', icon: '🔫', price: 40, rarity: 'rare' },
                    { name: 'AWP | Worm God', icon: '🔫', price: 60, rarity: 'epic' },
                    { name: '★ Knife | Forest', icon: '🔪', price: 500, rarity: 'legendary' }
                ]
            },
            {
                id: 'case_2',
                name: '💎 ПРЕМИУМ КЕЙС',
                icon: '💎',
                price: 500,
                items: [
                    { name: 'USP-S | Guardian', icon: '🔫', price: 30, rarity: 'rare' },
                    { name: 'Desert Eagle | Crimson Web', icon: '🔫', price: 50, rarity: 'rare' },
                    { name: 'M4A1-S | Cyrex', icon: '🔫', price: 80, rarity: 'epic' },
                    { name: 'AK-47 | Redline', icon: '🔫', price: 120, rarity: 'epic' },
                    { name: 'AWP | Asiimov', icon: '🔫', price: 250, rarity: 'legendary' },
                    { name: '★ Knife | Crimson Web', icon: '🔪', price: 1500, rarity: 'mythical' },
                    { name: '★ Butterfly Knife | Fade', icon: '🦋', price: 5000, rarity: 'divine' }
                ]
            },
            {
                id: 'case_3',
                name: '👑 ЛЕГЕНДАРНЫЙ КЕЙС',
                icon: '👑',
                price: 2500,
                items: [
                    { name: 'AWP | Dragon Lore', icon: '🐉', price: 5000, rarity: 'legendary' },
                    { name: 'AK-47 | Fire Serpent', icon: '🔥', price: 3000, rarity: 'legendary' },
                    { name: 'M4A4 | Howl', icon: '🐺', price: 4000, rarity: 'legendary' },
                    { name: '★ Karambit | Fade', icon: '🔪', price: 15000, rarity: 'mythical' },
                    { name: '★ M9 Bayonet | Marble Fade', icon: '🔪', price: 20000, rarity: 'mythical' },
                    { name: '★ Butterfly Knife | Doppler', icon: '🦋', price: 35000, rarity: 'divine' },
                    { name: '★ Karambit | Ruby', icon: '💎', price: 100000, rarity: 'divine' }
                ]
            }
        ];

        let player = {
            balance: 1000,
            casesOpened: 0,
            inventory: []
        };

        let currentCase = null;
        let animationTimeout = null;

        const balanceEl = document.getElementById('balance');
        const casesOpenedEl = document.getElementById('casesOpened');
        const itemsValueEl = document.getElementById('itemsValue');
        const casesList = document.getElementById('casesList');
        const inventoryList = document.getElementById('inventoryList');

        function loadGame() {
            const saved = localStorage.getItem('cs2_opener');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    player = { ...player, ...data };
                } catch(e) {}
            }
            updateUI();
            renderCases();
            renderInventory();
        }

        function saveGame() {
            localStorage.setItem('cs2_opener', JSON.stringify({
                balance: player.balance,
                casesOpened: player.casesOpened,
                inventory: player.inventory
            }));
        }

        function updateUI() {
            balanceEl.textContent = player.balance.toLocaleString();
            casesOpenedEl.textContent = player.casesOpened;
            const totalValue = player.inventory.reduce((sum, item) => sum + item.price, 0);
            itemsValueEl.textContent = totalValue.toLocaleString();
        }

        function renderCases() {
            casesList.innerHTML = cases.map(caseItem => `
                <div class="case-card">
                    <div class="case-image">${caseItem.icon}</div>
                    <div class="case-name">${caseItem.name}</div>
                    <div class="case-price">${caseItem.price} <span>монет</span></div>
                    <div class="case-items">${caseItem.items.length} предметов</div>
                    <button class="open-btn" onclick="openCase('${caseItem.id}')" 
                        ${player.balance < caseItem.price ? 'disabled' : ''}>
                        🎁 ОТКРЫТЬ
                    </button>
                </div>
            `).join('');
        }

        function renderInventory() {
            if (player.inventory.length === 0) {
                inventoryList.innerHTML = '<div style="text-align:center; color:#aaa; grid-column:1/-1;">Инвентарь пуст. Откройте кейс!</div>';
                return;
            }
            
            const grouped = {};
            player.inventory.forEach(item => {
                const key = `${item.name}|${item.icon}`;
                if (!grouped[key]) {
                    grouped[key] = { ...item, count: 0 };
                }
                grouped[key].count++;
            });
            
            inventoryList.innerHTML = Object.values(grouped).map(item => `
                <div class="inventory-item">
                    <div class="inventory-item-icon">${item.icon}</div>
                    <div class="inventory-item-name">${item.name}</div>
                    <div class="inventory-item-price">${item.price}💰</div>
                    <div class="inventory-item-price">x${item.count}</div>
                    <button class="sell-btn" onclick="sellItem('${item.name}', '${item.icon}')">💸 ПРОДАТЬ ВСЕ</button>
                </div>
            `).join('');
        }

        function openCase(caseId) {
            const caseItem = cases.find(c => c.id === caseId);
            if (!caseItem) return;
            
            if (player.balance < caseItem.price) {
                showNotification('❌ Недостаточно монет!', 'error');
                return;
            }
            
            currentCase = caseItem;
            showRouletteAnimation(caseItem);
        }

        function showRouletteAnimation(caseItem) {
            // Создаём модальное окно
            const modal = document.createElement('div');
            modal.className = 'opening-animation';
            
            // Удваиваем предметы для бесконечной прокрутки
            const itemsList = [...caseItem.items, ...caseItem.items, ...caseItem.items];
            
            modal.innerHTML = `
                <div class="roulette-container">
                    <div class="roulette-title">🎲 ОТКРЫТИЕ КЕЙСА: ${caseItem.name}</div>
                    <div class="roulette-wrapper">
                        <div class="center-indicator"></div>
                        <div class="roulette-track" id="rouletteTrack">
                            ${itemsList.map(item => `
                                <div class="roulette-item" data-name="${item.name}">
                                    <div class="roulette-item-icon">${item.icon}</div>
                                    <div class="roulette-item-name">${item.name}</div>
                                    <div class="roulette-item-price">${item.price}💰</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="roulette-controls">
                        <button class="spin-btn" id="spinBtn">🎰 КРУТИТЬ</button>
                        <button class="skip-btn" id="skipBtn" style="display: none;">⚡ ПРОПУСТИТЬ</button>
                    </div>
                    <div id="resultContainer" style="display: none;"></div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            const track = modal.querySelector('#rouletteTrack');
            const spinBtn = modal.querySelector('#spinBtn');
            const skipBtn = modal.querySelector('#skipBtn');
            const resultContainer = modal.querySelector('#resultContainer');
            
            let spinning = false;
            let animationId = null;
            let startTime = null;
            let duration = 3000;
            let startPosition = 0;
            let targetIndex = null;
            
            // Функция для определения предмета по центру
            function getCenterItem() {
                const container = modal.querySelector('.roulette-wrapper');
                const containerRect = container.getBoundingClientRect();
                const centerX = containerRect.left + containerRect.width / 2;
                
                const items = modal.querySelectorAll('.roulette-item');
                for (let item of items) {
                    const rect = item.getBoundingClientRect();
                    if (centerX >= rect.left && centerX <= rect.right) {
                        return item;
                    }
                }
                return null;
            }
            
            // Функция для подсветки центрального предмета
            function highlightCenterItem() {
                const centerItem = getCenterItem();
                const allItems = modal.querySelectorAll('.roulette-item');
                allItems.forEach(item => item.classList.remove('active'));
                if (centerItem) {
                    centerItem.classList.add('active');
                }
            }
            
            // Анимация прокрутки
            function animateSpin(timestamp) {
                if (!startTime) startTime = timestamp;
                const elapsed = timestamp - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                // Easing функция для плавной остановки
                const easeOut = (t) => 1 - Math.pow(1 - t, 3);
                const easedProgress = easeOut(progress);
                
                // Расчёт позиции
                const totalDistance = 8000; // Общее расстояние прокрутки
                const currentPos = startPosition - (totalDistance * easedProgress);
                track.style.transform = `translateX(${currentPos}px)`;
                
                // Подсветка центрального предмета
                highlightCenterItem();
                
                if (progress < 1) {
                    animationId = requestAnimationFrame(animateSpin);
                } else {
                    // Анимация завершена
                    spinning = false;
                    cancelAnimationFrame(animationId);
                    
                    // Получаем выигрышный предмет
                    const centerItem = getCenterItem();
                    if (centerItem) {
                        const itemName = centerItem.dataset.name;
                        const wonItem = caseItem.items.find(i => i.name === itemName);
                        
                        if (wonItem) {
                            finishOpening(wonItem, modal, resultContainer);
                        }
                    }
                }
            }
            
            function startSpin() {
                if (spinning) return;
                
                spinning = true;
                startTime = null;
                
                // Случайный выбор предмета
                const randomIndex = Math.floor(Math.random() * caseItem.items.length);
                const targetItem = caseItem.items[randomIndex];
                targetIndex = randomIndex;
                
                // Находим позицию нужного предмета в списке
                const items = modal.querySelectorAll('.roulette-item');
                let targetElement = null;
                for (let i = 0; i < items.length; i++) {
                    if (items[i].dataset.name === targetItem.name) {
                        targetElement = items[i];
                        break;
                    }
                }
                
                if (targetElement) {
                    const container = modal.querySelector('.roulette-wrapper');
                    const containerRect = container.getBoundingClientRect();
                    const targetRect = targetElement.getBoundingClientRect();
                    const centerX = containerRect.left + containerRect.width / 2;
                    const currentCenterX = targetRect.left + targetRect.width / 2;
                    const offset = currentCenterX - centerX;
                    
                    // Устанавливаем начальную позицию
                    const currentTransform = track.style.transform;
                    const match = currentTransform.match(/translateX\(([-\d.]+)px\)/);
                    const currentX = match ? parseFloat(match[1]) : 0;
                    startPosition = currentX + offset;
                    
                    // Сбрасываем transform и запускаем анимацию
                    track.style.transform = `translateX(${startPosition}px)`;
                    startTime = null;
                    animationId = requestAnimationFrame(animateSpin);
                }
                
                // Показываем кнопку пропуска
                spinBtn.disabled = true;
                skipBtn.style.display = 'inline-block';
            }
            
            function skipAnimation() {
                if (!spinning) return;
                
                // Принудительное завершение анимации
                cancelAnimationFrame(animationId);
                spinning = false;
                
                // Получаем текущий центральный предмет
                const centerItem = getCenterItem();
                if (centerItem) {
                    const itemName = centerItem.dataset.name;
                    const wonItem = caseItem.items.find(i => i.name === itemName);
                    if (wonItem) {
                        finishOpening(wonItem, modal, resultContainer);
                    }
                }
            }
            
            spinBtn.onclick = startSpin;
            skipBtn.onclick = skipAnimation;
            
            // Инициализация позиции
            track.style.transform = 'translateX(0px)';
            highlightCenterItem();
            
            // Добавляем обработчик для обновления подсветки при скролле
            const wrapper = modal.querySelector('.roulette-wrapper');
            wrapper.addEventListener('scroll', highlightCenterItem);
        }
        
        function finishOpening(wonItem, modal, resultContainer) {
            // Списываем монеты
            player.balance -= currentCase.price;
            player.casesOpened++;
            
            // Добавляем предмет в инвентарь
            player.inventory.push({ ...wonItem, wonAt: Date.now() });
            
            saveGame();
            updateUI();
            renderInventory();
            renderCases();
            
            // Показываем результат
            const rarityColors = {
                common: '#808080',
                rare: '#4169e1',
                epic: '#9400d3',
                legendary: '#ff8c00',
                mythical: '#ff00ff',
                divine: '#00ffff'
            };
            
            resultContainer.innerHTML = `
                <div class="result-popup" style="animation: bounce 0.5s;">
                    <div style="font-size: 4rem;">${wonItem.icon}</div>
                    <div style="font-size: 1.8rem; margin: 10px 0;">🎉 ВЫ ВЫИГРАЛИ!</div>
                    <div style="font-size: 1.3rem; font-weight: bold; color: ${rarityColors[wonItem.rarity]}">${wonItem.name}</div>
                    <div style="color: #ffd700; margin-top: 5px;">💰 Стоимость: ${wonItem.price} монет</div>
                    <div style="color: #aaa; margin-top: 5px;">⭐ Редкость: ${wonItem.rarity.toUpperCase()}</div>
                    <button class="spin-btn" onclick="this.closest('.opening-animation').remove()" style="margin-top: 20px;">✨ ЗАБРАТЬ</button>
                </div>
            `;
            resultContainer.style.display = 'block';
            
            // Скрываем кнопки
            const controls = modal.querySelector('.roulette-controls');
            if (controls) controls.style.display = 'none';
            
            // Автоматическое закрытие через 3 секунды
            setTimeout(() => {
                modal.remove();
            }, 4000);
        }
        
        function sellItem(itemName, itemIcon) {
            const itemsToSell = player.inventory.filter(item => item.name === itemName && item.icon === itemIcon);
            
            if (itemsToSell.length === 0) {
                showNotification('❌ Предмет не найден!', 'error');
                return;
            }
            
            const totalPrice = itemsToSell.reduce((sum, item) => sum + item.price, 0);
            
            if (confirm(`Продать ${itemsToSell.length} шт. "${itemName}" за ${totalPrice} монет?`)) {
                player.inventory = player.inventory.filter(item => !(item.name === itemName && item.icon === itemIcon));
                player.balance += totalPrice;
                
                saveGame();
                updateUI();
                renderInventory();
                
                showNotification(`✅ Продано! +${totalPrice} монет`);
            }
        }
        
        function resetGame() {
            if (confirm('⚠️ ВНИМАНИЕ! Весь прогресс будет удален. Продолжить?')) {
                player = {
                    balance: 1000,
                    casesOpened: 0,
                    inventory: []
                };
                saveGame();
                updateUI();
                renderInventory();
                renderCases();
                showNotification('🔄 Игра сброшена!');
            }
        }
        
        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type === 'error' ? 'error' : ''} show`;
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }
        
        loadGame();
    </script>
</body>
</html>
