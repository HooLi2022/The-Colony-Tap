<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <title>VAG Подборщик — двигатели и КПП</title>
    <style>
        /* ========== БАЗОВЫЕ СТИЛИ ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --bg-input: #0f172a;
            --bg-hover: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #334155;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --success: #22c55e;
            --radius: 16px;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 32px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            margin: 20px auto;
        }

        /* ========== ШАПКА ========== */
        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .header-icon {
            font-size: 32px;
            background: var(--accent);
            padding: 10px;
            border-radius: 12px;
            line-height: 1;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .version {
            font-size: 12px;
            background: var(--border-color);
            padding: 2px 12px;
            border-radius: 20px;
            color: var(--text-secondary);
            -webkit-text-fill-color: var(--text-secondary);
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 28px;
            padding-left: 4px;
        }

        /* ========== КАРТОЧКИ БЛОКОВ ========== */
        .block {
            margin-bottom: 24px;
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 18px 20px;
            border: 1px solid var(--border-color);
            transition: border-color 0.2s;
        }

        .block:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .block label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .block label .label-icon {
            font-size: 18px;
        }

        .block label .badge-count {
            background: var(--border-color);
            padding: 0 10px;
            border-radius: 20px;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 400;
            margin-left: auto;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 16px;
            color: var(--text-primary);
            transition: 0.2s;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ========== ВЫПАДАЮЩИЙ СПИСОК ========== */
        .options-list {
            margin-top: 8px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }

        .options-list.active {
            display: block;
        }

        .options-list .item {
            padding: 10px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            transition: 0.15s;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .options-list .item:last-child {
            border-bottom: none;
        }

        .options-list .item:hover {
            background: var(--bg-hover);
            color: var(--accent);
        }

        .options-list .item .highlight {
            background: rgba(59, 130, 246, 0.3);
            padding: 0 4px;
            border-radius: 4px;
            font-weight: 700;
        }

        .options-list .item .meta {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--border-color);
            padding: 2px 10px;
            border-radius: 20px;
            flex-shrink: 0;
            margin-left: 12px;
        }

        .options-list .empty-state {
            padding: 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }

        /* ========== ТЕГИ ВЫБРАННОГО ========== */
        .selected-tag {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--accent);
            color: white;
            padding: 6px 16px 6px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            margin-top: 8px;
        }

        .selected-tag .clear {
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            opacity: 0.7;
            transition: 0.2s;
        }

        .selected-tag .clear:hover {
            opacity: 1;
            transform: scale(1.2);
        }

        /* ========== РЕЗУЛЬТАТ ========== */
        .result-block {
            margin-top: 28px;
            padding: 20px 24px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(167, 139, 250, 0.1));
            border-radius: 12px;
            border: 1px solid var(--accent);
            display: none;
        }

        .result-block.active {
            display: block;
        }

        .result-block .label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .result-block .value {
            margin-top: 8px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-item .key {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .result-item .val {
            font-weight: 600;
            font-size: 15px;
            text-align: right;
        }

        .result-item .val .code {
            font-weight: 400;
            font-size: 12px;
            color: var(--text-muted);
            margin-left: 8px;
        }

        .result-status {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
            color: var(--success);
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ========== КНОПКИ ========== */
        .actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 28px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-reset {
            background: var(--border-color);
            color: var(--text-secondary);
        }

        .btn-reset:hover {
            background: #475569;
            color: var(--text-primary);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 8px 25px var(--accent-glow);
        }

        /* ========== СКРОЛЛ ========== */
        .options-list::-webkit-scrollbar {
            width: 6px;
        }

        .options-list::-webkit-scrollbar-track {
            background: var(--bg-primary);
            border-radius: 10px;
        }

        .options-list::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        .options-list::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* ========== АДАПТИВ ========== */
        @media (max-width: 600px) {
            .container {
                padding: 16px;
            }

            .header h1 {
                font-size: 20px;
            }

            .header-icon {
                font-size: 24px;
                padding: 8px;
            }

            .block {
                padding: 14px 16px;
            }

            .search-input {
                font-size: 15px;
                padding: 10px 14px;
            }

            .result-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 2px;
            }

            .result-item .val {
                text-align: left;
            }

            .actions {
                flex-direction: column;
            }

            .btn {
                justify-content: center;
            }
        }

        @media (max-width: 400px) {
            .container {
                padding: 12px;
            }

            .header h1 {
                font-size: 17px;
            }

            .selected-tag {
                font-size: 12px;
                padding: 4px 12px 4px 16px;
            }
        }
    </style>
</head>

</div>

    // ================================================================
    //  КЛАСС ПРИЛОЖЕНИЯ
    // ================================================================

    class VAGPicker {
        constructor() {
            this.state = {
                brand: null,
                model: null,
                engine: null,
                gear: null
            };

            // DOM
            this.brandInput = document.getElementById('brandInput');
            this.modelInput = document.getElementById('modelInput');
            this.engineInput = document.getElementById('engineInput');
            this.gearInput = document.getElementById('gearInput');

            this.brandOptions = document.getElementById('brandOptions');
            this.modelOptions = document.getElementById('modelOptions');
            this.engineOptions = document.getElementById('engineOptions');
            this.gearOptions = document.getElementById('gearOptions');

            this.brandSelected = document.getElementById('brandSelected');
            this.modelSelected = document.getElementById('modelSelected');
            this.engineSelected = document.getElementById('engineSelected');
            this.gearSelected = document.getElementById('gearSelected');

            this.brandCount = document.getElementById('brandCount');
            this.modelCount = document.getElementById('modelCount');
            this.engineCount = document.getElementById('engineCount');
            this.gearCount = document.getElementById('gearCount');

            this.resultBlock = document.getElementById('resultBlock');
            this.resultText = document.getElementById('resultText');

            // Events
            this.brandInput.addEventListener('input', () => this.updateBrandList());
            this.modelInput.addEventListener('input', () => this.updateModelList());
            this.engineInput.addEventListener('input', () => this.updateEngineList());
            this.gearInput.addEventListener('input', () => this.updateGearList());

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.block')) {
                    this.brandOptions.classList.remove('active');
                    this.modelOptions.classList.remove('active');
                    this.engineOptions.classList.remove('active');
                    this.gearOptions.classList.remove('active');
                }
            });

            document.getElementById('resetBtn').addEventListener('click', () => this.resetAll());
            document.getElementById('shareBtn').addEventListener('click', () => this.showResult());

            // Старт
            this.updateAll();
        }

        // ----- ГЕТТЕРЫ ДАННЫХ -----

        getBrands() { return DATA.brands; }
        getModels() {
            const { brand } = this.state;
            if (!brand) return DATA.models;
            return DATA.models.filter(m => m.brand === brand);
        }
        getEngines() {
            const { model } = this.state;
            if (!model) return DATA.engines;
            return DATA.engines.filter(e => e.models.includes(model));
        }
        getGearboxes() {
            const { model, engine } = this.state;
            let list = DATA.gearboxes;
            if (model) list = list.filter(g => g.models.includes(model));
            if (engine) list = list.filter(g => g.engines.includes(engine));
            return list;
        }

        // ----- ОБНОВЛЕНИЕ СПИСКОВ -----

        updateBrandList() {
            const q = this.brandInput.value.trim().toLowerCase();
            const items = this.getBrands().filter(b => b.name.toLowerCase().includes(q));
            this.renderOptions(this.brandOptions, items, q, 'name', (item) => this.selectBrand(item.id));
            this.brandCount.textContent = items.length;
        }

        updateModelList() {
            if (!this.state.brand) {
                this.modelOptions.classList.remove('active');
                this.modelCount.textContent = '0';
                return;
            }
            const q = this.modelInput.value.trim().toLowerCase();
            const items = this.getModels().filter(m => m.name.toLowerCase().includes(q));
            this.renderOptions(this.modelOptions, items, q, 'name', (item) => this.selectModel(item.id));
            this.modelCount.textContent = items.length;
        }

        updateEngineList() {
            if (!this.state.model) {
                this.engineOptions.classList.remove('active');
                this.engineCount.textContent = '0';
                return;
            }
            const q = this.engineInput.value.trim().toLowerCase();
            const items = this.getEngines().filter(e => e.name.toLowerCase().includes(q));
            this.renderOptions(this.engineOptions, items, q, 'name', (item) => this.selectEngine(item.id), true);
            this.engineCount.textContent = items.length;
        }

        updateGearList() {
            if (!this.state.model || !this.state.engine) {
                this.gearOptions.classList.remove('active');
                this.gearCount.textContent = '0';
                return;
            }
            const q = this.gearInput.value.trim().toLowerCase();
            const items = this.getGearboxes().filter(g => g.name.toLowerCase().includes(q));
            this.renderOptions(this.gearOptions, items, q, 'name', (item) => this.selectGear(item.id), true);
            this.gearCount.textContent = items.length;
        }

        // ----- ОТРИСОВКА ОПЦИЙ -----

        renderOptions(container, items, query, labelKey, onClick, showMeta = false) {
            container.innerHTML = '';
            if (items.length === 0) {
                container.innerHTML = `<div class="empty-state">🔍 Ничего не найдено</div>`;
                container.classList.add('active');
                return;
            }

            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';

                const name = item[labelKey] || item.name;
                const lower = name.toLowerCase();
                const idx = lower.indexOf(query);
                if (idx !== -1 && query.length > 0) {
                    const before = name.slice(0, idx);
                    const match = name.slice(idx, idx + query.length);
                    const after = name.slice(idx + query.length);
                    div.innerHTML = `<span>${before}<span class="highlight">${match}</span>${after}</span>`;
                } else {
                    div.innerHTML = `<span>${name}</span>`;
                }

                if (showMeta && item.codes && item.codes !== '—') {
                    const meta = document.createElement('span');
                    meta.className = 'meta';
                    meta.textContent = item.codes;
                    div.appendChild(meta);
                }

                div.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    onClick(item);
                });
                container.appendChild(div);
            });
            container.classList.add('active');
        }

        // ----- ВЫБОР -----

        selectBrand(id) {
            const brand = DATA.brands.find(b => b.id === id);
            if (!brand) return;
            this.state.brand = id;
            this.brandInput.value = brand.name;
            this.brandOptions.classList.remove('active');
            this.renderTag(this.brandSelected, brand.name, () => this.selectBrand(null));

            // Сброс зависимых
            this.state.model = null;
            this.state.engine = null;
            this.state.gear = null;
            this.modelInput.value = '';
            this.engineInput.value = '';
            this.gearInput.value = '';
            this.modelSelected.innerHTML = '';
            this.engineSelected.innerHTML = '';
            this.gearSelected.innerHTML = '';

            this.modelInput.disabled = false;
            this.modelInput.placeholder = 'Начните вводить модель...';
            this.engineInput.disabled = true;
            this.engineInput.placeholder = 'Сначала выберите модель';
            this.gearInput.disabled = true;
            this.gearInput.placeholder = 'Сначала выберите двигатель';

            this.updateAll();
        }

        selectModel(id) {
            if (!this.state.brand) { alert('Сначала выберите марку!'); return; }
            const model = DATA.models.find(m => m.id === id);
            if (!model) return;
            this.state.model = id;
            this.modelInput.value = model.name;
            this.modelOptions.classList.remove('active');
            this.renderTag(this.modelSelected, model.name, () => this.selectModel(null));

            this.state.engine = null;
            this.state.gear = null;
            this.engineInput.value = '';
            this.gearInput.value = '';
            this.engineSelected.innerHTML = '';
            this.gearSelected.innerHTML = '';

            this.engineInput.disabled = false;
            this.engineInput.placeholder = 'Начните вводить двигатель...';
            this.gearInput.disabled = true;
            this.gearInput.placeholder = 'Сначала выберите двигатель';

            this.updateAll();
        }

        selectEngine(id) {
            if (!this.state.model) { alert('Сначала выберите модель!'); return; }
            const engine = DATA.engines.find(e => e.id === id);
            if (!engine) return;
            this.state.engine = id;
            this.engineInput.value = engine.name;
            this.engineOptions.classList.remove('active');
            this.renderTag(this.engineSelected, engine.name, () => this.selectEngine(null));

            this.state.gear = null;
            this.gearInput.value = '';
            this.gearSelected.innerHTML = '';

            this.gearInput.disabled = false;
            this.gearInput.placeholder = 'Начните вводить коробку...';

            this.updateAll();
        }

        selectGear(id) {
            if (!this.state.model || !this.state.engine) {
                alert('Сначала выберите модель и двигатель!');
                return;
            }
            const gear = DATA.gearboxes.find(g => g.id === id);
            if (!gear) return;
            this.state.gear = id;
            this.gearInput.value = gear.name;
            this.gearOptions.classList.remove('active');
            this.renderTag(this.gearSelected, gear.name, () => this.selectGear(null));

            this.updateAll();
        }

        // ----- ТЕГ -----

        renderTag(container, text, onClear) {
            container.innerHTML = `
                <div class="selected-tag">
                    ${text}
                    <span class="clear" data-action="clear">✕</span>
                </div>
            `;
            container.querySelector('[data-action="clear"]').addEventListener('click', onClear);
        }

        // ----- ОБНОВЛЕНИЕ ВСЕГО -----

        updateAll() {
            if (this.state.brand) {
                this.updateModelList();
                if (this.state.model) {
                    this.updateEngineList();
                    if (this.state.engine) {
                        this.updateGearList();
                    }
                }
            }
            this.showResult();
        }

        // ----- РЕЗУЛЬТАТ -----

        showResult() {
            const { brand, model, engine, gear } = this.state;

            if (!brand && !model && !engine && !gear) {
                this.resultBlock.classList.remove('active');
                return;
            }

            const brandName = brand ? DATA.brands.find(b => b.id === brand)?.name || '—' : '—';
            const modelName = model ? DATA.models.find(m => m.id === model)?.name || '—' : '—';
            const engineName = engine ? DATA.engines.find(e => e.id === engine)?.name || '—' : '—';
            const engineCodes = engine ? DATA.engines.find(e => e.id === engine)?.codes || '' : '';
            const gearName = gear ? DATA.gearboxes.find(g => g.id === gear)?.name || '—' : '—';
            const gearCodes = gear ? DATA.gearboxes.find(g => g.id === gear)?.codes || '' : '';

            let html = `
                <div class="result-item">
                    <span class="key">🏷️ Марка</span>
                    <span class="val">${brandName}</span>
                </div>
                <div class="result-item">
                    <span class="key">📐 Модель</span>
                    <span class="val">${modelName}</span>
                </div>
                <div class="result-item">
                    <span class="key">⚡ Двигатель</span>
                    <span class="val">${engineName} ${engineCodes ? `<span class="code">[${engineCodes}]</span>` : ''}</span>
                </div>
                <div class="result-item">
                    <span class="key">⚙️ Коробка</span>
                    <span class="val">${gearName} ${gearCodes ? `<span class="code">[${gearCodes}]</span>` : ''}</span>
                </div>
            `;

            if (gear) {
                html += `
                    <div class="result-status">
                        ✅ Полная совместимость: все компоненты подходят друг к другу
                    </div>
                `;
            } else if (engine && !gear) {
                html += `
                    <div class="result-status" style="color: #f59e0b;">
                        ⏳ Выберите коробку передач для завершения подбора
                    </div>
                `;
            }

            this.resultText.innerHTML = html;
            this.resultBlock.classList.add('active');
        }

        // ----- СБРОС -----

        resetAll() {
            this.state = { brand: null, model: null, engine: null, gear: null };
            this.brandInput.value = '';
            this.modelInput.value = '';
            this.engineInput.value = '';
            this.gearInput.value = '';
            this.brandSelected.innerHTML = '';
            this.modelSelected.innerHTML = '';
            this.engineSelected.innerHTML = '';
            this.gearSelected.innerHTML = '';
            this.brandOptions.classList.remove('active');
            this.modelOptions.classList.remove('active');
            this.engineOptions.classList.remove('active');
            this.gearOptions.classList.remove('active');
            this.resultBlock.classList.remove('active');

            this.modelInput.disabled = true;
            this.modelInput.placeholder = 'Сначала выберите марку';
            this.engineInput.disabled = true;
            this.engineInput.placeholder = 'Сначала выберите модель';
            this.gearInput.disabled = true;
            this.gearInput.placeholder = 'Сначала выберите двигатель';

            this.modelCount.textContent = '0';
            this.engineCount.textContent = '0';
            this.gearCount.textContent = '0';
            this.brandCount.textContent = DATA.brands.length;

            this.updateAll();
        }
    }
