<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Tracker - The Colony</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #eee;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        .user-badge {
            background: #0f3460;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: bold;
        }
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover { transform: scale(1.02); opacity: 0.9; }
        button.danger { background: #dc3545; }
        button.secondary { background: #533483; }
        
        .card {
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }
        .form-group { flex: 1; min-width: 100px; }
        .form-group label { font-size: 12px; color: #aaa; display: block; margin-bottom: 5px; }
        input, select {
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #1a1a2e;
            color: white;
            width: 100%;
        }
        
        .stats-grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .stat-card {
            background: #0f3460;
            padding: 20px 30px;
            border-radius: 12px;
            text-align: center;
            min-width: 150px;
        }
        .stat-value { font-size: 32px; font-weight: bold; color: #e94560; }
        .stat-label { font-size: 14px; color: #aaa; margin-top: 8px; }
        .profit { color: #4caf50; }
        .loss { color: #f44336; }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        th { background: #0f3460; color: #e94560; }
        tr:hover { background: rgba(255,255,255,0.05); }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1a1a2e;
            padding: 25px;
            border-radius: 15px;
            min-width: 350px;
            max-width: 90%;
            max-height: 80%;
            overflow: auto;
        }
        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin: 8px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        .admin-section {
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 15px;
            margin-bottom: 15px;
        }
        h3, h4 { margin-bottom: 15px; color: #e94560; }
        .small-text { font-size: 12px; color: #aaa; }
        .quantity-badge {
            background: #e94560;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            margin-left: 8px;
        }
        
        /* Отдельное окно профиля */
        .profile-window {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 1000px;
            max-height: 85vh;
            background: #1a1a2e;
            border-radius: 20px;
            z-index: 2000;
            display: none;
            flex-direction: column;
            border: 1px solid #e94560;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        .profile-header {
            padding: 15px 20px;
            background: #0f3460;
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .profile-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }
        .close-profile { 
            background: #dc3545; 
            padding: 5px 15px; 
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 20px;
        }
        .close-profile:hover { opacity: 0.8; transform: none; }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1999;
            display: none;
            cursor: pointer;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }
        
        @media (max-width: 600px) {
            .stat-card { padding: 12px 20px; min-width: 100px; }
            .stat-value { font-size: 24px; }
            th, td { font-size: 12px; padding: 8px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <span style="color:#aaa;">👤</span>
            <span class="user-badge" id="currentUserName">Не авторизован</span>
        </div>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <select id="currencySelect" onchange="changeCurrency()">
                <option value="RUB">₽ Рубль</option>
                <option value="USD">$ Доллар</option>
                <option value="EUR">€ Евро</option>
            </select>
            <button onclick="showAllUsers()" class="secondary">👥 Все игроки</button>
            <button onclick="openAdminPanel()" class="danger">🔧 Админка</button>
        </div>
    </div>
    <div id="mainContent"><div class="loading">⏳ Загрузка...</div></div>
</div>

<!-- Затемнение и отдельное окно для просмотра профиля -->
<div id="profileOverlay" class="overlay" onclick="closeProfileWindow()"></div>
<div id="profileWindow" class="profile-window">
    <div class="profile-header">
        <h3 id="profileTitle">👤 Профиль игрока</h3>
        <button class="close-profile" onclick="closeProfileWindow()">✖ Закрыть</button>
    </div>
    <div class="profile-body" id="profileBody">Загрузка...</div>
</div>

<div id="usersModal" class="modal">
    <div class="modal-content">
        <h3>👥 Все игроки</h3>
        <div id="usersList"></div>
        <button onclick="closeModal('usersModal')" style="margin-top: 20px;">Закрыть</button>
    </div>
</div>

<div id="adminModal" class="modal">
    <div class="modal-content" style="min-width: 400px;">
        <h3>🔧 Админ-панель</h3>
        <div id="adminPanelContent"></div>
        <button onclick="closeModal('adminModal')" style="margin-top: 20px;">Закрыть</button>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>✏️ Редактировать</h3>
        <div class="form-group"><label>Предмет</label><input type="text" id="editName" style="width:100%"></div>
        <div class="form-group"><label>Количество</label><input type="number" id="editQuantity" step="1" style="width:100%"></div>
        <div class="form-group"><label>Покупка (общая)</label><input type="number" id="editBuy" step="0.01" style="width:100%"></div>
        <div class="form-group"><label>Продажа (общая)</label><input type="number" id="editSell" step="0.01" style="width:100%"></div>
        <button onclick="saveEdit()" class="success" style="margin-top:15px;background:#28a745">Сохранить</button>
        <button onclick="closeModal('editModal')" style="margin-top:15px">Отмена</button>
    </div>
</div>

<script>
    // ========== FIREBASE КОНФИГ ==========
    const firebaseConfig = {
        apiKey: "AIzaSyA_gNkLMsTxneTwyg5bDxKBN9osRIUrPaE",
        authDomain: "the-colony-tap.firebaseapp.com",
        databaseURL: "https://the-colony-tap-default-rtdb.firebaseio.com",
        projectId: "the-colony-tap",
        storageBucket: "the-colony-tap.firebasestorage.app",
        messagingSenderId: "433438733616",
        appId: "1:433438733616:web:76095a36161b32590d44f5"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
    let currentUser = null;
    let editTradeId = null;
    let currentCurrency = 'RUB';
    const symbols = { RUB: '₽', USD: '$', EUR: '€' };
    let myTradesListener = null;
    let currentProfileListener = null;
    let isProfileWindowOpen = false;
    
    // ========== АВТОРИЗАЦИЯ ==========
    function login() {
        let name = prompt("Введите ваш ник:", "Player" + Math.floor(Math.random()*1000));
        if (!name) return;
        name = name.replace(/[^a-zA-Z0-9_]/g, '_');
        if (name.length < 2) name = "User_" + Date.now();
        currentUser = name;
        localStorage.setItem("tradeTrackerUser", currentUser);
        setupRealtimeListener();
        renderMain();
    }
    
    function logout() {
        if (myTradesListener) myTradesListener.off();
        currentUser = null;
        localStorage.removeItem("tradeTrackerUser");
        renderLoginScreen();
    }
    
    function changeCurrency() {
        currentCurrency = document.getElementById("currencySelect").value;
        renderMain();
        // Если окно профиля открыто - обновляем его валюту
        if (isProfileWindowOpen) {
            const profileName = document.getElementById("profileTitle").innerText.replace("👤 Профиль: ", "").replace("👤 Профиль игрока: ", "");
            if (profileName && profileName !== "игрока") {
                refreshProfileWindow(profileName);
            }
        }
    }
    
    async function refreshProfileWindow(username) {
        if (!username) return;
        const snapshot = await db.ref(`users/${username}/trades`).once("value");
        const trades = snapshot.val() || [];
        
        let totalBuySum = 0, totalSellSum = 0, totalProfit = 0;
        trades.forEach(t => {
            totalBuySum += t.buyPrice || 0;
            totalSellSum += t.sellPrice || 0;
            totalProfit += t.profit || 0;
        });
        
        const profileBody = document.getElementById("profileBody");
        profileBody.innerHTML = `
            <div style="display:flex;gap:20px;flex-wrap:wrap;justify-content:center;margin-bottom:20px">
                <div class="stat-card" style="min-width:120px"><div class="stat-value">${totalBuySum.toFixed(2)} ${symbols[currentCurrency]}</div><div class="stat-label">💰 Потрачено</div></div>
                <div class="stat-card" style="min-width:120px"><div class="stat-value">${totalSellSum.toFixed(2)} ${symbols[currentCurrency]}</div><div class="stat-label">💵 Получено</div></div>
                <div class="stat-card" style="min-width:120px"><div class="stat-value ${totalProfit>=0?'profit':'loss'}">${totalProfit>=0?'+':''}${totalProfit.toFixed(2)} ${symbols[currentCurrency]}</div><div class="stat-label">📈 Прибыль</div></div>
            </div>
            <h4>📋 Сделки (${trades.length})</h4>
            ${trades.length === 0 ? '<div style="text-align:center;padding:40px">Нет сделок</div>' : `
            <div style="overflow-x:auto;max-height:350px;overflow-y:auto">
            <table><thead><tr><th>Дата</th><th>Предмет</th><th>Кол-во</th><th>Покупка</th><th>Продажа</th><th>Прибыль</th></tr></thead>
            <tbody>${trades.slice().reverse().map(t => `
                <tr>
                    <td>${t.date || '-'}</td>
                    <td>${t.itemName}${t.quantity>1?`<span class="quantity-badge">x${t.quantity}</span>`:''}</td>
                    <td>${t.quantity||1}</td>
                    <td>${t.buyPrice>0?t.buyPrice.toFixed(2)+' '+symbols[currentCurrency]:'-'}</td>
                    <td>${t.sellPrice>0?t.sellPrice.toFixed(2)+' '+symbols[currentCurrency]:'-'}</td>
                    <td class="${t.profit>=0?'profit':'loss'}">${t.profit>=0?'+':''}${t.profit.toFixed(2)} ${symbols[currentCurrency]}</td>
                </tr>
            `).join('')}</tbody></table></div>`}
        `;
    }
    
    // ========== ОТДЕЛЬНОЕ ОКНО ПРОФИЛЯ ==========
    async function openProfileWindow(username) {
        // Закрываем предыдущее окно если открыто
        if (isProfileWindowOpen) {
            closeProfileWindow();
        }
        
        const overlay = document.getElementById("profileOverlay");
        const window = document.getElementById("profileWindow");
        const profileTitle = document.getElementById("profileTitle");
        const profileBody = document.getElementById("profileBody");
        
        profileTitle.innerHTML = `👤 Профиль: ${username}`;
        profileBody.innerHTML = '<div class="loading">⏳ Загрузка...</div>';
        
        overlay.style.display = "block";
        window.style.display = "flex";
        isProfileWindowOpen = true;
        
        // Отписываемся от предыдущего
        if (currentProfileListener) currentProfileListener.off();
        
        // Подписываемся на реальное время
        currentProfileListener = db.ref(`users/${username}/trades`).on('value', (snapshot) => {
            if (!isProfileWindowOpen) return;
            const trades = snapshot.val() || [];
            
            let totalBuySum = 0, totalSellSum = 0, totalProfit = 0;
            trades.forEach(t => {
                totalBuySum += t.buyPrice || 0;
                totalSellSum += t.sellPrice || 0;
                totalProfit += t.profit || 0;
            });
            
            profileBody.innerHTML = `
                <div style="display:flex;gap:20px;flex-wrap:wrap;justify-content:center;margin-bottom:20px">
                    <div class="stat-card" style="min-width:120px"><div class="stat-value">${totalBuySum.toFixed(2)} ${symbols[currentCurrency]}</div><div class="stat-label">💰 Потрачено</div></div>
                    <div class="stat-card" style="min-width:120px"><div class="stat-value">${totalSellSum.toFixed(2)} ${symbols[currentCurrency]}</div><div class="stat-label">💵 Получено</div></div>
                    <div class="stat-card" style="min-width:120px"><div class="stat-value ${totalProfit>=0?'profit':'loss'}">${totalProfit>=0?'+':''}${totalProfit.toFixed(2)} ${symbols[currentCurrency]}</div><div class="stat-label">📈 Прибыль</div></div>
                </div>
                <h4>📋 Сделки (${trades.length})</h4>
                ${trades.length === 0 ? '<div style="text-align:center;padding:40px">Нет сделок</div>' : `
                <div style="overflow-x:auto;max-height:350px;overflow-y:auto">
                <table><thead><tr><th>Дата</th><th>Предмет</th><th>Кол-во</th><th>Покупка</th><th>Продажа</th><th>Прибыль</th></tr></thead>
                <tbody>${trades.slice().reverse().map(t => `
                    <tr>
                        <td>${t.date || '-'}</td>
                        <td>${t.itemName}${t.quantity>1?`<span class="quantity-badge">x${t.quantity}</span>`:''}</td>
                        <td>${t.quantity||1}</td>
                        <td>${t.buyPrice>0?t.buyPrice.toFixed(2)+' '+symbols[currentCurrency]:'-'}</td>
                        <td>${t.sellPrice>0?t.sellPrice.toFixed(2)+' '+symbols[currentCurrency]:'-'}</td>
                        <td class="${t.profit>=0?'profit':'loss'}">${t.profit>=0?'+':''}${t.profit.toFixed(2)} ${symbols[currentCurrency]}</td>
                    </tr>
                `).join('')}</tbody></table></div>`}
            `;
        });
    }
    
    function closeProfileWindow() {
        if (currentProfileListener) {
            currentProfileListener.off();
            currentProfileListener = null;
        }
        const overlay = document.getElementById("profileOverlay");
        const window = document.getElementById("profileWindow");
        
        overlay.style.display = "none";
        window.style.display = "none";
        isProfileWindowOpen = false;
    }
    
    // ========== ОСНОВНОЙ РЕНДЕР ==========
    async function renderMain() {
        if (!currentUser) { renderLoginScreen(); return; }
        
        const snapshot = await db.ref(`users/${currentUser}/trades`).once("value");
        let trades = snapshot.val() || [];
        
        let totalBuySum = 0, totalSellSum = 0, totalProfit = 0;
        trades.forEach(t => {
            totalBuySum += t.buyPrice || 0;
            totalSellSum += t.sellPrice || 0;
            totalProfit += t.profit || 0;
        });
        
        const html = `
            <div class="card">
                <h3 style="margin-bottom:15px">➕ Новая сделка</h3>
                <div class="form-row">
                    <div class="form-group"><label>Предмет</label><input type="text" id="itemName" placeholder="Кейс, капсула..."></div>
                    <div class="form-group"><label>Кол-во</label><input type="number" id="itemQuantity" value="1" step="1" min="1"></div>
                    <div class="form-group"><label>Покупка (${symbols[currentCurrency]})</label><input type="number" id="buyPrice" step="0.01" placeholder="0"></div>
                    <div class="form-group"><label>Продажа (${symbols[currentCurrency]})</label><input type="number" id="sellPrice" step="0.01" placeholder="0"></div>
                    <div class="form-group"><button onclick="addTrade()">➕ Добавить</button></div>
                </div>
                <div class="small-text" style="margin-top:10px">💡 Цены указывайте за ВСЕ предметы сразу. Комиссия Steam 13% при продаже.</div>
            </div>
            
            <div class="card">
                <h3>📊 Моя статистика</h3>
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value">${totalBuySum.toFixed(2)} ${symbols[currentCurrency]}</div><div class="stat-label">💰 Куплено</div></div>
                    <div class="stat-card"><div class="stat-value">${totalSellSum.toFixed(2)} ${symbols[currentCurrency]}</div><div class="stat-label">💵 Продано</div></div>
                    <div class="stat-card"><div class="stat-value ${totalProfit>=0?'profit':'loss'}">${totalProfit>=0?'+':''}${totalProfit.toFixed(2)} ${symbols[currentCurrency]}</div><div class="stat-label">📈 Прибыль</div></div>
                </div>
            </div>
            
            <div class="card">
                <h3>📋 История сделок</h3>
                ${trades.length === 0 ? '<div style="text-align:center;padding:40px">Нет сделок</div>' : `
                <div style="overflow-x:auto">
                <table>
                    <thead><tr><th>Дата</th><th>Предмет</th><th>Кол-во</th><th>Покупка</th><th>Продажа</th><th>Прибыль</th><th></th></tr></thead>
                    <tbody>${trades.slice().reverse().map(t => `
                        <tr>
                            <td>${t.date || '-'}</td>
                            <td>${t.itemName}${t.quantity > 1 ? `<span class="quantity-badge">x${t.quantity}</span>` : ''}</td>
                            <td>${t.quantity || 1}</td>
                            <td>${t.buyPrice > 0 ? t.buyPrice.toFixed(2) + ' ' + symbols[currentCurrency] : '-'}</td>
                            <td>${t.sellPrice > 0 ? t.sellPrice.toFixed(2) + ' ' + symbols[currentCurrency] : '-'}</td>
                            <td class="${t.profit >= 0 ? 'profit' : 'loss'}">${t.profit>=0?'+':''}${t.profit.toFixed(2)} ${symbols[currentCurrency]}</td>
                            <td><button onclick='openEdit(${t.id})' style="background:#ffc107;color:#000;padding:5px 10px;margin-right:5px">✏️</button><button onclick='deleteTradeConfirm(${t.id})' style="background:#dc3545;padding:5px 10px">🗑️</button></td>
                        </tr>
                    `).join('')}</tbody>
                </table>
                </div>`}
            </div>
        `;
        
        document.getElementById("mainContent").innerHTML = html;
        document.getElementById("currentUserName").innerHTML = currentUser;
    }
    
    function renderLoginScreen() {
        document.getElementById("mainContent").innerHTML = `
            <div class="card" style="text-align:center">
                <h2>🎮 Trade Tracker - The Colony</h2>
                <p style="margin:20px 0">Учёт сделок с комиссией Steam 13%</p>
                <p style="margin:10px 0;color:#e94560">🔧 Админ пароль: admin123</p>
                <button onclick="login()" style="font-size:18px;padding:12px 30px">🚀 Войти</button>
            </div>
        `;
        document.getElementById("currentUserName").innerHTML = "Не авторизован";
    }
    
    function setupRealtimeListener() {
        if (myTradesListener) myTradesListener.off();
        if (currentUser) {
            myTradesListener = db.ref(`users/${currentUser}/trades`).on('value', () => {
                renderMain();
            });
        }
    }
    
    // ========== СДЕЛКИ ==========
    async function addTrade() {
        const name = document.getElementById("itemName")?.value;
        const quantity = parseInt(document.getElementById("itemQuantity")?.value) || 1;
        const buyTotal = parseFloat(document.getElementById("buyPrice")?.value) || 0;
        const sellTotal = parseFloat(document.getElementById("sellPrice")?.value) || 0;
        
        if (!name) { alert("Введите название"); return; }
        if (quantity < 1) { alert("Количество должно быть не менее 1"); return; }
        
        const commission = sellTotal * 0.13;
        const netSell = sellTotal - commission;
        const profit = netSell - buyTotal;
        
        const trade = {
            id: Date.now(),
            itemName: name,
            quantity: quantity,
            buyPrice: buyTotal,
            sellPrice: sellTotal,
            commission: commission,
            netSell: netSell,
            profit: profit,
            date: new Date().toLocaleString(),
            timestamp: Date.now()
        };
        
        const ref = db.ref(`users/${currentUser}/trades`);
        const snap = await ref.once("value");
        let trades = snap.val() || [];
        trades.push(trade);
        await ref.set(trades);
        
        document.getElementById("itemName").value = "";
        document.getElementById("itemQuantity").value = "1";
        document.getElementById("buyPrice").value = "";
        document.getElementById("sellPrice").value = "";
    }
    
    async function deleteTradeConfirm(id) {
        if (!confirm("Удалить сделку?")) return;
        const ref = db.ref(`users/${currentUser}/trades`);
        const snap = await ref.once("value");
        let trades = snap.val() || [];
        trades = trades.filter(t => t.id !== id);
        await ref.set(trades);
    }
    
    async function openEdit(id) {
        const ref = db.ref(`users/${currentUser}/trades`);
        const snap = await ref.once("value");
        const trades = snap.val() || [];
        const trade = trades.find(t => t.id === id);
        if (trade) {
            editTradeId = id;
            document.getElementById("editName").value = trade.itemName;
            document.getElementById("editQuantity").value = trade.quantity || 1;
            document.getElementById("editBuy").value = trade.buyPrice;
            document.getElementById("editSell").value = trade.sellPrice;
            document.getElementById("editModal").style.display = "flex";
        }
    }
    
    async function saveEdit() {
        const newName = document.getElementById("editName").value;
        const newQuantity = parseInt(document.getElementById("editQuantity").value) || 1;
        const newBuy = parseFloat(document.getElementById("editBuy").value) || 0;
        const newSell = parseFloat(document.getElementById("editSell").value) || 0;
        
        const commission = newSell * 0.13;
        const netSell = newSell - commission;
        const profit = netSell - newBuy;
        
        const ref = db.ref(`users/${currentUser}/trades`);
        const snap = await ref.once("value");
        let trades = snap.val() || [];
        const index = trades.findIndex(t => t.id === editTradeId);
        if (index !== -1) {
            trades[index] = { ...trades[index], 
                itemName: newName, 
                quantity: newQuantity,
                buyPrice: newBuy, 
                sellPrice: newSell, 
                commission, 
                netSell, 
                profit 
            };
            await ref.set(trades);
        }
        closeModal("editModal");
    }
    
    // ========== ВСЕ ИГРОКИ ==========
    async function showAllUsers() {
        const snapshot = await db.ref("users").once("value");
        const users = snapshot.val() || {};
        const userList = Object.keys(users);
        const container = document.getElementById("usersList");
        
        if (userList.length === 0) {
            container.innerHTML = "<div>Нет пользователей</div>";
        } else {
            let html = "";
            for (const user of userList) {
                const tradesSnap = await db.ref(`users/${user}/trades`).once("value");
                const trades = tradesSnap.val() || [];
                let profit = 0;
                trades.forEach(t => profit += t.profit || 0);
                html += `<div class="user-item"><div><strong>👤 ${user}</strong><div class="small-text">Сделок: ${trades.length} | Прибыль: ${profit.toFixed(2)} ₽</div></div><button onclick="openProfileWindow('${user}')" style="background:#533483;padding:5px 15px;">📊 Открыть</button></div>`;
            }
            container.innerHTML = html;
        }
        document.getElementById("usersModal").style.display = "flex";
    }
    
    // ========== АДМИНКА ==========
    async function openAdminPanel() {
        const pwd = prompt("Введите пароль администратора:");
        if (pwd !== "admin123") { if (pwd !== null) alert("Неверный пароль!"); return; }
        
        const snapshot = await db.ref("users").once("value");
        const users = snapshot.val() || {};
        const userList = Object.keys(users);
        
        let usersHtml = "";
        for (const user of userList) {
            const tradesSnap = await db.ref(`users/${user}/trades`).once("value");
            const trades = tradesSnap.val() || [];
            let totalProfit = 0, totalSpent = 0;
            trades.forEach(t => { totalProfit += t.profit || 0; totalSpent += t.buyPrice || 0; });
            usersHtml += `<div class="user-item"><div><strong>${user}</strong><div class="small-text">Потрачено: ${totalSpent.toFixed(2)}₽ | Прибыль: ${totalProfit.toFixed(2)}₽</div></div><button onclick="adminDeleteUser('${user}')" class="danger" style="padding:5px 12px;">❌ Удалить</button></div>`;
        }
        
        const adminHtml = `
            <div class="admin-section"><h4 style="color:#ff4444">⚠️ ОПАСНЫЕ ДЕЙСТВИЯ</h4>
            <button onclick="adminResetAll()" class="danger" style="width:100%;margin-bottom:10px">💣 СБРОСИТЬ ВСЕ ДАННЫЕ</button>
            <button onclick="adminResetMe()" class="warning" style="width:100%;background:#ffc107;color:#000">🗑️ Сбросить мои данные</button></div>
            <div class="admin-section"><h4>👥 Все игроки (${userList.length})</h4>${usersHtml || "<div>Нет пользователей</div>"}</div>`;
        
        document.getElementById("adminPanelContent").innerHTML = adminHtml;
        document.getElementById("adminModal").style.display = "flex";
    }
    
    async function adminResetAll() {
        if (!confirm("Удалить ВСЕ данные ВСЕХ пользователей?")) return;
        if (prompt("Введите 'УДАЛИТЬ ВСЁ' для подтверждения") !== "УДАЛИТЬ ВСЁ") { alert("Отменено"); return; }
        await db.ref("users").set({});
        alert("✅ Все данные удалены!");
        closeModal("adminModal");
        renderMain();
    }
    
    async function adminResetMe() {
        if (!currentUser) return;
        if (!confirm(`Удалить все ваши данные (${currentUser})?`)) return;
        await db.ref(`users/${currentUser}`).set({});
        alert(`✅ Данные удалены`);
        closeModal("adminModal");
        logout();
    }
    
    async function adminDeleteUser(username) {
        if (!confirm(`Удалить пользователя "${username}"?`)) return;
        await db.ref(`users/${username}`).set({});
        alert(`✅ ${username} удалён`);
        if (currentUser === username) logout();
        else { closeModal("adminModal"); openAdminPanel(); }
    }
    
    function closeModal(id) { 
        document.getElementById(id).style.display = "none"; 
    }
    
    // Глобальные функции
    window.login = login;
    window.changeCurrency = changeCurrency;
    window.showAllUsers = showAllUsers;
    window.openAdminPanel = openAdminPanel;
    window.addTrade = addTrade;
    window.deleteTradeConfirm = deleteTradeConfirm;
    window.openEdit = openEdit;
    window.saveEdit = saveEdit;
    window.openProfileWindow = openProfileWindow;
    window.closeProfileWindow = closeProfileWindow;
    window.adminResetAll = adminResetAll;
    window.adminResetMe = adminResetMe;
    window.adminDeleteUser = adminDeleteUser;
    window.closeModal = closeModal;
    
    // Запуск
    (function() {
        const saved = localStorage.getItem("tradeTrackerUser");
        if (saved) { 
            currentUser = saved; 
            setupRealtimeListener();
            renderMain(); 
        }
        else renderLoginScreen();
    })();
</script>
</body>
</html>
