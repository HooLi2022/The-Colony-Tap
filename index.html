        * { margin:0; padding:0; box-sizing:border-box; }

        .main-tab.active { background:var(--accent); color:#000; border-color:var(--accent); box-shadow:0 4px 16px rgba(255,152,0,0.35); }
        .tab-content { display:none; animation:fadeIn 0.3s ease; }
        .tab-content.active { display:block; }

        .admin-link { text-align:right; margin-bottom:8px; }

        .search-results.active { display:block; }

        .chip-row { display:flex; flex-wrap:wrap; gap:5px; max-height:180px; overflow-y:auto; }

        .chip.active { background:var(--accent); color:#000; border-color:var(--accent); font-weight:700; }
        .info-bar { background:rgba(255,152,0,0.1); border:1px solid var(--accent); border-radius:10px; padding:10px 14px; margin-top:10px; display:flex; align-items:center; gap:10px; font-size:13px; }

        .sticky-bar .price { font-size:26px; font-weight:900; color:#000; }
        .svc-group-title { font-size:11px; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:1px; margin:12px 0 6px 4px; padding-top:8px; border-top:1px solid rgba(255,255,255,0.06); }
        .svc-row { display:flex; justify-content:space-between; align-items:center; padding:10px 12px; border-radius:10px; background:rgba(255,255,255,0.015); margin-bottom:3px; gap:8px; font-size:12px; }
        .svc-row:hover { background:rgba(255,255,255,0.04); }

        .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        .form-grid .full { grid-column:1/-1; }
        .form-group label { display:block; font-size:9px; font-weight:700; color:var(--muted); text-transform:uppercase; margin-bottom:4px; }
        .form-group input,.form-group textarea,.form-group select { width:100%; padding:10px; border-radius:8px; border:1px solid rgba(255,255,255,0.15); background:rgba(0,0,0,0.3); color:#fff; font-size:12px; outline:none; font-family:inherit; }

        .delivery-options { display:flex; gap:6px; }

        .calendar-popup { position:absolute; background:var(--surface); border:2px solid var(--accent); border-radius:12px; padding:10px; z-index:100; display:none; width:280px; box-shadow:0 10px 30px rgba(0,0,0,0.8); }

        .cal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }

        .cal-day-name { font-size:9px; color:var(--muted); padding:4px 0; }

        .cal-day.other { color:#444; }
        .cal-day.today { border:1px solid var(--accent); }
        .empty { text-align:center; padding:30px; color:#555; }
        .footer { text-align:center; margin-top:20px; padding-top:12px; border-top:1px solid rgba(255,255,255,0.05); color:#555; font-size:10px; }
        @media(max-width:768px) { .form-grid{grid-template-columns:1fr} .container{padding:12px} .svc-row{flex-wrap:wrap} }
    </style>
</head>

        function DS(){return [
            {id:1,name:'Компьютерная диагностика',price:1500,cat:'diagnostics',tools:'Сканер OBD2, Ноутбук, Программа диагностики',specs:'Время|30-60 мин\nПериодичность|При горящем Check Engine',steps:'Найдите разъём OBD2 (обычно под рулём).\nПодключите сканер.\nВключите зажигание.\nЗапустите программу диагностики.\nСчитайте коды ошибок.\nПроверьте параметры в реальном времени.\nПри необходимости сбросьте ошибки после устранения.',warning:'Не стирайте ошибки до выяснения причины! Коды ошибок — это подсказка, а не приговор.'},
            {id:2,name:'Диагностика ходовой',price:800,cat:'diagnostics',tools:'Подъёмник, Люфтомер, Фонарь',specs:'Время|20-30 мин\nПериодичность|При стуках в подвеске',steps:'Поднимите авто на подъёмнике.\nПроверьте люфты в шаровых опорах.\nОсмотрите сайлентблоки на наличие трещин.\nПроверьте рулевые наконечники.\nОцените состояние амортизаторов на предмет течи.\nПроверьте пружины на проседание.',warning:'Не откладывайте ремонт при обнаружении люфтов — это вопрос безопасности!'},
            {id:3,name:'Диагностика тормозной системы',price:600,cat:'diagnostics',tools:'Штангенциркуль, Тестер тормозной жидкости, Фонарь',specs:'Время|15-20 мин\nПериодичность|Каждые 15 000 км',steps:'Проверьте толщину тормозных колодок (мин. 2 мм).\nИзмерьте биение тормозных дисков.\nПроверьте уровень тормозной жидкости.\nОсмотрите шланги на предмет трещин.\nПроверьте герметичность системы.\nПроверьте работу ручного тормоза.',warning:'Скрип при торможении — первый признак износа колодок!'},
            {id:10,name:'Замена масла и фильтра',price:1000,cat:'maintenance',tools:'Ключ для пробки, Съёмник фильтра, Ёмкость 5л, Воронка, Ветошь',specs:'Интервал|10 000 км\nОбъём (легковые)|3.5-5.0 л\nОбъём (внедорожники)|5.0-8.0 л',steps:'Прогрейте двигатель 5-7 минут.\nЗаглушите, откройте крышку маслозаливной горловины.\nПодставьте ёмкость под сливную пробку.\nОткрутите пробку, слейте масло (10-15 мин).\nСъёмником открутите старый масляный фильтр.\nСмажьте уплотнительное кольцо нового фильтра свежим маслом.\nЗакрутите новый фильтр от руки.\nЗакрутите сливную пробку.\nЗалейте новое масло через воронку.\nПроверьте уровень щупом.',warning:'Не перетяните фильтр! Отработку сдавайте в пункты приёма.'},
            {id:11,name:'Замена воздушного фильтра',price:400,cat:'maintenance',tools:'Отвёртка, Новый фильтр',specs:'Интервал|15 000 км\nЧаще|В пыльной местности',steps:'Откройте капот.\nНайдите корпус воздушного фильтра.\nОтщёлкните зажимы или открутите винты.\nИзвлеките старый фильтр.\nОчистите корпус от пыли и мусора.\nУстановите новый фильтр.\nЗакройте корпус, зафиксируйте зажимы.',warning:'Не эксплуатируйте авто без фильтра — пыль попадёт в цилиндры и ускорит износ!'},
            {id:12,name:'Замена салонного фильтра',price:500,cat:'maintenance',tools:'Отвёртка Torx T20, Новый фильтр',specs:'Интервал|15 000 км\nЧаще|При аллергии у водителя',steps:'Найдите отсек фильтра (под бардачком или у моторного щита).\nСнимите защитную крышку.\nИзвлеките старый фильтр.\nОчистите посадочное место.\nУстановите новый фильтр (стрелка по направлению потока воздуха).\nЗакройте крышку.',warning:'Угольный фильтр лучше очищает воздух, но стоит дороже. Не путайте направление установки!'},
            {id:13,name:'Замена топливного фильтра',price:600,cat:'maintenance',tools:'Ключи, Ёмкость для топлива, Ветошь',specs:'Интервал|30 000 км\nДизель|15 000 км',steps:'Сбросьте давление в топливной системе.\nОтсоедините топливные шланги.\nСнимите старый фильтр.\nУстановите новый (стрелка по направлению потока).\nПодсоедините шланги.\nЗапустите двигатель, проверьте герметичность.',warning:'Осторожно — топливо под давлением! Работайте в перчатках, не курите рядом.'},
            {id:14,name:'Замена свечей зажигания',price:800,cat:'maintenance',tools:'Свечной ключ 16/21 мм, Динамометрический ключ, Щётка, Сжатый воздух',specs:'Интервал|30 000 км\nИридиевые|60 000 км\nМомент затяжки|25-30 Нм',steps:'Дайте двигателю полностью остыть.\nСнимите декоративную крышку.\nПродуйте свечные колодцы сжатым воздухом.\nОтсоедините разъёмы катушек.\nИзвлеките катушки зажигания.\nВыкрутите старые свечи.\nПроверьте зазор новых свечей (1.0-1.1 мм).\nВкрутите новые свечи от руки.\nЗатяните динамометрическим ключом.\nУстановите катушки и разъёмы.',warning:'Не перетяните свечи — можно повредить резьбу в ГБЦ! Рекомендуемые свечи: А17ДВРМ для ВАЗ, Bosch F7LTCR для VW.'},
            {id:15,name:'Замена охлаждающей жидкости',price:1200,cat:'maintenance',tools:'Ёмкость 10л, Воронка, Ключ для пробки блока',specs:'Интервал|Каждые 2 года\nОбъём|5-10 л в зависимости от авто',steps:'Дайте двигателю полностью остыть!\nОткройте крышку расширительного бачка.\nПодставьте ёмкость, открутите пробку на радиаторе.\nСлейте старую жидкость.\nПромойте систему дистиллированной водой.\nЗалейте новую жидкость до уровня.\nЗапустите двигатель, долейте при необходимости.\nУдалите воздушные пробки.',warning:'Не открывайте крышку на горячем двигателе — можно получить ожог паром!'},
            {id:16,name:'Замена тормозной жидкости',price:1000,cat:'maintenance',tools:'Ключ для штуцеров, Прозрачный шланг, Ёмкость, DOT-4',specs:'Интервал|Каждые 2 года\nТип|DOT-4\nПорядок|ПЗ→ЛЗ→ПП→ЛП',steps:'Откачайте старую жидкость из бачка шприцем.\nЗалейте свежую жидкость.\nНаденьте шланг на штуцер заднего правого колеса.\nПомощник нажимает педаль 3-4 раза и держит.\nОткрутите штуцер — жидкость пойдёт.\nЗакрутите штуцер, помощник отпускает педаль.\nПовторяйте до чистой жидкости.\nПовторите для всех колёс в правильном порядке.\nСледите за уровнем в бачке!',warning:'Не допускайте осушения бачка — в систему попадёт воздух, и тормоза откажут!'},
            {id:17,name:'Замена ремня генератора',price:700,cat:'maintenance',tools:'Ключ для натяжителя, Новый ремень',specs:'Интервал|60 000 км\nПризнак износа|Свист при запуске',steps:'Осмотрите схему прокладки ремня.\nОслабьте натяжитель.\nСнимите старый ремень.\nСравните старый и новый ремень.\nУстановите новый ремень по схеме.\nНатяните ремень согласно спецификации.\nЗапустите двигатель, проверьте.',warning:'Изношенный ремень может порваться и оставить вас без генератора и ГУРа!'},
            {id:18,name:'Замена масла в МКПП',price:800,cat:'maintenance',tools:'Шестигранник 17 мм, Шприц для заливки, Ёмкость',specs:'Интервал|60 000 км\nОбъём|2.0-3.0 л\nТип масла|G052 SAE 75W90',steps:'Открутите сливную пробку.\nСлейте масло в ёмкость.\nЗакрутите сливную пробку.\nШприцом залейте новое масло через заливное отверстие.\nЗалейте до уровня (масло должно начать вытекать).\nЗакрутите заливную пробку.',warning:'Используйте масло рекомендованной вязкости! Неправильное масло ускоряет износ синхронизаторов.'},
            {id:19,name:'Замена масла в редукторе',price:600,cat:'maintenance',tools:'Шестигранник, Шприц, Масло трансмиссионное',specs:'Интервал|60 000 км\nОбъём|1.0-2.0 л',steps:'Открутите заливную пробку.\nОткрутите сливную пробку, слейте масло.\nЗакрутите сливную пробку.\nШприцом залейте новое масло.\nЗалейте до уровня, закрутите пробку.',warning:'Не перепутайте масло для редуктора с маслом для КПП — у них разная вязкость!'},
            {id:20,name:'Замена ремня ГРМ + ролики',price:5000,cat:'engine',tools:'Набор ключей, Фиксаторы распредвалов, Динамометрический ключ',specs:'Интервал|60 000-90 000 км\nКритичность|ОЧЕНЬ ВАЖНО!',steps:'Снимите защитный кожух ремня ГРМ.\nВыставьте метки ГРМ на коленвале и распредвалах.\nОслабьте натяжитель.\nСнимите старый ремень.\nЗамените натяжной ролик.\nУстановите новый ремень по меткам.\nНатяните ремень согласно спецификации.\nПрокрутите двигатель вручную на 2 оборота.\nПроверьте совпадение меток.\nУстановите кожух.',warning:'Обрыв ремня ГРМ = загиб клапанов = капремонт двигателя! Не откладывайте замену. Рекомендуется менять помпу одновременно.'},
            {id:21,name:'Замена цепи ГРМ',price:12000,cat:'engine',tools:'Специнструмент, Набор ключей, Герметик',specs:'Интервал|150 000-200 000 км\nПризнак|Шум/лязг при запуске',steps:'Снимите крышку цепи ГРМ.\nВыставьте метки.\nСнимите натяжитель цепи.\nСнимите старую цепь.\nУстановите новую цепь и натяжитель.\nПроверьте фазы ГРМ.\nНанесите герметик, установите крышку.',warning:'Сложная операция! Требует опыта и специнструмента. Ошибка может привести к повреждению двигателя.'},
            {id:22,name:'Замена прокладки ГБЦ',price:10000,cat:'engine',tools:'Динамометрический ключ, Набор головок, Скребок, Герметик',specs:'Время|6-12 часов\nПризнак|Эмульсия в масле, белый дым',steps:'Слейте охлаждающую жидкость и масло.\nОтсоедините все патрубки и проводку.\nОткрутите болты ГБЦ в правильном порядке.\nСнимите ГБЦ.\nОчистите привалочные поверхности скребком.\nУстановите новую прокладку.\nУстановите ГБЦ.\nЗатяните болты динамометрическим ключом по схеме.\nСоберите всё обратно, залейте жидкости.',warning:'Строго соблюдайте момент и порядок затяжки болтов! Ошибка приведёт к пробою прокладки.'},
            {id:23,name:'Замена турбины',price:8000,cat:'engine',tools:'Набор ключей, Прокладки, Масло, Антифриз',specs:'Время|4-8 часов\nПризнак|Синий дым, потеря мощности',steps:'Слейте масло и антифриз.\nОтсоедините воздушные патрубки.\nОткрутите выпускной коллектор.\nОтсоедините масляные трубки.\nСнимите старую турбину.\nОчистите масляные магистрали.\nУстановите новую турбину с новыми прокладками.\nЗалейте масло в турбину перед запуском.\nЗапустите, проверьте герметичность.',warning:'После замены обязательно замените масло и фильтр! Прокачайте турбину маслом перед запуском.'},
            {id:24,name:'Регулировка клапанов',price:2500,cat:'engine',tools:'Щуп, Ключ на 13, Отвёртка, Ключ для коленвала',specs:'Интервал|30 000 км (для регулируемых)\nЗазор впуск|0.15 мм\nЗазор выпуск|0.15 мм',steps:'Снимите клапанную крышку.\nПрокрутите коленвал до ВМТ 1-го цилиндра.\nЩупом проверьте зазоры на 1,3 (выпуск) и 2,5 (впуск) клапанах.\nПри необходимости ослабьте контргайку, отрегулируйте винтом.\nЗатяните контргайку.\nПроверните коленвал на 360°.\nПроверьте 4,6 (выпуск) и 7,8 (впуск) клапаны.\nУстановите крышку с новой прокладкой.',warning:'Зазоры разные для впускных и выпускных клапанов! Сверяйтесь с мануалом для вашего двигателя.'},
            {id:25,name:'Замена помпы',price:3000,cat:'engine',tools:'Ключи, Прокладка, Антифриз, Герметик',specs:'Рекомендация|Менять вместе с ремнём ГРМ\nПризнак|Течь, шум, люфт шкива',steps:'Слейте антифриз.\nСнимите ремень ГРМ (если помпа приводится ГРМ).\nОткрутите болты старой помпы.\nСнимите помпу.\nОчистите посадочное место.\nУстановите новую помпу с прокладкой.\nЗатяните болты.\nУстановите ремень ГРМ.\nЗалейте антифриз.',warning:'Не экономьте на помпе — её отказ может привести к перегреву и повреждению двигателя!'},
            {id:26,name:'Замена радиатора охлаждения',price:2500,cat:'engine',tools:'Ключи, Ёмкость для антифриза, Пассатижи',specs:'Время|2-3 часа\nПризнак|Течь, перегрев',steps:'Слейте антифриз.\nОтсоедините патрубки радиатора.\nОтсоедините вентилятор.\nОткрутите крепления радиатора.\nСнимите старый радиатор.\nУстановите новый.\nПодсоедините патрубки и вентилятор.\nЗалейте антифриз, удалите воздушные пробки.',warning:'Используйте новый антифриз, не заливайте старый обратно — в нём может быть грязь.'},
            {id:27,name:'Чистка форсунок (ультразвук)',price:2000,cat:'engine',tools:'Ультразвуковая ванна, Стенд проверки, Уплотнения',specs:'Интервал|60 000 км\nПризнак|Провалы, расход топлива',steps:'Снимите форсунки с двигателя.\nУстановите в ультразвуковую ванну.\nПроведите чистку (30-60 мин).\nПроверьте распыл на стенде.\nЗамените уплотнительные кольца.\nУстановите форсунки обратно.\nСбросьте адаптации.',warning:'Не пытайтесь чистить форсунки механически — можно повредить распылитель!'},
            {id:28,name:'Замена маслосъёмных колпачков',price:5000,cat:'engine',tools:'Рассухариватель, Специнструмент, Динамометрический ключ',specs:'Признак|Синий дым при запуске\nВремя|4-6 часов',steps:'Снимите клапанную крышку.\nСнимите распредвалы.\nСнимите толкатели.\nРассухаривателем снимите сухари.\nСнимите пружины.\nЗамените маслосъёмные колпачки.\nСоберите всё в обратном порядке.\nЗапустите двигатель.',warning:'Не перепутайте сухари и пружины местами! Работа требует внимательности.'},
            {id:30,name:'Замена глушителя',price:1500,cat:'exhaust',tools:'Головки, Вороток, Новые резиновые подвесы',specs:'Время|30-60 мин\nПризнак|Рёв, дребезг',steps:'Открутите хомуты соединения.\nСнимите старый глушитель с резиновых подвесов.\nУстановите новый глушитель на подвесы.\nНаденьте трубу на соединение.\nЗатяните хомуты.\nЗапустите двигатель, проверьте герметичность.',warning:'Используйте новые резиновые подвесы — старые могут порваться в дороге.'},
            {id:31,name:'Замена гофры',price:2500,cat:'exhaust',tools:'Болгарка, Сварочный аппарат, Новая гофра',specs:'Время|1-2 часа\nПризнак|Рёв из-под капота',steps:'Вырежьте старую гофру болгаркой.\nПримерьте новую гофру.\nПрихватите сваркой.\nПроварите по кругу.\nПроверьте герметичность шва.\nОбработайте шов антикором.',warning:'Сварные швы должны быть герметичными — утечка выхлопных газов опасна для здоровья!'},
            {id:32,name:'Замена приёмной трубы',price:2000,cat:'exhaust',tools:'Головки, Болгарка, Прокладки',specs:'Время|1-2 часа',steps:'Открутите болты крепления приёмной трубы.\nПри необходимости обрежьте прикипевшие болты.\nСнимите старую трубу.\nОчистите посадочные поверхности.\nУстановите новую трубу с новыми прокладками.\nЗатяните болты.\nЗапустите, проверьте.',warning:'Болты часто прикипают — используйте WD-40 за 20 минут до работы.'},
            {id:33,name:'Замена прокладки выпускного коллектора',price:1800,cat:'exhaust',tools:'Головки, Скребок, Новая прокладка',specs:'Время|1-2 часа\nПризнак|Стрельба/цоканье',steps:'Открутите коллектор от ГБЦ.\nСнимите старую прокладку.\nОчистите поверхности скребком.\nУстановите новую прокладку.\nПрикрутите коллектор.\nЗатяните болты крест-накрест.\nЗапустите, проверьте.',warning:'Затягивайте болты равномерно, чтобы не перекосить коллектор.'},
            {id:40,name:'Замена сцепления (комплект)',price:8000,cat:'transmission',tools:'Трансмиссионная стойка, Центратор диска, Набор ключей',specs:'Время|4-8 часов\nПризнак|Пробуксовка, запах',steps:'Отсоедините кардан/приводы.\nСнимите стартер.\nОтсоедините тросик сцепления.\nОткрутите болты КПП.\nСнимите коробку передач.\nОткрутите болты корзины.\nСнимите корзину и ведомый диск.\nЦентратором установите новый диск.\nУстановите новую корзину, затяните крест-накрест.\nУстановите КПП.\nПодсоедините всё обратно.',warning:'Тяжёлая работа! Коробка весит 30-50 кг. Работайте с помощником. Используйте новый выжимной подшипник.'},
            {id:41,name:'Замена масла в АКПП (частичная)',price:2500,cat:'transmission',tools:'Шестигранник, Шприц, Новый фильтр АКПП, Прокладка поддона',specs:'Интервал|60 000 км\nОбъём|3.0-5.0 л\nТип|ATF ESSO 71141',steps:'Открутите сливную пробку.\nСлейте масло.\nОткрутите поддон АКПП.\nСнимите старый фильтр.\nУстановите новый фильтр.\nУстановите поддон с новой прокладкой.\nЗалейте свежее масло.\nПроверьте уровень при рабочей температуре.',warning:'Используйте только оригинальное масло VW! Неправильная жидкость убьёт коробку.'},
            {id:42,name:'Замена ШРУСа (гранаты)',price:2500,cat:'transmission',tools:'Съёмник, Стопорные кольца, Головки',specs:'Время|1-2 часа\nПризнак|Хруст при повороте',steps:'Снимите колесо.\nОткрутите ступичную гайку.\nОткрутите шаровую опору.\nИзвлеките ШРУС из ступицы.\nСъёмником извлеките ШРУС из КПП.\nУстановите новый ШРУС.\nСоберите всё обратно.\nЗатяните ступичную гайку.',warning:'Не забудьте заменить стопорное кольцо — иначе ШРУС может выскочить на ходу!'},
            {id:43,name:'Замена пыльника ШРУСа',price:1500,cat:'transmission',tools:'Съёмник, Хомуты, Смазка ШРУС',specs:'Время|1 час\nВажно|Своевременно менять',steps:'Снимите ШРУС.\nСрежьте старый пыльник.\nОчистите ШРУС от старой смазки.\nНабейте новую смазку.\nУстановите новый пыльник.\nЗакрепите хомутами.\nУстановите ШРУС на место.',warning:'Порванный пыльник = быстрый выход ШРУСа из строя из-за грязи и потери смазки.'},
            {id:44,name:'Замена сальника КПП',price:2000,cat:'transmission',tools:'Съёмник сальника, Оправка, Масло КПП',specs:'Время|1-2 часа\nПризнак|Течь масла',steps:'Снимите привод/кардан.\nИзвлеките старый сальник съёмником.\nОчистите посадочное место.\nЗапрессуйте новый сальник оправкой.\nУстановите привод/кардан.\nПроверьте уровень масла в КПП.',warning:'Не поцарапайте посадочное место при извлечении старого сальника!'},
            {id:50,name:'Замена передних тормозных колодок',price:1200,cat:'brakes',tools:'Домкрат, Ключ на 13-15, Отвёртка, Струбцина, Медная смазка',specs:'Мин. толщина|2 мм\nИнтервал|По износу',steps:'Ослабьте болты, поднимите авто, снимите колесо.\nОткрутите нижний болт суппорта.\nОткиньте суппорт вверх, закрепите проволокой.\nИзвлеките старые колодки.\nОчистите посадочные места щёткой.\nСтрубциной утопите поршень.\nНанесите медную смазку на тыльную сторону новых колодок.\nУстановите новые колодки.\nОпустите суппорт, закрутите болт.\nУстановите колесо.\nПрокачайте педаль тормоза!',warning:'Обязательно прокачайте педаль тормоза перед поездкой! Первое нажатие будет пустым.'},
            {id:51,name:'Замена задних тормозных колодок',price:1400,cat:'brakes',tools:'Домкрат, Ключи, Специнструмент для поршня, Медная смазка',specs:'Мин. толщина|2 мм',steps:'Ослабьте болты, поднимите авто, снимите колесо.\nОтсоедините тросик ручника.\nОткрутите болты суппорта.\nСнимите суппорт.\nИзвлеките старые колодки.\nОчистите всё очистителем.\nСпецинструментом вкрутите поршень (не вдавливайте!).\nНанесите смазку.\nУстановите новые колодки.\nУстановите суппорт.\nПодсоедините ручник.\nУстановите колесо.',warning:'Задний поршень часто ВКРУЧИВАЕТСЯ по часовой стрелке, а не вдавливается! Используйте специнструмент.'},
            {id:52,name:'Замена передних тормозных дисков',price:2000,cat:'brakes',tools:'Домкрат, Головки, Отвёртка, Очиститель тормозов',specs:'Интервал|По износу/биению\nМин. толщина|Указана на диске',steps:'Снимите колесо.\nСнимите суппорт.\nОткрутите винты крепления диска.\nСнимите старый диск.\nОчистите ступицу щёткой.\nОбработайте новый диск очистителем.\nУстановите новый диск.\nЗакрутите винты.\nУстановите суппорт.\nУстановите колесо.',warning:'Удалите консервационную смазку с новых дисков очистителем! Рекомендуется менять колодки вместе с дисками.'},
            {id:53,name:'Замена задних тормозных барабанов',price:1800,cat:'brakes',tools:'Домкрат, Ключи, Отвёртка',specs:'Интервал|По износу',steps:'Снимите колесо.\nОткрутите направляющие штифты.\nСнимите старый барабан.\nОчистите механизм.\nУстановите новый барабан.\nОтрегулируйте зазор.\nУстановите колесо.',warning:'Не забудьте отрегулировать стояночный тормоз после замены барабанов.'},
            {id:54,name:'Замена тормозных шлангов',price:1500,cat:'brakes',tools:'Ключи, Тормозная жидкость, Штуцерный ключ',specs:'Интервал|При повреждении/трещинах',steps:'Отсоедините старый шланг.\nУстановите новый шланг с медными шайбами.\nЗатяните штуцеры.\nПрокачайте тормоза.\nПроверьте герметичность.',warning:'Используйте новые медные уплотнительные шайбы при замене шлангов.'},
            {id:55,name:'Замена главного тормозного цилиндра',price:2500,cat:'brakes',tools:'Ключи, Тормозная жидкость, Штуцерный ключ',specs:'Время|2-3 часа\nПризнак|Провал педали',steps:'Откачайте жидкость из бачка.\nОтсоедините тормозные трубки.\nОткрутите ГТЦ.\nУстановите новый ГТЦ.\nПодсоедините трубки.\nЗалейте жидкость.\nПрокачайте всю систему.',warning:'После замены ГТЦ обязательна полная прокачка всех четырёх колёс!'},
            {id:60,name:'Замена амортизаторов передних (2 шт)',price:3500,cat:'suspension',tools:'Домкрат, Съёмник пружин, Ключи, Динамометрический ключ',specs:'Интервал|80 000 км\nПризнак|Раскачка, течь',steps:'Снимите колесо.\nОткрутите верхнее крепление стойки.\nОткрутите нижние болты.\nИзвлеките стойку.\nСъёмником сожмите пружину.\nОткрутите гайку штока.\nСнимите старый амортизатор.\nУстановите новый.\nСоберите стойку.\nУстановите на авто.\nСделайте сход-развал.',warning:'Меняйте оба амортизатора одновременно! После замены обязателен сход-развал.'},
            {id:61,name:'Замена амортизаторов задних (2 шт)',price:2800,cat:'suspension',tools:'Домкрат, Ключи',specs:'Интервал|80 000 км',steps:'Снимите колесо.\nОткрутите нижнее крепление.\nОткрутите верхнее крепление.\nСнимите старый амортизатор.\nУстановите новый.\nЗатяните крепления.\nУстановите колесо.',warning:'Меняйте оба амортизатора одновременно!'},
            {id:62,name:'Замена сайлентблоков задней балки',price:7000,cat:'suspension',tools:'Пресс, Съёмник, Болгарка, Токарный станок (для подгонки)',specs:'Пробег|80-100 тыс. км\nЗапчасти|800-3500 ₽\nРабота|6500-12000 ₽\nСход-развал|Требуется',steps:'Снимите заднюю балку.\nВыпрессуйте старые сайлентблоки.\nПри необходимости — токарная подгонка новых.\nЗапрессуйте новые сайлентблоки.\nУстановите балку на место.\nПроверьте геометрию.',warning:'На Nissan Almera Classic (G15) балка НЕРАЗБОРНАЯ! Сайлентблоки подгоняются от ВАЗ 2108 или Рено Логан. Проверьте сайты крепления к кузову — часто гниёт.'},
            {id:63,name:'Замена сайлентблоков рычагов',price:4000,cat:'suspension',tools:'Пресс, Съёмник, Ключи',specs:'Пробег|80-120 тыс. км\nПризнак|Стук, увод авто',steps:'Снимите рычаги.\nВыпрессуйте старые сайлентблоки.\nЗапрессуйте новые.\nУстановите рычаги.\nСделайте сход-развал.',warning:'После замены сайлентблоков обязателен сход-развал!'},
            {id:64,name:'Замена шаровых опор (2 шт)',price:2200,cat:'suspension',tools:'Съёмник, Домкрат, Ключи',specs:'Интервал|По люфту\nПризнак|Стук на кочках',steps:'Снимите колесо.\nОткрутите шаровую опору.\nВыпрессуйте старую.\nЗапрессуйте новую.\nЗатяните.\nУстановите колесо.',warning:'Не эксплуатируйте авто с люфтом в шаровой — это может привести к отрыву колеса!'},
            {id:65,name:'Регулировка развал-схождения',price:2000,cat:'suspension',tools:'Стенд развал-схождения, Ключи',specs:'Рекомендация|После ремонта подвески\nПериодичность|Раз в год',steps:'Установите авто на стенд.\nЗакрепите датчики на колёсах.\nПроверьте углы установки колёс.\nОтрегулируйте схождение.\nОтрегулируйте развал.\nПроведите контрольный заезд.',warning:'На многих авто регулируется только схождение. Развал без специальных болтов не регулируется!'},
            {id:66,name:'Замена рулевых наконечников (2 шт)',price:1800,cat:'suspension',tools:'Съёмник, Ключи, Штангенциркуль',specs:'Интервал|По люфту\nПризнак|Люфт руля',steps:'Открутите старый наконечник.\nПосчитайте обороты при откручивании.\nУстановите новый на то же количество оборотов.\nЗатяните.\nСделайте сход-развал.',warning:'После замены обязателен сход-развал! Не перепутайте левый и правый наконечники.'},
            {id:67,name:'Замена пружин (2 шт)',price:3000,cat:'suspension',tools:'Съёмник пружин, Ключи',specs:'Интервал|При проседании/поломке',steps:'Снимите стойку.\nСожмите пружину съёмником.\nСнимите старую пружину.\nУстановите новую.\nРазожмите съёмник.\nУстановите стойку.\nСделайте сход-развал.',warning:'Осторожно — пружина под нагрузкой! Используйте качественные съёмники, не подвязывайте проволокой.'},
            {id:68,name:'Замена ступичного подшипника',price:2500,cat:'suspension',tools:'Пресс, Съёмник, Динамометрический ключ',specs:'Признак|Гул при движении\nВремя|2-3 часа',steps:'Снимите колесо.\nСнимите суппорт и диск.\nОткрутите ступичную гайку.\nСнимите ступицу.\nВыпрессуйте старый подшипник.\nЗапрессуйте новый.\nУстановите ступицу.\nЗатяните гайку с правильным моментом.',warning:'Не перетяните ступичную гайку — подшипник быстро выйдет из строя!'},
            {id:70,name:'Заправка кондиционера',price:2000,cat:'ac',tools:'Станция заправки, Фреон R134a, Манометры',specs:'Интервал|Каждые 2 года\nОбъём|500-800 г',steps:'Подключите манометры.\nПроверьте давление в системе.\nВакуумируйте систему (15-20 мин).\nЗаправьте фреон по весам.\nПроверьте давление на работающем кондиционере.\nПроверьте температуру воздуха из дефлекторов.',warning:'Перезаправка так же вредна, как и недозаправка! Соблюдайте норму для вашего авто.'},
            {id:71,name:'Замена компрессора кондиционера',price:6000,cat:'ac',tools:'Ключи, Станция заправки, Новый компрессор, Масло PAG',specs:'Время|3-4 часа\nПризнак|Шум, нет холода',steps:'Спустите фреон.\nСнимите ремень.\nОткрутите трубки.\nСнимите старый компрессор.\nЗалейте масло в новый.\nУстановите новый компрессор.\nПодсоедините трубки.\nВакуумируйте и заправьте систему.',warning:'Обязательно замените ресивер-осушитель при замене компрессора!'},
            {id:72,name:'Чистка испарителя кондиционера',price:1500,cat:'ac',tools:'Очиститель кондиционера, Распылитель',specs:'Рекомендация|Каждые 30 000 км\nПризнак|Запах при включении',steps:'Найдите дренажное отверстие кондиционера.\nВставьте трубку очистителя.\nРаспылите средство.\nПодождите 10 минут.\nВключите кондиционер на 10 минут.\nПроветрите салон.',warning:'Регулярная чистка предотвращает размножение бактерий и неприятный запах.'},
            {id:80,name:'Замена стартера',price:2000,cat:'electrical',tools:'Ключи, Головки',specs:'Время|1-2 часа\nПризнак|Щелчки, не крутит',steps:'Отсоедините клемму АКБ.\nОткрутите болты крепления стартера.\nОтсоедините провода.\nСнимите старый стартер.\nУстановите новый.\nПодсоедините провода.\nПодсоедините АКБ.\nПроверьте запуск.',warning:'Не забудьте отсоединить АКБ перед работой — стартер подключён напрямую к батарее!'},
            {id:81,name:'Замена генератора',price:2500,cat:'electrical',tools:'Ключи, Головки',specs:'Время|1-3 часа\nПризнак|Нет зарядки, лампа АКБ',steps:'Отсоедините клемму АКБ.\nСнимите ремень.\nОткрутите болты генератора.\nОтсоедините провода.\nСнимите старый генератор.\nУстановите новый.\nНаденьте ремень.\nПодсоедините АКБ.\nПроверьте напряжение (должно быть 13.8-14.4 В).',warning:'Проверьте натяжение ремня после установки — слабый ремень будет свистеть.'},
            {id:82,name:'Замена аккумулятора',price:300,cat:'electrical',tools:'Ключ на 10',specs:'Срок службы|3-5 лет\nПризнак|Слабый запуск',steps:'Выключите зажигание.\nОтсоедините минусовую клемму.\nОтсоедините плюсовую клемму.\nОткрутите крепление.\nСнимите старый АКБ.\nУстановите новый.\nЗакрепите.\nПодсоедините плюс, затем минус.',warning:'Не перепутайте полярность! Сначала минус, потом плюс при снятии. При установке — наоборот.'},
            {id:83,name:'Замена катушек зажигания (1 шт)',price:500,cat:'electrical',tools:'Отвёртка, Ключ',specs:'Признак|Пропуски зажигания, троит',steps:'Отсоедините разъём катушки.\nОткрутите болт крепления.\nИзвлеките старую катушку.\nУстановите новую.\nЗакрутите болт.\nПодсоедините разъём.\nПроверьте работу двигателя.',warning:'Не меняйте катушки по одной — если умерла одна, скоро умрут и остальные.'},
            {id:84,name:'Замена ламп (фара/фонарь)',price:200,cat:'electrical',tools:'Руки, Перчатки',specs:'Время|5-10 мин\nВажно|Не касаться пальцами',steps:'Откройте капот/багажник.\nСнимите защитную крышку.\nОтсоедините разъём.\nИзвлеките старую лампу.\nУстановите новую (не касаясь пальцами колбы).\nПодсоедините разъём.\nУстановите крышку.\nПроверьте работу.',warning:'Не касайтесь стекла галогенных ламп пальцами — жир оставляет пятна, лампа перегреется и лопнет!'},
            {id:90,name:'Кузовные работы (за 1 час)',price:3000,cat:'body',tools:'Сварочный аппарат, Шлифмашинка, Шпаклёвка',specs:'Время|По объёму работ',steps:'Оцените повреждения.\nЗачистите место ремонта.\nВыровняйте металл.\nЗашпаклюйте.\nЗашлифуйте.\nПодготовьте к покраске.',warning:'Качественная подготовка — 80% успеха покраски. Не торопитесь.'},
            {id:91,name:'Покраска детали (1 элемент)',price:5000,cat:'body',tools:'Краскопульт, Компрессор, Краска, Лак, Грунт',specs:'Время|1-2 дня\nСлои|Грунт + краска + лак',steps:'Зачистите деталь.\nОбезжирьте.\nНанесите грунт.\nВысушите.\nНанесите краску в 2-3 слоя.\nНанесите лак в 2 слоя.\nПолируйте после высыхания.',warning:'Краску нужно подбирать по коду — иначе будет заметен переход цвета.'},
            {id:92,name:'Полировка кузова',price:4000,cat:'body',tools:'Полировальная машинка, Паста, Круги',specs:'Время|3-5 часов\nРекомендация|2 раза в год',steps:'Тщательно вымойте авто.\nНанесите абразивную пасту.\nПолируйте машинкой.\nУдалите остатки пасты.\nНанесите финишную пасту.\nПолируйте.\nНанесите воск/керамику.',warning:'Не перегревайте лак — можно прожечь его до краски! Держите машинку в движении.'},

        function openCalendar(input){
            let popup=document.getElementById('calendarPopup');
            let today=new Date();
            if(!calDate)calDate=today;
            calYear=calDate.getFullYear();calMonth=calDate.getMonth();
            renderCalendar(popup,input);
            popup.classList.add('show');
            let rect=input.getBoundingClientRect();
            popup.style.top=(rect.bottom+window.scrollY+4)+'px';
            popup.style.left=(rect.left+window.scrollX)+'px';
            setTimeout(()=>{document.addEventListener('click',closeCal,{once:true});},100);
        }
        function closeCal(){document.getElementById('calendarPopup').classList.remove('show');}
        function renderCalendar(popup,input){
            let months=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
            let days=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
            let today=new Date();today.setHours(0,0,0,0);
            let h=`<div class="cal-header"><button id="calPrev">◀</button><span>${months[calMonth]} ${calYear}</span><button id="calNext">▶</button></div>`;
            h+=`<div class="cal-grid">${days.map(d=>`<div class="cal-day-name">${d}</div>`).join('')}`;
            let firstDay=new Date(calYear,calMonth,1).getDay()||7;
            let lastDate=new Date(calYear,calMonth+1,0).getDate();
            let prevLast=new Date(calYear,calMonth,0).getDate();
            for(let i=1;i<firstDay;i++)h+=`<div class="cal-day other">${prevLast-firstDay+i+1}</div>`;
            for(let d=1;d<=lastDate;d++){let dt=new Date(calYear,calMonth,d);let cls='cal-day';if(dt.getTime()===calDate.getTime())cls+=' active';if(dt.getTime()===today.getTime())cls+=' today';h+=`<div class="${cls}" data-date="${dt.toISOString()}">${d}</div>`;}
            let total=firstDay+lastDate-1,remaining=Math.ceil(total/7)*7-total;
            for(let i=1;i<=remaining;i++)h+=`<div class="cal-day other">${i}</div>`;
            h+=`</div>`;popup.innerHTML=h;
            popup.querySelector('#calPrev').onclick=e=>{e.stopPropagation();calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar(popup,input);};
            popup.querySelector('#calNext').onclick=e=>{e.stopPropagation();calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar(popup,input);};
            popup.querySelectorAll('.cal-day:not(.other)').forEach(d=>d.onclick=e=>{e.stopPropagation();calDate=new Date(d.dataset.date);input.value=calDate.toLocaleDateString('ru-RU');closeCal();});
        }

        function RAC(){
            let h=`<div class="card"><div class="card-title">➕ Добавить авто</div><div style="display:flex;gap:8px;flex-wrap:wrap;"><div class="form-group" style="flex:1;"><label>Модель</label><input type="text" id="acName" placeholder="Toyota Camry"></div><div class="form-group" style="flex:1;"><label>Иконка</label><input type="text" id="acIcon" placeholder="🚙"></div><div class="form-group" style="flex:1;"><label>Категория</label><input type="text" id="acCat" placeholder="Японские"></div></div><button class="btn btn-accent" id="btnAddCar">➕ Добавить</button></div>`;
            h+=`<div class="card"><div class="card-title">📋 Автомобили (${C.length})</div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px;">${C.map(c=>`<div style="background:rgba(255,255,255,0.02);padding:10px;border-radius:8px;"><strong>${c.icon} ${E(c.name)}</strong><br><small>${E(c.cat)} • Двигателей: ${c.engines.length}</small><div style="margin-top:6px;display:flex;gap:4px;"><button class="btn btn-outline btn-sm" data-engs="${c.id}">⚙️ Двигатели</button><button class="btn btn-danger btn-sm" data-delcar="${c.id}">🗑️</button></div></div>`).join('')}</div></div>`;
            if(ac){let c=C.find(x=>x.id===ac);if(c){h+=`<div class="card"><div class="card-title">⚙️ Двигатели: ${c.icon} ${E(c.name)}</div><div style="display:flex;gap:8px;flex-wrap:wrap;"><div class="form-group" style="flex:1;"><label>Название</label><input type="text" id="aeName"></div><div class="form-group" style="flex:1;"><label>Код</label><input type="text" id="aeCode"></div><div class="form-group" style="flex:1;"><label>Мощность</label><input type="text" id="aePower"></div><div class="form-group" style="flex:1;"><label>Топливо</label><select id="aeFuel"><option>Бензин</option><option>Дизель</option></select></div></div><button class="btn btn-accent" id="btnAddEng">➕ Добавить</button><div style="margin-top:10px;">${c.engines.map(e=>`<div style="background:rgba(255,255,255,0.02);padding:8px;border-radius:6px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;"><span><strong>${E(e.name)}</strong> <span class="badge" style="background:rgba(66,165,245,0.2);color:#42a5f5;">${E(e.code)}</span> ${E(e.power)} • КПП: ${e.gearboxes.length}</span><div><button class="btn btn-outline btn-sm" data-gbs="${e.id}">⚙️ КПП</button><button class="btn btn-danger btn-sm" data-deleng="${e.id}">🗑️</button></div></div>`).join('')}</div></div>`;}}
            if(ac&&ae){let c=C.find(x=>x.id===ac);if(c){let e=c.engines.find(x=>x.id===ae);if(e){h+=`<div class="card"><div class="card-title">⚙️ КПП: ${E(e.name)}</div><div style="display:flex;gap:8px;flex-wrap:wrap;"><div class="form-group" style="flex:1;"><label>Название</label><input type="text" id="agName"></div><div class="form-group" style="flex:1;"><label>Код</label><input type="text" id="agCode"></div><div class="form-group" style="flex:1;"><label>Привод</label><select id="agDrive"><option>Передний</option><option>Задний</option><option>Полный</option></select></div><div class="form-group" style="flex:1;"><label>Коэфф.</label><input type="number" id="agMult" value="1" step="0.05"></div><div class="form-group" style="flex:1;"><label>Сложность</label><input type="text" id="agBadge" placeholder="Средне"></div></div><button class="btn btn-accent" id="btnAddGb">➕ Добавить</button><div style="margin-top:10px;">${e.gearboxes.map(g=>`<div style="background:rgba(255,255,255,0.02);padding:8px;border-radius:6px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;"><span><strong>${E(g.name)}</strong> <span class="badge" style="background:rgba(171,71,188,0.2);color:#ab47bc;">${E(g.code)}</span> ${E(g.drive)} ×${g.mult.toFixed(2)}</span><button class="btn btn-danger btn-sm" data-delgb="${g.id}">🗑️</button></div>`).join('')}</div></div>`;}}}
            return h;
        }

        function RAS(){
            let h=`<div class="card"><div class="card-title">➕ Услуга</div><input type="hidden" id="svcEditId"><div style="display:flex;gap:8px;flex-wrap:wrap;"><div class="form-group" style="flex:2;"><label>Название</label><input type="text" id="svcName"></div><div class="form-group" style="flex:1;"><label>Цена</label><input type="number" id="svcPrice" value="1000"></div><div class="form-group" style="flex:1;"><label>Категория</label><select id="svcCat">${['diagnostics:🔍 Диагностика','maintenance:🛠️ ТО','engine:⚡ Двигатель','exhaust:💨 Выхлоп','transmission:⚙️ Трансмиссия','brakes:🛑 Тормоза','suspension:🔧 Подвеска','ac:❄️ Кондиционер','electrical:🔌 Электрика','body:🎨 Кузов','tires:🛞 Шины'].map(x=>`<option value="${x.split(':')[0]}">${x.split(':')[1]}</option>`).join('')}</select></div></div><div class="form-group"><label>Инструменты</label><input type="text" id="svcTools"></div><div class="form-group"><label>Регламент</label><textarea id="svcSpecs"></textarea></div><div class="form-group"><label>Инструкция</label><textarea id="svcSteps"></textarea></div><div class="form-group"><label>Предупреждение</label><input type="text" id="svcWarning"></div><button class="btn btn-accent" id="btnSaveSvc">💾 Сохранить</button><button class="btn btn-outline btn-sm" id="btnClearSvc">✕ Очистить</button></div>`;
            h+=`<div class="card"><div class="card-title">📋 Услуги (${S.length})</div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px;">${S.map(s=>`<div style="background:rgba(255,255,255,0.02);padding:10px;border-radius:8px;"><strong>${E(s.name)}</strong><br><small>${F(s.price)} • ${s.cat}</small><div style="margin-top:6px;display:flex;gap:4px;"><button class="btn btn-outline btn-sm" data-editsvc="${s.id}">✏️</button><button class="btn btn-danger btn-sm" data-delsvc="${s.id}">🗑️</button></div></div>`).join('')}</div></div>`;
            return h;
        }

        function BA(){
            document.getElementById('logoutBtn').onclick=()=>{localStorage.removeItem(KA);A=!1;R();};
            document.querySelectorAll('.admin-tab').forEach(b=>b.onclick=()=>{at=b.dataset.at;ac=null;ae=null;R();});
            document.querySelectorAll('[data-confirm]').forEach(b=>b.onclick=()=>db.ref('bookings/'+b.dataset.confirm+'/status').set('confirmed'));
            document.querySelectorAll('[data-done]').forEach(b=>b.onclick=()=>db.ref('bookings/'+b.dataset.done+'/status').set('done'));
            document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{if(confirm('Удалить?'))db.ref('bookings/'+b.dataset.del).remove();});
            document.getElementById('btnAddCar').onclick=()=>{let n=document.getElementById('acName').value.trim();if(!n)return alert('Название!');C.push({id:'c'+Date.now(),name:n,icon:document.getElementById('acIcon').value.trim()||'🚗',cat:document.getElementById('acCat').value.trim()||'Стандарт',engines:[]});sC();R();};
            document.querySelectorAll('[data-delcar]').forEach(b=>b.onclick=()=>{if(!confirm('Удалить?'))return;C=C.filter(c=>c.id!==b.dataset.delcar);sC();R();});
            document.querySelectorAll('[data-engs]').forEach(b=>b.onclick=()=>{ac=b.dataset.engs;ae=null;R();});
            let btnAE=document.getElementById('btnAddEng');if(btnAE)btnAE.onclick=()=>{let c=C.find(x=>x.id===ac);if(!c)return;let n=document.getElementById('aeName').value.trim(),cd=document.getElementById('aeCode').value.trim();if(!n||!cd)return alert('Заполните!');c.engines.push({id:'e'+Date.now(),name:n,code:cd,power:document.getElementById('aePower').value.trim(),fuel:document.getElementById('aeFuel').value,gearboxes:[]});sC();R();};
            document.querySelectorAll('[data-deleng]').forEach(b=>b.onclick=()=>{if(!confirm('Удалить?'))return;let c=C.find(x=>x.id===ac);if(c)c.engines=c.engines.filter(e=>e.id!==b.dataset.deleng);sC();R();});
            document.querySelectorAll('[data-gbs]').forEach(b=>b.onclick=()=>{ae=b.dataset.gbs;R();});
            let btnAG=document.getElementById('btnAddGb');if(btnAG)btnAG.onclick=()=>{let c=C.find(x=>x.id===ac);if(!c)return;let e=c.engines.find(x=>x.id===ae);if(!e)return;let n=document.getElementById('agName').value.trim(),cd=document.getElementById('agCode').value.trim();if(!n||!cd)return alert('Заполните!');e.gearboxes.push({id:'g'+Date.now(),name:n,code:cd,drive:document.getElementById('agDrive').value,mult:parseFloat(document.getElementById('agMult').value)||1,badge:document.getElementById('agBadge').value.trim()||'Средне'});sC();R();};
            document.querySelectorAll('[data-delgb]').forEach(b=>b.onclick=()=>{if(!confirm('Удалить?'))return;let c=C.find(x=>x.id===ac);if(!c)return;let e=c.engines.find(x=>x.id===ae);if(e)e.gearboxes=e.gearboxes.filter(g=>g.id!==b.dataset.delgb);sC();R();});
            document.getElementById('btnSaveSvc').onclick=()=>{let eid=document.getElementById('svcEditId').value,n=document.getElementById('svcName').value.trim(),p=parseInt(document.getElementById('svcPrice').value)||0;if(!n||!p)return alert('Название и цена!');let o={name:n,price:p,cat:document.getElementById('svcCat').value,tools:document.getElementById('svcTools').value.trim(),specs:document.getElementById('svcSpecs').value.trim(),steps:document.getElementById('svcSteps').value.trim(),warning:document.getElementById('svcWarning').value.trim()};if(eid){let i=S.findIndex(s=>s.id==eid);if(i>=0){o.id=S[i].id;S[i]=o;}}else{o.id=Date.now();S.push(o);}sS();document.getElementById('svcEditId').value='';document.getElementById('svcName').value='';document.getElementById('svcPrice').value='1000';R();};
            document.getElementById('btnClearSvc').onclick=()=>{document.getElementById('svcEditId').value='';document.getElementById('svcName').value='';document.getElementById('svcPrice').value='1000';};
            document.querySelectorAll('[data-editsvc]').forEach(b=>b.onclick=()=>{let s=S.find(x=>x.id==b.dataset.editsvc);if(!s)return;document.getElementById('svcEditId').value=s.id;document.getElementById('svcName').value=s.name;document.getElementById('svcPrice').value=s.price;document.getElementById('svcCat').value=s.cat;document.getElementById('svcTools').value=s.tools||'';document.getElementById('svcSpecs').value=s.specs||'';document.getElementById('svcSteps').value=s.steps||'';document.getElementById('svcWarning').value=s.warning||'';at='services';R();});
            document.querySelectorAll('[data-delsvc]').forEach(b=>b.onclick=()=>{if(!confirm('Удалить?'))return;S=S.filter(s=>s.id!=b.dataset.delsvc);sS();R();});
        }

        function OM(sid){let s=S.find(x=>x.id===sid);if(!s)return;document.getElementById('modalTitle').textContent=s.name;let h='';if(s.specs?.trim()){h+='<h3>📅 Регламент и спецификации</h3><table>';s.specs.split('\n').forEach(l=>{let p=l.split('|');if(p.length>=2)h+=`<tr><td>${E(p[0].trim())}</td><td>${E(p[1].trim())}</td></tr>`;});h+='</table>';}if(s.tools?.trim()){h+='<h3>🔧 Инструменты</h3><div style="display:flex;flex-wrap:wrap;gap:4px;">';s.tools.split(',').forEach(t=>h+=`<span class="badge" style="background:rgba(255,255,255,0.08);padding:4px 8px;">${E(t.trim())}</span>`);h+='</div>';}if(s.steps?.trim()){h+='<h3>📝 Пошаговая инструкция</h3>';s.steps.split('\n').forEach((st,i)=>h+=`<div class="step"><div class="step-head">Шаг ${i+1}</div>${E(st)}</div>`);}if(s.warning?.trim())h+=`<h3>⚠️ Предупреждение</h3><div style="background:rgba(255,152,0,0.1);border-left:4px solid var(--accent);padding:10px;border-radius:0 8px 8px 0;">${E(s.warning)}</div>`;document.getElementById('modalBody').innerHTML=h;document.getElementById('modalOverlay').classList.remove('hidden');document.body.style.overflow='hidden';}
        function CM(){document.getElementById('modalOverlay').classList.add('hidden');document.body.style.overflow='';}
        document.getElementById('modalClose').onclick=CM;
        document.getElementById('modalOverlay').onclick=e=>{if(e.target===document.getElementById('modalOverlay'))CM();};
        document.onkeydown=e=>{if(e.key==='Escape')CM();};

        LD();
    </script>
</body>
</html>
