<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Tracker PRO - Админка</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #eee;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .current-user {
            background: #0f3460;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
        }

        .admin-badge {
            background: #e94560;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            margin-left: 10px;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }

        button:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        button.secondary {
            background: #533483;
        }

        button.danger {
            background: #dc3545;
        }

        button.warning {
            background: #ffc107;
            color: #1a1a2e;
        }

        button.success {
            background: #28a745;
        }

        select, input {
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            background: #1a1a2e;
            color: white;
        }

        .add-form, .stats-card, .admin-panel {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }

        .form-group {
            flex: 1;
            min-width: 120px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 5px;
            color: #aaa;
        }

        .stats-grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: space-around;
        }

        .stat-item {
            background: #0f3460;
            padding: 15px 25px;
            border-radius: 12px;
            min-width: 120px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #e94560;
        }

        .stat-label {
            font-size: 12px;
            margin-top: 5px;
            color: #aaa;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        th {
            background: #0f3460;
            color: #e94560;
        }

        tr:hover {
            background: rgba(255,255,255,0.05);
        }

        .profit {
            color: #4caf50;
            font-weight: bold;
        }

        .loss {
            color: #f44336;
            font-weight: bold;
        }

        .action-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            margin: 0 3px;
            padding: 0 5px;
        }

        .edit-btn { color: #ffc107; }
        .delete-btn { color: #f44336; }

        .admin-btn {
            margin-top: 10px;
            width: 100%;
        }

        .user-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin: 5px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }

        .user-stats {
            font-size: 12px;
            color: #aaa;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 15px;
            min-width: 350px;
        }

        .user-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .user-tag {
            background: #0f3460;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }

        .user-tag:hover {
            background: #e94560;
        }

        @media (max-width: 768px) {
            th, td { font-size: 11px; padding: 6px; }
            .form-group { min-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="user-info">
                <div>
                    <span style="color:#aaa;">👤 Профиль:</span>
                    <span class="current-user" id="currentUserDisplay">Не авторизован</span>
                </div>
                <div class="controls">
                    <select id="currencySelect" onchange="changeCurrency()">
                        <option value="RUB">₽ RUB</option>
                        <option value="USD">$ USD</option>
                        <option value="EUR">€ EUR</option>
                    </select>
                    <button onclick="showUserList()" class="secondary">👥 Все игроки</button>
                    <button onclick="resetToMyProfile()" class="secondary">👤 Мой профиль</button>
                    <button onclick="showAdminPanel()" class="danger">🔧 Админка</button>
                </div>
            </div>
        </div>

        <div id="app"></div>
    </div>

    <!-- Модальное окно со списком пользователей -->
    <div id="userListModal" class="modal">
        <div class="modal-content">
            <h3>👥 Все игроки</h3>
            <div id="userListContainer" class="user-list"></div>
            <button onclick="closeUserList()" style="margin-top: 20px;">Закрыть</button>
        </div>
    </div>

    <!-- Админ-панель -->
    <div id="adminModal" class="modal">
        <div class="modal-content" style="min-width: 500px;">
            <h3>🔧 Админ-панель</h3>
            <div id="adminContent"></div>
            <button onclick="closeAdminPanel()" style="margin-top: 20px;">Закрыть</button>
        </div>
    </div>

    <!-- Модальное окно редактирования -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>✏️ Редактировать сделку</h3>
            <div class="form-group" style="margin: 10px 0;">
                <label>Предмет</label>
                <input type="text" id="editItemName">
            </div>
            <div class="form-group" style="margin: 10px 0;">
                <label>Цена покупки</label>
                <input type="number" id="editBuyPrice" step="0.01">
            </div>
            <div class="form-group" style="margin: 10px 0;">
                <label>Цена продажи</label>
                <input type="number" id="editSellPrice" step="0.01">
            </div>
            <button onclick="saveEdit()" class="success">Сохранить</button>
            <button onclick="closeEditModal()" style="margin-left: 10px;">Отмена</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // ========== ВАШИ ДАННЫЕ ИЗ FIREBASE ==========
        const firebaseConfig = {
            apiKey: "AIzaSyA_gNkLMsTxneTwyg5bDxKBN9osRIUrPaE",
            authDomain: "the-colony-tap.firebaseapp.com",
            databaseURL: "https://the-colony-tap-default-rtdb.firebaseio.com",
            projectId: "the-colony-tap",
            storageBucket: "the-colony-tap.firebasestorage.app",
            messagingSenderId: "433438733616",
            appId: "1:433438733616:web:76095a36161b32590d44f5"
        };
        // =============================================

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentUser = null;
        let viewingUser = null;
        let editTradeId = null;
        let currencySymbol = { RUB: '₽', USD: '$', EUR: '€' };
        let currentCurrency = 'RUB';
        let profitChart = null;
        let isAdmin = false;

        function login() {
            let nick = prompt("Введите ваш ник (латиница, цифры, _):", "Trader" + Math.floor(Math.random() * 1000));
            if (!nick) return;
            nick = nick.replace(/[^a-zA-Z0-9_]/g, '_');
            if (nick.length < 2) nick = "User_" + Date.now();
            
            currentUser = nick;
            localStorage.setItem("tradeTrackerUser", currentUser);
            viewingUser = null;
            renderApp();
        }

        function logout() {
            currentUser = null;
            viewingUser = null;
            isAdmin = false;
            localStorage.removeItem("tradeTrackerUser");
            renderLoginScreen();
        }

        function changeCurrency() {
            currentCurrency = document.getElementById("currencySelect").value;
            renderApp();
        }

        async function showUserList() {
            const snapshot = await database.ref("users").once("value");
            const users = snapshot.val() || {};
            const userList = Object.keys(users);
            const container = document.getElementById("userListContainer");
            
            // Получаем количество сделок для каждого пользователя
            const userStats = [];
            for (const user of userList) {
                const tradesSnapshot = await database.ref(`users/${user}/trades`).once("value");
                const trades = tradesSnapshot.val() || [];
                userStats.push({ name: user, count: trades.length });
            }
            
            if (userList.length === 0) {
                container.innerHTML = "<div>Пока нет других пользователей</div>";
            } else {
                container.innerHTML = userStats.map(u => 
                    `<div class="user-tag" onclick="viewUser('${u.name}')">
                        👤 ${u.name} <span style="font-size:11px;color:#aaa;">(${u.count} сделок)</span>
                    </div>`
                ).join("");
            }
            document.getElementById("userListModal").style.display = "flex";
        }

        function closeUserList() {
            document.getElementById("userListModal").style.display = "none";
        }

        function viewUser(nick) {
            viewingUser = nick;
            closeUserList();
            renderApp();
        }

        // АДМИН-ФУНКЦИИ
        function showAdminPanel() {
            const password = prompt("Введите пароль администратора:");
            if (password === "admin123") {
                isAdmin = true;
                loadAdminContent();
                document.getElementById("adminModal").style.display = "flex";
            } else if (password !== null) {
                alert("Неверный пароль!");
            }
        }

        async function loadAdminContent() {
            const snapshot = await database.ref("users").once("value");
            const users = snapshot.val() || {};
            const userList = Object.keys(users);
            
            // Собираем статистику по каждому пользователю
            const userStats = [];
            for (const user of userList) {
                const tradesSnapshot = await database.ref(`users/${user}/trades`).once("value");
                const trades = tradesSnapshot.val() || [];
                let totalProfit = 0;
                trades.forEach(t => totalProfit += t.profit || 0);
                userStats.push({ 
                    name: user, 
                    count: trades.length,
                    profit: totalProfit
                });
            }
            
            const container = document.getElementById("adminContent");
            container.innerHTML = `
                <div style="margin-bottom: 20px;">
                    <h4>⚠️ ОПАСНЫЕ ДЕЙСТВИЯ</h4>
                    <button onclick="confirmResetAll()" class="danger" style="width: 100%; margin: 5px 0;">💣 СБРОСИТЬ ВСЕ ДАННЫЕ (ВСЕХ ПОЛЬЗОВАТЕЛЕЙ)</button>
                    <button onclick="resetMyData()" class="warning" style="width: 100%; margin: 5px 0;">🗑️ Сбросить ТОЛЬКО мои данные</button>
                </div>
                
                <div style="margin-top: 20px;">
                    <h4>📊 Все пользователи (${userList.length})</h4>
                    <div style="max-height: 300px; overflow-y: auto;">
                        ${userStats.map(u => `
                            <div class="user-row">
                                <div>
                                    <strong>${u.name}</strong>
                                    <div class="user-stats">${u.count} сделок, прибыль: ${u.profit.toFixed(2)} ₽</div>
                                </div>
                                <button onclick="deleteUser('${u.name}')" class="danger" style="padding: 5px 10px;">❌ Удалить</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        async function confirmResetAll() {
            if (confirm("⚠️ ВНИМАНИЕ! Это удалит ВСЕ данные ВСЕХ пользователей! Безвозвратно!\n\nВы уверены?")) {
                if (confirm("ПОСЛЕДНЕЕ ПРЕДУПРЕЖДЕНИЕ! Введите 'ДА' для подтверждения:")) {
                    await database.ref("users").set({});
                    alert("✅ Все данные удалены!");
                    closeAdminPanel();
                    if (currentUser) renderApp();
                    else renderLoginScreen();
                }
            }
        }

        async function resetMyData() {
            if (!currentUser) return;
            if (confirm(`Удалить ВСЕ ваши данные (${currentUser})?`)) {
                await database.ref(`users/${currentUser}`).set({});
                alert("✅ Ваши данные удалены!");
                renderApp();
                closeAdminPanel();
            }
        }

        async function deleteUser(username) {
            if (confirm(`Удалить пользователя "${username}" и ВСЕ его сделки?`)) {
                await database.ref(`users/${username}`).set({});
                alert(`✅ Пользователь "${username}" удалён!`);
                if (currentUser === username) {
                    logout();
                } else {
                    loadAdminContent();
                }
                closeAdminPanel();
            }
        }

        function closeAdminPanel() {
            document.getElementById("adminModal").style.display = "none";
            isAdmin = false;
        }

        async function addTrade() {
            const itemName = document.getElementById("itemName")?.value;
            const buyPrice = parseFloat(document.getElementById("buyPrice")?.value) || 0;
            const sellPrice = parseFloat(document.getElementById("sellPrice")?.value) || 0;

            if (!itemName) { alert("Введите название предмета"); return; }

            let commission = 0, netSell = sellPrice;
            if (sellPrice > 0) {
                commission = sellPrice * 0.13;
                netSell = sellPrice - commission;
            }
            const profit = netSell - buyPrice;

            const trade = {
                id: Date.now(),
                itemName, buyPrice, sellPrice, commission, netSell, profit,
                date: new Date().toLocaleString(),
                timestamp: Date.now()
            };

            const userRef = database.ref(`users/${viewingUser || currentUser}/trades`);
            const snapshot = await userRef.once("value");
            let trades = snapshot.val() || [];
            trades.push(trade);
            await userRef.set(trades);

            document.getElementById("itemName").value = "";
            document.getElementById("buyPrice").value = "";
            document.getElementById("sellPrice").value = "";
            renderApp();
        }

        async function deleteTrade(tradeId) {
            if (!confirm("Удалить сделку?")) return;
            const userRef = database.ref(`users/${currentUser}/trades`);
            const snapshot = await userRef.once("value");
            let trades = snapshot.val() || [];
            trades = trades.filter(t => t.id !== tradeId);
            await userRef.set(trades);
            renderApp();
        }

        function openEditModal(trade) {
            editTradeId = trade.id;
            document.getElementById("editItemName").value = trade.itemName;
            document.getElementById("editBuyPrice").value = trade.buyPrice;
            document.getElementById("editSellPrice").value = trade.sellPrice;
            document.getElementById("editModal").style.display = "flex";
        }

        function closeEditModal() {
            document.getElementById("editModal").style.display = "none";
            editTradeId = null;
        }

        async function saveEdit() {
            const itemName = document.getElementById("editItemName").value;
            const buyPrice = parseFloat(document.getElementById("editBuyPrice").value) || 0;
            const sellPrice = parseFloat(document.getElementById("editSellPrice").value) || 0;

            let commission = 0, netSell = sellPrice;
            if (sellPrice > 0) {
                commission = sellPrice * 0.13;
                netSell = sellPrice - commission;
            }
            const profit = netSell - buyPrice;

            const userRef = database.ref(`users/${currentUser}/trades`);
            const snapshot = await userRef.once("value");
            let trades = snapshot.val() || [];
            const index = trades.findIndex(t => t.id === editTradeId);
            if (index !== -1) {
                trades[index] = { ...trades[index], itemName, buyPrice, sellPrice, commission, netSell, profit };
                await userRef.set(trades);
            }
            closeEditModal();
            renderApp();
        }

        function resetToMyProfile() {
            viewingUser = null;
            renderApp();
        }

        function renderLoginScreen() {
            const app = document.getElementById("app");
            app.innerHTML = `
                <div class="stats-card" style="text-align: center;">
                    <h2>🎮 Trade Tracker PRO - The Colony</h2>
                    <p style="margin: 20px 0;">Учёт продаж/покупок с комиссией Steam (13%)<br>Графики, валюты, просмотр других игроков</p>
                    <p style="margin: 10px 0; color: #e94560;">🔧 Админ-пароль: admin123</p>
                    <button onclick="login()" style="font-size: 18px; padding: 12px 30px;">🚀 Войти / Создать профиль</button>
                </div>
            `;
        }

        async function renderApp() {
            if (!currentUser) { renderLoginScreen(); return; }

            const app = document.getElementById("app");
            const isViewingOther = viewingUser && viewingUser !== currentUser;
            const activeUser = viewingUser || currentUser;

            const tradesRef = database.ref(`users/${activeUser}/trades`);
            const snapshot = await tradesRef.once("value");
            let trades = snapshot.val() || [];

            let totalBuy = 0, totalSellGross = 0, totalCommission = 0, totalProfit = 0;
            trades.forEach(t => {
                totalBuy += t.buyPrice || 0;
                totalSellGross += t.sellPrice || 0;
                totalCommission += t.commission || 0;
                totalProfit += t.profit || 0;
            });

            const dailyProfit = {};
            trades.forEach(t => {
                const date = t.date?.split(',')[0] || 'Нет даты';
                dailyProfit[date] = (dailyProfit[date] || 0) + (t.profit || 0);
            });
            const chartLabels = Object.keys(dailyProfit).slice(-7);
            const chartData = chartLabels.map(l => dailyProfit[l]);

            app.innerHTML = `
                <div class="add-form">
                    <div class="section-title" style="font-size:20px;margin-bottom:15px;color:#e94560;">➕ Новая сделка</div>
                    <div class="form-row">
                        <div class="form-group"><label>Предмет</label><input type="text" id="itemName" placeholder="Кейс, капсула..."></div>
                        <div class="form-group"><label>Покупка (${currencySymbol[currentCurrency]})</label><input type="number" id="buyPrice" step="0.01" placeholder="0"></div>
                        <div class="form-group"><label>Продажа (${currencySymbol[currentCurrency]})</label><input type="number" id="sellPrice" step="0.01" placeholder="0"></div>
                        <div class="form-group"><button onclick="addTrade()">➕ Добавить</button></div>
                    </div>
                </div>

                <div class="stats-card">
                    <div class="section-title" style="font-size:20px;margin-bottom:15px;">📊 Статистика ${isViewingOther ? `игрока ${activeUser}` : 'моя'}</div>
                    <div class="stats-grid">
                        <div class="stat-item"><div class="stat-value">${totalBuy.toFixed(2)} ${currencySymbol[currentCurrency]}</div><div class="stat-label">💰 Потрачено</div></div>
                        <div class="stat-item"><div class="stat-value">${totalSellGross.toFixed(2)} ${currencySymbol[currentCurrency]}</div><div class="stat-label">💵 Продажи</div></div>
                        <div class="stat-item"><div class="stat-value">${totalCommission.toFixed(2)} ${currencySymbol[currentCurrency]}</div><div class="stat-label">📉 Комиссия 13%</div></div>
                        <div class="stat-item"><div class="stat-value ${totalProfit >= 0 ? 'profit' : 'loss'}">${totalProfit >= 0 ? '+' : ''}${totalProfit.toFixed(2)} ${currencySymbol[currentCurrency]}</div><div class="stat-label">📈 Чистая прибыль</div></div>
                    </div>
                </div>

                <div class="stats-card">
                    <div class="section-title" style="font-size:20px;margin-bottom:15px;">📈 График прибыли (последние 7 дней)</div>
                    <div class="chart-container"><canvas id="profitChart"></canvas></div>
                </div>

                <div class="stats-card">
                    <div class="section-title" style="font-size:20px;margin-bottom:15px;">📋 История сделок</div>
                    ${trades.length === 0 ? '<div class="empty-state" style="text-align:center;padding:40px;">Нет сделок. Добавьте первую!</div>' : `
                        <table>
                            <thead><tr><th>Дата</th><th>Предмет</th><th>Покупка</th><th>Продажа</th><th>Комиссия</th><th>Чистый доход</th><th>Прибыль</th><th></th></tr></thead>
                            <tbody>
                                ${trades.slice().reverse().map(t => `
                                    <tr>
                                        <td>${t.date || '-'}</td>
                                        <td>${t.itemName}</td>
                                        <td>${t.buyPrice > 0 ? t.buyPrice.toFixed(2) + ' ' + currencySymbol[currentCurrency] : '-'}</td>
                                        <td>${t.sellPrice > 0 ? t.sellPrice.toFixed(2) + ' ' + currencySymbol[currentCurrency] : '-'}</td>
                                        <td>${t.commission > 0 ? t.commission.toFixed(2) + ' ' + currencySymbol[currentCurrency] : '-'}</td>
                                        <td>${t.netSell > 0 ? t.netSell.toFixed(2) + ' ' + currencySymbol[currentCurrency] : '-'}</td>
                                        <td class="${t.profit >= 0 ? 'profit' : 'loss'}">${t.profit >= 0 ? '+' : ''}${t.profit.toFixed(2)} ${currencySymbol[currentCurrency]}</td>
                                        <td>${!isViewingOther ? `<button class="action-btn edit-btn" onclick="openEditModalById(${t.id})">✏️</button><button class="action-btn delete-btn" onclick="deleteTrade(${t.id})">🗑️</button>` : '-'}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `}
                </div>
            `;

            document.getElementById("currentUserDisplay").innerHTML = `${currentUser} ${isViewingOther ? `→ просмотр: ${activeUser}` : ''}`;

            const ctx = document.getElementById("profitChart")?.getContext("2d");
            if (ctx && profitChart) profitChart.destroy();
            if (ctx && chartLabels.length > 0) {
                profitChart = new Chart(ctx, {
                    type: 'line',
                    data: { labels: chartLabels, datasets: [{ label: `Прибыль (${currencySymbol[currentCurrency]})`, data: chartData, borderColor: '#e94560', tension: 0.3, fill: false }] },
                    options: { responsive: true, maintainAspectRatio: true }
                });
            } else if (ctx) {
                profitChart = new Chart(ctx, {
                    type: 'line',
                    data: { labels: ['Нет данных'], datasets: [{ label: 'Прибыль', data: [0] }] },
                    options: { responsive: true }
                });
            }
        }

        window.openEditModalById = async (id) => {
            const snapshot = await database.ref(`users/${currentUser}/trades`).once("value");
            const trades = snapshot.val() || [];
            const trade = trades.find(t => t.id === id);
            if (trade) openEditModal(trade);
        };

        window.addTrade = addTrade;
        window.deleteTrade = deleteTrade;
        window.login = login;
        window.logout = logout;
        window.changeCurrency = changeCurrency;
        window.showUserList = showUserList;
        window.closeUserList = closeUserList;
        window.viewUser = viewUser;
        window.resetToMyProfile = resetToMyProfile;
        window.openEditModal = openEditModal;
        window.closeEditModal = closeEditModal;
        window.saveEdit = saveEdit;
        window.showAdminPanel = showAdminPanel;
        window.closeAdminPanel = closeAdminPanel;
        window.confirmResetAll = confirmResetAll;
        window.resetMyData = resetMyData;
        window.deleteUser = deleteUser;

        (function checkAuth() {
            const saved = localStorage.getItem("tradeTrackerUser");
            if (saved) { currentUser = saved; renderApp(); }
            else renderLoginScreen();
        })();
    </script>
</body>
</html>
