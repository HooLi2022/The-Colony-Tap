<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автосервис - Прайс-лист</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #1e1e32;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .header { text-align: center; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 2px solid rgba(255, 165, 0, 0.3); }
        .logo { font-size: 36px; font-weight: 900; color: #ff9800; letter-spacing: 3px; }
        .logo span { color: #fff; font-weight: 300; }
        .subtitle { font-size: 14px; color: #aaa; letter-spacing: 2px; margin-top: 5px; }
        .status-bar {
            text-align: center;
            padding: 8px;
            margin-bottom: 15px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .status-bar.online { background: rgba(76,175,80,0.2); color: #4caf50; }
        .status-bar.offline { background: rgba(244,67,54,0.2); color: #f44336; }
        .status-bar.connecting { background: rgba(255,152,0,0.2); color: #ff9800; }

        .smart-search { background: rgba(0,0,0,0.4); border-radius: 16px; padding: 20px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .smart-search input { width: 100%; padding: 14px 20px; border-radius: 30px; border: 2px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: #fff; font-size: 15px; outline: none; transition: all 0.3s; }
        .smart-search input:focus { border-color: #ff9800; box-shadow: 0 0 20px rgba(255,152,0,0.3); }
        .search-results { display: none; margin-top: 10px; background: rgba(0,0,0,0.5); border-radius: 12px; max-height: 300px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); }
        .search-results.active { display: block; }
        .search-result-item { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; }
        .search-result-item:hover { background: rgba(255,152,0,0.15); }
        .search-result-item:last-child { border-bottom: none; }
        .search-result-name { font-size: 13px; color: #fff; }
        .search-result-cat { font-size: 10px; color: #ff9800; text-transform: uppercase; }
        .search-result-price { font-size: 14px; color: #ff9800; font-weight: 700; }

        .selector-section { background: rgba(0,0,0,0.3); border-radius: 16px; padding: 20px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .selector-title { font-size: 13px; font-weight: 700; color: #ff9800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 14px; text-align: center; }
        .selector-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
        .selector-row:last-child { margin-bottom: 0; }
        .selector-group { flex: 1; min-width: 200px; }
        .selector-label { font-size: 10px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .selector-buttons { display: flex; flex-wrap: wrap; gap: 5px; }
        .sel-btn { padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.04); color: #ccc; cursor: pointer; font-size: 11px; font-weight: 500; transition: all 0.2s; white-space: nowrap; text-align: left; }
        .sel-btn:hover { background: rgba(255,152,0,0.15); border-color: rgba(255,152,0,0.5); color: #fff; }
        .sel-btn.active { background: #ff9800; color: #000; border-color: #ff9800; font-weight: 700; }
        .sel-btn .btn-code { font-size: 9px; color: #999; display: block; }
        .sel-btn.active .btn-code { color: rgba(0,0,0,0.7); }

        .selected-config { background: rgba(255,152,0,0.12); border: 1px solid #ff9800; border-radius: 10px; padding: 12px 16px; margin-top: 12px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .selected-config-icon { font-size: 32px; }
        .selected-config-info { flex: 1; }
        .selected-config-name { font-size: 15px; font-weight: 700; color: #fff; }
        .selected-config-detail { font-size: 11px; color: #ccc; }
        .selected-config-code { font-size: 10px; color: #ff9800; margin-top: 2px; }
        .selected-config-badge { background: #ff9800; color: #000; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 12px; }

        .filter-buttons { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; justify-content: center; }
        .filter-btn { padding: 8px 14px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: #ccc; cursor: pointer; font-size: 11px; font-weight: 500; }
        .filter-btn:hover { background: rgba(255,152,0,0.2); border-color: #ff9800; color: #fff; }
        .filter-btn.active { background: #ff9800; color: #000; border-color: #ff9800; font-weight: 700; }

        .total-panel { background: #ff9800; border-radius: 12px; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 8px; position: sticky; top: 10px; z-index: 10; }
        .total-label { font-size: 12px; font-weight: 600; color: #000; text-transform: uppercase; }
        .total-price { font-size: 28px; font-weight: 900; color: #000; }
        .clear-btn { padding: 8px 16px; border-radius: 30px; border: 2px solid #000; background: transparent; color: #000; cursor: pointer; font-weight: 700; font-size: 12px; text-transform: uppercase; }
        .clear-btn:hover { background: #000; color: #ff9800; }

        .category-title { font-size: 13px; font-weight: 700; color: #ff9800; text-transform: uppercase; letter-spacing: 1px; margin: 15px 0 8px 5px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.08); }
        .category-title:first-child { border-top: none; margin-top: 0; padding-top: 0; }
        .service-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; border-radius: 10px; background: rgba(255,255,255,0.02); margin-bottom: 4px; border: 1px solid transparent; gap: 10px; }
        .service-row:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,152,0,0.3); }
        .service-row.selected { background: rgba(255,152,0,0.2); border-color: #ff9800; }
        .service-left { display: flex; align-items: center; gap: 10px; flex: 1; cursor: pointer; min-width: 150px; }
        .check-box { width: 24px; height: 24px; border-radius: 5px; border: 2px solid rgba(255,255,255,0.3); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; color: #000; }
        .service-row.selected .check-box { background: #ff9800; border-color: #ff9800; }
        .service-name { font-size: 13px; color: #ddd; }
        .service-row.selected .service-name { color: #fff; font-weight: 600; }
        .service-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .service-price { font-size: 15px; font-weight: 700; color: #ff9800; white-space: nowrap; }
        .service-row.selected .service-price { color: #fff; }
        .price-note { font-size: 10px; color: #888; margin-left: 3px; }
        .detail-btn { padding: 7px 14px; border-radius: 20px; border: 2px solid #ff9800; background: rgba(255,152,0,0.1); color: #ff9800; cursor: pointer; font-size: 11px; font-weight: 700; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.2s; }
        .detail-btn:hover { background: #ff9800; color: #000; box-shadow: 0 0 15px rgba(255,152,0,0.5); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .modal-overlay.hidden { display: none; }
        .modal { background: #1e1e32; border-radius: 16px; width: 90%; max-width: 800px; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 2px solid #ff9800; }
        .modal-header { background: #ff9800; padding: 16px 20px; border-radius: 14px 14px 0 0; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 5; }
        .modal-title { font-size: 18px; font-weight: 800; color: #000; }
        .modal-close { width: 34px; height: 34px; border-radius: 50%; border: 2px solid #000; background: transparent; color: #000; cursor: pointer; font-size: 18px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: #000; color: #ff9800; }
        .modal-body { padding: 20px; }
        .modal-body h3 { font-size: 15px; color: #ff9800; margin: 20px 0 10px 0; text-transform: uppercase; }
        .modal-body h3:first-child { margin-top: 0; }
        .modal-tools { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
        .tool-tag { background: rgba(255,255,255,0.08); padding: 5px 10px; border-radius: 15px; font-size: 11px; color: #ddd; }
        .modal-warning { background: rgba(255,152,0,0.12); border-left: 4px solid #ff9800; padding: 12px 14px; border-radius: 0 8px 8px 0; margin: 10px 0; font-size: 13px; color: #ffa726; }
        .modal-info-table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 12px; }
        .modal-info-table td { padding: 6px 10px; border-bottom: 1px solid rgba(255,255,255,0.08); color: #ccc; }
        .modal-info-table td:first-child { font-weight: 600; color: #ff9800; white-space: nowrap; width: 40%; }
        .step-block { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.06); }
        .step-header { font-weight: 700; color: #ff9800; font-size: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .step-number { background: #ff9800; color: #000; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 13px; }
        .step-text { font-size: 13px; color: #ccc; line-height: 1.6; }
        .step-image { width: 100%; max-width: 400px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); margin-top: 8px; cursor: pointer; }
        .footer { text-align: center; margin-top: 25px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.08); color: #666; font-size: 11px; }
        .admin-link { text-align: right; margin-bottom: 10px; }
        .admin-link a { color: #666; font-size: 11px; text-decoration: none; }
        .admin-link a:hover { color: #ff9800; }

        .btn { padding: 10px 18px; border-radius: 25px; border: none; cursor: pointer; font-size: 12px; font-weight: 700; transition: all 0.2s; }
        .btn-primary { background: #ff9800; color: #000; }
        .btn-primary:hover { background: #ffb74d; }
        .btn-danger { background: #e53935; color: #fff; }
        .btn-danger:hover { background: #ef5350; }
        .btn-outline { background: transparent; border: 2px solid #ff9800; color: #ff9800; }
        .btn-outline:hover { background: #ff9800; color: #000; }
        .btn-sm { padding: 5px 10px; font-size: 10px; border-radius: 15px; }

        .admin-section { background: rgba(0,0,0,0.3); border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .admin-section h3 { font-size: 16px; color: #ff9800; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; }
        .admin-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 14px; }
        .admin-card h4 { font-size: 13px; color: #fff; margin-bottom: 6px; }
        .admin-card p { font-size: 10px; color: #999; margin-bottom: 3px; }
        .admin-card .card-actions { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 10px; font-weight: 700; color: #999; text-transform: uppercase; margin-bottom: 4px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: #fff; font-size: 12px; outline: none; font-family: inherit; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: #ff9800; }
        .form-group textarea { min-height: 60px; resize: vertical; }
        .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .form-row .form-group { flex: 1; min-width: 160px; }
        .badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 9px; font-weight: 700; margin-left: 4px; }
        .badge-engine { background: rgba(66,165,245,0.2); color: #42a5f5; }
        .badge-gearbox { background: rgba(171,71,188,0.2); color: #ab47bc; }
        .empty-state { text-align: center; padding: 30px; color: #666; }
        .tabs-admin { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-admin { padding: 10px 18px; border-radius: 25px; border: 2px solid rgba(255,255,255,0.2); background: transparent; color: #ccc; cursor: pointer; font-size: 12px; font-weight: 600; }
        .tab-admin:hover { border-color: #ff9800; color: #fff; }
        .tab-admin.active { background: #ff9800; color: #000; border-color: #ff9800; }
        .tab-content-admin { display: none; }
        .tab-content-admin.active { display: block; }

        @media (max-width: 768px) {
            .container { padding: 12px; }
            .admin-grid { grid-template-columns: 1fr; }
            .form-row { flex-direction: column; }
            .service-row { flex-wrap: wrap; padding: 10px; }
            .service-right { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body>
    <div class="container" id="appContainer">
        <div class="header">
            <div class="logo">AUTO<span>SERVICE</span></div>
            <div class="subtitle">Загрузка данных...</div>
        </div>
        <div class="status-bar connecting" id="statusBar">⏳ Подключение к базе данных...</div>
        <div class="empty-state" style="padding:60px;">🔄 Синхронизация с Firebase...</div>
    </div>

    <div class="modal-overlay hidden" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle"></span>
                <button class="modal-close" id="modalClose">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import { getDatabase, ref, get, set, onValue, off } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

        const FIREBASE_URL = 'https://the-colony-tap-default-rtdb.firebaseio.com/';
        const ADMIN_PASS = 'admin123';
        const KEY_AUTH = 'as_auth';

        const firebaseConfig = { databaseURL: FIREBASE_URL };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const carsRef = ref(db, 'cars');
        const servicesRef = ref(db, 'services');

        let isAdmin = localStorage.getItem(KEY_AUTH) === '1';
        let cars = [];
        let services = [];
        let selCar = null;
        let selEng = null;
        let selGb = null;
        let picks = new Set();
        let filt = 'all';
        let admTab = 'cars';
        let admCar = null;
        let admEng = null;
        let dbConnected = false;

        function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

        function fmt(p) { return p.toLocaleString('ru-RU') + ' ₽'; }

        function getSel() {
            let c = cars.find(x => x.id === selCar);
            if (!c) return null;
            let e = c.engines.find(x => x.id === selEng);
            if (!e) return null;
            let g = e.gearboxes.find(x => x.id === selGb);
            return g ? { car: c, engine: e, gearbox: g } : null;
        }

        function mult() { let d = getSel(); return d ? d.gearbox.mult : 1; }
        function prc(s) { return Math.round(s.price * mult()); }

        function updateStatus(state) {
            const bar = document.getElementById('statusBar');
            if (!bar) return;
            bar.className = 'status-bar ' + state;
            if (state === 'online') bar.textContent = '🟢 Онлайн • Данные синхронизированы';
            else if (state === 'offline') bar.textContent = '🔴 Офлайн • Работаем с локальными данными';
            else bar.textContent = '🟡 Подключение...';
        }

        function loadFromFB() {
            updateStatus('connecting');
            Promise.all([get(carsRef), get(servicesRef)]).then(([carsSnap, svcSnap]) => {
                if (carsSnap.exists()) cars = carsSnap.val();
                else cars = [];
                if (svcSnap.exists()) services = svcSnap.val();
                else services = [];
                if (!selCar || !cars.find(c => c.id === selCar)) {
                    selCar = cars[0] ? cars[0].id : null;
                    selEng = cars[0] && cars[0].engines[0] ? cars[0].engines[0].id : null;
                    selGb = cars[0] && cars[0].engines[0] && cars[0].engines[0].gearboxes[0] ? cars[0].engines[0].gearboxes[0].id : null;
                }
                dbConnected = true;
                updateStatus('online');
                render();
            }).catch(err => {
                console.error('Ошибка загрузки:', err);
                dbConnected = false;
                updateStatus('offline');
                let localCars = localStorage.getItem('as_cars_local');
                let localSvc = localStorage.getItem('as_svc_local');
                cars = localCars ? JSON.parse(localCars) : [];
                services = localSvc ? JSON.parse(localSvc) : [];
                if (!selCar && cars.length) { selCar = cars[0].id;
                    selEng = cars[0].engines[0]?.id;
                    selGb = cars[0].engines[0]?.gearboxes[0]?.id; }
                render();
            });
            onValue(carsRef, (snap) => {
                if (snap.exists()) cars = snap.val();
                else cars = [];
                dbConnected = true;
                updateStatus('online');
                render();
            });
            onValue(servicesRef, (snap) => {
                if (snap.exists()) services = snap.val();
                else services = [];
                dbConnected = true;
                updateStatus('online');
                render();
            });
        }

        function saveToFB() {
            if (!dbConnected) {
                localStorage.setItem('as_cars_local', JSON.stringify(cars));
                localStorage.setItem('as_svc_local', JSON.stringify(services));
                updateStatus('offline');
                return;
            }
            set(carsRef, cars).catch(() => {
                localStorage.setItem('as_cars_local', JSON.stringify(cars));
            });
            set(servicesRef, services).catch(() => {
                localStorage.setItem('as_svc_local', JSON.stringify(services));
            });
        }

        function render() {
            let h = '';
            if (isAdmin) h = renderAdmin();
            else h = renderClient();
            document.getElementById('appContainer').innerHTML = h;
            if (isAdmin) bindAdmin();
            else bindClient();
            updateStatus(dbConnected ? 'online' : 'offline');
        }

        // ==================== КЛИЕНТ ====================
        function renderClient() {
            let h = '';
            h += '<div class="header"><div class="logo">AUTO<span>SERVICE</span></div><div class="subtitle">Прайс-лист</div></div>';
            h += '<div class="status-bar online" id="statusBar">🟢 Онлайн</div>';
            h += '<div class="admin-link"><a href="#" id="loginLink">🔐 Админ</a></div>';
            h += '<div class="smart-search"><input type="text" id="smartSearch" placeholder="🔍 Умный поиск: услуга, инструмент, категория..." autocomplete="off"><div class="search-results" id="searchResults"></div></div>';
            h += '<div class="selector-section"><div class="selector-title">🚗 Выберите авто</div>';
            h += '<div class="selector-row"><div class="selector-group"><div class="selector-label">Модель</div><div class="selector-buttons" id="carBtns">';
            cars.forEach(c => h += '<button class="sel-btn' + (c.id === selCar ? ' active' : '') + '" data-car="' + c.id + '">' + c.icon + ' ' + esc(c.name) + '<span class="btn-code">' + esc(c.cat) + '</span></button>');
            h += '</div></div></div>';

            let car = cars.find(c => c.id === selCar);
            h += '<div class="selector-row"><div class="selector-group"><div class="selector-label">Двигатель</div><div class="selector-buttons" id="engBtns">';
            if (car) car.engines.forEach(e => h += '<button class="sel-btn' + (e.id === selEng ? ' active' : '') + '" data-eng="' + e.id + '">' + esc(e.name) + ' (' + esc(e.power) + ')<span class="btn-code">' + esc(e.code) + '</span></button>');
            h += '</div></div></div>';
            h += '<div class="selector-row"><div class="selector-group"><div class="selector-label">КПП</div><div class="selector-buttons" id="gbBtns">';
            if (car) { let eng = car.engines.find(e => e.id === selEng); if (eng) eng.gearboxes.forEach(g => h += '<button class="sel-btn' + (g.id === selGb ? ' active' : '') + '" data-gb="' + g.id + '">' + esc(g.name) + '<span class="btn-code">' + esc(g.drive) + ' • ' + esc(g.code) + '</span></button>')); }
            h += '</div></div></div>';
            let d = getSel();
            if (d) h += '<div class="selected-config"><span class="selected-config-icon">' + d.car.icon + '</span><div class="selected-config-info"><div class="selected-config-name">' + esc(d.car.name) + '</div><div class="selected-config-detail">' + esc(d.engine.name) + ' • ' + esc(d.gearbox.name) + '</div><div class="selected-config-code">×' + d.gearbox.mult.toFixed(2) + '</div></div><span class="selected-config-badge">' + esc(d.gearbox.badge) + '</span></div>';
            h += '</div>';

            let cats = ['maintenance','engine','exhaust','transmission','brakes','suspension','welding','diagnostics'];
            let catNames = { maintenance:'🛠️ ТО', engine:'⚡ Двигатель', exhaust:'💨 Выхлоп', transmission:'⚙️ Трансмиссия', brakes:'🛑 Тормоза', suspension:'🔧 Подвеска', welding:'🔥 Сварка', diagnostics:'🔍 Диагностика' };
            h += '<div class="filter-buttons" id="filtBtns"><button class="filter-btn' + (filt === 'all' ? ' active' : '') + '" data-filt="all">Все</button>';
            cats.forEach(c => h += '<button class="filter-btn' + (filt === c ? ' active' : '') + '" data-filt="' + c + '">' + (catNames[c] || c) + '</button>');
            h += '</div>';

            let total = 0;
            picks.forEach(id => { let s = services.find(x => x.id === id); if (s) total += prc(s); });
            h += '<div class="total-panel"><div><div class="total-label">Выбрано: ' + picks.size + ' шт.</div></div><div class="total-price">' + fmt(total) + '</div><button class="clear-btn" id="clearBtn">Сбросить</button></div>';

            let list = services.filter(s => filt === 'all' || s.cat === filt);
            let grp = {};
            list.forEach(s => { if (!grp[s.cat]) grp[s.cat] = [];
                grp[s.cat].push(s); });
            h += '<div id="svcList">';
            Object.keys(grp).forEach(k => {
                h += '<div class="category-title">' + (catNames[k] || k) + '</div>';
                grp[k].forEach(s => {
                    let p = prc(s);
                    let diff = p - s.price;
                    let note = diff !== 0 ? '<span class="price-note">(' + (diff > 0 ? '+' : '') + diff + ' ₽)</span>' : '';
                    h += '<div class="service-row' + (picks.has(s.id) ? ' selected' : '') + '" data-sid="' + s.id + '"><div class="service-left"><div class="check-box">' + (picks.has(s.id) ? '✓' : '') + '</div><span class="service-name">' + esc(s.name) + '</span></div><div class="service-right"><span class="service-price">' + fmt(p) + ' ' + note + '</span><button class="detail-btn" data-det="' + s.id + '">📋 Подробнее</button></div></div>';
                });
            });
            if (!list.length) h += '<div class="empty-state">Ничего не найдено</div>';
            h += '</div><div class="footer">© 2026 AutoService</div>';
            return h;
        }

        function bindClient() {
            document.getElementById('loginLink').onclick = function(e) {
                e.preventDefault();
                let p = prompt('Пароль:');
                if (p === ADMIN_PASS) { localStorage.setItem(KEY_AUTH, '1');
                    isAdmin = true;
                    render(); } else if (p !== null) alert('Неверно!');
            };
            document.querySelectorAll('#carBtns .sel-btn').forEach(b => b.onclick = function() {
                selCar = b.dataset.car;
                let c = cars.find(x => x.id === selCar);
                selEng = c?.engines[0]?.id || null;
                selGb = c?.engines[0]?.gearboxes[0]?.id || null;
                picks.clear();
                render();
            });
            document.querySelectorAll('#engBtns .sel-btn').forEach(b => b.onclick = function() {
                selEng = b.dataset.eng;
                let c = cars.find(x => x.id === selCar);
                if (c) { let e = c.engines.find(x => x.id === selEng);
                    selGb = e?.gearboxes[0]?.id || null; }
                picks.clear();
                render();
            });
            document.querySelectorAll('#gbBtns .sel-btn').forEach(b => b.onclick = function() { selGb = b.dataset.gb;
                picks.clear();
                render(); });
            document.querySelectorAll('#filtBtns .filter-btn').forEach(b => b.onclick = function() { filt = b.dataset.filt;
                render(); });
            document.getElementById('clearBtn').onclick = function() { picks.clear();
                render(); };
            document.querySelectorAll('.service-row').forEach(r => {
                r.querySelector('.service-left').onclick = function() { let sid = parseInt(r.dataset.sid);
                    picks.has(sid) ? picks.delete(sid) : picks.add(sid);
                    render(); };
                r.querySelector('.detail-btn').onclick = function(e) { e.stopPropagation();
                    openModal(parseInt(r.querySelector('.detail-btn').dataset.det)); };
            });
            let ss = document.getElementById('smartSearch');
            let sr = document.getElementById('searchResults');
            ss.oninput = function() {
                let q = ss.value.toLowerCase().trim();
                if (!q) { sr.classList.remove('active');
                    sr.innerHTML = ''; return; }
                let results = services.filter(s => s.name.toLowerCase().indexOf(q) >= 0 || (s.tools && s.tools.toLowerCase().indexOf(q) >= 0) || s.cat.toLowerCase().indexOf(q) >= 0);
                if (results.length) {
                    sr.classList.add('active');
                    sr.innerHTML = results.map(s => '<div class="search-result-item" data-ssid="' + s.id + '"><div><div class="search-result-name">' + esc(s.name) + '</div><div class="search-result-cat">' + s.cat + '</div></div><div class="search-result-price">' + fmt(prc(s)) + '</div></div>').join('');
                    sr.querySelectorAll('.search-result-item').forEach(item => item.onclick = function() { let sid = parseInt(item.dataset.ssid);
                        picks.has(sid) ? picks.delete(sid) : picks.add(sid);
                        ss.value = '';
                        sr.classList.remove('active');
                        render(); });
                } else { sr.classList.add('active');
                    sr.innerHTML = '<div class="empty-state" style="padding:15px;">Ничего не найдено</div>'; }
            };
        }

        // ==================== АДМИН ====================
        function renderAdmin() {
            let h = '';
            h += '<div class="header"><div class="logo">AUTO<span>SERVICE</span></div><div class="subtitle">⚙️ Админ-панель</div></div>';
            h += '<div class="status-bar online" id="statusBar">🟢 Онлайн</div>';
            h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;"><div class="tabs-admin"><button class="tab-admin' + (admTab === 'cars' ? ' active' : '') + '" data-atab="cars">🚗 Авто</button><button class="tab-admin' + (admTab === 'svc' ? ' active' : '') + '" data-atab="svc">🔧 Услуги</button></div><button class="btn btn-outline btn-sm" id="logoutBtn">🚪 Выйти</button></div>';

            h += '<div class="tab-content-admin' + (admTab === 'cars' ? ' active' : '') + '" id="atab-cars">';
            h += '<div class="admin-section"><h3>➕ Добавить авто</h3><div class="form-row"><div class="form-group"><label>Модель</label><input type="text" id="acName"></div><div class="form-group"><label>Иконка</label><input type="text" id="acIcon" placeholder="🚙"></div><div class="form-group"><label>Категория</label><input type="text" id="acCat" placeholder="Бизнес"></div></div><button class="btn btn-primary" id="btnAddCar">➕ Добавить</button></div>';
            h += '<div class="admin-section"><h3>📋 Список авто</h3><div class="admin-grid">';
            cars.forEach(c => h += '<div class="admin-card"><h4>' + c.icon + ' ' + esc(c.name) + '</h4><p>' + esc(c.cat) + ' | Двигателей: ' + c.engines.length + '</p><div class="card-actions"><button class="btn btn-sm btn-outline" data-engs="' + c.id + '">⚙️ Двигатели</button><button class="btn btn-sm btn-danger" data-delcar="' + c.id + '">🗑️</button></div></div>');
            if (!cars.length) h += '<div class="empty-state">Нет авто</div>';
            h += '</div></div>';

            if (admCar) {
                let ac = cars.find(c => c.id === admCar);
                if (ac) {
                    h += '<div class="admin-section"><h3>⚙️ Двигатели: ' + ac.icon + ' ' + esc(ac.name) + '</h3><div class="form-row"><div class="form-group"><label>Название</label><input type="text" id="aeName"></div><div class="form-group"><label>Код</label><input type="text" id="aeCode"></div><div class="form-group"><label>Мощность</label><input type="text" id="aePower"></div><div class="form-group"><label>Топливо</label><select id="aeFuel"><option>Бензин</option><option>Дизель</option></select></div></div><button class="btn btn-primary" id="btnAddEng">➕ Добавить</button><div style="margin-top:12px;">';
                    ac.engines.forEach(e => h += '<div style="background:rgba(255,255,255,0.03);padding:10px;border-radius:8px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;"><span><strong>' + esc(e.name) + '</strong> <span class="badge badge-engine">' + esc(e.code) + '</span> ' + esc(e.power) + ' ' + esc(e.fuel) + ' | КПП: ' + e.gearboxes.length + '</span><div><button class="btn btn-sm btn-outline" data-gbs="' + e.id + '">⚙️ КПП</button><button class="btn btn-sm btn-danger" data-deleng="' + e.id + '">🗑️</button></div></div>');
                    if (!ac.engines.length) h += '<div class="empty-state">Нет двигателей</div>';
                    h += '</div></div>';
                }
            }

            if (admCar && admEng) {
                let ac = cars.find(c => c.id === admCar);
                if (ac) {
                    let eng = ac.engines.find(e => e.id === admEng);
                    if (eng) {
                        h += '<div class="admin-section"><h3>⚙️ КПП: ' + esc(eng.name) + ' (' + esc(eng.code) + ')</h3><div class="form-row"><div class="form-group"><label>Название</label><input type="text" id="agName"></div><div class="form-group"><label>Код</label><input type="text" id="agCode"></div><div class="form-group"><label>Привод</label><select id="agDrive"><option>Передний</option><option>Задний</option><option>Полный</option></select></div><div class="form-group"><label>Коэфф.</label><input type="number" id="agMult" value="1" step="0.05"></div><div class="form-group"><label>Сложность</label><input type="text" id="agBadge" placeholder="Средне"></div></div><button class="btn btn-primary" id="btnAddGb">➕ Добавить</button><div style="margin-top:12px;">';
                        eng.gearboxes.forEach(g => h += '<div style="background:rgba(255,255,255,0.03);padding:10px;border-radius:8px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;"><span><strong>' + esc(g.name) + '</strong> <span class="badge badge-gearbox">' + esc(g.code) + '</span> ' + esc(g.drive) + ' ×' + g.mult.toFixed(2) + ' <em>' + esc(g.badge) + '</em></span><button class="btn btn-sm btn-danger" data-delgb="' + g.id + '">🗑️</button></div>');
                        if (!eng.gearboxes.length) h += '<div class="empty-state">Нет КПП</div>';
                        h += '</div></div>';
                    }
                }
            }
            h += '</div>';

            h += '<div class="tab-content-admin' + (admTab === 'svc' ? ' active' : '') + '" id="atab-svc">';
            h += '<div class="admin-section"><h3>➕ Услуга</h3><input type="hidden" id="svcEditId"><div class="form-row"><div class="form-group"><label>Название</label><input type="text" id="svcName"></div><div class="form-group"><label>Цена</label><input type="number" id="svcPrice" value="1000"></div><div class="form-group"><label>Категория</label><select id="svcCat"><option value="maintenance">🛠️ ТО</option><option value="engine">⚡ Двигатель</option><option value="exhaust">💨 Выхлоп</option><option value="transmission">⚙️ Трансмиссия</option><option value="brakes">🛑 Тормоза</option><option value="suspension">🔧 Подвеска</option><option value="welding">🔥 Сварка</option><option value="diagnostics">🔍 Диагностика</option></select></div></div><div class="form-group"><label>Инструменты</label><input type="text" id="svcTools"></div><div class="form-group"><label>Регламент (строка|значение)</label><textarea id="svcSpecs"></textarea></div><div class="form-group"><label>Инструкция</label><textarea id="svcSteps"></textarea></div><div class="form-group"><label>Предупреждение</label><input type="text" id="svcWarning"></div><div class="form-group"><label>URL картинки</label><input type="text" id="svcImage"></div><button class="btn btn-primary" id="btnSaveSvc">💾 Сохранить</button><button class="btn btn-outline btn-sm" id="btnClearSvc">✕ Очистить</button></div>';
            h += '<div class="admin-section"><h3>📋 Услуги</h3><div class="admin-grid">';
            services.forEach(s => h += '<div class="admin-card"><h4>' + esc(s.name) + '</h4><p>' + fmt(s.price) + ' | ' + s.cat + '</p><p>' + (s.tools || '—') + '</p><div class="card-actions"><button class="btn btn-sm btn-outline" data-editsvc="' + s.id + '">✏️</button><button class="btn btn-sm btn-danger" data-delsvc="' + s.id + '">🗑️</button></div></div>');
            if (!services.length) h += '<div class="empty-state">Нет услуг</div>';
            h += '</div></div></div>';
            h += '<div class="footer">Админ-панель • Данные в Firebase</div>';
            return h;
        }

        function bindAdmin() {
            document.getElementById('logoutBtn').onclick = function() { localStorage.removeItem(KEY_AUTH);
                isAdmin = false;
                render(); };
            document.querySelectorAll('.tab-admin').forEach(b => b.onclick = function() { admTab = b.dataset.atab;
                admCar = null;
                admEng = null;
                render(); });
            document.getElementById('btnAddCar').onclick = function() {
                let n = document.getElementById('acName').value.trim();
                let i = document.getElementById('acIcon').value.trim() || '🚗';
                let c = document.getElementById('acCat').value.trim() || 'Стандарт';
                if (!n) return alert('Название!');
                cars.push({ id: 'c' + Date.now(), name: n, icon: i, cat: c, engines: [] });
                saveToFB();
                render();
            };
            document.querySelectorAll('[data-delcar]').forEach(b => b.onclick = function() {
                if (!confirm('Удалить?')) return;
                cars = cars.filter(c => c.id !== b.dataset.delcar);
                if (selCar === b.dataset.delcar) { selCar = cars[0]?.id || null;
                    selEng = cars[0]?.engines[0]?.id || null;
                    selGb = cars[0]?.engines[0]?.gearboxes[0]?.id || null; }
                saveToFB();
                admCar = null;
                admEng = null;
                render();
            });
            document.querySelectorAll('[data-engs]').forEach(b => b.onclick = function() { admCar = b.dataset.engs;
                admEng = null;
                render(); });
            let btnAddEng = document.getElementById('btnAddEng');
            if (btnAddEng) btnAddEng.onclick = function() {
                let ac = cars.find(c => c.id === admCar);
                if (!ac) return;
                let n = document.getElementById('aeName').value.trim();
                let cd = document.getElementById('aeCode').value.trim();
                let p = document.getElementById('aePower').value.trim();
                let f = document.getElementById('aeFuel').value;
                if (!n || !cd) return alert('Заполните!');
                ac.engines.push({ id: 'e' + Date.now(), name: n, code: cd, power: p, fuel: f, gearboxes: [] });
                saveToFB();
                render();
            };
            document.querySelectorAll('[data-deleng]').forEach(b => b.onclick = function() {
                if (!confirm('Удалить?')) return;
                let ac = cars.find(c => c.id === admCar);
                if (ac) ac.engines = ac.engines.filter(e => e.id !== b.dataset.deleng);
                saveToFB();
                render();
            });
            document.querySelectorAll('[data-gbs]').forEach(b => b.onclick = function() { admEng = b.dataset.gbs;
                render(); });
            let btnAddGb = document.getElementById('btnAddGb');
            if (btnAddGb) btnAddGb.onclick = function() {
                let ac = cars.find(c => c.id === admCar);
                if (!ac) return;
                let eng = ac.engines.find(e => e.id === admEng);
                if (!eng) return;
                let n = document.getElementById('agName').value.trim();
                let cd = document.getElementById('agCode').value.trim();
                let d = document.getElementById('agDrive').value;
                let m = parseFloat(document.getElementById('agMult').value) || 1;
                let bd = document.getElementById('agBadge').value.trim() || 'Средне';
                if (!n || !cd) return alert('Заполните!');
                eng.gearboxes.push({ id: 'g' + Date.now(), name: n, code: cd, drive: d, mult: m, badge: bd });
                saveToFB();
                render();
            };
            document.querySelectorAll('[data-delgb]').forEach(b => b.onclick = function() {
                if (!confirm('Удалить?')) return;
                let ac = cars.find(c => c.id === admCar);
                if (!ac) return;
                let eng = ac.engines.find(e => e.id === admEng);
                if (eng) eng.gearboxes = eng.gearboxes.filter(g => g.id !== b.dataset.delgb);
                saveToFB();
                render();
            });
            document.getElementById('btnSaveSvc').onclick = function() {
                let eid = document.getElementById('svcEditId').value;
                let n = document.getElementById('svcName').value.trim();
                let p = parseInt(document.getElementById('svcPrice').value) || 0;
                let c = document.getElementById('svcCat').value;
                let t = document.getElementById('svcTools').value.trim();
                let sp = document.getElementById('svcSpecs').value.trim();
                let st = document.getElementById('svcSteps').value.trim();
                let w = document.getElementById('svcWarning').value.trim();
                let im = document.getElementById('svcImage').value.trim();
                if (!n || !p) return alert('Название и цена!');
                if (eid) {
                    let idx = services.findIndex(s => s.id == eid);
                    if (idx >= 0) services[idx] = { id: services[idx].id, name: n, price: p, cat: c, tools: t, specs: sp, steps: st, warning: w, image: im };
                } else {
                    services.push({ id: Date.now(), name: n, price: p, cat: c, tools: t, specs: sp, steps: st, warning: w, image: im });
                }
                saveToFB();
                document.getElementById('svcEditId').value = '';
                document.getElementById('svcName').value = '';
                document.getElementById('svcPrice').value = '1000';
                document.getElementById('svcTools').value = '';
                document.getElementById('svcSpecs').value = '';
                document.getElementById('svcSteps').value = '';
                document.getElementById('svcWarning').value = '';
                document.getElementById('svcImage').value = '';
                render();
            };
            document.getElementById('btnClearSvc').onclick = function() {
                document.getElementById('svcEditId').value = '';
                document.getElementById('svcName').value = '';
                document.getElementById('svcPrice').value = '1000';
                document.getElementById('svcTools').value = '';
                document.getElementById('svcSpecs').value = '';
                document.getElementById('svcSteps').value = '';
                document.getElementById('svcWarning').value = '';
                document.getElementById('svcImage').value = '';
            };
            document.querySelectorAll('[data-editsvc]').forEach(b => b.onclick = function() {
                let s = services.find(x => x.id == b.dataset.editsvc);
                if (!s) return;
                document.getElementById('svcEditId').value = s.id;
                document.getElementById('svcName').value = s.name;
                document.getElementById('svcPrice').value = s.price;
                document.getElementById('svcCat').value = s.cat;
                document.getElementById('svcTools').value = s.tools || '';
                document.getElementById('svcSpecs').value = s.specs || '';
                document.getElementById('svcSteps').value = s.steps || '';
                document.getElementById('svcWarning').value = s.warning || '';
                document.getElementById('svcImage').value = s.image || '';
                admTab = 'svc';
                render();
            });
            document.querySelectorAll('[data-delsvc]').forEach(b => b.onclick = function() {
                if (!confirm('Удалить?')) return;
                services = services.filter(s => s.id != b.dataset.delsvc);
                saveToFB();
                render();
            });
        }

        // ==================== МОДАЛКА ====================
        function openModal(sid) {
            let s = services.find(x => x.id === sid);
            if (!s) return;
            document.getElementById('modalTitle').textContent = '📋 ' + s.name;
            let h = '';
            if (s.specs?.trim()) {
                h += '<h3>📅 Регламент</h3><table class="modal-info-table">';
                s.specs.split('\n').forEach(line => { let p = line.split('|'); if (p.length >= 2) h += '<tr><td>' + esc(p[0].trim()) + '</td><td>' + esc(p[1].trim()) + '</td></tr>'; });
                h += '</table>';
            }
            if (s.tools?.trim()) { h += '<h3>🔧 Инструменты</h3><div class="modal-tools">';
                s.tools.split(',').forEach(t => h += '<span class="tool-tag">' + esc(t.trim()) + '</span>');
                h += '</div>'; }
            if (s.steps?.trim()) { h += '<h3>📝 Инструкция</h3>';
                s.steps.split('\n').forEach((st, i) => h += '<div class="step-block"><div class="step-header"><span class="step-number">' + (i + 1) + '</span> Шаг ' + (i + 1) + '</div><div class="step-text">' + esc(st) + '</div></div>'); }
            if (s.image?.trim()) h += '<h3>🖼️ Фото</h3><img src="' + esc(s.image) + '" class="step-image" onerror="this.style.display=\'none\'">';
            if (s.warning?.trim()) h += '<h3>⚠️ Предупреждение</h3><div class="modal-warning">' + esc(s.warning) + '</div>';
            document.getElementById('modalBody').innerHTML = h;
            document.getElementById('modalOverlay').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() { document.getElementById('modalOverlay').classList.add('hidden');
            document.body.style.overflow = ''; }
        document.getElementById('modalClose').onclick = closeModal;
        document.getElementById('modalOverlay').onclick = function(e) { if (e.target === this) closeModal(); };
        document.onkeydown = function(e) { if (e.key === 'Escape') closeModal(); };

        // Старт
        loadFromFB();
    </script>
