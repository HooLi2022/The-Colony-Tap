<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Tracker - The Colony</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #eee;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .current-user {
            background: #0f3460;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
        }

        .search-box {
            display: flex;
            gap: 10px;
        }

        .search-box input {
            padding: 10px 15px;
            border-radius: 25px;
            border: none;
            background: #e94560;
            color: white;
            outline: none;
        }

        .search-box input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            font-weight: bold;
        }

        button:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        button.secondary {
            background: #533483;
        }

        button.danger {
            background: #1a1a2e;
            border: 1px solid #e94560;
        }

        /* Форма добавления */
        .add-form {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }

        .form-group {
            flex: 1;
            min-width: 150px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 5px;
            color: #aaa;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            background: #1a1a2e;
            color: white;
        }

        /* Таблица */
        .stats-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: space-around;
            text-align: center;
        }

        .stat-item {
            background: #0f3460;
            padding: 15px 25px;
            border-radius: 12px;
            min-width: 120px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #e94560;
        }

        .stat-label {
            font-size: 12px;
            margin-top: 5px;
            color: #aaa;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        th {
            background: #0f3460;
            color: #e94560;
        }

        tr:hover {
            background: rgba(255,255,255,0.05);
        }

        .profit {
            color: #4caf50;
            font-weight: bold;
        }

        .loss {
            color: #f44336;
            font-weight: bold;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #f44336;
            font-size: 20px;
            cursor: pointer;
            padding: 0 5px;
        }

        .view-profile {
            background: #533483;
            margin-top: 20px;
        }

        .section-title {
            font-size: 20px;
            margin-bottom: 15px;
            color: #e94560;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }

        @media (max-width: 768px) {
            th, td {
                font-size: 12px;
                padding: 8px;
            }
            .form-group {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="user-info">
                <div>
                    <span style="color:#aaa;">👤 Текущий профиль:</span>
                    <span class="current-user" id="currentUserDisplay">Не авторизован</span>
                </div>
                <div class="search-box">
                    <input type="text" id="searchNick" placeholder="Ник игрока для просмотра">
                    <button onclick="viewUserProfile()">🔍 Найти</button>
                    <button onclick="resetToMyProfile()" class="secondary">👤 Мой профиль</button>
                </div>
            </div>
        </div>

        <div id="app">
            <!-- Контент будет загружаться динамически -->
        </div>
    </div>

    <!-- Подключаем Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // Конфигурация Firebase (ваша)
        const firebaseConfig = {
            apiKey: "AIzaSyB5xxxxxxxxxxxxxxxxxxxxxxx", // Ваш реальный API Key
            authDomain: "the-colony-tap.firebaseapp.com",
            databaseURL: "https://the-colony-tap-default-rtdb.firebaseio.com",
            projectId: "the-colony-tap",
            storageBucket: "the-colony-tap.firebasestorage.app",
            messagingSenderId: "573049321250",
            appId: "1:573049321250:web:8bd706c6bc53b7f2ceface"
        };

        // Инициализация
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Текущий пользователь
        let currentUser = null;
        let viewingUser = null; // Кого смотрим (null = себя)

        // Функция входа
        function login() {
            let nick = prompt("Введите ваш ник (только латиница, цифры, _):", "Trader" + Math.floor(Math.random() * 1000));
            if (!nick) return;
            nick = nick.replace(/[^a-zA-Z0-9_]/g, '_');
            if (nick.length < 2) nick = "User_" + Date.now();
            
            currentUser = nick;
            localStorage.setItem("tradeTrackerUser", currentUser);
            viewingUser = null;
            renderApp();
        }

        // Выход
        function logout() {
            currentUser = null;
            viewingUser = null;
            localStorage.removeItem("tradeTrackerUser");
            renderApp();
        }

        // Проверка авторизации при загрузке
        function checkAuth() {
            const saved = localStorage.getItem("tradeTrackerUser");
            if (saved && saved.length > 0) {
                currentUser = saved;
                renderApp();
            } else {
                renderLoginScreen();
            }
        }

        // Экран входа
        function renderLoginScreen() {
            const app = document.getElementById("app");
            app.innerHTML = `
                <div class="stats-card" style="text-align: center;">
                    <h2>🎮 Trade Tracker - The Colony</h2>
                    <p style="margin: 20px 0;">Учёт продаж и покупок с автоматическим расчётом комиссии Steam (13%)</p>
                    <button onclick="login()" style="font-size: 18px; padding: 12px 30px;">🚀 Войти / Создать профиль</button>
                </div>
            `;
        }

        // Добавить сделку
        async function addTrade() {
            const itemName = document.getElementById("itemName").value;
            const buyPrice = parseFloat(document.getElementById("buyPrice").value) || 0;
            const sellPrice = parseFloat(document.getElementById("sellPrice").value) || 0;
            const type = document.getElementById("tradeType").value;

            if (!itemName) {
                alert("Введите название предмета");
                return;
            }

            if (buyPrice < 0 || sellPrice < 0) {
                alert("Цены не могут быть отрицательными");
                return;
            }

            // Комиссия при продаже
            let commission = 0;
            let netSell = sellPrice;
            if (sellPrice > 0) {
                commission = sellPrice * 0.13;
                netSell = sellPrice - commission;
            }

            const profit = netSell - buyPrice;

            const trade = {
                id: Date.now(),
                itemName: itemName,
                buyPrice: buyPrice,
                sellPrice: sellPrice,
                commission: commission,
                netSell: netSell,
                profit: profit,
                type: type,
                date: new Date().toLocaleString()
            };

            const userRef = database.ref(`users/${viewingUser || currentUser}/trades`);
            const snapshot = await userRef.once("value");
            let trades = snapshot.val() || [];
            trades.push(trade);
            await userRef.set(trades);

            // Очистить форму
            document.getElementById("itemName").value = "";
            document.getElementById("buyPrice").value = "";
            document.getElementById("sellPrice").value = "";
            
            renderApp();
        }

        // Удалить сделку
        async function deleteTrade(tradeId) {
            const userRef = database.ref(`users/${viewingUser || currentUser}/trades`);
            const snapshot = await userRef.once("value");
            let trades = snapshot.val() || [];
            trades = trades.filter(t => t.id !== tradeId);
            await userRef.set(trades);
            renderApp();
        }

        // Просмотр профиля другого игрока
        async function viewUserProfile() {
            const searchNick = document.getElementById("searchNick").value.trim();
            if (!searchNick) {
                alert("Введите ник для поиска");
                return;
            }
            const cleanNick = searchNick.replace(/[^a-zA-Z0-9_]/g, '_');
            
            // Проверяем, существует ли пользователь
            const ref = database.ref(`users/${cleanNick}`);
            const snapshot = await ref.once("value");
            if (!snapshot.exists()) {
                alert(`Пользователь "${cleanNick}" не найден`);
                return;
            }
            
            viewingUser = cleanNick;
            renderApp();
        }

        // Сброс к своему профилю
        function resetToMyProfile() {
            viewingUser = null;
            document.getElementById("searchNick").value = "";
            renderApp();
        }

        // Основной рендер
        async function renderApp() {
            if (!currentUser) {
                renderLoginScreen();
                return;
            }

            const app = document.getElementById("app");
            const isViewingOther = viewingUser && viewingUser !== currentUser;
            const activeUser = viewingUser || currentUser;

            // Получаем сделки
            const tradesRef = database.ref(`users/${activeUser}/trades`);
            const snapshot = await tradesRef.once("value");
            let trades = snapshot.val() || [];

            // Статистика
            let totalBuy = 0, totalSellGross = 0, totalCommission = 0, totalNet = 0, totalProfit = 0;
            trades.forEach(t => {
                totalBuy += t.buyPrice || 0;
                totalSellGross += t.sellPrice || 0;
                totalCommission += t.commission || 0;
                totalNet += t.netSell || 0;
                totalProfit += t.profit || 0;
            });

            app.innerHTML = `
                <div class="add-form">
                    <div class="section-title">➕ Новая сделка</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Предмет</label>
                            <input type="text" id="itemName" placeholder="Кейс, капсула, скин...">
                        </div>
                        <div class="form-group">
                            <label>Цена покупки (₽)</label>
                            <input type="number" id="buyPrice" step="0.01" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label>Цена продажи (₽)</label>
                            <input type="number" id="sellPrice" step="0.01" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label>Тип</label>
                            <select id="tradeType">
                                <option value="trade">Сделка</option>
                                <option value="buy">Только покупка</option>
                                <option value="sell">Только продажа</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <button onclick="addTrade()">➕ Добавить</button>
                        </div>
                    </div>
                </div>

                <div class="stats-card">
                    <div class="section-title">📊 Статистика ${isViewingOther ? `игрока ${activeUser}` : 'моя'}</div>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value">${totalBuy.toFixed(2)} ₽</div>
                            <div class="stat-label">💰 Потрачено</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${totalSellGross.toFixed(2)} ₽</div>
                            <div class="stat-label">💵 Продажи (брутто)</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${totalCommission.toFixed(2)} ₽</div>
                            <div class="stat-label">📉 Комиссия (13%)</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value ${totalProfit >= 0 ? 'profit' : 'loss'}">${totalProfit.toFixed(2)} ₽</div>
                            <div class="stat-label">📈 Чистая прибыль</div>
                        </div>
                    </div>
                </div>

                <div class="stats-card">
                    <div class="section-title">📋 История сделок</div>
                    ${trades.length === 0 ? '<div class="empty-state">Нет сделок. Добавьте первую!</div>' : `
                        <table>
                            <thead>
                                <tr>
                                    <th>Дата</th>
                                    <th>Предмет</th>
                                    <th>Покупка</th>
                                    <th>Продажа</th>
                                    <th>Комиссия</th>
                                    <th>Чистый доход</th>
                                    <th>Прибыль</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                ${trades.slice().reverse().map(t => `
                                    <tr>
                                        <td>${t.date || '-'}</td>
                                        <td>${t.itemName}</td>
                                        <td>${t.buyPrice > 0 ? t.buyPrice.toFixed(2) + ' ₽' : '-'}</td>
                                        <td>${t.sellPrice > 0 ? t.sellPrice.toFixed(2) + ' ₽' : '-'}</td>
                                        <td>${t.commission > 0 ? t.commission.toFixed(2) + ' ₽' : '-'}</td>
                                        <td>${t.netSell > 0 ? t.netSell.toFixed(2) + ' ₽' : '-'}</td>
                                        <td class="${t.profit >= 0 ? 'profit' : 'loss'}">${t.profit > 0 ? '+' : ''}${t.profit.toFixed(2)} ₽</td>
                                        <td>${!isViewingOther ? `<button class="delete-btn" onclick="deleteTrade(${t.id})">🗑️</button>` : '-'}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `}
                </div>
            `;

            // Обновляем отображение текущего пользователя в хедере
            document.getElementById("currentUserDisplay").innerHTML = `${currentUser} ${isViewingOther ? `→ просмотр: ${activeUser}` : ''}`;
        }

        // Старт
        window.onload = () => {
            checkAuth();
        };

        // Глобальные функции для кнопок
        window.login = login;
        window.logout = logout;
        window.addTrade = addTrade;
        window.deleteTrade = deleteTrade;
        window.viewUserProfile = viewUserProfile;
        window.resetToMyProfile = resetToMyProfile;
    </script>
</body>
</html>
