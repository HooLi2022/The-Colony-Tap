<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎁 CS2 CASE OPENER | Массовое открытие кейсов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0e1a, #0f1219);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #1a1f2a, #0f1219);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border-bottom: 3px solid #ffd700;
        }

        .balance-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .balance-card {
            background: linear-gradient(135deg, #2a2f3a, #1a1f2a);
            padding: 20px 35px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #ffd700;
        }

        .balance-amount {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffd700;
        }

        .stats {
            display: flex;
            gap: 20px;
        }

        .stat {
            background: rgba(255,255,255,0.05);
            padding: 15px 25px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
        }

        .cases-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .case-card {
            background: linear-gradient(135deg, #1f242f, #151a24);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid rgba(255,215,0,0.2);
        }

        .case-card:hover {
            transform: translateY(-5px);
            border-color: #ffd700;
        }

        .case-image {
            font-size: 5rem;
            margin-bottom: 15px;
        }

        .case-name {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .case-price {
            font-size: 1.3rem;
            color: #ffd700;
            margin: 15px 0;
        }

        .case-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            margin: 15px 0;
        }

        .case-controls button {
            background: #2a2f3a;
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 10px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .case-controls button:hover {
            background: #ffd700;
            color: #1a1f2a;
        }

        .case-count {
            font-size: 1.3rem;
            font-weight: bold;
            min-width: 50px;
            text-align: center;
        }

        .total-price {
            font-size: 0.9rem;
            color: #ffd700;
            margin: 10px 0;
        }

        .open-btn {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #1a1f2a;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }

        .open-btn:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        .open-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* МАССОВОЕ ОТКРЫТИЕ */
        .mass-open-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            overflow-y: auto;
            padding: 20px;
        }

        .mass-open-container {
            width: 95%;
            max-width: 1400px;
            background: linear-gradient(135deg, #1a1f2a, #0f1219);
            border-radius: 30px;
            padding: 30px;
            border: 3px solid #ffd700;
        }

        .mass-open-title {
            color: #ffd700;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 20px;
        }

        .roulettes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-height: 60vh;
            overflow-y: auto;
            padding: 10px;
        }

        .roulette-card {
            background: linear-gradient(135deg, #1f242f, #151a24);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.3);
            position: relative;
        }

        .roulette-card .roulette-number {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #ffd700;
            color: #1a1f2a;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .roulette-wrapper {
            position: relative;
            overflow: hidden;
            margin: 15px 0;
            border-radius: 15px;
            background: #0a0e1a;
            padding: 15px 0;
            min-height: 180px;
        }

        .roulette-track {
            display: flex;
            gap: 10px;
            transition: transform 2s cubic-bezier(0.1, 0.9, 0.2, 1);
            will-change: transform;
        }

        .roulette-item {
            min-width: 100px;
            padding: 15px 10px;
            text-align: center;
            background: linear-gradient(135deg, #2a2f3a, #1a1f2a);
            border-radius: 12px;
            border: 2px solid transparent;
        }

        .roulette-item.active {
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(255,215,0,0.5);
            transform: scale(1.02);
        }

        .roulette-item-icon {
            font-size: 2rem;
        }

        .roulette-item-name {
            font-size: 0.7rem;
            margin-top: 5px;
        }

        .roulette-item-price {
            font-size: 0.65rem;
            color: #ffd700;
        }

        .center-indicator {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 100%;
            background: linear-gradient(to bottom, #ffd700, #ffaa00, #ffd700);
            z-index: 20;
            box-shadow: 0 0 10px rgba(255,215,0,0.8);
            pointer-events: none;
        }

        .roulette-result {
            margin-top: 10px;
            padding: 10px;
            background: rgba(76,175,80,0.2);
            border-radius: 10px;
            font-size: 0.85rem;
        }

        .mass-open-controls {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .mass-spin-btn, .mass-close-btn {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #1a1f2a;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .mass-spin-btn:hover, .mass-close-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        .mass-spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .summary-results {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            text-align: center;
        }

        .inventory-section {
            background: linear-gradient(135deg, #1a1f2a, #0f1219);
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            border-top: 3px solid #ffd700;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }

        .inventory-item {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid rgba(255,215,0,0.2);
        }

        .inventory-item:hover {
            transform: translateY(-3px);
            border-color: #ffd700;
        }

        .inventory-item-icon {
            font-size: 2.5rem;
        }

        .inventory-item-name {
            font-size: 0.8rem;
            margin-top: 8px;
        }

        .inventory-item-price {
            font-size: 0.7rem;
            color: #ffd700;
        }

        .sell-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 0.7rem;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
        }

        .reset-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #ff4444;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            z-index: 100;
        }

        .reset-btn:hover {
            background: #ff6666;
            transform: scale(1.05);
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 2000;
            animation: slideIn 0.3s;
            display: none;
        }

        .notification.show {
            display: block;
        }

        .notification.error {
            background: #ff4444;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="balance-info">
                <div class="balance-card">
                    <div class="balance-amount" id="balance">0</div>
                    <div class="balance-label">💰 Монеты</div>
                </div>
                <div class="stats">
                    <div class="stat">
                        <div class="stat-value" id="casesOpened">0</div>
                        <div class="stat-label">Открыто кейсов</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="itemsValue">0</div>
                        <div class="stat-label">💰 Стоимость инвентаря</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="cases-section">
            <h2 class="section-title" style="font-size: 1.8rem; margin-bottom: 20px;">🎁 Доступные кейсы</h2>
            <div class="cases-grid" id="casesList"></div>
        </div>

        <div class="inventory-section">
            <h2 class="section-title" style="font-size: 1.8rem; margin-bottom: 20px;">📦 Мой инвентарь</h2>
            <div class="inventory-grid" id="inventoryList"></div>
        </div>
    </div>

    <button class="reset-btn" onclick="resetGame()">🔄 СБРОС ИГРЫ</button>
    <div class="notification" id="notification"></div>

    <script>
        // Данные кейсов
        const cases = [
            {
                id: 'case_1',
                name: '⚡ ОБЫЧНЫЙ КЕЙС',
                icon: '📦',
                price: 100,
                items: [
                    { name: 'P250 | Sand Dune', icon: '🔫', price: 5, rarity: 'common' },
                    { name: 'MAC-10 | Palm', icon: '🔫', price: 8, rarity: 'common' },
                    { name: 'Five-SeveN | Forest', icon: '🔫', price: 12, rarity: 'common' },
                    { name: 'M4A4 | Urban DDPAT', icon: '🔫', price: 25, rarity: 'rare' },
                    { name: 'AK-47 | Blue Laminate', icon: '🔫', price: 40, rarity: 'rare' },
                    { name: 'AWP | Worm God', icon: '🔫', price: 60, rarity: 'epic' },
                    { name: '★ Knife | Forest', icon: '🔪', price: 500, rarity: 'legendary' }
                ]
            },
            {
                id: 'case_2',
                name: '💎 ПРЕМИУМ КЕЙС',
                icon: '💎',
                price: 500,
                items: [
                    { name: 'USP-S | Guardian', icon: '🔫', price: 30, rarity: 'rare' },
                    { name: 'Desert Eagle | Crimson Web', icon: '🔫', price: 50, rarity: 'rare' },
                    { name: 'M4A1-S | Cyrex', icon: '🔫', price: 80, rarity: 'epic' },
                    { name: 'AK-47 | Redline', icon: '🔫', price: 120, rarity: 'epic' },
                    { name: 'AWP | Asiimov', icon: '🔫', price: 250, rarity: 'legendary' },
                    { name: '★ Knife | Crimson Web', icon: '🔪', price: 1500, rarity: 'mythical' },
                    { name: '★ Butterfly Knife | Fade', icon: '🦋', price: 5000, rarity: 'divine' }
                ]
            },
            {
                id: 'case_3',
                name: '👑 ЛЕГЕНДАРНЫЙ КЕЙС',
                icon: '👑',
                price: 2500,
                items: [
                    { name: 'AWP | Dragon Lore', icon: '🐉', price: 5000, rarity: 'legendary' },
                    { name: 'AK-47 | Fire Serpent', icon: '🔥', price: 3000, rarity: 'legendary' },
                    { name: 'M4A4 | Howl', icon: '🐺', price: 4000, rarity: 'legendary' },
                    { name: '★ Karambit | Fade', icon: '🔪', price: 15000, rarity: 'mythical' },
                    { name: '★ M9 Bayonet | Marble Fade', icon: '🔪', price: 20000, rarity: 'mythical' },
                    { name: '★ Butterfly Knife | Doppler', icon: '🦋', price: 35000, rarity: 'divine' },
                    { name: '★ Karambit | Ruby', icon: '💎', price: 100000, rarity: 'divine' }
                ]
            }
        ];

        let player = {
            balance: 10000,
            casesOpened: 0,
            inventory: []
        };

        // Количество выбранных кейсов для каждого типа
        let selectedCounts = {
            case_1: 1,
            case_2: 1,
            case_3: 1
        };

        const balanceEl = document.getElementById('balance');
        const casesOpenedEl = document.getElementById('casesOpened');
        const itemsValueEl = document.getElementById('itemsValue');
        const casesList = document.getElementById('casesList');
        const inventoryList = document.getElementById('inventoryList');

        function loadGame() {
            const saved = localStorage.getItem('cs2_opener');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    player = { ...player, ...data };
                } catch(e) {}
            }
            updateUI();
            renderCases();
            renderInventory();
        }

        function saveGame() {
            localStorage.setItem('cs2_opener', JSON.stringify({
                balance: player.balance,
                casesOpened: player.casesOpened,
                inventory: player.inventory
            }));
        }

        function updateUI() {
            balanceEl.textContent = player.balance.toLocaleString();
            casesOpenedEl.textContent = player.casesOpened;
            const totalValue = player.inventory.reduce((sum, item) => sum + item.price, 0);
            itemsValueEl.textContent = totalValue.toLocaleString();
        }

        function updateCount(caseId, delta) {
            const newCount = selectedCounts[caseId] + delta;
            if (newCount >= 1 && newCount <= 10) {
                selectedCounts[caseId] = newCount;
                renderCases();
            }
        }

        function renderCases() {
            casesList.innerHTML = cases.map(caseItem => {
                const totalPrice = caseItem.price * selectedCounts[caseItem.id];
                const canAfford = player.balance >= totalPrice;
                
                return `
                    <div class="case-card">
                        <div class="case-image">${caseItem.icon}</div>
                        <div class="case-name">${caseItem.name}</div>
                        <div class="case-price">${caseItem.price} <span>монет/шт</span></div>
                        <div class="case-controls">
                            <button onclick="updateCount('${caseItem.id}', -1)" ${selectedCounts[caseItem.id] <= 1 ? 'disabled' : ''}>-</button>
                            <span class="case-count">${selectedCounts[caseItem.id]}</span>
                            <button onclick="updateCount('${caseItem.id}', 1)" ${selectedCounts[caseItem.id] >= 10 ? 'disabled' : ''}>+</button>
                        </div>
                        <div class="total-price">💰 Итого: ${totalPrice} монет</div>
                        <button class="open-btn" onclick="openMultipleCases('${caseItem.id}')" 
                            ${!canAfford ? 'disabled' : ''}>
                            🎁 ОТКРЫТЬ ${selectedCounts[caseItem.id]} КЕЙС(ОВ)
                        </button>
                    </div>
                `;
            }).join('');
        }

        function renderInventory() {
            if (player.inventory.length === 0) {
                inventoryList.innerHTML = '<div style="text-align:center; color:#aaa; grid-column:1/-1;">Инвентарь пуст. Откройте кейс!</div>';
                return;
            }
            
            const grouped = {};
            player.inventory.forEach(item => {
                const key = `${item.name}|${item.icon}`;
                if (!grouped[key]) {
                    grouped[key] = { ...item, count: 0 };
                }
                grouped[key].count++;
            });
            
            inventoryList.innerHTML = Object.values(grouped).map(item => `
                <div class="inventory-item">
                    <div class="inventory-item-icon">${item.icon}</div>
                    <div class="inventory-item-name">${item.name}</div>
                    <div class="inventory-item-price">${item.price}💰</div>
                    <div class="inventory-item-price">x${item.count}</div>
                    <button class="sell-btn" onclick="sellItem('${item.name}', '${item.icon}')">💸 ПРОДАТЬ ВСЕ</button>
                </div>
            `).join('');
        }

        function openMultipleCases(caseId) {
            const caseItem = cases.find(c => c.id === caseId);
            if (!caseItem) return;
            
            const count = selectedCounts[caseId];
            const totalPrice = caseItem.price * count;
            
            if (player.balance < totalPrice) {
                showNotification('❌ Недостаточно монет!', 'error');
                return;
            }
            
            // Списываем монеты
            player.balance -= totalPrice;
            player.casesOpened += count;
            
            // Генерируем выигрыши для каждого кейса
            const results = [];
            for (let i = 0; i < count; i++) {
                const randomIndex = Math.floor(Math.random() * caseItem.items.length);
                const wonItem = { ...caseItem.items[randomIndex], wonAt: Date.now() };
                player.inventory.push(wonItem);
                results.push(wonItem);
            }
            
            saveGame();
            updateUI();
            renderInventory();
            
            // Показываем анимацию массового открытия
            showMassOpenAnimation(caseItem, results);
        }
        
        function showMassOpenAnimation(caseItem, results) {
            const ITEM_COPIES = 50;
            const itemsList = [];
            for (let i = 0; i < ITEM_COPIES; i++) {
                itemsList.push(...caseItem.items);
            }
            
            const modal = document.createElement('div');
            modal.className = 'mass-open-modal';
            
            // Создаём рулетки для каждого кейса
            const roulettesHTML = results.map((result, idx) => `
                <div class="roulette-card" id="roulette-${idx}">
                    <div class="roulette-number">${idx + 1}</div>
                    <div class="roulette-wrapper" style="min-height: 160px;">
                        <div class="center-indicator"></div>
                        <div class="roulette-track" id="track-${idx}">
                            ${itemsList.map((item, itemIdx) => `
                                <div class="roulette-item" data-name="${item.name}" data-price="${item.price}" data-rarity="${item.rarity}" data-icon="${item.icon}">
                                    <div class="roulette-item-icon">${item.icon}</div>
                                    <div class="roulette-item-name">${item.name.substring(0, 15)}</div>
                                    <div class="roulette-item-price">${item.price}💰</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="roulette-result" id="result-${idx}" style="display: none;">
                        <div style="font-size: 1.2rem;">✨ ${result.icon} ${result.name}</div>
                        <div style="color: #ffd700;">+${result.price}💰</div>
                    </div>
                </div>
            `).join('');
            
            modal.innerHTML = `
                <div class="mass-open-container">
                    <div class="mass-open-title">🎲 ОТКРЫТИЕ ${results.length} КЕЙСОВ</div>
                    <div class="roulettes-grid" id="roulettesGrid">
                        ${roulettesHTML}
                    </div>
                    <div class="mass-open-controls">
                        <button class="mass-spin-btn" id="massSpinBtn">🎰 КРУТИТЬ ВСЕ</button>
                        <button class="mass-close-btn" id="massCloseBtn" style="display: none;">✨ ЗАБРАТЬ ВСЁ</button>
                    </div>
                    <div class="summary-results" id="summaryResults" style="display: none;"></div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            const spinBtn = modal.querySelector('#massSpinBtn');
            const closeBtn = modal.querySelector('#massCloseBtn');
            const summaryDiv = modal.querySelector('#summaryResults');
            
            let completedSpins = 0;
            const totalSpins = results.length;
            const allWonItems = [...results];
            
            function startSpinForRoulette(index, targetItem) {
                const track = modal.querySelector(`#track-${index}`);
                const wrapper = track?.parentElement;
                const resultDiv = modal.querySelector(`#result-${index}`);
                
                if (!track || !wrapper) return;
                
                // Находим целевой элемент
                const allItems = track.querySelectorAll('.roulette-item');
                let targetElement = null;
                for (let i = 0; i < allItems.length; i++) {
                    if (allItems[i].dataset.name === targetItem.name) {
                        targetElement = allItems[i];
                        break;
                    }
                }
                
                if (targetElement) {
                    const wrapperRect = wrapper.getBoundingClientRect();
                    const targetRect = targetElement.getBoundingClientRect();
                    const centerX = wrapperRect.left + wrapperRect.width / 2;
                    const targetCenterX = targetRect.left + targetRect.width / 2;
                    const offsetToCenter = targetCenterX - centerX;
                    
                    const currentTransform = track.style.transform;
                    let currentX = 0;
                    if (currentTransform) {
                        const match = currentTransform.match(/translateX\(([-\d.]+)px\)/);
                        if (match) currentX = parseFloat(match[1]);
                    }
                    
                    const targetPosition = currentX - offsetToCenter - 400;
                    const randomOffset = (Math.random() - 0.5) * 200;
                    const finalPosition = targetPosition + randomOffset;
                    
                    track.style.transition = 'transform 2s cubic-bezier(0.1, 0.9, 0.2, 1)';
                    track.style.transform = `translateX(${finalPosition}px)`;
                    
                    setTimeout(() => {
                        // Показываем результат
                        const rarityColors = {
                            common: '#808080', rare: '#4169e1', epic: '#9400d3',
                            legendary: '#ff8c00', mythical: '#ff00ff', divine: '#00ffff'
                        };
                        resultDiv.style.display = 'block';
                        resultDiv.style.border = `2px solid ${rarityColors[targetItem.rarity] || '#ffd700'}`;
                        
                        completedSpins++;
                        if (completedSpins === totalSpins) {
                            showSummary();
                        }
                    }, 2100);
                }
            }
            
            function showSummary() {
                // Группируем выигрыши
                const grouped = {};
                allWonItems.forEach(item => {
                    const key = `${item.name}|${item.icon}`;
                    if (!grouped[key]) {
                        grouped[key] = { ...item, count: 0 };
                    }
                    grouped[key].count++;
                });
                
                const totalValue = allWonItems.reduce((sum, item) => sum + item.price, 0);
                
                summaryDiv.innerHTML = `
                    <h3 style="color:#ffd700;">📊 ИТОГИ ОТКРЫТИЯ</h3>
                    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 15px 0;">
                        ${Object.values(grouped).map(item => `
                            <div style="background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; text-align: center;">
                                <div style="font-size: 1.5rem;">${item.icon}</div>
                                <div>${item.name}</div>
                                <div style="color:#ffd700;">x${item.count}</div>
                                <div>${item.price * item.count}💰</div>
                            </div>
                        `).join('')}
                    </div>
                    <div style="font-size: 1.3rem;">💰 Общая стоимость: ${totalValue} монет</div>
                `;
                summaryDiv.style.display = 'block';
                
                spinBtn.style.display = 'none';
                closeBtn.style.display = 'inline-block';
            }
            
            spinBtn.onclick = () => {
                spinBtn.disabled = true;
                spinBtn.textContent = '🌀 ПРОКРУТКА...';
                
                // Запускаем анимацию для всех рулеток
                results.forEach((result, idx) => {
                    setTimeout(() => {
                        startSpinForRoulette(idx, result);
                    }, idx * 150);
                });
            };
            
            closeBtn.onclick = () => {
                modal.remove();
                renderCases();
                showNotification(`✅ Открыто ${totalSpins} кейсов! Получено ${allWonItems.length} предметов`);
            };
        }
        
        function sellItem(itemName, itemIcon) {
            const itemsToSell = player.inventory.filter(item => item.name === itemName && item.icon === itemIcon);
            
            if (itemsToSell.length === 0) {
                showNotification('❌ Предмет не найден!', 'error');
                return;
            }
            
            const totalPrice = itemsToSell.reduce((sum, item) => sum + item.price, 0);
            
            if (confirm(`Продать ${itemsToSell.length} шт. "${itemName}" за ${totalPrice} монет?`)) {
                player.inventory = player.inventory.filter(item => !(item.name === itemName && item.icon === itemIcon));
                player.balance += totalPrice;
                
                saveGame();
                updateUI();
                renderInventory();
                
                showNotification(`✅ Продано! +${totalPrice} монет`);
            }
        }
        
        function resetGame() {
            if (confirm('⚠️ ВНИМАНИЕ! Весь прогресс будет удален. Продолжить?')) {
                player = {
                    balance: 10000,
                    casesOpened: 0,
                    inventory: []
                };
                selectedCounts = { case_1: 1, case_2: 1, case_3: 1 };
                saveGame();
                updateUI();
                renderInventory();
                renderCases();
                showNotification('🔄 Игра сброшена!');
            }
        }
        
        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type === 'error' ? 'error' : ''} show`;
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }
        
        loadGame();
    </script>
</body>
</html>
