<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автосервис - Прайс-лист с выбором авто</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #1e1e32;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255, 165, 0, 0.3);
        }
        .logo {
            font-size: 36px;
            font-weight: 900;
            color: #ff9800;
            letter-spacing: 3px;
        }
        .logo span {
            color: #fff;
            font-weight: 300;
        }
        .subtitle {
            font-size: 14px;
            color: #aaa;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* Выбор авто */
        .selector-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .selector-title {
            font-size: 13px;
            font-weight: 700;
            color: #ff9800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 14px;
            text-align: center;
        }
        .selector-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
        }
        .selector-row:last-child {
            margin-bottom: 0;
        }
        .selector-group {
            flex: 1;
            min-width: 180px;
        }
        .selector-label {
            font-size: 10px;
            font-weight: 700;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .selector-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .sel-btn {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.04);
            color: #ccc;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .sel-btn:hover {
            background: rgba(255, 152, 0, 0.15);
            border-color: rgba(255, 152, 0, 0.5);
            color: #fff;
        }
        .sel-btn.active {
            background: #ff9800;
            color: #000;
            border-color: #ff9800;
            font-weight: 700;
            box-shadow: 0 0 12px rgba(255, 152, 0, 0.4);
        }
        .sel-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        .selected-config {
            background: rgba(255, 152, 0, 0.12);
            border: 1px solid #ff9800;
            border-radius: 10px;
            padding: 12px 16px;
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .selected-config-icon {
            font-size: 32px;
        }
        .selected-config-info {
            flex: 1;
        }
        .selected-config-name {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
        }
        .selected-config-detail {
            font-size: 11px;
            color: #ccc;
        }
        .selected-config-badge {
            background: #ff9800;
            color: #000;
            font-size: 10px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 12px;
            white-space: nowrap;
        }
        .price-multiplier {
            font-size: 10px;
            color: #ff9800;
            margin-top: 3px;
        }

        /* Поиск и фильтры */
        .search-box {
            margin-bottom: 15px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 12px 45px 12px 18px;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .search-box input:focus {
            border-color: #ff9800;
        }
        .search-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
        }
        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .filter-btn {
            padding: 8px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #ccc;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
        }
        .filter-btn:hover {
            background: rgba(255, 152, 0, 0.2);
            border-color: #ff9800;
            color: #fff;
        }
        .filter-btn.active {
            background: #ff9800;
            color: #000;
            border-color: #ff9800;
            font-weight: 700;
        }
        .total-panel {
            background: #ff9800;
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 8px;
            position: sticky;
            top: 10px;
            z-index: 10;
        }
        .total-label {
            font-size: 12px;
            font-weight: 600;
            color: #000;
            text-transform: uppercase;
        }
        .total-price {
            font-size: 28px;
            font-weight: 900;
            color: #000;
        }
        .clear-btn {
            padding: 8px 16px;
            border-radius: 30px;
            border: 2px solid #000;
            background: transparent;
            color: #000;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
        }
        .clear-btn:hover {
            background: #000;
            color: #ff9800;
        }
        .category-title {
            font-size: 13px;
            font-weight: 700;
            color: #ff9800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 15px 0 8px 5px;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }
        .category-title:first-child {
            border-top: none;
            margin-top: 0;
            padding-top: 0;
        }
        .service-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 4px;
            border: 1px solid transparent;
            gap: 10px;
        }
        .service-row:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 152, 0, 0.3);
        }
        .service-row.selected {
            background: rgba(255, 152, 0, 0.2);
            border-color: #ff9800;
        }
        .service-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            cursor: pointer;
            min-width: 150px;
        }
        .check-box {
            width: 24px;
            height: 24px;
            border-radius: 5px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: #000;
        }
        .service-row.selected .check-box {
            background: #ff9800;
            border-color: #ff9800;
        }
        .service-name {
            font-size: 13px;
            color: #ddd;
        }
        .service-row.selected .service-name {
            color: #fff;
            font-weight: 600;
        }
        .service-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .service-price {
            font-size: 15px;
            font-weight: 700;
            color: #ff9800;
            white-space: nowrap;
        }
        .service-row.selected .service-price {
            color: #fff;
        }
        .price-note {
            font-size: 10px;
            color: #888;
            margin-left: 3px;
        }
        .detail-btn {
            padding: 7px 14px;
            border-radius: 20px;
            border: 2px solid #ff9800;
            background: rgba(255, 152, 0, 0.1);
            color: #ff9800;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }
        .detail-btn:hover {
            background: #ff9800;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 152, 0, 0.5);
            transform: scale(1.05);
        }
        .hidden {
            display: none !important;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal {
            background: #1e1e32;
            border-radius: 16px;
            width: 90%;
            max-width: 850px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            border: 2px solid #ff9800;
        }
        .modal::-webkit-scrollbar {
            width: 5px;
        }
        .modal::-webkit-scrollbar-thumb {
            background: rgba(255, 152, 0, 0.4);
            border-radius: 10px;
        }
        .modal-header {
            background: #ff9800;
            padding: 16px 20px;
            border-radius: 14px 14px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 5;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 800;
            color: #000;
        }
        .modal-close {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 2px solid #000;
            background: transparent;
            color: #000;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover {
            background: #000;
            color: #ff9800;
        }
        .modal-body {
            padding: 20px;
        }
        .modal-body h3 {
            font-size: 15px;
            color: #ff9800;
            margin: 20px 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .modal-body h3:first-child {
            margin-top: 0;
        }
        .modal-body p,
        .modal-body li {
            font-size: 13px;
            color: #ccc;
            line-height: 1.7;
        }
        .modal-body ol,
        .modal-body ul {
            padding-left: 20px;
        }
        .modal-body li {
            margin-bottom: 6px;
        }
        .modal-tools {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0;
        }
        .tool-tag {
            background: rgba(255, 255, 255, 0.08);
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 11px;
            color: #ddd;
        }
        .modal-warning {
            background: rgba(255, 152, 0, 0.12);
            border-left: 4px solid #ff9800;
            padding: 12px 14px;
            border-radius: 0 8px 8px 0;
            margin: 10px 0;
            font-size: 13px;
            color: #ffa726;
        }
        .step-block {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .step-header {
            font-weight: 700;
            color: #ff9800;
            font-size: 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .step-number {
            background: #ff9800;
            color: #000;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 13px;
            flex-shrink: 0;
        }
        .step-text {
            font-size: 13px;
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        .step-image {
            width: 100%;
            max-width: 500px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: transform 0.2s;
            display: block;
            margin-top: 6px;
        }
        .step-image:hover {
            transform: scale(1.03);
        }
        .image-caption {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
            font-style: italic;
        }
        .modal-video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            margin: 10px 0;
            background: #000;
        }
        .modal-video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }
        .footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            color: #666;
            font-size: 11px;
        }
        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }
            .selector-row {
                flex-direction: column;
                gap: 8px;
            }
            .selector-group {
                min-width: auto;
            }
            .service-row {
                flex-wrap: wrap;
                padding: 10px;
            }
            .service-right {
                width: 100%;
                justify-content: space-between;
            }
            .detail-btn {
                padding: 6px 12px;
                font-size: 10px;
            }
            .modal {
                width: 95%;
                max-height: 80vh;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="logo">AUTO<span>SERVICE</span></div>
            <div class="subtitle">Прайс-лист с выбором модификации</div>
        </div>

        <!-- Выбор автомобиля -->
        <div class="selector-section">
            <div class="selector-title">🚗 Выберите автомобиль</div>
            <div class="selector-row">
                <div class="selector-group">
                    <div class="selector-label">Марка / Модель</div>
                    <div class="selector-buttons" id="carButtons"></div>
                </div>
            </div>
            <div class="selector-row">
                <div class="selector-group">
                    <div class="selector-label">Двигатель</div>
                    <div class="selector-buttons" id="engineButtons"></div>
                </div>
            </div>
            <div class="selector-row">
                <div class="selector-group">
                    <div class="selector-label">Коробка передач</div>
                    <div class="selector-buttons" id="gearboxButtons"></div>
                </div>
            </div>
            <div class="selected-config" id="selectedConfig">
                <span class="selected-config-icon">🚗</span>
                <div class="selected-config-info">
                    <div class="selected-config-name" id="configName">ВАЗ 2107</div>
                    <div class="selected-config-detail" id="configDetail">1.6, механика</div>
                    <div class="price-multiplier" id="configMultiplier">Коэффициент: ×1.0</div>
                </div>
                <span class="selected-config-badge" id="configBadge">Эконом</span>
            </div>
        </div>

        <!-- Поиск -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Поиск услуги...">
            <span class="search-icon">🔍</span>
        </div>

        <!-- Фильтры -->
        <div class="filter-buttons" id="filterButtons">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="maintenance">ТО</button>
            <button class="filter-btn" data-filter="engine">Двигатель</button>
            <button class="filter-btn" data-filter="exhaust">Выхлоп</button>
            <button class="filter-btn" data-filter="transmission">Трансмиссия</button>
            <button class="filter-btn" data-filter="brakes">Тормоза</button>
            <button class="filter-btn" data-filter="suspension">Подвеска</button>
            <button class="filter-btn" data-filter="welding">Сварка</button>
        </div>

        <!-- Итог -->
        <div class="total-panel">
            <div>
                <div class="total-label">Выбрано: <span id="totalCount">0</span></div>
                <div class="total-label" id="totalCarLabel">ВАЗ 2107</div>
            </div>
            <div class="total-price" id="totalPrice">0 ₽</div>
            <button class="clear-btn" id="clearBtn">Сбросить</button>
        </div>

        <!-- Список услуг -->
        <div id="servicesList"></div>
        <div class="footer">© 2026 AutoService. Цены без учёта запчастей. Нажмите «Подробнее» для инструкции.</div>
    </div>

    <!-- Модальное окно -->
    <div class="modal-overlay hidden" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle"></span>
                <button class="modal-close" id="modalClose">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        // ==================== БАЗА АВТОМОБИЛЕЙ ====================
        const carDatabase = [

            {

        // ==================== УСЛУГИ С БАЗОВЫМИ ЦЕНАМИ ====================
        const services = [
            { id: 1, name: 'Замена масла и масляного фильтра', basePrice: 800, cat: 'maintenance',

            { id: 13, name: 'Замена глушителя', basePrice: 1500, cat: 'exhaust', catName: '💨 ВЫПУСК' },
            { id: 14, name: 'Замена гофры', basePrice: 2000, cat: 'exhaust', catName: '💨 ВЫПУСК' },
            { id: 15, name: 'Замена сцепления (комплект)', basePrice: 7000, cat: 'transmission',
                catName: '⚙️ ТРАНСМИССИЯ' },
            { id: 16, name: 'Замена масла в АКПП', basePrice: 2500, cat: 'transmission', catName: '⚙️ ТРАНСМИССИЯ' },
            { id: 17, name: 'Замена масла в МКПП', basePrice: 800, cat: 'transmission', catName: '⚙️ ТРАНСМИССИЯ' },
            { id: 18, name: 'Замена передних колодок', basePrice: 1200, cat: 'brakes', catName: '🛑 ТОРМОЗА' },
            { id: 19, name: 'Замена задних колодок', basePrice: 1400, cat: 'brakes', catName: '🛑 ТОРМОЗА' },
            { id: 20, name: 'Замена передних дисков', basePrice: 1800, cat: 'brakes', catName: '🛑 ТОРМОЗА' },
            { id: 21, name: 'Замена задних барабанов', basePrice: 1600, cat: 'brakes', catName: '🛑 ТОРМОЗА' },
            { id: 22, name: 'Прокачка тормозов', basePrice: 1200, cat: 'brakes', catName: '🛑 ТОРМОЗА' },
            { id: 23, name: 'Замена амортизаторов перед (2 шт)', basePrice: 3000, cat: 'suspension',
                catName: '🔧 ПОДВЕСКА' },
            { id: 24, name: 'Замена амортизаторов зад (2 шт)', basePrice: 2500, cat: 'suspension',
                catName: '🔧 ПОДВЕСКА' },
            { id: 25, name: 'Замена шаровых опор (2 шт)', basePrice: 2000, cat: 'suspension',
            catName: '🔧 ПОДВЕСКА' },
            { id: 26, name: 'Замена рулевых наконечников (2 шт)', basePrice: 1600, cat: 'suspension',
                catName: '🔧 ПОДВЕСКА' },
            { id: 27, name: 'Регулировка развал-схождения', basePrice: 2000, cat: 'suspension',
                catName: '🔧 ПОДВЕСКА' },
            { id: 28, name: 'Сварочные работы (кузов, час)', basePrice: 3000, cat: 'welding', catName: '🔥 СВАРКА' },
        ];

        // Инструкции
        const instructions = {
            1: {
                title: 'Замена масла и масляного фильтра',
                tools: ['Ключ для пробки', 'Съёмник фильтра', 'Ёмкость', 'Воронка', 'Ветошь'],
                video: 'https://www.youtube.com/embed/dQw4w9WgXcQ',
                videoTitle: 'Видео: Замена масла',
                warning: 'Не перетягивайте фильтр! Используйте качественное масло.',
                stepsWithImages: [
                    { step: 1, title: 'Подготовка',
                        text: 'Подготовьте масло, фильтр, инструменты и ёмкость.', image: null,
                    caption: '' },
                    { step: 2, title: 'Прогрев',
                        text: 'Прогрейте двигатель 5-7 минут. Заглушите.', image: null, caption: '' },
                    { step: 3, title: 'Слив отработки',
                        text: 'Открутите сливную пробку. Слейте масло в ёмкость (10-15 мин).', image: null,
                        caption: '' },
                    { step: 4, title: 'Замена фильтра',
                        text: 'Снимите старый фильтр. Смажьте уплотнитель нового, закрутите от руки.',
                        image: null, caption: '' },
                    { step: 5, title: 'Заливка',
                        text: 'Залейте новое масло. Проверьте уровень щупом.', image: null, caption: '' },
                ],
            },
            5: {
                title: 'Замена ремня ГРМ',
                tools: ['Набор ключей', 'Динамометрический ключ', 'Фиксаторы'],
                video: 'https://www.youtube.com/embed/dQw4w9WgXcQ',
                videoTitle: 'Видео: Замена ремня ГРМ',
                warning: 'Неправильная установка ремня ГРМ может привести к серьёзной поломке двигателя!',
                stepsWithImages: [
                    { step: 1, title: 'Подготовка',
                        text: 'Снимите защитный кожух ремня ГРМ. Выставьте метки.', image: null,
                    caption: '' },
                    { step: 2, title: 'Снятие ремня',
                        text: 'Ослабьте натяжитель. Снимите старый ремень.', image: null, caption: '' },
                    { step: 3, title: 'Установка',
                        text: 'Установите новый ремень по меткам. Натяните согласно спецификации.',
                        image: null, caption: '' },
                    { step: 4, title: 'Проверка',
                        text: 'Прокрутите двигатель вручную на 2 оборота. Проверьте метки.', image: null,
                        caption: '' },
                ],
            },
        };

        services.forEach(s => {
            if (!instructions[s.id]) {
                instructions[s.id] = {
                    title: s.name,
                    tools: ['Набор инструментов', 'Специнструмент'],
                    stepsWithImages: [
                        { step: 1, title: 'Выполнение работы',
                            text: 'Выполните необходимые операции согласно регламенту.', image: null,
                        caption: '' },
                    ],
                    warning: 'При отсутствии опыта обратитесь в автосервис.',
                    video: 'https://www.youtube.com/embed/dQw4w9WgXcQ',
                    videoTitle: 'Видео по ремонту',
                };
            }
        });

        // ==================== СОСТОЯНИЕ ====================
        let selectedCarId = 'vaz2107';
        let selectedEngineId = 'vaz16carb';
        let selectedGearboxId = 'manual5';
        let selectedIds = new Set();
        let currentFilter = 'all';
        let searchQuery = '';

        function getSelectedCarData() {
            const car = carDatabase.find(c => c.carId === selectedCarId);
            if (!car) return null;
            const engine = car.engines.find(e => e.engineId === selectedEngineId);
            if (!engine) return null;
            const gearbox = engine.gearboxes.find(g => g.gearboxId === selectedGearboxId);
            if (!gearbox) return null;
            return { car, engine, gearbox };
        }

        function getMultiplier() {
            const data = getSelectedCarData();
            return data ? data.gearbox.multiplier : 1.0;
        }

        function getServicePrice(service) {
            return Math.round(service.basePrice * getMultiplier());
        }

        function formatPrice(p) { return p.toLocaleString('ru-RU') + ' ₽'; }

        function renderCarButtons() {
            const container = document.getElementById('carButtons');
            container.innerHTML = '';
            carDatabase.forEach(car => {
                const btn = document.createElement('button');
                btn.className = 'sel-btn';
                if (car.carId === selectedCarId) btn.classList.add('active');
                btn.textContent = car.carIcon + ' ' + car.carName;
                btn.addEventListener('click', () => {
                    selectedCarId = car.carId;
                    selectedEngineId = car.engines[0].engineId;
                    selectedGearboxId = car.engines[0].gearboxes[0].gearboxId;
                    selectedIds.clear();
                    renderAll();
                });
                container.appendChild(btn);
            });
        }

        function renderEngineButtons() {
            const container = document.getElementById('engineButtons');
            container.innerHTML = '';
            const car = carDatabase.find(c => c.carId === selectedCarId);
            if (!car) return;
            car.engines.forEach(engine => {
                const btn = document.createElement('button');
                btn.className = 'sel-btn';
                if (engine.engineId === selectedEngineId) btn.classList.add('active');
                btn.textContent = engine.engineName + ' (' + engine.power + ')';
                btn.addEventListener('click', () => {
                    selectedEngineId = engine.engineId;
                    selectedGearboxId = engine.gearboxes[0].gearboxId;
                    selectedIds.clear();
                    renderAll();
                });
                container.appendChild(btn);
            });
        }

        function renderGearboxButtons() {
            const container = document.getElementById('gearboxButtons');
            container.innerHTML = '';
            const car = carDatabase.find(c => c.carId === selectedCarId);
            if (!car) return;
            const engine = car.engines.find(e => e.engineId === selectedEngineId);
            if (!engine) return;
            engine.gearboxes.forEach(gearbox => {
                const btn = document.createElement('button');
                btn.className = 'sel-btn';
                if (gearbox.gearboxId === selectedGearboxId) btn.classList.add('active');
                btn.textContent = gearbox.gearboxName;
                btn.addEventListener('click', () => {
                    selectedGearboxId = gearbox.gearboxId;
                    selectedIds.clear();
                    renderAll();
                });
                container.appendChild(btn);
            });
        }

        function updateSelectedConfig() {
            const data = getSelectedCarData();
            if (!data) return;
            document.getElementById('configName').textContent = data.car.carIcon + ' ' + data.car.carName;
            document.getElementById('configDetail').textContent =
                data.engine.engineName + ', ' + data.gearbox.gearboxName;
            document.getElementById('configMultiplier').textContent =
                'Коэффициент сложности: ×' + data.gearbox.multiplier.toFixed(2);
            document.getElementById('configBadge').textContent = data.gearbox.badge;
            document.getElementById('totalCarLabel').textContent =
                data.car.carName + ' ' + data.engine.engineName;
            document.querySelector('.selected-config-icon').textContent = data.car.carIcon;
        }

        function renderServices() {
            const container = document.getElementById('servicesList');
            container.innerHTML = '';
            const multiplier = getMultiplier();
            let list = services;
            if (currentFilter !== 'all') list = list.filter(s => s.cat === currentFilter);
            if (searchQuery.trim()) {
                const q = searchQuery.toLowerCase().trim();
                list = list.filter(s => s.name.toLowerCase().includes(q));
            }
            const grouped = {};
            list.forEach(s => {
                if (!grouped[s.cat]) grouped[s.cat] = { catName: s.catName, items: [] };
                grouped[s.cat].items.push(s);
            });
            Object.keys(grouped).forEach(key => {
                const g = grouped[key];
                const title = document.createElement('div');
                title.className = 'category-title';
                title.textContent = g.catName;
                container.appendChild(title);
                g.items.forEach(s => {
                    const price = getServicePrice(s);
                    const row = document.createElement('div');
                    row.className = 'service-row';
                    if (selectedIds.has(s.id)) row.classList.add('selected');
                    let note = '';
                    if (multiplier !== 1.0) {
                        const diff = price - s.basePrice;
                        if (diff !== 0) note =
                            `<span class="price-note">(${diff > 0 ? '+' : ''}${diff} ₽)</span>`;
                    }
                    row.innerHTML = `
                    <div class="service-left">
                        <div class="check-box">${selectedIds.has(s.id) ? '✓' : ''}</div>
                        <span class="service-name">${s.name}</span>
                    </div>
                    <div class="service-right">
                        <span class="service-price">${formatPrice(price)} ${note}</span>
                        <button class="detail-btn">📋 Подробнее</button>
                    </div>`;
                    row.querySelector('.service-left').addEventListener('click', () => {
                        if (selectedIds.has(s.id)) selectedIds.delete(s.id);
                        else selectedIds.add(s.id);
                        renderServices();
                    });
                    row.querySelector('.detail-btn').addEventListener('click', (e) => {
                        e.stopPropagation();
                        openModal(s.id);
                    });
                    container.appendChild(row);
                });
            });
            if (!list.length) container.innerHTML =
                '<div style="text-align:center;padding:30px;color:#777;">Ничего не найдено</div>';
            updateTotal();
        }

        function updateTotal() {
            let total = 0;
            selectedIds.forEach(id => {
                const s = services.find(x => x.id === id);
                if (s) total += getServicePrice(s);
            });
            document.getElementById('totalPrice').textContent = formatPrice(total);
            document.getElementById('totalCount').textContent = selectedIds.size + ' шт.';
        }

        function renderAll() {
            renderCarButtons();
            renderEngineButtons();
            renderGearboxButtons();
            updateSelectedConfig();
            renderServices();
        }

        // Модальное окно
        function openModal(serviceId) {
            const instr = instructions[serviceId];
            document.getElementById('modalTitle').textContent = '📋 ' + instr.title;
            let html = '<h3>🔧 Инструменты</h3><div class="modal-tools">';
            instr.tools.forEach(t => html += `<span class="tool-tag">${t}</span>`);
            html += '</div><h3>📝 Пошаговая инструкция</h3>';
            if (instr.stepsWithImages) {
                instr.stepsWithImages.forEach(sd => {
                    html += '<div class="step-block">';
                    html +=
                        `<div class="step-header"><span class="step-number">${sd.step}</span> ${sd.title}</div>`;
                    html += `<div class="step-text">${sd.text}</div>`;
                    if (sd.image) html +=
                        `<img src="${sd.image}" class="step-image" loading="lazy">`;
                    html += '</div>';
                });
            }
            if (instr.warning) html +=
                '<h3>⚠️ Предупреждение</h3><div class="modal-warning">' + instr.warning + '</div>';
            if (instr.video) {
                html += '<h3>🎬 Видео</h3><div class="modal-video-wrapper"><iframe src="' + instr.video +
                    '" allowfullscreen></iframe></div>';
            }
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('modalOverlay').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.add('hidden');
            document.body.style.overflow = '';
        }

        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });
        document.getElementById('clearBtn').addEventListener('click', () => { selectedIds.clear();
            renderServices(); });
        document.getElementById('searchInput').addEventListener('input', e => { searchQuery = e.target.value;
            renderServices(); });
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentFilter = btn.dataset.filter;
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderServices();
            });
        });

        // Инициализация
        renderAll();
        console.log('✅ Каталог с выбором модификаций загружен!');
    </script>
</body>
</html>
